name: "交通运输应急与无人机飞行管理领域本体"
description: "涵盖无人驾驶航空器飞行管理、交通运输突发事件应急处置、公路交通应急抢通等领域的实体、规则和业务过程，支持飞行活动申请审批、合规检查、应急响应、设施评估、资源调度等核心业务流程。"

objects:
  - name: Drone
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "无人驾驶航空器（按性能指标分类）"
    description: "无人驾驶航空器，是指没有机载驾驶员、自备动力系统的航空器。按照性能指标分为微型、轻型、小型、中型和大型。"
    properties:
      - name: drone_id
        type: str
        required: true
        description: "无人驾驶航空器唯一标识（如产品识别码或登记号）"
      - name: category
        type: str
        required: false
        description: "分类：微型/轻型/小型/中型/大型"
      - name: max_takeoff_weight_kg
        type: float
        required: false
        description: "最大起飞重量（千克）"
      - name: empty_weight_kg
        type: float
        required: false
        description: "空机重量（千克）"
      - name: max_flight_height_m
        type: float
        required: false
        description: "最大飞行真高（米）"
      - name: max_speed_kmh
        type: float
        required: false
        description: "最大平飞速度（千米/小时）"
      - name: product_identification_code
        type: str
        required: false
        description: "唯一产品识别码"
      - name: owner
        type: str
        required: false
        description: "所有者信息（实名登记）"
      - name: registration_status
        type: str
        required: false
        description: "实名登记状态：已登记/未登记"
      - name: airworthiness_certificate
        type: str
        required: false
        description: "适航许可（中型、大型需取得）"
      - name: operator_license
        type: str
        required: false
        description: "运营合格证（使用除微型外的单位需取得）"
      - name: pilot_license
        type: str
        required: false
        description: "操控员执照（操控小型、中型、大型需取得）"
      - name: insurance_status
        type: str
        required: false
        description: "责任保险投保状态：已投保/未投保"
      - name: airspace_keeping_capability
        type: bool
        required: false
        description: "是否具备空域保持能力"
      - name: reliable_monitored_capability
        type: bool
        required: false
        description: "是否具备可靠被监视能力"
      - name: radio_frequency
        type: str
        required: false
        description: "指挥控制链路无线电频率"
    status_transitions: {}
    constraints: []

  - name: FlightMission
    kind: entity
    data_source: agent_generated
    mutability: mutable
    summary: "飞行活动申请及执行记录"
    description: "组织无人驾驶航空器飞行活动的单位或者个人需提交的飞行活动申请，包含飞行任务、空域、时间等信息。"
    properties:
      - name: mission_id
        type: str
        required: true
        description: "飞行活动申请编号"
      - name: applicant
        type: str
        required: false
        description: "组织飞行活动的单位或者个人"
      - name: pilot_info
        type: str
        required: false
        description: "操控人员信息以及有关资质证书"
      - name: drone_type
        type: str
        required: false
        description: "无人驾驶航空器的类型"
      - name: drone_quantity
        type: int
        required: false
        description: "无人驾驶航空器数量"
      - name: drone_performance
        type: str
        required: false
        description: "主要性能指标"
      - name: drone_registration
        type: str
        required: false
        description: "登记管理信息"
      - name: mission_type
        type: str
        required: false
        description: "飞行任务性质和飞行方式"
      - name: special_mission_approval
        type: str
        required: false
        description: "执行国家规定的特殊通用航空飞行任务的批准文件"
      - name: takeoff_site
        type: str
        required: false
        description: "起飞、降落和备降机场（场地）"
      - name: communication_method
        type: str
        required: false
        description: "通信联络方法"
      - name: estimated_start_time
        type: str
        required: false
        description: "预计飞行开始时刻"
      - name: estimated_end_time
        type: str
        required: false
        description: "预计飞行结束时刻"
      - name: flight_route
        type: str
        required: false
        description: "飞行航线、高度、速度和空域范围，进出空域方法"
      - name: control_link_frequency
        type: str
        required: false
        description: "指挥控制链路无线电频率以及占用带宽"
      - name: communication_navigation_surveillance_capability
        type: str
        required: false
        description: "通信、导航和被监视能力"
      - name: transponder_code
        type: str
        required: false
        description: "二次雷达应答机或自动监视设备代码申请"
      - name: emergency_procedure
        type: str
        required: false
        description: "应急处置程序"
      - name: special_flight_support
        type: str
        required: false
        description: "特殊飞行保障需求"
      - name: approval_status
        type: str
        required: false
        description: "批准状态：已批准/未批准/待审批"
      - name: approval_authority
        type: str
        required: false
        description: "批准机构（空中交通管理机构）"
      - name: report_time
        type: str
        required: false
        description: "计划起飞1小时前报告预计起飞时刻和准备情况"
      - name: actual_start_time
        type: str
        required: false
        description: "实际起飞时间"
      - name: actual_end_time
        type: str
        required: false
        description: "实际结束时间"
      - name: flight_status
        type: str
        required: false
        description: "飞行状态：申请中/已批准/已起飞/飞行中/已结束/异常"
      - name: status
        type: str
        required: false
        description: "状态: 待审批/已批准/已拒绝/执行中/已完成/已取消"
      - name: flight_type
        type: str
        required: false
        description: "运行分类: 开放类/特定类/审定类"
      - name: operation_type
        type: str
        required: false
        description: "运行种类: 留空飞行/航线飞行/其他飞行"
      - name: business_type
        type: str
        required: false
        description: "经营种类: 载客类/载人类/载货类/培训类/其他类"
      - name: drone_id
        type: str
        required: false
        description: "使用的无人驾驶航空器编号"
      - name: pilot_license_id
        type: str
        required: false
        description: "操控员执照编号"
      - name: operation_certificate_id
        type: str
        required: false
        description: "运营合格证编号"
      - name: airworthiness_certificate_id
        type: str
        required: false
        description: "适航证编号"
      - name: registration_id
        type: str
        required: false
        description: "实名登记号"
      - name: flight_area
        type: str
        required: false
        description: "飞行区域描述"
      - name: flight_time
        type: str
        required: false
        description: "飞行时间"
      - name: emergency_plan
        type: str
        required: false
        description: "紧急情况处置预案"
    status_transitions:
      "申请中":
        - "已批准"
        - "未批准"
      "已批准":
        - "已起飞"
      "已起飞":
        - "飞行中"
      "飞行中":
        - "已结束"
        - "异常"
      "异常":
        - "已结束"
      "待审批":
        - "已批准"
        - "已拒绝"
      "已批准":
        - "执行中"
      "已拒绝": []
      "执行中":
        - "已完成"
        - "已取消"
      "已完成": []
      "已取消": []
    constraints: []

  - name: ControlledAirspace
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "无人驾驶航空器管制空域"
    description: "国家根据需要划设的无人驾驶航空器管制空域，包括真高120米以上空域、空中禁区、空中限制区等。"
    properties:
      - name: airspace_id
        type: str
        required: true
        description: "空域编号"
      - name: type
        type: str
        required: false
        description: "空域类型：管制空域/适飞空域"
      - name: horizontal_range
        type: str
        required: false
        description: "水平范围"
      - name: vertical_range
        type: str
        required: false
        description: "垂直范围（如真高120米以上）"
      - name: usage_time
        type: str
        required: false
        description: "使用时间"
      - name: description
        type: str
        required: false
        description: "空域描述（如机场周边、军事禁区等）"
      - name: name
        type: str
        required: false
        description: "空域名称"
      - name: spatial_range
        type: str
        required: false
        description: "空间范围描述"
      - name: effective_time
        type: str
        required: false
        description: "有效时间"
      - name: access_conditions
        type: str
        required: false
        description: "准入条件"
      - name: capacity
        type: int
        required: false
        description: "容量(最多可接受的无人驾驶航空器数量)"
    status_transitions: {}
    constraints: []

  - name: PilotLicense
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "民用无人驾驶航空器操控员执照"
    description: "操控小型、中型、大型民用无人驾驶航空器飞行的人员需取得的操控员执照。"
    properties:
      - name: license_id
        type: str
        required: true
        description: "操控员执照编号"
      - name: holder_name
        type: str
        required: false
        description: "持有人姓名"
      - name: civil_capacity
        type: str
        required: false
        description: "民事行为能力：完全/限制/无"
      - name: training_status
        type: str
        required: false
        description: "安全操控培训考核状态：合格/不合格"
      - name: health_status
        type: str
        required: false
        description: "无可能影响操控的疾病病史、无吸毒行为记录"
      - name: criminal_record
        type: str
        required: false
        description: "近5年内无危害国家安全等故意犯罪记录"
      - name: valid_until
        type: str
        required: false
        description: "执照有效期"
      - name: license_type
        type: str
        required: false
        description: "执照类型: 小型/中型/大型"
      - name: category_rating
        type: str
        required: false
        description: "类别等级: 飞机/飞艇/滑翔机/旋翼飞行器/动力升空器/自由气球/特殊类"
      - name: class_rating
        type: str
        required: false
        description: "级别等级"
      - name: type_rating
        type: str
        required: false
        description: "型别等级"
      - name: beyond_visual_line_of_sight_rating
        type: str
        required: false
        description: "超视距等级"
      - name: instructor_rating
        type: str
        required: false
        description: "教员等级"
      - name: holder_id
        type: str
        required: false
        description: "持有人身份证明"
      - name: issue_date
        type: str
        required: false
        description: "颁发日期"
      - name: expiry_date
        type: str
        required: false
        description: "有效期至(执照有效期6年)"
      - name: medical_certificate
        type: str
        required: false
        description: "体检合格证编号(如适用)"
      - name: status
        type: str
        required: false
        description: "状态: 有效/过期/暂扣/吊销/注销"
    status_transitions:
      "有效":
        - "过期"
        - "暂扣"
        - "吊销"
        - "注销"
      "过期":
        - "有效"
      "暂扣":
        - "有效"
        - "吊销"
      "吊销": []
      "注销": []
    constraints: []

  - name: OperationCertificate
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "民用无人驾驶航空器运营合格证"
    description: "使用除微型以外的民用无人驾驶航空器从事飞行活动的单位需取得的运营合格证。"
    properties:
      - name: certificate_id
        type: str
        required: true
        description: "运营合格证编号"
      - name: unit_name
        type: str
        required: false
        description: "单位名称"
      - name: management_structure
        type: str
        required: false
        description: "管理机构、管理人员情况"
      - name: qualified_pilots
        type: str
        required: false
        description: "符合规定的操控人员"
      - name: equipment_facilities
        type: str
        required: false
        description: "符合安全运营要求的无人驾驶航空器及有关设施、设备"
      - name: management_system
        type: str
        required: false
        description: "安全运营的管理制度和操作规程"
      - name: business_type
        type: str
        required: false
        description: "经营性/非经营性"
      - name: valid_until
        type: str
        required: false
        description: "有效期"
      - name: holder_name
        type: str
        required: false
        description: "合格证持有人名称"
      - name: holder_address
        type: str
        required: false
        description: "主运行基地地址"
      - name: issue_date
        type: str
        required: false
        description: "生效日期"
      - name: expiry_date
        type: str
        required: false
        description: "有效期至(24个日历月)"
      - name: operation_types
        type: str
        required: false
        description: "被批准的运行种类: 留空飞行/航线飞行/其他飞行"
      - name: business_types
        type: str
        required: false
        description: "被批准的经营种类: 载客类/载人类/载货类/培训类/其他类"
      - name: status
        type: str
        required: false
        description: "状态: 有效/暂停/吊销/注销"
    status_transitions:
      "有效":
        - "暂停"
        - "吊销"
        - "注销"
      "暂停":
        - "有效"
        - "吊销"
      "吊销": []
      "注销": []
    constraints: []

  - name: AirworthinessCertificate
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "适航许可"
    description: "从事中型、大型民用无人驾驶航空器系统的设计、生产、进口、飞行和维修活动需取得的适航许可。"
    properties:
      - name: certificate_id
        type: str
        required: true
        description: "适航许可编号"
      - name: drone_type
        type: str
        required: false
        description: "无人驾驶航空器类型"
      - name: holder
        type: str
        required: false
        description: "持有人（单位/个人）"
      - name: valid_until
        type: str
        required: false
        description: "有效期"
      - name: certificate_type
        type: str
        required: false
        description: "证件类型: 标准适航证/特殊适航证/特许飞行证/出口适航证"
      - name: drone_id
        type: str
        required: false
        description: "适用的无人驾驶航空器编号"
      - name: holder_name
        type: str
        required: false
        description: "所有人或占有人名称"
      - name: issue_date
        type: str
        required: false
        description: "颁发日期"
      - name: expiry_date
        type: str
        required: false
        description: "有效期(适航证长期有效，特许飞行证由局方规定)"
      - name: status
        type: str
        required: false
        description: "状态: 有效/暂停/吊销/注销"
    status_transitions:
      "有效":
        - "暂停"
        - "吊销"
        - "注销"
      "暂停":
        - "有效"
        - "吊销"
      "吊销": []
      "注销": []
    constraints: []

  - name: FlightIncidentReport
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "飞行安全问题报告"
    description: "无人驾驶航空器飞行发生异常情况导致飞行安全问题时，组织飞行活动的单位或者个人应在降落后24小时内向空中交通管理机构报告。"
    properties:
      - name: report_id
        type: str
        required: true
        description: "报告编号"
      - name: mission_id
        type: str
        required: false
        description: "关联的飞行活动申请编号"
      - name: incident_time
        type: str
        required: false
        description: "异常发生时间"
      - name: description
        type: str
        required: false
        description: "异常情况描述"
      - name: handling_measures
        type: str
        required: false
        description: "处置措施"
      - name: report_time
        type: str
        required: false
        description: "报告时间（降落后24小时内）"
      - name: drone_id
        type: str
        required: false
        description: "涉及的无人驾驶航空器编号"
      - name: incident_type
        type: str
        required: false
        description: "问题类型: 故障/失效/缺陷/事故/其他"
      - name: reporter
        type: str
        required: false
        description: "报告人"
      - name: status
        type: str
        required: false
        description: "状态: 已报告/处理中/已关闭"
    status_transitions:
      "已报告":
        - "处理中"
      "处理中":
        - "已关闭"
      "已关闭": []
    constraints: []

  - name: DroneRegistration
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "民用无人驾驶航空器实名登记"
    description: "民用无人驾驶航空器所有者应当依法进行实名登记。"
    properties:
      - name: registration_id
        type: str
        required: true
        description: "登记编号"
      - name: drone_id
        type: str
        required: false
        description: "无人驾驶航空器标识"
      - name: owner_name
        type: str
        required: false
        description: "所有者姓名或单位名称"
      - name: registration_date
        type: str
        required: false
        description: "登记日期"
      - name: nationality_registration
        type: str
        required: false
        description: "国籍登记（涉及境外飞行时）"
      - name: owner_contact
        type: str
        required: false
        description: "所有人联系信息"
      - name: usage
        type: str
        required: false
        description: "使用用途"
      - name: issue_date
        type: str
        required: false
        description: "登记日期"
      - name: expiry_date
        type: str
        required: false
        description: "有效期至(注销登记之日止)"
      - name: status
        type: str
        required: false
        description: "状态: 有效/注销"
    status_transitions:
      "有效":
        - "注销"
      "注销": []
    constraints: []

  - name: AgriculturalDroneOperatorCertificate
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "农用无人驾驶航空器操作证书"
    description: "从事常规农用无人驾驶航空器作业飞行活动的人员需取得的操作证书。"
    properties:
      - name: certificate_id
        type: str
        required: true
        description: "操作证书编号"
      - name: holder_name
        type: str
        required: false
        description: "持有人姓名"
      - name: training_provider
        type: str
        required: false
        description: "培训考核机构（农用无人驾驶航空器系统生产者）"
      - name: valid_until
        type: str
        required: false
        description: "有效期"
      - name: issue_date
        type: str
        required: false
        description: "颁发日期"
      - name: expiry_date
        type: str
        required: false
        description: "有效期"
      - name: status
        type: str
        required: false
        description: "状态: 有效/过期/注销"
    status_transitions:
      "有效":
        - "过期"
        - "注销"
      "过期": []
      "注销": []
    constraints: []

  - name: DroneDefectRecall
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "无人驾驶航空器缺陷召回记录"
    description: "微型、轻型、小型民用无人驾驶航空器系统投放市场后发现缺陷的，生产者、进口商应当停止生产、销售，召回缺陷产品。"
    properties:
      - name: recall_id
        type: str
        required: true
        description: "召回记录编号"
