        default: null
      - name: flight_route
        type: str
        description: 飞行航线、高度、速度和空域范围，进出空域方法
        default: null
      - name: control_link_frequency
        type: str
        description: 指挥控制链路无线电频率以及占用带宽
        default: null
    writes_to:
      - FlightMissionApplication
    involves_objects:
      - FlightMissionApplication
      - Drone
      - PilotLicense
      - OperationCertificate
      - AirworthinessCertificate
      - DroneRegistration
      - AgriculturalDroneOperatorCertificate
      - ControlledAirspace
    preconditions: []
    effects: []
    temporal_constraints:
      - when: before_flight
        deadline: "1 day before estimated_start_time at 12:00"
        sla: "estimated_start_time - 1 day, 12:00"
    hint: "申请时需确保所有涉及的资质证书（操控员执照、运营合格证、适航许可、实名登记等）有效，且飞行空域不在管制空域内或已获得管制空域使用许可。"

rules:
  - rule_type: classification
    applies_to: FlightMission
    conditions:
      - field: mission_type
        operator: equals
        value: "commercial"
        result: requires_approval
      - field: mission_type
        operator: equals
        value: "private"
        result: no_approval_required
  - rule_type: judgment
    applies_to: FlightMission
    conditions:
      - field: altitude
        operator: greater_than
        value: 400
        result: restricted_airspace
      - field: altitude
        operator: less_than_or_equal
        value: 400
        result: unrestricted_airspace
  - rule_type: qualification
    applies_to: Pilot
    conditions:
      - field: license_type
        operator: equals
        value: "commercial"
        result: can_operate_commercial_missions
      - field: license_type
        operator: equals
        value: "private"
        result: can_operate_private_missions_only
  - rule_type: threshold
    applies_to: FlightMission
    conditions:
      - field: flight_duration_minutes
        operator: greater_than
        value: 120
        result: requires_rest_period
      - field: flight_duration_minutes
        operator: less_than_or_equal
        value: 120
        result: no_rest_period_required

