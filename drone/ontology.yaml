name: drone
description: "公路交通应急处置与无人机侦测。距离单位km，时间单位h。基于v2元模型，含rules和workflows。"

objects:
  # ============================================================
  # 公路基础设施（外部接口数据，不入库）
  # 框架会创建空表，但查询必须走对应的 get_xxx 函数
  # ============================================================

  RoadSegment:
    kind: entity
    summary: "路段(公路基本单元，按桩号搜)"
    description: 路段。外部接口数据，请用 get_road_segment 查询，不要用 query
    properties:
      segment_id: {type: str, required: true, description: "路段编号"}
      road_name: {type: str, description: "公路名称，如G318"}
      road_grade: {type: str, description: "公路等级: 高速/一级/二级/三级/四级"}
      start_stake: {type: str, description: "起始桩号，如K120+000"}
      end_stake: {type: str, description: "终止桩号，如K135+000"}
      lane_count: {type: int, description: "车道数"}
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      length_km: {type: float, description: "长度(km)"}

  Bridge:
    kind: entity
    summary: "桥梁(含桥涵，按bridge_id查)"
    description: 桥梁。外部接口数据，请用 get_bridge_status 查询
    properties:
      bridge_id: {type: str, required: true, description: "桥梁编号"}
      name: {type: str, description: "桥梁名称"}
      segment_id: {type: str, description: "所属路段编号"}
      center_stake: {type: str, description: "中心桩号"}
      span_m: {type: float, description: "主跨跨径(m)"}
      total_length_m: {type: float, description: "全长(m)"}
      width_m: {type: float, description: "桥面宽度(m)"}
      structure_type: {type: str, description: "结构型式: 简支梁/连续梁/拱桥/缆索桥/吊杆拱桥"}
      lane_count: {type: int, description: "车道数"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}

  Tunnel:
    kind: entity
    summary: "隧道(按tunnel_id查)"
    description: 隧道。外部接口数据，请用 get_tunnel_status 查询
    properties:
      tunnel_id: {type: str, required: true, description: "隧道编号"}
      name: {type: str, description: "隧道名称"}
      segment_id: {type: str, description: "所属路段编号"}
      length_m: {type: float, description: "长度(m)"}
      width_m: {type: float, description: "净宽(m)"}
      height_m: {type: float, description: "净高(m)"}
      tunnel_type: {type: str, description: "类型: 山岭隧道/水下隧道"}
      layout: {type: str, description: "布置: 单洞/双洞"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}

  EmergencyDepot:
    kind: entity
    summary: "应急物资储备点(按坐标搜)"
    description: 应急物资储备点。外部接口数据，请用 get_depots_in_range 查询
    properties:
      depot_id: {type: str, required: true, description: "储备点编号"}
      name: {type: str, description: "名称"}
      level: {type: str, description: "级别: 国家/省级/市级/县级/养护队"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      province: {type: str, description: "所在省份"}

  RescueTeam:
    kind: entity
    summary: "应急队伍(按坐标搜)"
    description: 应急队伍。外部接口数据，请用 get_rescue_teams_in_range 查询
    properties:
      team_id: {type: str, required: true, description: "队伍编号"}
      name: {type: str, description: "队伍名称"}
      team_type: {type: str, description: "类型: 专业/兼职/社会"}
      capacity_person: {type: int, description: "人数"}
      specialty: {type: str, description: "专长: 路基/桥涵/隧道/事故清障/综合"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      available: {type: int, description: "是否可用: 1=是 0=否"}

  # ============================================================
  # 无人机资产对象（外部接口数据，不入库）
  # ============================================================

  Drone:
    kind: entity
    summary: "无人机(单机，按drone_id查)"
    description: |
      无人机。外部接口数据，请用 get_drone 或 get_drones_in_range 查询，不要用 query。
      status=维护中 的无人机不可派遣执行 ReconMission。
    properties:
      drone_id: {type: str, required: true, description: "无人机编号"}
      name: {type: str, description: "名称"}
      model: {type: str, description: "型号"}
      weight_kg: {type: float, description: "空机重量(kg)"}
      max_takeoff_weight_kg: {type: float, description: "最大起飞重量(kg)"}
      category: {type: str, description: "类别: 微型/轻型/小型/中型/大型"}
      payload_types: {type: str, description: "可搭载载荷类型(逗号分隔)"}
      endurance_min: {type: int, description: "续航时间(分钟)"}
      max_range_km: {type: float, description: "最大航程(km)"}
      base_id: {type: str, description: "所属基地编号"}
      status: {type: str, description: "状态: 可用/任务中/维护中/故障"}
      registration_code: {type: str, description: "实名登记编码"}
      airworthiness_cert: {type: str, description: "适航证编号(中大型需要，小型及以下为空)"}

  DroneOperator:
    kind: entity
    summary: "无人机操控员(按operator_id查)"
    description: 无人机操控员。外部接口数据，请用 get_drone_operator 或 get_operators_available 查询
    properties:
      operator_id: {type: str, required: true, description: "操控员编号"}
      name: {type: str, description: "姓名"}
      license_type: {type: str, description: "执照类型: 无需执照/安全操控合格证/操控员执照"}
      license_categories: {type: str, description: "执照类别等级(逗号分隔)"}
      has_bvlos_rating: {type: int, description: "是否有超视距等级: 1=是 0=否"}
      has_instructor_rating: {type: int, description: "是否有教员等级: 1=是 0=否"}
      medical_cert: {type: str, description: "体检合格证(IFR运行需要)"}
      affiliated_team_id: {type: str, description: "所属队伍编号"}
      available: {type: int, description: "是否可用: 1=是 0=否"}

  DroneBase:
    kind: entity
    summary: "无人机基地/起降点(按坐标搜)"
    description: 无人机基地。外部接口数据，请用 get_drone_base 查询
    properties:
      base_id: {type: str, required: true, description: "基地编号"}
      name: {type: str, description: "名称"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      capacity_drones: {type: int, description: "容纳无人机数"}
      has_charging: {type: int, description: "有充电设施: 1=是 0=否"}
      has_maintenance: {type: int, description: "有维护能力: 1=是 0=否"}

  AirspaceZone:
    kind: entity
    summary: "空域区划(管制/适飞/禁飞)"
    description: 空域区划。外部接口数据，请用 get_airspace_zone 查询
    properties:
      zone_id: {type: str, required: true, description: "空域编号"}
      name: {type: str, description: "名称"}
      zone_type: {type: str, description: "类型: 管制空域/适飞空域/禁飞区"}
      geometry_desc: {type: str, description: "范围描述"}
      altitude_limit_m: {type: int, description: "高度限制(米)"}
      responsible_authority: {type: str, description: "管辖机构"}
      restrictions: {type: str, description: "限制说明"}

  # ============================================================
  # 预警与报告对象
  # ============================================================

  WeatherWarning:
    kind: entity
    summary: "气象预警信息(外部接口)"
    description: |
      气象预警信息。外部接口数据，请用 get_weather_warning 查询。
      trigger_defense_response 和 intensify_patrol 以本对象的 warning_id 为输入。
      预警级别与防御响应级别的对应关系见 rules.warning_to_defense。
    properties:
      warning_id: {type: str, required: true, description: "预警编号"}
      warning_type: {type: str, description: "预警类型: 暴雨/台风/低温雨雪冰冻/大风/地质灾害/山洪"}
      warning_level: {type: str, description: "预警级别: 红色/橙色/黄色/蓝色"}
      affected_area_desc: {type: str, description: "影响区域描述"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)"}
      issued_by: {type: str, description: "发布机构"}
      issued_time: {type: str, description: "发布时间"}
      valid_until: {type: str, description: "有效期至"}
      status: {type: str, description: "状态: 生效中/已解除"}

  # ============================================================
  # 业务过程对象（智能体写入产物）
  # ============================================================

  DisasterEvent:
    kind: entity
    summary: "自然灾害事件(地震/暴雨/泥石流/滑坡等)"
    description: |
      自然灾害导致的公路交通突发事件。涉及设施损伤，需要 inspect_facility 检查评估。
      plan_recon_mission 可为本类型事件规划无人机侦测。
    properties:
      event_id: {type: str, required: true, description: "事件编号"}
      disaster_type: {type: str, description: "灾害类型: 地震/暴雨/泥石流/滑坡/崩塌/冰雪/洪水/火灾"}
      event_level: {type: str, description: "事件级别: I/II/III/IV"}
      event_time: {type: str, description: "发生时间"}
      location_desc: {type: str, description: "位置描述"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)"}
      response_level: {type: str, description: "响应级别"}
      status: {type: str, description: "状态: 进行中/已终止"}

  AccidentEvent:
    kind: entity
    summary: "交通事故事件(不涉及设施损伤检查)"
    description: |
      交通事故导致的公路交通突发事件。不涉及设施损伤检查(不适用 inspect_facility)。
      主要关注事故清障(set_traffic_control)和交通管制。
      事故类型按处理方式分为: 抛锚/碰撞/碾压/翻车/坠车/落水/烧毁/货物散落。
    properties:
      event_id: {type: str, required: true, description: "事件编号"}
      accident_type: {type: str, description: "事故类型: 抛锚/碰撞/碾压/翻车/坠车/落水/烧毁/货物散落"}
      event_level: {type: str, description: "事件级别: I/II/III/IV"}
      event_time: {type: str, description: "发生时间"}
      location_desc: {type: str, description: "位置描述"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)"}
      vehicle_type: {type: str, description: "涉事车辆类型"}
      cargo_type: {type: str, description: "货物类型(如有)"}
      casualty_info: {type: str, description: "人员伤亡情况"}
      response_level: {type: str, description: "响应级别"}
      status: {type: str, description: "状态: 进行中/已终止"}

  FacilityInspection:
    kind: entity
    summary: "设施现场检查(检查评估记录)"
    description: 设施现场检查记录。inspect_facility 产出。generate_clearance_plans、set_traffic_control、assess_event_level 以本记录为输入
    properties:
      inspection_id: {type: str, required: true, description: "检查编号"}
      event_id: {type: str, description: "关联事件编号"}
      facility_type: {type: str, description: "设施类型: 路段/桥梁/隧道"}
      facility_id: {type: str, description: "设施编号"}
      facility_name: {type: str, description: "设施名称"}
      damage_summary: {type: str, description: "损伤概况"}
      overall_damage_grade: {type: str, description: "综合损伤等级: I/II/III"}
      access_recommendation: {type: str, description: "通行建议: 观察通行/限制通行/禁止通行"}
      inspection_time: {type: str, description: "检查时间"}

  ClearancePlan:
    kind: entity
    summary: "抢通方案(候选/执行/完成)"
    description: 抢通方案。generate_clearance_plans 产出，score_plans 评分，dispatch_resources 和 evaluate_traffic 以本记录为输入
    properties:
      plan_id: {type: str, required: true, description: "方案编号"}
      event_id: {type: str, description: "关联事件编号"}
      plan_level: {type: str, description: "方案层级: 总体/线路/设施"}
      facility_id: {type: str, description: "关联设施编号"}
      facility_name: {type: str, description: "设施名称"}
      damage_type: {type: str, description: "灾损类型"}
      technique_name: {type: str, description: "抢通技术"}
      technique_desc: {type: str, description: "技术说明"}
      estimated_duration_hours: {type: float, description: "预估工期(小时)"}
      required_equipment: {type: str, description: "所需装备"}
      required_material: {type: str, description: "所需物资"}
      timeliness_score: {type: float, description: "时效性评分(0-100)"}
      safety_score: {type: float, description: "安全性评分(0-100)"}
      economy_score: {type: float, description: "经济性评分(0-100)"}
      total_score: {type: float, description: "综合评分: 时效40%+安全30%+经济30%"}
      status: {type: str, description: "状态: candidate/executing/completed/dropped"}

  ResourceDispatch:
    kind: entity
    summary: "资源调度单(队伍/装备/物资)"
    description: 资源调度记录。dispatch_resources 产出。evaluate_traffic 以本记录的存在为前提
    properties:
      dispatch_id: {type: str, required: true, description: "调度编号"}
      event_id: {type: str, description: "关联事件编号"}
      plan_id: {type: str, description: "关联方案编号"}
      resource_type: {type: str, description: "资源类型: 队伍/装备/物资"}
      resource_name: {type: str, description: "资源名称"}
      quantity: {type: int, description: "数量"}
      source_depot_id: {type: str, description: "来源储备点编号"}
      source_name: {type: str, description: "来源名称"}
      distance_km: {type: float, description: "运距(km)"}
      estimated_arrival_hours: {type: float, description: "预计到达时间(h)"}
      status: {type: str, description: "状态: pending/in_transit/arrived/completed"}

  TrafficControl:
    kind: entity
    summary: "交通管制措施(执行记录)"
    description: 交通管制措施记录。set_traffic_control 产出。generate_event_report 终报引用本记录
    properties:
      control_id: {type: str, required: true, description: "管制编号"}
      event_id: {type: str, description: "关联事件编号"}
      facility_id: {type: str, description: "设施编号"}
      facility_name: {type: str, description: "设施名称"}
      control_type: {type: str, description: "管制类型: 半幅通行/单车道/限速限载/分时控制/封闭"}
      speed_limit_kmh: {type: int, description: "限速(km/h)，0表示不限"}
      weight_limit_t: {type: int, description: "限重(t)，0表示不限"}
      status: {type: str, description: "状态: active/lifted"}
      message: {type: str, description: "管制说明"}

  TrafficEvaluation:
    kind: entity
    summary: "通行评估(抢通后评估)"
    description: 应急通行评估记录。evaluate_traffic 产出。generate_event_report 终报引用本记录
    properties:
      eval_id: {type: str, required: true, description: "评估编号"}
      event_id: {type: str, description: "关联事件编号"}
      plan_id: {type: str, description: "关联方案编号"}
      facility_id: {type: str, description: "设施编号"}
      eval_result: {type: str, description: "评估结果: 开放应急通行/继续抢通"}
      restrictions: {type: str, description: "通行限制条件"}
      message: {type: str, description: "评估说明"}

  DetourPlan:
    kind: entity
    summary: "绕行方案(无法抢通时的替代)"
    description: |
      绕行方案。generate_detour 产出。
      当 FacilityInspection 为III级且 ClearancePlan 无可行技术时，或 ClearancePlan 预估工期过长时，应考虑绕行方案。
    properties:
      detour_id: {type: str, required: true, description: "绕行方案编号"}
      event_id: {type: str, description: "关联事件编号"}
      detour_route_name: {type: str, description: "绕行线路名称"}
      start_point: {type: str, description: "起点"}
      end_point: {type: str, description: "终点"}
      length_km: {type: float, description: "绕行距离(km)"}
      road_condition: {type: str, description: "路况"}
      estimated_delay_min: {type: int, description: "预估增加耗时(分钟)"}
      message: {type: str, description: "方案说明"}

  # ============================================================
  # 无人机业务过程对象（智能体写入产物）
  # ============================================================

  ReconMission:
    kind: entity
    summary: "侦测任务(无人机应急侦测)"
    description: |
      无人机侦测任务。plan_recon_mission 产出。
      自然灾害事件(DisasterEvent)的宏观灾情侦测需要无人机；交通事故(AccidentEvent)不需要。
      需要 ComplianceCheck.overall_result=通过 且 FlightApproval.approval_status=已批准 后才可 dispatch_drone。
    properties:
      mission_id: {type: str, required: true, description: "任务编号"}
      event_id: {type: str, description: "关联事件编号(日常巡检可为空)"}
      mission_type: {type: str, description: "任务类型: 灾情宏观侦测/设施精细检测/事故现场侦测/日常巡检"}
      drone_id: {type: str, description: "指派无人机编号"}
      operator_id: {type: str, description: "指派操控员编号"}
      target_facility_ids: {type: str, description: "目标设施编号(逗号分隔)"}
      planned_area_desc: {type: str, description: "计划侦测区域描述"}
      payload_types: {type: str, description: "搭载载荷类型(逗号分隔)"}
      status: {type: str, description: "状态: 计划中/审批中/执行中/数据处理/完成/取消"}

  FlightApproval:
    kind: entity
    summary: "飞行审批记录"
    description: |
      飞行审批记录。request_flight_approval 产出。
      DisasterEvent 关联的任务适用 EmergencyFlightRule 快速审批(S3第29条)。
    properties:
      approval_id: {type: str, required: true, description: "审批编号"}
      mission_id: {type: str, description: "关联任务编号"}
      airspace_zone_id: {type: str, description: "涉及空域编号"}
      approval_type: {type: str, description: "审批类型: 常规/应急快速/特别紧急"}
      submit_time: {type: str, description: "提交时间"}
      planned_takeoff_time: {type: str, description: "计划起飞时间"}
      approval_status: {type: str, description: "审批状态: 待审批/已批准/已拒绝"}
      approval_authority: {type: str, description: "审批机构"}
      conditions: {type: str, description: "附加条件"}

  ComplianceCheck:
    kind: entity
    summary: "合规检查记录(出动前)"
    description: |
      无人机出动前合规检查。check_compliance 产出。
      校验 DroneClassRule(注册/适航)、OperatorLicenseRule(资质)、AirspaceRule(空域)、PayloadTypeRule(载荷)。
      overall_result=不通过 时 ReconMission 不可执行 dispatch_drone。
    properties:
      check_id: {type: str, required: true, description: "检查编号"}
      mission_id: {type: str, description: "关联任务编号"}
      drone_compliance: {type: str, description: "无人机合规: 通过/不通过"}
      operator_compliance: {type: str, description: "操控员合规: 通过/不通过"}
      airspace_compliance: {type: str, description: "空域合规: 通过/不通过"}
      payload_compliance: {type: str, description: "载荷合规: 通过/不通过"}
      overall_result: {type: str, description: "总体结果: 通过/不通过"}
      issues: {type: str, description: "不通过项说明"}

  ReconData:
    kind: entity
    summary: "侦测数据采集结果"
    description: |
      无人机侦测数据。collect_recon_data 产出。
      damage_indicators 可作为 inspect_facility 的参考输入，提供定量数据支持。
    properties:
      data_id: {type: str, required: true, description: "数据编号"}
      mission_id: {type: str, description: "关联任务编号"}
      event_id: {type: str, description: "关联事件编号"}
      facility_id: {type: str, description: "关联设施编号"}
      data_type: {type: str, description: "数据类型: 影像/点云/红外热图/气体浓度/视频"}
      coverage_area_desc: {type: str, description: "覆盖区域描述"}
      key_findings: {type: str, description: "关键发现"}
      damage_indicators: {type: str, description: "损伤指标(JSON格式)"}
      recommended_actions: {type: str, description: "建议后续行动"}

  DefenseResponse:
    kind: entity
    summary: "防御响应记录"
    description: |
      防御响应记录。trigger_defense_response 产出。
      防御响应期间若发生灾害，对应的 DisasterEvent 可引用本记录的 warning_id。
    properties:
      response_id: {type: str, required: true, description: "响应编号"}
      warning_id: {type: str, description: "关联预警编号"}
      response_level: {type: str, description: "防御响应级别: 一级/二级/三级/四级"}
      measures_taken: {type: str, description: "已采取措施"}
      drone_prepositioned: {type: str, description: "已前置无人机编号(逗号分隔)"}
      patrol_intensified: {type: int, description: "已加密巡检的路段数"}
      status: {type: str, description: "状态: 进行中/已转应急/已终止"}

  EventReport:
    kind: entity
    summary: "灾情信息报告(首报/续报/终报)"
    description: |
      灾情信息报告。generate_event_report 产出。
      符合S1预案信息报送要求: 事件时间地点、影响范围损害程度、发展趋势、已采取措施。
      首报要快(ReconData提供快速数据)、续报要准(FacilityInspection提供详细数据)、终报要全。
    properties:
      report_id: {type: str, required: true, description: "报告编号"}
      event_id: {type: str, description: "关联事件编号"}
      report_type: {type: str, description: "报告类型: 首报/续报/终报"}
      event_summary: {type: str, description: "事件概况(时间、地点、信息来源)"}
      damage_scope: {type: str, description: "影响范围及损害程度"}
      casualty_info: {type: str, description: "人员伤亡情况"}
      trend_analysis: {type: str, description: "发展趋势分析"}
      measures_taken: {type: str, description: "已采取措施"}
      next_plan: {type: str, description: "下一步工作计划"}
      data_sources: {type: str, description: "数据来源(ReconData/FacilityInspection等)"}
      report_time: {type: str, description: "报告时间"}

  # ============================================================
  # 业务规则对象（稳定配置，落库可 query）— kind: rule_table
  # ============================================================

  DamageGradeStandard:
    kind: rule_table
    summary: "损伤分级标准(设施类型+等级→通行建议)"
    description: 公路基础设施损伤分级标准。可用 lookup_damage_grade 查询
    properties:
      facility_type: {type: str, required: true, description: "设施类型: 路基路面/路基防护/路基支挡/桥涵整体稳定/桥涵承载力/桥涵通行能力/隧道洞口边仰坡/隧道洞门/隧道衬砌/隧道路面/隧道吊顶预埋件"}
      damage_grade: {type: str, required: true, description: "损伤等级: I/II/III"}
      damage_degree: {type: str, description: "损伤程度: 无损伤或轻微损伤/中等损伤/严重损伤或坍塌"}
      description: {type: str, description: "损伤状况描述"}
      access_decision: {type: str, description: "通行建议: 观察通行/限制通行并加强观测/禁止通行并实施抢通"}

  EventLevelStandard:
    kind: rule_table
    summary: "突发事件分级标准(I~IV级)"
    description: 公路交通突发事件分级标准。可用 lookup_event_level 查询
    properties:
      level: {type: str, required: true, description: "级别: I/II/III/IV"}
      level_name: {type: str, description: "名称: 特别重大/重大/较大/一般"}
      description: {type: str, description: "事件严重度描述"}
      duration_threshold_hours: {type: int, description: "预计处置时间门槛(小时)"}
      response_department: {type: str, description: "负责部门"}

  ClearanceTechniqueRule:
    kind: rule_table
    summary: "抢通技术选用规则(设施+灾损→技术)"
    description: 抢通技术选用规则。可用 lookup_clearance_technique 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      facility_type: {type: str, description: "设施类型: 路基路面/桥涵/隧道"}
      damage_type: {type: str, description: "灾损类型: 沉陷开裂/坍塌/水毁/滑坡阻塞/崩塌落石/泥石流/冰雪/沙害/桥涵垮塌/桥涵受损可通车/洞口掩埋/衬砌受损/涌水突泥等"}
      applicable_condition: {type: str, description: "适用条件"}
      technique_name: {type: str, description: "技术名称"}
      technique_desc: {type: str, description: "技术说明"}
      required_equipment: {type: str, description: "所需装备(逗号分隔)"}
      required_material: {type: str, description: "所需物资(逗号分隔)"}

  TrafficControlRule:
    kind: rule_table
    summary: "交通管制措施规则(损伤等级→管制)"
    description: 交通管制措施规则。可用 lookup_traffic_control 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      damage_grade: {type: str, description: "损伤等级: I/II/III"}
      facility_type: {type: str, description: "设施类型"}
      control_measure: {type: str, description: "管制措施: 正常通行/半幅通行/单车道居中/限速限载/分时控制/禁止通行"}
      description: {type: str, description: "措施说明"}

  TunnelImportanceLevel:
    kind: rule_table
    summary: "隧道重要等级(道路等级+交通量→等级)"
    description: 隧道重要等级分级表。可用 lookup_tunnel_importance 查询
    properties:
      road_grade: {type: str, required: true, description: "道路等级"}
      aadt_range: {type: str, required: true, description: "年日均交通量范围(pcu/d/ln)"}
      importance_level: {type: str, description: "重要等级: 一级/二级/三级"}

  TunnelDifficultyMatrix:
    kind: rule_table
    summary: "隧道抢通难度矩阵(时长+风险→难度)"
    description: 隧道抢通难度等级矩阵
    properties:
      duration_grade: {type: str, required: true, description: "抢通时长评级: A/B/C/D"}
      risk_level: {type: str, required: true, description: "次生事故风险等级: I/II/III/IV"}
      difficulty: {type: str, description: "难度: 高难度/中等难度/低难度"}

  TunnelTargetMatrix:
    kind: rule_table
    summary: "隧道抢通目标矩阵(难度+重要等级→目标)"
    description: 隧道抢通目标等级矩阵
    properties:
      difficulty: {type: str, required: true, description: "抢通难度: 高难度/中等难度/低难度"}
      importance_level: {type: str, required: true, description: "隧道重要等级: 一级/二级/三级"}
      target_grade: {type: str, description: "抢通目标等级: I(禁止通行改道)/II(限制性通行)/III(保证抢险车辆通行)"}

  BridgeTypeSelection:
    kind: rule_table
    summary: "便桥选型参考(场景+跨径→桥型)"
    description: 便桥选型参考表。可用 lookup_bridge_type 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      scenario: {type: str, description: "应用场景"}
      obstacle_width_range: {type: str, description: "障碍宽度范围(m)"}
      bridge_type: {type: str, description: "便桥类型: 机械化桥/装配式钢桥/舟桥/应急轻便桥/索道桥"}
      capacity_desc: {type: str, description: "通行保障能力"}
      setup_time: {type: str, description: "架设时效"}
      notes: {type: str, description: "其他参考因素"}

  ResponseLevelRule:
    kind: rule_table
    summary: "响应级别规则(事件级别→响应要求)"
    description: 应急响应级别规则
    properties:
      event_level: {type: str, required: true, description: "事件级别: I/II/III/IV"}
      response_level: {type: str, description: "响应级别: 一级/二级/三级/四级"}
      responsible_org: {type: str, description: "负责机构"}
      time_limit_hours: {type: int, description: "处理时限(小时)"}
      termination_condition: {type: str, description: "终止条件"}

  # ============================================================
  # 无人机法规规则对象（S3+S4 提取，落库可查）— kind: rule_table
  # ============================================================

  DroneClassRule:
    kind: rule_table
    summary: "无人机分类标准(S3第2条)"
    description: 无人机按最大起飞重量和性能分为微型/轻型/小型/中型/大型。可用 lookup_drone_class 查询
    properties:
      category: {type: str, required: true, description: "类别: 微型/轻型/小型/中型/大型"}
      max_takeoff_weight_range: {type: str, description: "最大起飞重量范围"}
      characteristics: {type: str, description: "性能特征"}
      registration_required: {type: int, description: "是否需要实名登记: 1=是 0=否"}
      airworthiness_required: {type: int, description: "是否需要适航许可: 1=是 0=否"}
      insurance_required: {type: int, description: "是否需要投保责任保险: 1=是 0=否"}
      operation_cert_required: {type: int, description: "是否需要运营合格证: 1=是 0=否"}

  OperatorLicenseRule:
    kind: rule_table
    summary: "操控员资质要求(S3+S4)"
    description: 不同类别无人机和运行方式对操控员的资质要求。可用 lookup_operator_license_rule 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      drone_category: {type: str, description: "无人机类别"}
      operation_type: {type: str, description: "运行方式: 视距内/超视距/经营性/非经营性"}
      required_license: {type: str, description: "所需执照: 无需执照/安全操控合格证/操控员执照"}
      required_ratings: {type: str, description: "所需等级(逗号分隔)"}
      age_requirement: {type: str, description: "年龄/行为能力要求"}
      training_requirement: {type: str, description: "培训要求"}
      legal_basis: {type: str, description: "法规依据"}

  AirspaceRule:
    kind: rule_table
    summary: "空域使用规则(S3第3章)"
    description: 不同空域类型的使用条件和限制。可用 lookup_airspace_rule 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      airspace_type: {type: str, description: "空域类型: 管制空域/适飞空域/禁飞区"}
      drone_category_allowed: {type: str, description: "允许的无人机类别"}
      flight_approval_required: {type: int, description: "是否需要飞行审批: 1=是 0=否"}
      altitude_limit_m: {type: int, description: "高度限制(米)"}
      special_conditions: {type: str, description: "特殊条件"}
      legal_basis: {type: str, description: "法规依据"}

  FlightApprovalRule:
    kind: rule_table
    summary: "飞行审批规则(S3第25-29条)"
    description: 飞行活动审批要求，含常规审批和应急快速审批。可用 lookup_flight_approval_rule 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      scenario: {type: str, description: "场景: 常规飞行/应急抢险/特别紧急"}
      approval_authority: {type: str, description: "审批机构"}
      advance_time_required: {type: str, description: "提前申请时间要求"}
      response_time: {type: str, description: "批复时限"}
      required_documents: {type: str, description: "所需材料"}
      legal_basis: {type: str, description: "法规依据"}

  EmergencyFlightRule:
    kind: rule_table
    summary: "应急飞行特殊规则(S3第29条+第39条)"
    description: |
      应急抢险任务的飞行特殊规定。可用 lookup_emergency_flight_rule 查询。
      DisasterEvent 关联的 ReconMission 适用此规则的快速审批通道。
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      emergency_type: {type: str, description: "应急类型: 反恐维稳/抢险救灾/医疗救护/特别紧急"}
      approval_fast_track: {type: str, description: "快速审批说明"}
      advance_minutes: {type: int, description: "最短提前申请时间(分钟)"}
      can_fly_in_restricted: {type: int, description: "可在限制空域飞行: 1=是 0=否"}
      authority: {type: str, description: "审批权限"}
      legal_basis: {type: str, description: "法规依据"}

  PreflightCheckRule:
    kind: rule_table
    summary: "飞行前检查清单(S4 E章)"
    description: 无人机飞行前必须完成的检查项目。可用 lookup_preflight_check 查询
    properties:
      check_id: {type: str, required: true, description: "检查项编号"}
      check_item: {type: str, description: "检查项名称"}
      check_category: {type: str, description: "类别: 系统检查/环境检查/空域检查/载荷检查/人员检查"}
      required_for_categories: {type: str, description: "适用的无人机类别(逗号分隔)"}
      description: {type: str, description: "检查内容描述"}

  PayloadTypeRule:
    kind: rule_table
    summary: "载荷类型及适用场景"
    description: |
      无人机载荷类型与应急侦测场景的匹配关系。可用 lookup_payload_type 查询。
      plan_recon_mission 根据灾害类型匹配合适的载荷。
    properties:
      payload_type: {type: str, required: true, description: "载荷类型: 光学相机/红外相机/激光雷达/气体检测仪/多光谱/视频摄像机"}
      applicable_scenarios: {type: str, description: "适用场景(逗号分隔)"}
      weight_kg: {type: float, description: "载荷重量(kg)"}
      data_output_type: {type: str, description: "输出数据类型: 影像/点云/红外热图/气体浓度/视频"}
      description: {type: str, description: "说明"}

  # ============================================================
  # 法规原文查询表 — kind: lookup_table
  # ============================================================

  S3Regulation:
    kind: lookup_table
    summary: "S3暂行条例原文(63条)"
    description: 《无人驾驶航空器飞行管理暂行条例》原文条目。可用 lookup_s3_regulation 按条号或关键词查询
    properties:
      article_number: {type: str, required: true, description: "条号，如'第二十九条'"}
      chapter: {type: str, description: "所属章节"}
      title: {type: str, description: "条目标题(如有)"}
      content: {type: str, description: "条文内容"}
      keywords: {type: str, description: "关键词(逗号分隔)"}

  S4Regulation:
    kind: lookup_table
    summary: "S4 CCAR-92原文"
    description: 《民用无人驾驶航空器运行安全管理规则》原文条目。可用 lookup_s4_regulation 按条号或关键词查询
    properties:
      section_number: {type: str, required: true, description: "条号，如'第92.7条'"}
      chapter: {type: str, description: "所属章节"}
      title: {type: str, description: "条目标题"}
      content: {type: str, description: "条文内容"}
      keywords: {type: str, description: "关键词(逗号分隔)"}

