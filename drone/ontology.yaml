functions:
  # ----- A. 事件与检查 -----
  get_event:
    summary: "查询突发事件详情"
    description: "查询事件详情。同时搜索 DisasterEvent 和 AccidentEvent，返回 {event_type, ...字段}"
    group: "事件与检查"
    params:
      event_id: {type: str, description: "事件编号"}

  get_affected_facilities:
    summary: "查询事件影响范围内设施"
    description: "根据事件位置，搜索半径内的路段、桥梁、隧道"
    group: "事件与检查"
    params:
      event_id: {type: str, description: "事件编号"}
      radius_km: {type: float, default: 5, description: "搜索半径(km)"}

  inspect_facility:
    summary: "对设施进行检查评估"
    description: "对受损设施进行现场检查评估，确定损伤等级和通行建议，写入 FacilityInspection。当存在 ReconData(collect_recon_data 产出)时，检查精度更高"
    group: "事件与检查"
    hint: >
      根据设施类型采用不同检查标准:
      路段: 路基路面+路基防护+路基支挡三项取最大等级
      桥梁: 整体稳定+承载能力+通行能力三项取最大等级
      隧道: 洞口边仰坡+洞门+衬砌+路面+吊顶预埋件取最大等级
      损伤等级I→观察通行，II→限制通行，III→禁止通行并实施抢通
    params:
      event_id: {type: str, description: "事件编号"}
      facility_type: {type: str, description: "设施类型: 路段/桥梁/隧道"}
      facility_id: {type: str, description: "设施编号"}

  assess_event_level:
    summary: "综合评估事件等级"
    description: "根据 FacilityInspection 记录综合评估事件等级，更新 DisasterEvent 的 event_level 和 response_level"
    group: "事件与检查"
    hint: >
      评估依据:
      - 受损设施数量和严重程度
      - 交通阻断范围和持续时间
      - 人员伤亡和财产损失
      I级: 国家干线阻断24h以上
      II级: 国家干线阻断12h以上或省级干线24h以上
      III级: 国家干线6h以上或省级12h以上
      IV级: 其他
    params:
      event_id: {type: str, description: "事件编号"}

  # ----- B. 基础设施查询 -----
  get_road_segment:
    summary: "查询路段信息"
    description: "查询路段基本信息"
    group: "基础设施查询"
    params:
      segment_id: {type: str, description: "路段编号"}

  get_bridge_status:
    summary: "查询桥梁信息"
    description: "查询桥梁基本信息和结构参数"
    group: "基础设施查询"
    params:
      bridge_id: {type: str, description: "桥梁编号"}

  get_tunnel_status:
    summary: "查询隧道信息"
    description: "查询隧道基本信息和结构参数"
    group: "基础设施查询"
    params:
      tunnel_id: {type: str, description: "隧道编号"}

  # ----- C. 资源搜索 -----
  get_depots_in_range:
    summary: "范围内应急物资储备点"
    description: "空间查询：以(lng,lat)为中心搜索储备点"
    group: "资源搜索"
    params:
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      radius_km: {type: float, default: 100, description: "搜索半径(km)"}

  get_rescue_teams_in_range:
    summary: "范围内应急队伍"
    description: "空间查询：以(lng,lat)为中心搜索可用应急队伍"
    group: "资源搜索"
    params:
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      radius_km: {type: float, default: 100, description: "搜索半径(km)"}

  get_equipment_by_depot:
    summary: "查询储备点装备清单"
    description: "查询某储备点的装备库存，可按大类过滤"
    group: "资源搜索"
    params:
      depot_id: {type: str, description: "储备点编号"}
      category: {type: str, default: "", description: "大类过滤: 通用/专用(可选)"}

  get_material_by_depot:
    summary: "查询储备点物资清单"
    description: "查询某储备点的物资库存，可按灾害类型过滤"
    group: "资源搜索"
    params:
      depot_id: {type: str, description: "储备点编号"}
      disaster_type: {type: str, default: "", description: "灾害类型过滤(可选)"}

  # ----- D. 规则查询 -----
  lookup_damage_grade:
    summary: "查损伤分级标准"
    description: "根据设施类型和损伤等级查通行建议"
    group: "规则查询"
    params:
      facility_type: {type: str, description: "设施类型"}
      damage_grade: {type: str, default: "", description: "损伤等级(可选，不填返回全部)"}

  lookup_event_level:
    summary: "查事件分级标准"
    description: "查询突发事件分级标准"
    group: "规则查询"
    params:
      level: {type: str, default: "", description: "级别(可选)"}

  lookup_clearance_technique:
    summary: "查抢通技术选用规则"
    description: "根据设施类型和灾损类型查可用的抢通技术"
    group: "规则查询"
    params:
      facility_type: {type: str, description: "设施类型: 路基路面/桥涵/隧道"}
      damage_type: {type: str, default: "", description: "灾损类型(可选)"}

  lookup_traffic_control:
    summary: "查交通管制措施"
    description: "根据损伤等级查推荐的交通管制措施"
    group: "规则查询"
    params:
      damage_grade: {type: str, description: "损伤等级: I/II/III"}
      facility_type: {type: str, default: "", description: "设施类型(可选)"}

  lookup_tunnel_importance:
    summary: "查隧道重要等级"
    description: "根据道路等级和交通量查隧道重要等级"
    group: "规则查询"
    params:
      road_grade: {type: str, description: "道路等级"}
      aadt_range: {type: str, default: "", description: "交通量范围(可选)"}

  lookup_tunnel_target:
    summary: "查隧道抢通目标"
    description: "根据抢通难度和隧道重要等级查抢通目标"
    group: "规则查询"
    params:
      difficulty: {type: str, description: "抢通难度: 高难度/中等难度/低难度"}
      importance_level: {type: str, description: "重要等级: 一级/二级/三级"}

  lookup_bridge_type:
    summary: "查便桥选型"
    description: "根据场景查推荐的便桥类型"
    group: "规则查询"
    params:
      scenario: {type: str, default: "", description: "应用场景(可选)"}
      obstacle_width_range: {type: str, default: "", description: "障碍宽度范围(可选)"}

  lookup_response_level:
    summary: "查响应级别要求"
    description: "根据事件级别查响应要求"
    group: "规则查询"
    params:
      event_level: {type: str, description: "事件级别: I/II/III/IV"}

  # ----- E. 方案与评估 -----
  generate_clearance_plans:
    summary: "生成候选抢通方案"
    description: "根据 FacilityInspection 记录和 ClearanceTechniqueRule 规则表，为需要抢通的设施生成候选 ClearancePlan(status=candidate)"
    group: "方案与评估"
    hint: >
      输入: 需要 event_id 对应的 FacilityInspection 记录(损伤等级II或III)
      输出: ClearancePlan 候选记录，匹配 ClearanceTechniqueRule 中的适用技术
      损伤等级II→可生成加固方案；损伤等级III→必须生成抢通方案
    params:
      event_id: {type: str, description: "事件编号"}

  score_plans:
    summary: "三维加权评分(时效40+安全30+经济30)"
    description: "对 ClearancePlan(status=candidate) 进行三维评分，更新 total_score 字段。dispatch_resources 优先选择 total_score 最高的方案"
    group: "方案与评估"
    hint: >
      评分细节:
      时效性(40%): 预估工期越短分越高(本批min/max线性归一)
      安全性(30%): 次生灾害风险越低分越高，有监测手段加分
      经济性(30%): 所需资源越少、运距越短分越高
    params:
      event_id: {type: str, description: "事件编号"}

  # ----- F. 资源调度 -----
  dispatch_resources:
    summary: "为方案调度资源(队伍+装备+物资)"
    description: "根据已评分的 ClearancePlan(需有 total_score) 的 required_equipment/required_material，搜索最近储备点的可用资源并生成 ResourceDispatch 调度单"
    group: "资源调度"
    hint: >
      调度原则(规程5.2):
      1. 就近便捷: 从最近储备点调配
      2. 平急结合: 优先调配有应急能力的装备
      3. 通专相济: 通用+专用组合调配
      副作用: 写入 ResourceDispatch 记录
    params:
      event_id: {type: str, description: "事件编号"}
      plan_id: {type: str, description: "方案编号"}

  # ----- G. 管制与通行 -----
  set_traffic_control:
    summary: "设置交通管制措施"
    description: "根据 FacilityInspection 的损伤等级和 TrafficControlRule 规则，对受损设施设置 TrafficControl 管制记录"
    group: "管制与通行"
    params:
      event_id: {type: str, description: "事件编号"}
      facility_id: {type: str, description: "设施编号"}
      control_type: {type: str, description: "管制类型: 半幅通行/单车道/限速限载/分时控制/封闭"}

  evaluate_traffic:
    summary: "抢通完成后通行评估"
    description: "评估已调度资源(ResourceDispatch)的 ClearancePlan 是否达到应急通行目标，写入 TrafficEvaluation(开放应急通行/继续抢通)"
    group: "管制与通行"
    hint: >
      评估要点(规程6.4/7.4/8.4):
      路基路面: 施工机械试通行无异常→开放
      桥涵: 分级试加载+试通行无异常→开放
      隧道: 结构稳定+限界达标+试通行→开放
    params:
      event_id: {type: str, description: "事件编号"}
      plan_id: {type: str, description: "方案编号"}

  # ----- H. 救济 -----
  generate_detour:
    summary: "生成绕行方案(无法抢通时)"
    description: "当 FacilityInspection 为III级且无可行抢通技术、或 ClearancePlan 预估工期超出响应时限(ResponseLevelRule.time_limit_hours)时，生成 DetourPlan"
    group: "救济"
    params:
      event_id: {type: str, description: "事件编号"}
      facility_id: {type: str, description: "设施编号"}

  # ----- I. 无人机查询 -----
  get_drone:
    summary: "查询无人机详情"
    description: "查询无人机基本信息、状态和载荷能力"
    group: "无人机查询"
    params:
      drone_id: {type: str, description: "无人机编号"}

  get_drone_operator:
    summary: "查询操控员详情"
    description: "查询操控员资质、执照和等级信息"
    group: "无人机查询"
    params:
      operator_id: {type: str, description: "操控员编号"}

  get_drone_base:
    summary: "查询基地详情"
    description: "查询无人机基地位置和设施信息"
    group: "无人机查询"
    params:
      base_id: {type: str, description: "基地编号"}

  get_airspace_zone:
    summary: "查询空域区划"
    description: "查询空域类型、限制和管辖信息"
    group: "无人机查询"
    params:
      zone_id: {type: str, description: "空域编号"}

  get_drones_in_range:
    summary: "搜索范围内可用无人机"
    description: "空间查询：以(lng,lat)为中心搜索可用(status=可用)的无人机"
    group: "无人机查询"
    params:
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      radius_km: {type: float, default: 50, description: "搜索半径(km)"}

  get_operators_available:
    summary: "搜索可用操控员"
    description: "查询当前可用的无人机操控员，可按执照类型过滤"
    group: "无人机查询"
    params:
      license_type: {type: str, default: "", description: "执照类型过滤(可选)"}

  # ----- J. 无人机法规 -----
  lookup_drone_class:
    summary: "查无人机分类标准"
    description: "根据类别查分类标准、登记要求和适航要求"
    group: "无人机法规"
    params:
      category: {type: str, default: "", description: "类别: 微型/轻型/小型/中型/大型(可选)"}

  lookup_operator_license_rule:
    summary: "查操控员资质要求"
    description: "根据无人机类别和运行方式查所需资质"
    group: "无人机法规"
    params:
      drone_category: {type: str, default: "", description: "无人机类别(可选)"}
      operation_type: {type: str, default: "", description: "运行方式(可选)"}

  lookup_operation_class:
    summary: "查运行分类及要求"
    description: "查询开放类/特定类/审定类运行的条件和要求"
    group: "无人机法规"
    params:
      operation_class: {type: str, default: "", description: "运行类别(可选)"}

  lookup_airspace_rule:
    summary: "查空域使用规则"
    description: "根据空域类型查使用条件和限制"
    group: "无人机法规"
    params:
      airspace_type: {type: str, default: "", description: "空域类型(可选)"}

  lookup_flight_approval_rule:
    summary: "查飞行审批要求"
    description: "查常规审批和应急快速审批的要求"
    group: "无人机法规"
    params:
      scenario: {type: str, default: "", description: "场景: 常规飞行/应急抢险/特别紧急(可选)"}

  lookup_emergency_flight_rule:
    summary: "查应急飞行特殊规则"
    description: "查应急抢险任务的快速审批通道和特殊权限(S3第29条)"
    group: "无人机法规"
    params:
      emergency_type: {type: str, default: "", description: "应急类型(可选)"}

  lookup_preflight_check:
    summary: "查飞行前检查清单"
    description: "查无人机飞行前必须完成的检查项目"
    group: "无人机法规"
    params:
      check_category: {type: str, default: "", description: "检查类别(可选)"}
      drone_category: {type: str, default: "", description: "无人机类别(可选)"}

  lookup_maintenance_rule:
    summary: "查维护保养规则"
    description: "查无人机维护保养要求和间隔"
    group: "无人机法规"
    params:
      maintenance_type: {type: str, default: "", description: "维护类型: 日常/定期/故障后(可选)"}

  lookup_payload_type:
    summary: "查载荷类型及适用场景"
    description: "根据载荷类型或应急场景查匹配关系"
    group: "无人机法规"
    params:
      payload_type: {type: str, default: "", description: "载荷类型(可选)"}
      scenario: {type: str, default: "", description: "适用场景关键词(可选)"}

  lookup_s3_regulation:
    summary: "查S3暂行条例原文"
    description: "按条号或关键词查询《无人驾驶航空器飞行管理暂行条例》原文"
    group: "无人机法规"
    params:
      article_number: {type: str, default: "", description: "条号(可选)"}
      keyword: {type: str, default: "", description: "关键词(可选)"}

  lookup_s4_regulation:
    summary: "查S4 CCAR-92原文"
    description: "按条号或关键词查询《民用无人驾驶航空器运行安全管理规则》原文"
    group: "无人机法规"
    params:
      section_number: {type: str, default: "", description: "条号(可选)"}
      keyword: {type: str, default: "", description: "关键词(可选)"}

  # ----- K. 无人机侦测 -----
  plan_recon_mission:
    summary: "规划无人机侦测任务"
    description: "根据 DisasterEvent 的灾害类型和受影响设施，规划 ReconMission。自动按载荷兼容性选择最近的合格无人机；也可通过 drone_id 手动指定"
    group: "无人机侦测"
    hint: >
      载荷选择依据(PayloadTypeRule):
      宏观灾情侦测: 光学相机+红外相机
      桥涵精细检测: 激光雷达
      隧道洞口侦测: 视频摄像机
      有毒气体泄漏: 气体检测仪
      冰雪灾害: 红外相机+多光谱
      自动选机: 按载荷兼容性过滤后选最近的可用无人机
    params:
      event_id: {type: str, description: "事件编号"}
      drone_id: {type: str, default: "", description: "指定无人机编号(可选，不填则自动按载荷兼容性选择最近的)"}

  check_compliance:
    summary: "无人机出动前合规检查"
    description: "对 ReconMission 进行出动前合规检查，写入 ComplianceCheck。校验 DroneClassRule(注册/适航)、OperatorLicenseRule(资质)、AirspaceRule(空域)、PayloadTypeRule(载荷)"
    group: "无人机侦测"
    hint: >
      四维合规校验:
      无人机合规: 实名登记、适航证(中大型)、保险
      操控员合规: 执照类型匹配无人机类别、超视距等级(如需)
      空域合规: 飞行区域的空域类型是否允许、高度限制
      载荷合规: 载荷重量不超过无人机剩余载荷能力
    params:
      mission_id: {type: str, description: "任务编号"}

  request_flight_approval:
    summary: "提交飞行审批"
    description: "根据 ReconMission 和 FlightApprovalRule 提交飞行审批，写入 FlightApproval。DisasterEvent 关联的任务适用 EmergencyFlightRule 快速审批"
    group: "无人机侦测"
    params:
      mission_id: {type: str, description: "任务编号"}

  dispatch_drone:
    summary: "调派无人机执行任务"
    description: "ComplianceCheck.overall_result=通过 且 FlightApproval.approval_status=已批准 后，从 DroneBase 调派无人机，更新 Drone.status 和 ReconMission.status"
    group: "无人机侦测"
    params:
      mission_id: {type: str, description: "任务编号"}

  collect_recon_data:
    summary: "采集处理侦测数据"
    description: "ReconMission 执行完成后，采集处理侦测数据，写入 ReconData。ReconData.damage_indicators 可作为 inspect_facility 的参考输入"
    group: "无人机侦测"
    params:
      mission_id: {type: str, description: "任务编号"}

  # ----- L. 无人机管理 -----
  schedule_patrol:
    summary: "创建日常巡检排班"
    description: "为路段/桥梁/隧道创建日常巡检排班，关联 Drone 和 DroneOperator"
    group: "无人机管理"
    params:
      route_segment_ids: {type: str, description: "巡检路段编号(逗号分隔)"}
      drone_id: {type: str, description: "无人机编号"}
      operator_id: {type: str, description: "操控员编号"}
      frequency: {type: str, default: "每周", description: "频率: 每日/每周/事件触发"}

  log_maintenance:
    summary: "记录无人机维护"
    description: "记录无人机维护，写入 DroneMaintenanceLog。维护中的 Drone.status=维护中，不可派遣"
    group: "无人机管理"
    params:
      drone_id: {type: str, description: "无人机编号"}
      maintenance_type: {type: str, description: "维护类型: 日常/定期/故障后"}
      work_items: {type: str, default: "", description: "维护项目(可选)"}

  # ----- M. 预警与防御 -----
  get_weather_warning:
    summary: "查询气象预警信息"
    description: "查询当前生效的气象预警信息"
    group: "预警与防御"
    params:
      warning_id: {type: str, default: "", description: "预警编号(可选，不填返回所有生效预警)"}

  trigger_defense_response:
    summary: "触发防御响应"
    description: "根据 WeatherWarning 的预警级别启动防御响应，写入 DefenseResponse。措施包括: 无人机前置到受影响路段最近基地、加密巡检频率、装备物资前置"
    group: "预警与防御"
    hint: >
      防御响应级别与预警级别对应(S1预案):
      红色→一级: 督促应急救援队伍进入预置点待命，专屏实时监测
      橙色→二级: 重点调度防御响应启动情况，督促队伍进入预置点
      黄色→三级: 加强预警监测、专家分析评估
      蓝色→四级: 密切跟踪，电话调度提醒
    params:
      warning_id: {type: str, description: "预警编号"}

  intensify_patrol:
    summary: "加密巡检(预警触发)"
    description: "根据 WeatherWarning 的受影响路段，将相关巡检频率提升为每日或事件触发，并优先安排配备红外/光学载荷的无人机"
    group: "预警与防御"
    params:
      warning_id: {type: str, description: "预警编号"}

  # ----- N. 信息报送 -----
  generate_event_report:
    summary: "生成灾情信息报告"
    description: |
      根据 DisasterEvent/AccidentEvent、ReconData、FacilityInspection 等数据生成灾情信息报告(EventReport)。
      首报: 基于 ReconData 快速生成(分钟级)，覆盖事件概况和初步影响范围。
      续报: 加入 FacilityInspection 详细损伤数据和 ClearancePlan 抢通方案。
      终报: 加入 TrafficEvaluation 通行评估结果和总体损失统计。
    group: "信息报送"
    hint: >
      信息报送要素(S1预案4.2):
      - 事件时间、地点、信息来源
      - 事件性质、影响范围及损害程度
      - 人员伤亡和失踪情况
      - 发展趋势
      - 已经采取的措施
      首报要快(2小时内)、续报要准、终报要全
    params:
      event_id: {type: str, description: "事件编号"}
      report_type: {type: str, default: "首报", description: "报告类型: 首报/续报/终报"}

rules:
  damage_to_access:
    description: "损伤等级→通行建议"
    rule_type: classification
    applies_to: [FacilityInspection]
    result_field: access_recommendation
    conditions:
      - {field: overall_damage_grade, operator: eq, value: "I", result: "观察通行"}
      - {field: overall_damage_grade, operator: eq, value: "II", result: "限制通行并加强观测"}
      - {field: overall_damage_grade, operator: eq, value: "III", result: "禁止通行并实施抢通"}

  event_to_response:
    description: "事件级别→响应级别"
    rule_type: classification
    applies_to: [DisasterEvent, AccidentEvent]
    result_field: response_level
    conditions:
      - {field: event_level, operator: eq, value: "I", result: "一级"}
      - {field: event_level, operator: eq, value: "II", result: "二级"}
      - {field: event_level, operator: eq, value: "III", result: "三级"}
      - {field: event_level, operator: eq, value: "IV", result: "四级"}

  warning_to_defense:
    description: "预警级别→防御响应级别"
    rule_type: classification
    applies_to: [WeatherWarning]
    result_field: defense_level
    conditions:
      - {field: warning_level, operator: eq, value: "红色", result: "一级"}
      - {field: warning_level, operator: eq, value: "橙色", result: "二级"}
      - {field: warning_level, operator: eq, value: "黄色", result: "三级"}
      - {field: warning_level, operator: eq, value: "蓝色", result: "四级"}

  drone_weight_classification:
    description: "按最大起飞重量分类无人机(S3第2条)"
    rule_type: classification
    applies_to: [Drone]
    result_field: category
    source: "S3第二条"
    conditions:
      - {field: max_takeoff_weight_kg, operator: lte, value: 0.25, result: "微型"}
      - {field: max_takeoff_weight_kg, operator: lte, value: 7, result: "轻型"}
      - {field: max_takeoff_weight_kg, operator: lte, value: 25, result: "小型"}
      - {field: max_takeoff_weight_kg, operator: lte, value: 150, result: "中型"}
      - {field: max_takeoff_weight_kg, operator: gt, value: 150, result: "大型"}

workflows:
  emergency_response:
    description: "公路交通应急处置全流程（规程图3.3.1）"
    trigger: "灾情发生或接报"
    involves_objects: [DisasterEvent, FacilityInspection, ClearancePlan, ResourceDispatch, TrafficControl, TrafficEvaluation]
    steps:
      - {name: 启动应急响应, function: "", description: "接报→疏散→安全措施→上报"}
      - {name: 无人机侦测, function: plan_recon_mission, next: 设施检查}
      - {name: 设施检查, function: inspect_facility, next: 事件评估}
      - {name: 事件评估, function: assess_event_level, next: 方案生成}
      - {name: 方案生成, function: generate_clearance_plans, next: 方案评分}
      - {name: 方案评分, function: score_plans, next: 资源调度}
      - {name: 资源调度, function: dispatch_resources, next: 交通管制}
      - {name: 交通管制, function: set_traffic_control, next: 通行评估}
      - name: 通行评估
        function: evaluate_traffic
        next: {通过: 信息报送, 不通过: 绕行方案}
      - {name: 绕行方案, function: generate_detour}
      - {name: 信息报送, function: generate_event_report}

  drone_dispatch:
    description: "无人机出动流程（合规检查→审批→调派）"
    trigger: "侦测任务创建"
    involves_objects: [ReconMission, ComplianceCheck, FlightApproval, Drone]
    steps:
      - {name: 任务规划, function: plan_recon_mission, next: 合规检查}
      - name: 合规检查
        function: check_compliance
        next: {通过: 飞行审批, 不通过: ""}
      - name: 飞行审批
        function: request_flight_approval
        next: {已批准: 调派执行, 已拒绝: ""}
      - {name: 调派执行, function: dispatch_drone, next: 数据采集}
      - {name: 数据采集, function: collect_recon_data}

  weather_defense:
    description: "气象预警防御响应流程（S1预案）"
    trigger: "气象预警发布"
    involves_objects: [WeatherWarning, DefenseResponse]
    steps:
      - {name: 启动防御响应, function: trigger_defense_response, next: 加密巡检}
      - {name: 加密巡检, function: intensify_patrol}
