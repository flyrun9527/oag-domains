name: drone
description: "公路交通应急处置与无人机侦测。覆盖自然灾害/交通事故应急响应、设施灾损调查与抢通处置、无人机飞行管理与应急侦测。"

objects:
  # ============================================================
  # 公路基础设施（外部接口数据）
  # ============================================================

  RoadSegment:
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "路段(公路基本单元)"
    description: 路段。外部接口数据，请用 get_road_segment 查询。
    properties:
      segment_id: {type: str, required: true, description: "路段编号"}
      road_name: {type: str, description: "公路名称，如G318"}
      road_grade: {type: str, description: "公路等级: 高速/一级/二级/三级/四级"}
      start_stake: {type: str, description: "起始桩号，如K120+000"}
      end_stake: {type: str, description: "终止桩号，如K135+000"}
      lane_count: {type: int, description: "车道数"}
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      length_km: {type: float, description: "长度(km)"}

  Bridge:
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "桥梁(含桥涵)"
    description: 桥梁。外部接口数据，请用 get_bridge_status 查询。
    properties:
      bridge_id: {type: str, required: true, description: "桥梁编号"}
      name: {type: str, description: "桥梁名称"}
      segment_id: {type: str, description: "所属路段编号"}
      center_stake: {type: str, description: "中心桩号"}
      span_m: {type: float, description: "主跨跨径(m)"}
      total_length_m: {type: float, description: "全长(m)"}
      width_m: {type: float, description: "桥面宽度(m)"}
      structure_type: {type: str, description: "结构型式: 简支梁/连续梁/拱桥/缆索桥"}
      lane_count: {type: int, description: "车道数"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}

  Tunnel:
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "隧道"
    description: 隧道。外部接口数据，请用 get_tunnel_status 查询。
    properties:
      tunnel_id: {type: str, required: true, description: "隧道编号"}
      name: {type: str, description: "隧道名称"}
      segment_id: {type: str, description: "所属路段编号"}
      length_m: {type: float, description: "长度(m)"}
      width_m: {type: float, description: "净宽(m)"}
      height_m: {type: float, description: "净高(m)"}
      tunnel_type: {type: str, description: "类型: 山岭隧道/水下隧道"}
      layout: {type: str, description: "布置: 单洞/双洞"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}

  EmergencyDepot:
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "应急物资储备点"
    description: 应急物资储备点。外部接口数据，请用 get_depots_in_range 查询。
    properties:
      depot_id: {type: str, required: true, description: "储备点编号"}
      name: {type: str, description: "名称"}
      level: {type: str, description: "级别: 国家/省级/市级/县级/养护队"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      province: {type: str, description: "所在省份"}

  RescueTeam:
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "应急队伍"
    description: 应急队伍。外部接口数据，请用 get_rescue_teams_in_range 查询。
    properties:
      team_id: {type: str, required: true, description: "队伍编号"}
      name: {type: str, description: "队伍名称"}
      team_type: {type: str, description: "类型: 专业/兼职/社会"}
      capacity_person: {type: int, description: "人数"}
      specialty: {type: str, description: "专长: 路基/桥涵/隧道/事故清障/综合"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      available: {type: int, description: "是否可用: 1=是 0=否"}

  # ============================================================
  # 无人机资产（外部接口数据）
  # ============================================================

  Drone:
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "无人机"
    description: 无人机。外部接口数据，请用 get_drone 或 get_drones_in_range 查询。
    status_transitions:
      可用: [任务中, 维护中]
      任务中: [可用]
      维护中: [可用]
      故障: [维护中]
    constraints:
      - when: {status: "维护中"}
        excluded_functions: [dispatch_drone]
        reason: "维护中的无人机不可派遣"
      - when: {status: "故障"}
        excluded_functions: [dispatch_drone]
        reason: "故障无人机不可派遣"
    properties:
      drone_id: {type: str, required: true, description: "无人机编号"}
      name: {type: str, description: "名称"}
      model: {type: str, description: "型号"}
      weight_kg: {type: float, description: "空机重量(kg)"}
      max_takeoff_weight_kg: {type: float, description: "最大起飞重量(kg)"}
      category: {type: str, description: "类别: 微型/轻型/小型/中型/大型(S3第六十二条)"}
      operation_class: {type: str, description: "运行分类: 开放类/特定类/审定类(S4第92.7条)"}
      payload_types: {type: str, description: "可搭载载荷类型(逗号分隔)"}
      endurance_min: {type: int, description: "续航时间(分钟)"}
      max_range_km: {type: float, description: "最大航程(km)"}
      base_id: {type: str, description: "所属基地编号"}
      status: {type: str, description: "状态: 可用/任务中/维护中/故障"}
      registration_code: {type: str, description: "实名登记编码(S3第十条,S4第92.205条)"}
      airworthiness_cert: {type: str, description: "适航证编号(中大型需要，S3第八条,S4第92.453条)"}
      has_efence: {type: int, description: "是否安装电子围栏: 1=是 0=否(S4第92.613条)"}

  DroneOperator:
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "无人机操控员"
    description: 无人机操控员。外部接口数据，请用 get_drone_operator 查询。
    properties:
      operator_id: {type: str, required: true, description: "操控员编号"}
      name: {type: str, description: "姓名"}
      license_type: {type: str, description: "执照类型: 无需执照/小型执照/中型执照/大型执照(S3第十六条,S4第92.53条)"}
      license_categories: {type: str, description: "执照类别等级(逗号分隔，如飞机/旋翼飞行器)"}
      has_bvlos_rating: {type: int, description: "是否有超视距等级: 1=是 0=否(S4第92.53条d款)"}
      has_instructor_rating: {type: int, description: "是否有教员等级: 1=是 0=否(S4第92.53条e款)"}
      license_expiry: {type: str, description: "执照有效期(6年，S4第92.61条)"}
      affiliated_team_id: {type: str, description: "所属队伍编号"}
      available: {type: int, description: "是否可用: 1=是 0=否"}

  DroneBase:
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "无人机基地/起降点"
    description: 无人机基地。外部接口数据，请用 get_drone_base 查询。
    properties:
      base_id: {type: str, required: true, description: "基地编号"}
      name: {type: str, description: "名称"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      capacity_drones: {type: int, description: "容纳无人机数"}
      has_charging: {type: int, description: "有充电设施: 1=是 0=否"}
      has_maintenance: {type: int, description: "有维护能力: 1=是 0=否"}

  AirspaceZone:
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "空域区划(管制/适飞/禁飞)"
    description: |
      空域区划。管制空域包括真高120m以上、空中禁区/限制区、军用超低空飞行空域、机场周边等(S3第十九条)。
      管制空域外为微型/轻型/小型无人机适飞空域(S3第十九条)。
    properties:
      zone_id: {type: str, required: true, description: "空域编号"}
      name: {type: str, description: "名称"}
      zone_type: {type: str, description: "类型: 管制空域/适飞空域/禁飞区/临时管制"}
      altitude_limit_m: {type: int, description: "高度限制(米)，适飞空域120m"}
      responsible_authority: {type: str, description: "管辖机构"}
      restrictions: {type: str, description: "限制说明"}

  WeatherWarning:
    kind: entity
    data_source: external_api
    mutability: read_only
    summary: "气象预警信息"
    description: |
      气象预警信息。预警级别由高到低: 红色(一级)→橙色(二级)→黄色(三级)→蓝色(四级)(S1第3.1节)。
      气象灾害包括台风、暴雨、低温雨雪冰冻、大雾、大风、海啸、海冰等(S1第3.1节)。
    properties:
      warning_id: {type: str, required: true, description: "预警编号"}
      warning_type: {type: str, description: "预警类型: 台风/暴雨/低温雨雪冰冻/大雾/大风/寒潮/风暴潮/海冰/海啸/沙尘暴/地质灾害"}
      warning_level: {type: str, description: "预警级别: 红色/橙色/黄色/蓝色"}
      affected_area_desc: {type: str, description: "影响区域描述"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)"}
      issued_by: {type: str, description: "发布机构"}
      issued_time: {type: str, description: "发布时间"}
      expected_wind_level: {type: int, description: "预计风力等级(台风预警时)"}
      status: {type: str, description: "状态: 生效中/已解除"}

  # ============================================================
  # 业务过程对象（智能体写入产物）
  # ============================================================

  DisasterEvent:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "自然灾害事件"
    description: |
      自然灾害导致的公路交通突发事件。涉及设施损伤，需要 inspect_facility 检查评估。
      灾害类型包括暴雨山洪、地震地质灾害、低温雨雪冰冻等(S1公路交通突发事件应急预案第1.4节)。
    status_transitions:
      进行中: [已终止]
    properties:
      event_id: {type: str, required: true, description: "事件编号"}
      disaster_type: {type: str, description: "灾害类型: 地震/暴雨/泥石流/滑坡/崩塌/冰雪/洪水/大风"}
      event_level: {type: str, description: "事件级别: I/II/III/IV(特别重大/重大/较大/一般)"}
      event_time: {type: str, description: "发生时间"}
      location_desc: {type: str, description: "位置描述"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)"}
      response_level: {type: str, description: "响应级别: 一级/二级/三级/四级"}
      status: {type: str, description: "状态: 进行中/已终止"}

  AccidentEvent:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "交通事故事件(不涉及设施损伤检查)"
    description: 交通事故导致的公路交通突发事件。不涉及设施损伤检查，主要关注事故清障和交通管制。
    excluded_functions: [inspect_facility, plan_recon_mission]
    status_transitions:
      进行中: [已终止]
    properties:
      event_id: {type: str, required: true, description: "事件编号"}
      accident_type: {type: str, description: "事故类型: 抛锚/碰撞/翻车/坠车/落水/货物散落"}
      event_level: {type: str, description: "事件级别: I/II/III/IV"}
      event_time: {type: str, description: "发生时间"}
      location_desc: {type: str, description: "位置描述"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)"}
      casualty_info: {type: str, description: "人员伤亡情况"}
      response_level: {type: str, description: "响应级别"}
      status: {type: str, description: "状态: 进行中/已终止"}

  FacilityInspection:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "设施检查评估记录"
    description: |
      设施现场检查记录。inspect_facility 产出。
      检查标准依据《公路交通应急处置技术规范》。
    properties:
      inspection_id: {type: str, required: true, description: "检查编号"}
      event_id: {type: str, description: "关联事件编号"}
      facility_type: {type: str, description: "设施类型: 路段/桥梁/隧道"}
      facility_id: {type: str, description: "设施编号"}
      facility_name: {type: str, description: "设施名称"}
      damage_summary: {type: str, description: "损伤概况"}
      overall_damage_grade: {type: str, description: "综合损伤等级: I/II/III"}
      access_recommendation: {type: str, description: "通行建议: 观察通行/限制通行/禁止通行"}
      inspection_time: {type: str, description: "检查时间"}

  ClearancePlan:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "抢通方案"
    description: |
      抢通方案。技术选用依据《公路交通应急抢通技术规程》。
      抢通原则: 随断即抢、随抢即通; 先通后补、先干后支(技术规程)。
    status_transitions:
      candidate: [executing, dropped]
      executing: [completed, dropped]
    properties:
      plan_id: {type: str, required: true, description: "方案编号"}
      event_id: {type: str, description: "关联事件编号"}
      facility_id: {type: str, description: "关联设施编号"}
      damage_type: {type: str, description: "灾损类型"}
      technique_name: {type: str, description: "抢通技术"}
      technique_desc: {type: str, description: "技术说明"}
      estimated_duration_hours: {type: float, description: "预估工期(小时)"}
      required_equipment: {type: str, description: "所需装备"}
      required_material: {type: str, description: "所需物资"}
      total_score: {type: float, description: "综合评分: 时效40%+安全30%+经济30%"}
      status: {type: str, description: "状态: candidate/executing/completed/dropped"}

  ResourceDispatch:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "资源调度单"
    description: "资源调度记录。调度原则: 就近便捷、平急结合、通专相济(抢通规程)。"
    status_transitions:
      pending: [in_transit]
      in_transit: [arrived]
      arrived: [completed]
    properties:
      dispatch_id: {type: str, required: true, description: "调度编号"}
      event_id: {type: str, description: "关联事件编号"}
      plan_id: {type: str, description: "关联方案编号"}
      resource_type: {type: str, description: "资源类型: 队伍/装备/物资"}
      resource_name: {type: str, description: "资源名称"}
      quantity: {type: int, description: "数量"}
      source_depot_id: {type: str, description: "来源储备点编号"}
      distance_km: {type: float, description: "运距(km)"}
      estimated_arrival_hours: {type: float, description: "预计到达时间(h)"}
      status: {type: str, description: "状态: pending/in_transit/arrived/completed"}

  TrafficControl:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "交通管制措施"
    description: 交通管制措施记录。管制类型依据《公路交通应急处置技术规范》。
    status_transitions:
      active: [lifted]
    properties:
      control_id: {type: str, required: true, description: "管制编号"}
      event_id: {type: str, description: "关联事件编号"}
      facility_id: {type: str, description: "设施编号"}
      control_type: {type: str, description: "管制类型: 半幅通行/单车道/限速限载/分时控制/封闭"}
      speed_limit_kmh: {type: int, description: "限速(km/h)，0表示不限"}
      weight_limit_t: {type: int, description: "限重(t)，0表示不限"}
      status: {type: str, description: "状态: active/lifted"}
      message: {type: str, description: "管制说明"}

  TrafficEvaluation:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "通行评估(抢通后)"
    description: 应急通行评估记录。evaluate_traffic 产出。
    properties:
      eval_id: {type: str, required: true, description: "评估编号"}
      event_id: {type: str, description: "关联事件编号"}
      plan_id: {type: str, description: "关联方案编号"}
      facility_id: {type: str, description: "设施编号"}
      eval_result: {type: str, description: "评估结果: 开放应急通行/继续抢通"}
      restrictions: {type: str, description: "通行限制条件"}
      message: {type: str, description: "评估说明"}

  DetourPlan:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "绕行方案"
    description: 绕行方案。当设施损伤III级且无可行抢通技术、或工期超出时限时生成。
    properties:
      detour_id: {type: str, required: true, description: "绕行方案编号"}
      event_id: {type: str, description: "关联事件编号"}
      detour_route_name: {type: str, description: "绕行线路名称"}
      start_point: {type: str, description: "起点"}
      end_point: {type: str, description: "终点"}
      length_km: {type: float, description: "绕行距离(km)"}
      estimated_delay_min: {type: int, description: "预估增加耗时(分钟)"}
      message: {type: str, description: "方案说明"}

  ReconMission:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "无人机侦测任务"
    description: 无人机侦测任务。需要 ComplianceCheck 通过且 FlightApproval 已批准后才可 dispatch_drone。
    status_transitions:
      计划中: [审批中, 取消]
      审批中: [执行中, 取消]
      执行中: [数据处理, 取消]
      数据处理: [完成]
    properties:
      mission_id: {type: str, required: true, description: "任务编号"}
      event_id: {type: str, description: "关联事件编号"}
      mission_type: {type: str, description: "任务类型: 灾情宏观侦测/设施精细检测/事故现场侦测/日常巡检"}
      drone_id: {type: str, description: "指派无人机编号"}
      operator_id: {type: str, description: "指派操控员编号"}
      payload_types: {type: str, description: "搭载载荷类型(逗号分隔)"}
      planned_area_desc: {type: str, description: "计划侦测区域描述"}
      flight_altitude_m: {type: int, description: "计划飞行高度(米)"}
      is_bvlos: {type: int, description: "是否超视距运行: 1=是 0=否"}
      status: {type: str, description: "状态: 计划中/审批中/执行中/数据处理/完成/取消"}

  ComplianceCheck:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "合规检查记录(出动前)"
    description: |
      无人机出动前合规检查。check_compliance 产出。
      校验: 无人机登记(S3第十条)/适航(S3第八条,S4 D章)、操控员资质(S3第十六条,S4第92.51条)、
      空域合规(S3第十九条,S4第92.511条)、载荷合规、电子围栏(S4第92.613条)。
    properties:
      check_id: {type: str, required: true, description: "检查编号"}
      mission_id: {type: str, description: "关联任务编号"}
      drone_compliance: {type: str, description: "无人机合规: 通过/不通过"}
      operator_compliance: {type: str, description: "操控员合规: 通过/不通过"}
      airspace_compliance: {type: str, description: "空域合规: 通过/不通过"}
      payload_compliance: {type: str, description: "载荷合规: 通过/不通过"}
      efence_compliance: {type: str, description: "电子围栏合规: 通过/不通过/不适用"}
      overall_result: {type: str, description: "总体结果: 通过/不通过"}
      issues: {type: str, description: "不通过项说明"}

  FlightApproval:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "飞行审批记录"
    description: |
      飞行审批记录。常规审批提前1日12时前申请(S3第二十六条);
      应急快速审批提前30分钟(S3第二十九条); 特别紧急可随时申请(S3第二十九条)。
      适飞空域内微型/轻型无需申请(S3第三十一条)。
    status_transitions:
      待审批: [已批准, 已拒绝]
    properties:
      approval_id: {type: str, required: true, description: "审批编号"}
      mission_id: {type: str, description: "关联任务编号"}
      approval_type: {type: str, description: "审批类型: 常规/应急快速/特别紧急/无需审批"}
      approval_status: {type: str, description: "审批状态: 待审批/已批准/已拒绝"}
      approval_authority: {type: str, description: "审批机构(分区/管制区/国家级，S3第二十八条)"}
      conditions: {type: str, description: "附加条件"}

  ReconData:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "侦测数据采集结果"
    description: 无人机侦测数据。collect_recon_data 产出。damage_indicators 可辅助 inspect_facility。
    properties:
      data_id: {type: str, required: true, description: "数据编号"}
      mission_id: {type: str, description: "关联任务编号"}
      event_id: {type: str, description: "关联事件编号"}
      data_type: {type: str, description: "数据类型: 影像/点云/红外热图/气体浓度/视频"}
      key_findings: {type: str, description: "关键发现"}
      damage_indicators: {type: str, description: "损伤指标(JSON格式)"}
      recommended_actions: {type: str, description: "建议后续行动"}

  DefenseResponse:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "防御响应记录"
    description: |
      防御响应记录。预警级别→防御响应级别(S1第3.3节): 红色→一级、橙色→二级、黄色→三级、蓝色→四级。
      防御措施包括: 响应、巡查、管控三阶段(S1第3.3节)。
    status_transitions:
      进行中: [已转应急, 已终止]
    properties:
      response_id: {type: str, required: true, description: "响应编号"}
      warning_id: {type: str, description: "关联预警编号"}
      response_level: {type: str, description: "防御响应级别: 一级/二级/三级/四级"}
      measures_taken: {type: str, description: "已采取措施"}
      patrol_status: {type: str, description: "巡查状态: 常规/加密/暂停"}
      control_status: {type: str, description: "管控状态: 正常/限行/封闭"}
      status: {type: str, description: "状态: 进行中/已转应急/已终止"}

  EventReport:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    summary: "灾情信息报告(首报/续报/终报)"
    description: |
      灾情信息报告。信息报送要素(S1第4.2节): 事件时间地点、影响范围损害程度、人员伤亡、发展趋势、已采取措施。
      重特大事件按国家规定时限报告(S1第4.2节)。
    properties:
      report_id: {type: str, required: true, description: "报告编号"}
      event_id: {type: str, description: "关联事件编号"}
      report_type: {type: str, description: "报告类型: 首报/续报/终报"}
      event_summary: {type: str, description: "事件概况"}
      damage_scope: {type: str, description: "影响范围及损害程度"}
      casualty_info: {type: str, description: "人员伤亡失踪情况"}
      trend_analysis: {type: str, description: "发展趋势分析"}
      measures_taken: {type: str, description: "已采取措施"}
      next_plan: {type: str, description: "下一步工作计划"}
      report_time: {type: str, description: "报告时间"}

  # ============================================================
  # 规则配置表（rule_table）
  # ============================================================

  DamageGradeStandard:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "损伤分级标准(I/II/III→通行建议)"
    description: 公路基础设施损伤分级标准。依据《公路交通应急处置技术规范》。
    properties:
      facility_type: {type: str, required: true, description: "设施类型"}
      damage_grade: {type: str, required: true, description: "损伤等级: I/II/III"}
      damage_degree: {type: str, description: "损伤程度"}
      description: {type: str, description: "损伤状况描述"}
      access_decision: {type: str, description: "通行建议"}

  EventLevelStandard:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "事件分级标准(I~IV级)"
    description: |
      公路交通突发事件分级标准。依据S1第1.4节及公路交通突发事件应急预案第4.1节。
      分为特别重大(I)、重大(II)、较大(III)、一般(IV)四级。
    properties:
      level: {type: str, required: true, description: "级别: I/II/III/IV"}
      level_name: {type: str, description: "名称: 特别重大/重大/较大/一般"}
      description: {type: str, description: "事件严重度描述"}
      duration_threshold_hours: {type: int, description: "预计处置时间门槛(小时)"}
      response_department: {type: str, description: "负责部门"}

  ClearanceTechniqueRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "抢通技术选用规则(设施+灾损→技术)"
    description: 抢通技术选用规则。依据《公路交通应急抢通技术规程》。
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      facility_type: {type: str, description: "设施类型: 路基路面/桥涵/隧道"}
      damage_type: {type: str, description: "灾损类型"}
      applicable_condition: {type: str, description: "适用条件"}
      technique_name: {type: str, description: "技术名称"}
      technique_desc: {type: str, description: "技术说明"}
      required_equipment: {type: str, description: "所需装备(逗号分隔)"}
      required_material: {type: str, description: "所需物资(逗号分隔)"}

  TrafficControlRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "交通管制措施规则(损伤等级→管制)"
    description: 交通管制措施规则。依据《公路交通应急处置技术规范》。
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      damage_grade: {type: str, description: "损伤等级: I/II/III"}
      facility_type: {type: str, description: "设施类型"}
      control_measure: {type: str, description: "管制措施"}
      description: {type: str, description: "措施说明"}

  ResponseLevelRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "响应级别规则(事件级别→响应要求)"
    description: |
      应急响应级别规则。依据S1第4.3节。
      一级: 部主要领导主持; 二级: 分管部领导主持; 三级: 牵头司局主持; 四级: 司局负责人主持。
    properties:
      event_level: {type: str, required: true, description: "事件级别: I/II/III/IV"}
      response_level: {type: str, description: "响应级别: 一级/二级/三级/四级"}
      responsible_org: {type: str, description: "负责机构"}
      time_limit_hours: {type: int, description: "处理时限(小时)"}
      termination_condition: {type: str, description: "终止条件"}

  DefenseResponseRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "防御响应启动条件(预警→防御级别)"
    description: |
      台风及其他极端天气防御响应启动条件。依据S1附件。
      台风: 一级=16级以上/二级=14级以上/三级=12级以上/四级=8级以上。
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      weather_type: {type: str, description: "气象类型: 台风/冬季大风/风暴潮/海冰/海啸/寒潮"}
      defense_level: {type: str, description: "防御响应级别: 一级/二级/三级/四级"}
      trigger_condition: {type: str, description: "启动条件"}
      key_measures: {type: str, description: "重点措施"}

  DroneClassRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "无人机分类标准(S3第六十二条)"
    description: |
      无人机按性能指标分为微型/轻型/小型/中型/大型(S3第二条、第六十二条)。
      微型: 空机<0.25kg,真高≤50m,速度≤40km/h; 轻型: 空机≤4kg且最大起飞≤7kg,速度≤100km/h;
      小型: 空机≤15kg且最大起飞≤25kg; 中型: 最大起飞≤150kg; 大型: 最大起飞>150kg。
    properties:
      category: {type: str, required: true, description: "类别"}
      max_takeoff_weight_range: {type: str, description: "最大起飞重量范围"}
      characteristics: {type: str, description: "性能特征"}
      registration_required: {type: int, description: "需实名登记: 1=是 0=否(S3第十条)"}
      airworthiness_required: {type: int, description: "需适航许可: 1=是 0=否(S3第八条，仅中大型)"}
      license_required: {type: int, description: "操控员需执照: 1=是 0=否(S3第十六条/十七条)"}
      insurance_required: {type: int, description: "需投保责任保险: 1=是 0=否(S3第十二条)"}
      efence_required: {type: int, description: "需电子围栏: 1=是 0=否(S4第92.613条)"}

  OperatorLicenseRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "操控员资质要求(S3第十六条,S4 B章)"
    description: |
      不同类别无人机和运行方式对操控员的资质要求。
      微型/轻型: 无需执照(S3第十七条); 小型/中型/大型: 需操控员执照(S3第十六条,S4第92.53条)。
      超视距运行需超视距等级(S4第92.51条c款)。
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      drone_category: {type: str, description: "无人机类别"}
      operation_type: {type: str, description: "运行方式: 视距内/超视距"}
      required_license: {type: str, description: "所需执照"}
      required_ratings: {type: str, description: "所需等级(逗号分隔)"}
      training_requirement: {type: str, description: "培训要求"}
      legal_basis: {type: str, description: "法规依据"}

  AirspaceRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "空域使用规则(S3第三章,S4 E章)"
    description: |
      不同空域类型的使用条件和限制。
      管制空域: 需经空中交通管理机构批准(S3第十九条); 适飞空域: 微型/轻型/小型无需申请(S3第三十一条)。
      融合飞行条件见S3第二十二条。
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      airspace_type: {type: str, description: "空域类型: 管制空域/适飞空域/禁飞区"}
      drone_category_allowed: {type: str, description: "允许的无人机类别"}
      flight_approval_required: {type: int, description: "需飞行审批: 1=是 0=否"}
      altitude_limit_m: {type: int, description: "高度限制(米)"}
      legal_basis: {type: str, description: "法规依据"}

  FlightApprovalRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "飞行审批规则(S3第二十六条/二十九条)"
    description: |
      飞行活动审批要求。常规: 飞行前1日12时前申请、21时前批复(S3第二十六条)。
      应急: 起飞前30分钟申请、10分钟前批复(S3第二十九条)。特别紧急: 随时申请(S3第二十九条)。
      适飞空域内微型/轻型: 无需申请(S3第三十一条)。
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      scenario: {type: str, description: "场景: 常规飞行/应急抢险/特别紧急/适飞空域免申请"}
      approval_authority: {type: str, description: "审批机构"}
      advance_time_required: {type: str, description: "提前申请时间"}
      response_time: {type: str, description: "批复时限"}
      legal_basis: {type: str, description: "法规依据"}

  PayloadTypeRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    summary: "载荷类型及适用场景"
    description: 无人机载荷类型与应急侦测场景的匹配关系。
    properties:
      payload_type: {type: str, required: true, description: "载荷类型"}
      applicable_scenarios: {type: str, description: "适用场景(逗号分隔)"}
      weight_kg: {type: float, description: "载荷重量(kg)"}
      data_output_type: {type: str, description: "输出数据类型"}
      description: {type: str, description: "说明"}

  # ============================================================
  # 法规查询表（lookup_table）
  # ============================================================

  S1Regulation:
    kind: lookup_table
    data_source: human_confirmed
    mutability: read_only
    summary: "S1交通运输综合应急预案及公路/水路/道路运输预案原文"
    description: |
      《交通运输综合应急预案》及其附属5项预案(公路/水路/道路运输/公路水运工程/城市公交)关键条款。
      涵盖: 事件分级、响应程序、防御响应、信息报告、总结评估等。
    properties:
      article_number: {type: str, required: true, description: "条号(如S1-4.3.1)"}
      plan_name: {type: str, description: "所属预案名称"}
      chapter: {type: str, description: "所属章节"}
      content: {type: str, description: "条文内容"}
      keywords: {type: str, description: "关键词(逗号分隔)"}

  S3Regulation:
    kind: lookup_table
    data_source: human_confirmed
    mutability: read_only
    summary: "S3无人驾驶航空器飞行管理暂行条例原文"
    description: |
      《无人驾驶航空器飞行管理暂行条例》(国令第761号,2024年1月1日施行)原文条目。
      六章63条: 总则、民用无人机及操控员管理、空域和飞行活动管理、监督管理和应急处置、法律责任、附则。
    properties:
      article_number: {type: str, required: true, description: "条号"}
      chapter: {type: str, description: "所属章节"}
      content: {type: str, description: "条文内容"}
      keywords: {type: str, description: "关键词(逗号分隔)"}

  S4Regulation:
    kind: lookup_table
    data_source: human_confirmed
    mutability: read_only
    summary: "S4 CCAR-92民用无人驾驶航空器运行安全管理规则原文"
    description: |
      《民用无人驾驶航空器运行安全管理规则》(CCAR-92,2024年1月1日施行)原文条目。
      含: A章总则、B章操控员管理、C章登记管理、D章适航管理、E章空中交通管理、F章运行管理、M章法律责任。
      运行分类: 开放类/特定类/审定类(第92.7条)。
    properties:
      section_number: {type: str, required: true, description: "条号"}
      chapter: {type: str, description: "所属章节"}
      content: {type: str, description: "条文内容"}
      keywords: {type: str, description: "关键词(逗号分隔)"}

links:
  disaster_has_inspections:
    source: DisasterEvent
    target: FacilityInspection
    join: {source_key: event_id, target_key: event_id}
    link_type: contains
    cardinality: "1..n"
    description: 灾害事件下的设施检查记录

  disaster_has_plans:
    source: DisasterEvent
    target: ClearancePlan
    join: {source_key: event_id, target_key: event_id}
    link_type: contains
    cardinality: "0..n"
    description: 灾害事件下的抢通方案

  plan_has_dispatches:
    source: ClearancePlan
    target: ResourceDispatch
    join: {source_key: plan_id, target_key: plan_id}
    link_type: contains
    cardinality: "0..n"
    description: 方案下的资源调度记录

  disaster_has_controls:
    source: DisasterEvent
    target: TrafficControl
    join: {source_key: event_id, target_key: event_id}
    link_type: contains
    cardinality: "0..n"
    description: 灾害事件下的交通管制

  accident_has_controls:
    source: AccidentEvent
    target: TrafficControl
    join: {source_key: event_id, target_key: event_id}
    link_type: contains
    cardinality: "0..n"
    description: 事故事件下的交通管制

  disaster_has_evaluations:
    source: DisasterEvent
    target: TrafficEvaluation
    join: {source_key: event_id, target_key: event_id}
    link_type: contains
    cardinality: "0..n"
    description: 灾害事件下的通行评估

  disaster_has_detours:
    source: DisasterEvent
    target: DetourPlan
    join: {source_key: event_id, target_key: event_id}
    link_type: contains
    cardinality: "0..n"
    description: 灾害事件下的绕行方案

  disaster_has_recon_missions:
    source: DisasterEvent
    target: ReconMission
    join: {source_key: event_id, target_key: event_id}
    link_type: enables
    cardinality: "0..n"
    description: 灾害事件触发无人机侦测任务

  mission_has_compliance:
    source: ReconMission
    target: ComplianceCheck
    join: {source_key: mission_id, target_key: mission_id}
    link_type: enables
    cardinality: "1..1"
    description: 侦测任务需要合规检查

  mission_has_approval:
    source: ReconMission
    target: FlightApproval
    join: {source_key: mission_id, target_key: mission_id}
    link_type: enables
    cardinality: "1..1"
    description: 侦测任务需要飞行审批

  mission_has_recon_data:
    source: ReconMission
    target: ReconData
    join: {source_key: mission_id, target_key: mission_id}
    link_type: contains
    cardinality: "0..n"
    description: 侦测任务的数据采集结果

  warning_has_defense:
    source: WeatherWarning
    target: DefenseResponse
    join: {source_key: warning_id, target_key: warning_id}
    link_type: enables
    cardinality: "0..1"
    description: 预警触发防御响应

  defense_may_escalate_to_event:
    source: DefenseResponse
    target: DisasterEvent
    join: {source_key: response_id, target_key: event_id}
    link_type: causal
    cardinality: "0..1"
    description: 防御响应期间灾害发生时转为应急响应(S1第3.3.4节)

  disaster_has_reports:
    source: DisasterEvent
    target: EventReport
    join: {source_key: event_id, target_key: event_id}
    link_type: contains
    cardinality: "1..n"
    description: 灾害事件下的灾情报告

  accident_has_reports:
    source: AccidentEvent
    target: EventReport
    join: {source_key: event_id, target_key: event_id}
    link_type: contains
    cardinality: "0..n"
    description: 事故事件下的事故报告

  recon_data_enables_inspection:
    source: ReconData
    target: FacilityInspection
    join: {source_key: event_id, target_key: event_id}
    link_type: enables
    cardinality: "0..n"
    description: 侦测数据辅助设施检查评估

  inspection_enables_plan:
    source: FacilityInspection
    target: ClearancePlan
    join: {source_key: event_id, target_key: event_id}
    link_type: enables
    cardinality: "0..n"
    description: 检查评估结果驱动抢通方案生成(II/III级损伤)

functions:
  get_event:
    summary: "查询突发事件详情"
    group: "事件与检查"
    function_type: get
    params:
      event_id: {type: str, description: "事件编号"}

  get_affected_facilities:
    summary: "查询事件影响范围内设施"
    description: "根据事件位置搜索半径内的路段、桥梁、隧道"
    group: "事件与检查"
    function_type: get
    params:
      event_id: {type: str, description: "事件编号"}
      radius_km: {type: float, default: 5, description: "搜索半径(km)"}

  inspect_facility:
    summary: "对设施进行检查评估"
    description: "对受损设施进行现场检查评估，确定损伤等级和通行建议"
    group: "事件与检查"
    function_type: business
    writes_to: [FacilityInspection]
    hint: >
      检查标准(技术规范):
      路段: 路基路面+防护+支挡三项取最大等级;
      桥梁: 整体稳定+承载力+通行能力三项取最大等级;
      隧道: 洞口边仰坡+洞门+衬砌+路面取最大等级;
      I→观察通行，II→限制通行，III→禁止通行并实施抢通
    preconditions:
      - {object: DisasterEvent, field: event_id, operator: exists}
    effects:
      - {object: FacilityInspection, field: inspection_id, set_to: "新记录"}
    params:
      event_id: {type: str, description: "事件编号"}
      facility_type: {type: str, description: "设施类型: 路段/桥梁/隧道"}
      facility_id: {type: str, description: "设施编号"}

  assess_event_level:
    summary: "综合评估事件等级"
    group: "事件与检查"
    function_type: business
    writes_to: [DisasterEvent]
    hint: >
      I级: 国家干线阻断24h以上; II级: 阻断12h以上; III级: 阻断6h以上; IV级: 其他
    preconditions:
      - {object: FacilityInspection, field: inspection_id, operator: exists}
    params:
      event_id: {type: str, description: "事件编号"}

  get_road_segment:
    summary: "查询路段信息"
    group: "基础设施查询"
    function_type: get
    params:
      segment_id: {type: str, description: "路段编号"}

  get_bridge_status:
    summary: "查询桥梁信息"
    group: "基础设施查询"
    function_type: get
    params:
      bridge_id: {type: str, description: "桥梁编号"}

  get_tunnel_status:
    summary: "查询隧道信息"
    group: "基础设施查询"
    function_type: get
    params:
      tunnel_id: {type: str, description: "隧道编号"}

  get_depots_in_range:
    summary: "范围内应急物资储备点"
    group: "资源搜索"
    function_type: get
    params:
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      radius_km: {type: float, default: 100, description: "搜索半径(km)"}

  get_rescue_teams_in_range:
    summary: "范围内应急队伍"
    group: "资源搜索"
    function_type: get
    params:
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      radius_km: {type: float, default: 100, description: "搜索半径(km)"}

  get_equipment_by_depot:
    summary: "查询储备点装备清单"
    group: "资源搜索"
    function_type: get
    params:
      depot_id: {type: str, description: "储备点编号"}

  get_material_by_depot:
    summary: "查询储备点物资清单"
    group: "资源搜索"
    function_type: get
    params:
      depot_id: {type: str, description: "储备点编号"}

  lookup_damage_grade:
    summary: "查损伤分级标准"
    group: "规则查询"
    function_type: lookup
    params:
      facility_type: {type: str, description: "设施类型"}
      damage_grade: {type: str, default: "", description: "损伤等级(可选)"}

  lookup_event_level:
    summary: "查事件分级标准"
    group: "规则查询"
    function_type: lookup
    params:
      level: {type: str, default: "", description: "级别(可选)"}

  lookup_clearance_technique:
    summary: "查抢通技术选用规则"
    group: "规则查询"
    function_type: lookup
    params:
      facility_type: {type: str, description: "设施类型"}
      damage_type: {type: str, default: "", description: "灾损类型(可选)"}

  lookup_traffic_control:
    summary: "查交通管制措施"
    group: "规则查询"
    function_type: lookup
    params:
      damage_grade: {type: str, description: "损伤等级: I/II/III"}
      facility_type: {type: str, default: "", description: "设施类型(可选)"}

  lookup_response_level:
    summary: "查响应级别要求"
    group: "规则查询"
    function_type: lookup
    params:
      event_level: {type: str, description: "事件级别: I/II/III/IV"}

  lookup_defense_response_rule:
    summary: "查防御响应启动条件"
    group: "规则查询"
    function_type: lookup
    params:
      weather_type: {type: str, default: "", description: "气象类型(可选)"}
      defense_level: {type: str, default: "", description: "防御级别(可选)"}

  lookup_drone_class:
    summary: "查无人机分类标准"
    group: "规则查询"
    function_type: lookup
    params:
      category: {type: str, default: "", description: "类别(可选)"}

  lookup_operator_license_rule:
    summary: "查操控员资质要求"
    group: "规则查询"
    function_type: lookup
    params:
      drone_category: {type: str, default: "", description: "无人机类别(可选)"}
      operation_type: {type: str, default: "", description: "运行方式(可选)"}

  lookup_airspace_rule:
    summary: "查空域使用规则"
    group: "规则查询"
    function_type: lookup
    params:
      airspace_type: {type: str, default: "", description: "空域类型(可选)"}

  lookup_flight_approval_rule:
    summary: "查飞行审批要求"
    group: "规则查询"
    function_type: lookup
    params:
      scenario: {type: str, default: "", description: "场景(可选)"}

  lookup_payload_type:
    summary: "查载荷类型及适用场景"
    group: "规则查询"
    function_type: lookup
    params:
      payload_type: {type: str, default: "", description: "载荷类型(可选)"}
      scenario: {type: str, default: "", description: "适用场景关键词(可选)"}

  lookup_regulation:
    summary: "查法规条文"
    description: "查询S1/S3/S4法规原文条目"
    group: "规则查询"
    function_type: lookup
    params:
      regulation: {type: str, description: "法规: S1/S3/S4"}
      article_number: {type: str, default: "", description: "条号(可选)"}
      keyword: {type: str, default: "", description: "关键词(可选)"}

  generate_clearance_plans:
    summary: "生成候选抢通方案"
    group: "方案与评估"
    function_type: business
    writes_to: [ClearancePlan]
    preconditions:
      - {object: FacilityInspection, field: overall_damage_grade, operator: in, value: ["II", "III"]}
    effects:
      - {object: ClearancePlan, field: status, set_to: "candidate"}
    params:
      event_id: {type: str, description: "事件编号"}

  score_plans:
    summary: "三维加权评分(时效40%+安全30%+经济30%)"
    group: "方案与评估"
    function_type: business
    preconditions:
      - {object: ClearancePlan, field: status, operator: eq, value: "candidate"}
    effects:
      - {object: ClearancePlan, field: total_score, set_to: "计算值"}
    params:
      event_id: {type: str, description: "事件编号"}

  dispatch_resources:
    summary: "为方案调度资源"
    group: "资源调度"
    function_type: business
    writes_to: [ResourceDispatch]
    preconditions:
      - {object: ClearancePlan, field: total_score, operator: exists}
    effects:
      - {object: ResourceDispatch, field: status, set_to: "pending"}
    params:
      event_id: {type: str, description: "事件编号"}
      plan_id: {type: str, description: "方案编号"}

  set_traffic_control:
    summary: "设置交通管制措施"
    group: "管制与通行"
    function_type: business
    writes_to: [TrafficControl]
    params:
      event_id: {type: str, description: "事件编号"}
      facility_id: {type: str, description: "设施编号"}
      control_type: {type: str, description: "管制类型"}

  evaluate_traffic:
    summary: "抢通完成后通行评估"
    group: "管制与通行"
    function_type: business
    writes_to: [TrafficEvaluation]
    preconditions:
      - {object: ResourceDispatch, field: status, operator: exists}
    effects:
      - {object: TrafficEvaluation, field: eval_id, set_to: "新记录"}
    params:
      event_id: {type: str, description: "事件编号"}
      plan_id: {type: str, description: "方案编号"}

  generate_detour:
    summary: "生成绕行方案"
    group: "管制与通行"
    function_type: business
    writes_to: [DetourPlan]
    params:
      event_id: {type: str, description: "事件编号"}
      facility_id: {type: str, description: "设施编号"}

  get_drone:
    summary: "查询无人机详情"
    group: "无人机查询"
    function_type: get
    params:
      drone_id: {type: str, description: "无人机编号"}

  get_drone_operator:
    summary: "查询操控员详情"
    group: "无人机查询"
    function_type: get
    params:
      operator_id: {type: str, description: "操控员编号"}

  get_drone_base:
    summary: "查询基地详情"
    group: "无人机查询"
    function_type: get
    params:
      base_id: {type: str, description: "基地编号"}

  get_airspace_zone:
    summary: "查询空域区划"
    group: "无人机查询"
    function_type: get
    params:
      zone_id: {type: str, description: "空域编号"}

  get_drones_in_range:
    summary: "搜索范围内可用无人机"
    group: "无人机查询"
    function_type: get
    params:
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      radius_km: {type: float, default: 50, description: "搜索半径(km)"}

  get_operators_available:
    summary: "搜索可用操控员"
    group: "无人机查询"
    function_type: get
    params:
      license_type: {type: str, default: "", description: "执照类型过滤(可选)"}

  get_weather_warning:
    summary: "查询气象预警信息"
    group: "预警与防御"
    function_type: get
    params:
      warning_id: {type: str, default: "", description: "预警编号(可选)"}

  plan_recon_mission:
    summary: "规划无人机侦测任务"
    description: "根据灾害类型和受影响设施规划侦测任务，自动按载荷兼容性选择无人机"
    group: "无人机侦测"
    function_type: business
    writes_to: [ReconMission]
    preconditions:
      - {object: DisasterEvent, field: event_id, operator: exists}
    effects:
      - {object: ReconMission, field: status, set_to: "计划中"}
    params:
      event_id: {type: str, description: "事件编号"}
      drone_id: {type: str, default: "", description: "指定无人机编号(可选)"}

  check_compliance:
    summary: "无人机出动前合规检查"
    description: "五维合规校验: 无人机登记/适航、操控员资质、空域合规、载荷合规、电子围栏"
    group: "无人机侦测"
    function_type: business
    writes_to: [ComplianceCheck]
    preconditions:
      - {object: ReconMission, field: mission_id, operator: exists}
    effects:
      - {object: ComplianceCheck, field: check_id, set_to: "新记录"}
    params:
      mission_id: {type: str, description: "任务编号"}

  request_flight_approval:
    summary: "提交飞行审批"
    description: |
      常规: 飞行前1日12时前申请(S3第二十六条); 应急: 起飞前30分钟(S3第二十九条);
      特别紧急: 随时申请(S3第二十九条); 适飞空域微型/轻型: 无需申请(S3第三十一条)。
    group: "无人机侦测"
    function_type: business
    writes_to: [FlightApproval]
    preconditions:
      - {object: ReconMission, field: mission_id, operator: exists}
    effects:
      - {object: FlightApproval, field: approval_status, set_to: "待审批"}
    params:
      mission_id: {type: str, description: "任务编号"}

  dispatch_drone:
    summary: "调派无人机执行任务"
    description: "合规检查通过且飞行审批批准后调派无人机"
    group: "无人机侦测"
    function_type: business
    writes_to: [Drone, ReconMission]
    preconditions:
      - {object: ComplianceCheck, field: overall_result, operator: eq, value: "通过"}
      - {object: FlightApproval, field: approval_status, operator: eq, value: "已批准"}
    effects:
      - {object: Drone, field: status, set_to: "任务中"}
      - {object: ReconMission, field: status, set_to: "执行中"}
    params:
      mission_id: {type: str, description: "任务编号"}

  collect_recon_data:
    summary: "采集处理侦测数据"
    group: "无人机侦测"
    function_type: business
    writes_to: [ReconData]
    preconditions:
      - {object: ReconMission, field: status, operator: eq, value: "执行中"}
    effects:
      - {object: ReconData, field: data_id, set_to: "新记录"}
      - {object: ReconMission, field: status, set_to: "数据处理"}
    params:
      mission_id: {type: str, description: "任务编号"}

  trigger_defense_response:
    summary: "触发防御响应"
    description: "根据预警级别启动防御响应(S1第3.3节)，含响应、巡查、管控三阶段"
    group: "预警与防御"
    function_type: business
    writes_to: [DefenseResponse]
    params:
      warning_id: {type: str, description: "预警编号"}

  intensify_patrol:
    summary: "加密巡检(预警触发)"
    group: "预警与防御"
    function_type: get
    params:
      warning_id: {type: str, description: "预警编号"}

  generate_event_report:
    summary: "生成灾情信息报告"
    description: |
      信息报送要素(S1第4.2节): 事件时间地点、影响范围损害程度、人员伤亡、发展趋势、已采取措施。
      首报基于 ReconData 快速生成; 续报加入详细检查数据; 终报加入通行评估结果。
    group: "信息报送"
    function_type: business
    writes_to: [EventReport]
    effects:
      - {object: EventReport, field: report_id, set_to: "新记录"}
    temporal_constraints:
      - when: {report_type: "首报"}
        deadline: "event_time + 2h"
        sla: "事件发生后2小时内完成首报"
      - when: {report_type: "续报"}
        deadline: "首报时间 + 24h"
        sla: "首报后24小时内出续报"
    params:
      event_id: {type: str, description: "事件编号"}
      report_type: {type: str, default: "首报", description: "报告类型: 首报/续报/终报"}

rules:
  damage_to_access:
    description: "损伤等级→通行建议(技术规范)"
    rule_type: classification
    applies_to: [FacilityInspection]
    result_field: access_recommendation
    conditions:
      - {field: overall_damage_grade, operator: eq, value: "I", result: "观察通行"}
      - {field: overall_damage_grade, operator: eq, value: "II", result: "限制通行并加强观测"}
      - {field: overall_damage_grade, operator: eq, value: "III", result: "禁止通行并实施抢通"}

  event_to_response:
    description: "事件级别→响应级别(S1第4.1节)"
    rule_type: classification
    applies_to: [DisasterEvent, AccidentEvent]
    result_field: response_level
    conditions:
      - {field: event_level, operator: eq, value: "I", result: "一级"}
      - {field: event_level, operator: eq, value: "II", result: "二级"}
      - {field: event_level, operator: eq, value: "III", result: "三级"}
      - {field: event_level, operator: eq, value: "IV", result: "四级"}

  warning_to_defense:
    description: "预警级别→防御响应级别(S1第3.3节)"
    rule_type: classification
    applies_to: [WeatherWarning]
    result_field: defense_level
    conditions:
      - {field: warning_level, operator: eq, value: "红色", result: "一级"}
      - {field: warning_level, operator: eq, value: "橙色", result: "二级"}
      - {field: warning_level, operator: eq, value: "黄色", result: "三级"}
      - {field: warning_level, operator: eq, value: "蓝色", result: "四级"}

  drone_weight_classification:
    description: "按性能指标分类无人机(S3第六十二条)"
    rule_type: classification
    applies_to: [Drone]
    result_field: category
    source: "S3第六十二条"
    conditions:
      - {field: max_takeoff_weight_kg, operator: lte, value: 0.25, result: "微型"}
      - {field: max_takeoff_weight_kg, operator: lte, value: 7, result: "轻型"}
      - {field: max_takeoff_weight_kg, operator: lte, value: 25, result: "小型"}
      - {field: max_takeoff_weight_kg, operator: lte, value: 150, result: "中型"}
      - {field: max_takeoff_weight_kg, operator: gt, value: 150, result: "大型"}

  drone_license_requirement:
    description: "无人机类别→操控员执照要求(S3第十六条/十七条)"
    rule_type: classification
    applies_to: [Drone]
    result_field: license_required
    source: "S3第十六条、第十七条"
    conditions:
      - {field: category, operator: in, value: ["微型", "轻型"], result: "无需执照"}
      - {field: category, operator: eq, value: "小型", result: "小型操控员执照"}
      - {field: category, operator: eq, value: "中型", result: "中型操控员执照"}
      - {field: category, operator: eq, value: "大型", result: "大型操控员执照"}

  defense_may_escalate:
    description: "防御响应期间发生灾害→转应急响应(S1第3.3.4节)"
    rule_type: classification
    applies_to: [DefenseResponse]
    result_field: status
    conditions:
      - {field: status, operator: eq, value: "进行中", result: "若发生较大及以上事件则已转应急"}

workflows:
  emergency_response:
    description: "公路交通应急处置全流程"
    trigger: "灾情发生或接报"
    involves_objects: [DisasterEvent, FacilityInspection, ClearancePlan, ResourceDispatch, TrafficControl, TrafficEvaluation]
    steps:
      - name: 启动应急响应
        description: "接报→疏散→安全措施→上报(S1第4.1节)"
        sla: "接报后30分钟"
      - {name: 无人机侦测, function: plan_recon_mission, next: 设施检查}
      - {name: 设施检查, function: inspect_facility, next: 事件评估}
      - {name: 事件评估, function: assess_event_level, next: 方案生成}
      - {name: 方案生成, function: generate_clearance_plans, next: 方案评分}
      - {name: 方案评分, function: score_plans, next: 资源调度}
      - {name: 资源调度, function: dispatch_resources, next: 交通管制}
      - {name: 交通管制, function: set_traffic_control, next: 通行评估}
      - name: 通行评估
        function: evaluate_traffic
        next: {通过: 信息报送, 不通过: 绕行方案}
      - {name: 绕行方案, function: generate_detour}
      - name: 信息报送
        function: generate_event_report
        sla: "首报2小时内"

  drone_dispatch:
    description: "无人机出动流程(合规检查→审批→调派)"
    trigger: "侦测任务创建"
    involves_objects: [ReconMission, ComplianceCheck, FlightApproval, Drone]
    steps:
      - {name: 任务规划, function: plan_recon_mission, next: 合规检查}
      - name: 合规检查
        function: check_compliance
        next: {通过: 飞行审批, 不通过: ""}
      - name: 飞行审批
        function: request_flight_approval
        next: {已批准: 调派执行, 已拒绝: ""}
      - {name: 调派执行, function: dispatch_drone, next: 数据采集}
      - {name: 数据采集, function: collect_recon_data}

  weather_defense:
    description: "气象预警防御响应流程(S1第3.3节)"
    trigger: "气象预警发布"
    involves_objects: [WeatherWarning, DefenseResponse]
    steps:
      - {name: 启动防御响应, function: trigger_defense_response, next: 加密巡检}
      - name: 加密巡检
        function: intensify_patrol
        description: "对高风险路段、桥梁、隧道、高边坡加密巡查频次"
        next: 持续监控
      - name: 持续监控
