name: hv_access_builder
description: 面向10kV高压新装、增容、装表临时用电及变电站新出线场景的接入方案智能生成、校核、评分与输出领域。（由 builder 版本体派生的独立可执行实验
  domain。）
objects:
  HighVoltageConnectionRequest:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: json_file
      id_field: request_id
      config:
        path: data/high_voltage_connection_request.json
    summary: 10kV高压接入方案推理的统一入口请求，覆盖新装、增容和装表临时用电。
    description: 来自营销2.0或PMS3.0的高压接入方案推理入口请求，包含业务类型、电压等级、容量、用户重要性、负荷等级、供电诉求、用电地址和受电点坐标等信息。
    properties:
      request_id:
        type: str
        required: true
        description: 接入方案推理请求编号。
      business_type:
        type: str
        description: 业务类型：新装/增容/临时。
      demand_type:
        type: str
        description: 需求类型或报装场景。
      supply_voltage_kv:
        type: float
        description: 供电电压等级，10kV范围校验要求为10。
      load_nature:
        type: str
        description: 负荷性质。
      electricity_category:
        type: str
        description: 用电类别。
      approved_contract_capacity_kva:
        type: float
        description: 已核定合同容量，单位kVA。
      total_receiving_transformer_capacity_kva:
        type: float
        description: 受电变压器总容量或新装总容量，单位kVA。
      user_importance_level:
        type: str
        description: 用户重要等级，如一级重要用户、二级重要用户、临时性重要用户、普通用户。
      load_level:
        type: str
        description: 负荷等级，如一级负荷、二级负荷、三级负荷。
      primary_secondary_load_capacity_kva:
        type: float
        description: 一二级负荷容量，单位kVA。
      requested_power_source_count:
        type: int
        description: 用户申请或要求的电源点数量。
      requested_operation_mode:
        type: str
        description: 用户请求的运行方式或供电方式，如单电源、双回路、双电源。
      electricity_address:
        type: str
        description: 用电地址。
      receiving_point_coordinate:
        type: str
        format: geojson_point
        description: 受电点坐标，统一采用WGS84坐标系GeoJSON Point字符串，坐标顺序为[longitude, latitude]。
      customer_confirmed_location_flag:
        type: bool
        description: 客户是否已确认受电点位置。
  ExpansionOriginalSupplyInfo:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: json_file
      id_field: original_supply_info_id
      config:
        path: data/expansion_original_supply_info.json
    summary: 增容场景中原有电源接入线路、主变和既有接入点信息。
    description: 高压增容场景下用于原电源优先校核的既有供电信息。使用original_supply_info_id作为主键，支持同一增容请求下存在多个原电源、双回路或双电源既有接入信息。
    properties:
      original_supply_info_id:
        type: str
        required: true
        description: 原供电信息记录唯一编号。
      request_id:
        type: str
        required: true
        description: 对应高压接入请求编号。
      original_access_point_id:
        type: str
        description: 原电源接入点编号。
      original_feeder_id:
        type: str
        description: 原接入馈线编号。
      original_transformer_id:
        type: str
        description: 原接入主变编号。
      original_substation_id:
        type: str
        description: 原接入变电站编号。
      original_busbar_id:
        type: str
        description: 原接入母线编号。
      existing_contract_capacity_kva:
        type: float
        description: 既有合同容量，单位kVA。
      incremental_capacity_kva:
        type: float
        description: 本次新增或增容容量，单位kVA。
      post_expansion_capacity_kva:
        type: float
        description: 增容后总容量，单位kVA。
      original_supply_mode:
        type: str
        description: 原供电方式，如单电源、双回路、双电源。
  ConnectionReasoningConfig:
    kind: config
    data_source: human_confirmed
    mutability: read_only
    source:
      type: json_file
      id_field: config_id
      config:
        path: data/connection_reasoning_config.json
    summary: 正式推理前的配置对象，用于约束设备类型、红线设备和新出线分支。
    description: 业务人员或PMS3.0在正式推理前确认的强约束配置，包括指定电源点设备类型、是否红线处新增设备、是否启用变电站新出线等。
    properties:
      config_id:
        type: str
        required: true
        description: 推理配置编号。
      request_id:
        type: str
        required: true
        description: 对应高压接入请求编号。
      allowed_source_device_types:
        type: list[str]
        description: 允许使用的电源点设备类型集合。
      add_redline_boundary_device:
        type: bool
        description: 是否在红线处新增用户分界设备。
      enable_new_substation_outgoing_line:
        type: bool
        description: 是否启用变电站新出线分支。
      pms_preselected_source_type:
        type: str
        description: PMS前置推理指定的电源点设备类型。
      created_by:
        type: str
        description: 配置创建人。
      created_at:
        type: str
        description: 配置创建时间。
  PowerAccessPoint:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: json_file
      id_field: access_point_id
      config:
        path: data/power_access_point.json
    summary: 可供接入的现有电源点及其馈线、母线、变电站和空间关联。
    description: 存量配网中可作为候选接入点的设备，包含设备类型、空间距离、所属馈线、母线、变电站、进线来源、间隔余量和运行状态。
    properties:
      access_point_id:
        type: str
        required: true
        description: 电源点编号。
      device_type:
        type: str
        description: 电源点设备类型，如杆塔、环网柜、开闭所、开关站、间隔开关等。
      coordinate:
        type: str
        format: geojson_point
        description: 电源点坐标，统一采用WGS84坐标系GeoJSON Point字符串，坐标顺序为[longitude, latitude]。
      distance_to_receiving_point_m:
        type: float
        description: 到受电点的距离，单位米。
      feeder_id:
        type: str
        description: 所属馈线编号。
      busbar_id:
        type: str
        description: 所属母线编号。
      substation_id:
        type: str
        description: 所属变电站编号。
      incoming_source_id:
        type: str
        description: 所属进线电源或上级电源编号。
      available_bay_count:
        type: int
        description: 可用备用间隔数量。
      is_available:
        type: bool
        description: 电源点当前是否可用于接入。
      current_operation_status:
        type: str
        description: 当前运行状态。
  Feeder:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: json_file
      id_field: feeder_id
      config:
        path: data/feeder.json
    summary: 候选电源点所属馈线，用于容量、负载率、用户数、线损率和负荷划接判断。
    description: 配网馈线事实数据，支撑电源点容量校核、负载率校核、线损校核、接入用户数校核和馈线负荷划接方案生成。
    properties:
      feeder_id:
        type: str
        required: true
        description: 馈线编号。
      substation_id:
        type: str
        description: 所属变电站编号。
      busbar_id:
        type: str
        description: 所属母线编号。
      historical_max_load_rate:
        type: float
        description: 历史最大负载率，统一采用0到1小数，如0.8表示80%。
      current_load_rate:
        type: float
        description: 当前负载率，统一采用0到1小数，如0.8表示80%。
      available_capacity_kva:
        type: float
        description: 馈线可开放容量，单位kVA。
      connected_user_count:
        type: int
        description: 已接入用户数量。
      line_loss_rate_after_connection:
        type: float
        description: 预计接入后线损率，统一采用0到1小数，如0.05表示5%。
      neighbor_feeder_ids:
        type: list[str]
        description: 邻近馈线编号集合。
      section_switch_ids:
        type: list[str]
        description: 分段开关编号集合。
      tie_switch_ids:
        type: list[str]
        description: 联络开关编号集合。
  SubstationTransformer:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: json_file
      id_field: transformer_id
      config:
        path: data/substation_transformer.json
    summary: 变电站主变事实，用于主变可开放容量、负载率和主变负荷转移判断。
    description: 变电站主变运行与容量事实数据，支撑接入容量校核、新出线可行性校核和主变负荷划接判断。
    properties:
      transformer_id:
        type: str
        required: true
        description: 主变编号。
      substation_id:
        type: str
        description: 所属变电站编号。
      busbar_id:
        type: str
        description: 所属母线编号。
      available_capacity_kva:
        type: float
        description: 主变可开放容量，单位kVA。
      current_load_rate:
        type: float
        description: 主变实时负载率，统一采用0到1小数，如0.8表示80%。
      historical_max_load_rate:
        type: float
        description: 主变历史最大负载率，统一采用0到1小数，如0.8表示80%。
      connected_feeder_ids:
        type: list[str]
        description: 主变所带馈线编号集合。
  Substation:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: json_file
      id_field: substation_id
      config:
        path: data/substation.json
    summary: 变电站事实，用于双电源来源判定和15公里新出线搜索。
    description: 变电站基础与空间事实数据，包含坐标、至受电点距离、空余出线间隔、进线来源、母线、主变和出线间隔列表。
    properties:
      substation_id:
        type: str
        required: true
        description: 变电站编号。
      name:
        type: str
        description: 变电站名称。
      coordinate:
        type: str
        format: geojson_point
        description: 变电站坐标，统一采用WGS84坐标系GeoJSON Point字符串，坐标顺序为[longitude, latitude]。
      distance_to_receiving_point_m:
        type: float
        description: 到受电点的距离，单位米。
      spare_outgoing_bay_count:
        type: int
        description: 空余出线间隔数量。
      incoming_source_ids:
        type: list[str]
        description: 变电站进线电源编号集合。
      busbar_ids:
        type: list[str]
        description: 变电站母线编号集合。
      transformer_ids:
        type: list[str]
        description: 变电站主变编号集合。
      outgoing_bay_ids:
        type: list[str]
        description: 变电站出线间隔编号集合。
  SubstationOutgoingBay:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: json_file
      id_field: outgoing_bay_id
      config:
        path: data/substation_outgoing_bay.json
    summary: 变电站10kV出线间隔事实，用于新出线方案选择具体间隔。
    description: 记录变电站出线间隔所属变电站、母线、主变关联、可用状态和运行状态，支撑新出线方案从空余间隔数量进一步落到具体间隔。
    properties:
      outgoing_bay_id:
        type: str
        required: true
        description: 出线间隔编号。
      substation_id:
        type: str
        required: true
        description: 所属变电站编号。
      busbar_id:
        type: str
        description: 所属母线编号。
      transformer_id:
        type: str
        description: 关联主变编号。
      voltage_kv:
        type: float
        description: 出线间隔电压等级，单位kV。
      is_available:
        type: bool
        description: 是否可用于新出线接入。
      current_status:
        type: str
        description: 当前状态，如空闲、占用、检修、预留。
      reserved_for_project_id:
        type: str
        description: 若已预留，记录预留项目编号。
      operation_status:
        type: str
        description: 运行状态说明。
  ConnectionScopeRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    source:
      type: json_file
      id_field: rule_id
      config:
        path: data/connection_scope_rule.json
    summary: 判断请求是否属于10kV高压接入方案推理范围。
    description: 入口范围校验规则表，约束允许的业务类型、供电电压和受电变压器总容量上限。
    properties:
      rule_id:
        type: str
        required: true
        description: 规则记录编号。
      allowed_business_types:
        type: list[str]
        description: 允许的业务类型集合。
      required_supply_voltage_kv:
        type: float
        description: 要求的供电电压等级，通常为10kV。
      max_total_receiving_transformer_capacity_kva:
        type: float
        description: 受电变压器总容量或增容后总容量上限，单位kVA。
  PowerSupplyModeRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    source:
      type: json_file
      id_field: rule_id
      config:
        path: data/power_supply_mode_rule.json
    summary: 根据用户重要等级、负荷等级和用户需求确定最低供电方式要求。
    description: 供电方式判定规则表，用于确定最低供电模式、最少回路数、最少电源数和电源独立性要求。
    properties:
      rule_id:
        type: str
        required: true
        description: 规则记录编号。
      user_importance_level:
        type: str
        description: 用户重要等级匹配条件。
      load_level:
        type: str
        description: 负荷等级匹配条件。
      user_requested_mode:
        type: str
        description: 用户请求供电方式。
      required_supply_mode:
        type: str
        description: 判定后的最低供电方式。
      minimum_route_count:
        type: int
        description: 最少供电回路数。
      minimum_source_count:
        type: int
        description: 最少独立电源数。
      source_independence_requirement:
        type: str
        description: 电源独立性要求描述。
  ExistingAccessPointConstraintRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    source:
      type: json_file
      id_field: rule_id
      config:
        path: data/existing_access_point_constraint_rule.json
    summary: 现有电源点直接接入所需满足的馈线、主变、间隔、用户数和线损约束。
    description: 用于现有电源点直接准入的约束规则表，负载率和线损率阈值统一采用0到1小数。
    properties:
      rule_id:
        type: str
        required: true
        description: 规则记录编号。
      max_feeder_historical_load_rate:
        type: float
        description: 馈线历史最大负载率上限，0到1小数。
      max_feeder_current_load_rate:
        type: float
        description: 馈线实时负载率上限，0到1小数。
      feeder_capacity_operator:
        type: str
        description: 馈线可开放容量与单路接入容量比较运算符，如>=。
      feeder_capacity_multiplier:
        type: float
        description: 馈线可开放容量相对单路接入容量的倍数要求，如1.0表示可开放容量>=单路容量。
      min_spare_bay_count:
        type: int
        description: 最少备用间隔数量。
      max_connected_user_count:
        type: int
        description: 最大接入用户数。
      max_line_loss_rate_after_connection:
        type: float
        description: 接入后线损率上限，0到1小数。
      transformer_capacity_operator:
        type: str
        description: 主变可开放容量与单路接入容量比较运算符，如>=。
      transformer_capacity_multiplier:
        type: float
        description: 主变可开放容量相对单路接入容量的倍数要求，如1.0表示可开放容量>=单路容量。
      max_transformer_load_rate:
        type: float
        description: 主变负载率上限，0到1小数。
  LoadTransferRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    source:
      type: json_file
      id_field: rule_id
      config:
        path: data/load_transfer_rule.json
    summary: 馈线或主变负载率超限时生成并校核负荷划接方案的规则。
    description: 负荷划接规则表，用于确定重载阈值、是否保持既有联络关系、接收对象选择优先级、划接后负载率上限和馈线划接搜索半径，负载率统一采用0到1小数。
    properties:
      rule_id:
        type: str
        required: true
        description: 规则记录编号。
      overload_threshold:
        type: float
        description: 重载或超限阈值，0到1小数，如0.8表示80%。
      preserve_existing_tie_relationship:
        type: bool
        description: 是否要求保持现有联络关系。
      receiver_selection_priority:
        type: str
        description: 接收馈线或接收主变选择优先级。
      target_feeder_max_load_rate_after_transfer:
        type: float
        description: 划接后目标馈线最大允许负载率，0到1小数。
      target_transformer_max_load_rate_after_transfer:
        type: float
        description: 划接后目标主变最大允许负载率，0到1小数。
      feeder_transfer_search_radius_m:
        type: float
        description: 馈线负荷划接候选搜索半径，单位米。
  NewSubstationOutgoingLineTriggerRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    source:
      type: json_file
      id_field: rule_id
      config:
        path: data/new_substation_outgoing_line_trigger_rule.json
    summary: 判断是否从常规现有电源点推荐切换至变电站新出线逻辑。
    description: 新出线触发规则表，仅保存静态阈值和触发条件配置；实际运行时判断结果记录在NewSubstationOutgoingLineDecision.trigger_reasons中。
    properties:
      rule_id:
        type: str
        required: true
        description: 规则记录编号。
      config_enabled:
        type: bool
        description: 配置是否启用新出线。
      single_route_capacity_threshold_kva:
        type: float
        description: 触发新出线的单路容量阈值，单位kVA。
      trigger_when_capacity_exceeds_threshold:
        type: bool
        description: 单路容量超过阈值时是否允许触发新出线。
      require_no_available_existing_access_point:
        type: bool
        description: 是否要求无可用现有电源点作为触发条件之一。
      require_no_feeder_transfer_candidate_within_radius:
        type: bool
        description: 是否要求指定半径内无馈线划接候选作为触发条件之一。
      feeder_transfer_candidate_radius_m:
        type: float
        description: 馈线划接候选判定半径，单位米，通常为1000。
      require_no_transformer_transfer_candidate_in_substation:
        type: bool
        description: 是否要求站内无主变划接候选作为触发条件之一。
      trigger_logic:
        type: str
        description: 多个触发条件之间的逻辑关系，如ANY或ALL。
  NewSubstationOutgoingLineFeasibilityRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    source:
      type: json_file
      id_field: rule_id
      config:
        path: data/new_substation_outgoing_line_feasibility_rule.json
    summary: 判断15公里范围内候选变电站是否可用于新出线接入。
    description: 新出线可行性规则表，约束搜索半径、最少空余出线间隔、主变负载率上限、主变可开放容量比较条件和搜索顺序。
    properties:
      rule_id:
        type: str
        required: true
        description: 规则记录编号。
      search_radius_km:
        type: float
        description: 新出线变电站搜索半径，单位公里。
      min_spare_outgoing_bay_count:
        type: int
