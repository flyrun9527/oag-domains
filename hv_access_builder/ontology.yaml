functions:
  validate_connection_scope:
    summary: 校验请求是否属于10kV高压接入方案推理范围
    description: 基于业务类型、供电电压、受电变压器总容量或增容后容量，确定高压新装、增容、装表临时用电请求是否可进入10kV接入方案推理。
    group: 入口校验
    function_type: business
    writes_to:
    - ScopeValidationResult
    involves_objects:
    - HighVoltageConnectionRequest
    - ConnectionScopeRule
    - ScopeValidationResult
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      rule_id:
        type: str
        description: 范围校验规则编号；为空时使用当前生效规则
        default: ''
    hint: 必须先执行入口范围校验。业务类型仅允许新装、增容、临时；供电电压必须为10kV；新装和临时用电按total_receiving_transformer_capacity_kva校验，增容可结合post_expansion_capacity_kva校验；容量上限为20000kVA。不通过时停止后续方案生成。
    effects:
    - object: ScopeValidationResult
      field: is_in_scope
      set_to: 按规则校验结果
    - object: ScopeValidationResult
      field: failed_reasons
      set_to: 不通过原因列表
    temporal_constraints: []
  apply_reasoning_config_constraints:
    summary: 应用推理配置强约束
    description: 读取正式推理配置，将指定电源点设备类型、PMS前置指定类型、红线处新增设备、新出线启用状态解析为后续搜索、校核和方案生成必须遵守的无状态约束；本函数不产生持久化结果对象。
    group: 入口校验
    function_type: lookup
    writes_to: []
    involves_objects:
    - HighVoltageConnectionRequest
    - ScopeValidationResult
    - ConnectionReasoningConfig
    - PowerAccessPoint
    - CandidateConnectionScheme
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      config_id:
        type: str
        description: 推理配置编号；为空时使用请求对应的当前配置
        default: ''
    preconditions:
    - object: ScopeValidationResult
      field: is_in_scope
      operator: eq
      value: true
    hint: 配置约束不是建议项而是硬约束，但本函数仅做无状态校验和参数解析，不写入持久化对象。若allowed_source_device_types或pms_preselected_source_type指定设备类型，后续搜索和候选方案不得使用其他类型电源点；add_redline_boundary_device为启用时，候选方案必须结合红线分界设备规则生成边界设备；enable_new_substation_outgoing_line为启用时，仅表示允许纳入新出线评估分支，不等同于无条件强制触发新出线。
    temporal_constraints: []
  decide_supply_mode:
    summary: 判定最低供电方式、路数、电源数和独立性要求
    description: 根据用户重要等级、负荷等级、临时用电属性和用户需求，确定单电源、双回路或双电源等最低供电方式约束。
    group: 供电方式
    function_type: business
    writes_to:
    - SupplyModeDecision
    involves_objects:
    - HighVoltageConnectionRequest
    - ScopeValidationResult
    - PowerSupplyModeRule
    - SupplyModeDecision
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      rule_id:
        type: str
        description: 供电方式判定规则编号；为空时使用当前生效规则
        default: ''
    preconditions:
    - object: ScopeValidationResult
      field: is_in_scope
      operator: eq
      value: true
    hint: 一级重要用户或一级负荷要求双电源；二级重要用户、临时性重要用户或二级负荷至少双回路；三级负荷可单电源。若用户请求的电源数或运行方式高于最低要求，应按较高要求执行。双电源通常要求不同变电站，或同站不同电源进线的两段母线；双回路至少要求不同母线。
    effects:
    - object: SupplyModeDecision
      field: required_supply_mode
      set_to: 单电源/双回路/双电源
    - object: SupplyModeDecision
      field: minimum_route_count
      set_to: 按供电方式规则确定
    - object: SupplyModeDecision
      field: minimum_source_count
      set_to: 按供电方式规则确定
    temporal_constraints: []
  search_power_access_points:
    summary: 按固定半径扩散搜索周边现有电源点
    description: 以受电点坐标为中心，按200米、500米、800米、1000米逐步扩散搜索现有电源点，执行设备类型过滤、可用状态过滤、线路去重和停止条件判断。
    group: 电源点搜索
    function_type: lookup
    writes_to:
    - PowerSourceSearchBatch
    involves_objects:
    - HighVoltageConnectionRequest
    - ScopeValidationResult
    - ConnectionReasoningConfig
    - PowerAccessPoint
    - Feeder
    - PowerSourceSearchBatch
    - SupplyModeDecision
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      center_coordinate:
        type: str
        description: 受电点坐标；为空时使用请求receiving_point_coordinate
        default: ''
      allowed_source_device_types:
        type: str
        description: 允许的电源点设备类型，多个值用逗号分隔；为空时使用推理配置
        default: ''
      radius_sequence_m:
        type: str
        description: 扩散搜索半径序列，默认200,500,800,1000
        default: 200,500,800,1000
      required_distinct_feeder_count:
        type: int
        description: 满足供电方式所需的不同馈线数量；为空时按SupplyModeDecision确定
        default: 0
    preconditions:
    - object: ScopeValidationResult
      field: is_in_scope
      operator: eq
      value: true
    - object: SupplyModeDecision
      field: decision_id
      operator: exists
      value: true
    hint: 必须按200、500、800、1000米顺序搜索，不得跳过近距离半径。每一轮仅纳入可用且满足配置设备类型的电源点，并统计不同馈线数量；达到供电方式要求的不同线路数量后停止。达到1000米仍不足时，应记录不满足原因，并进入容量校核、负荷划接或新出线触发判断。
    effects:
    - object: PowerSourceSearchBatch
      field: stopped_radius_m
      set_to: 满足线路数量要求时的半径或1000
    - object: PowerSourceSearchBatch
      field: satisfies_required_line_count
      set_to: 是否满足不同线路数量要求
    temporal_constraints: []
  check_access_point_capacity:
    summary: 校核现有电源点接入容量和运行约束
    description: 跨电源点、馈线、主变和规则配置，校核可开放容量、历史及当前负载率、备用间隔、接入用户数、线损率等现有电源点准入条件。
    group: 容量校核
    function_type: business
    writes_to:
    - AccessPointCapacityCheck
    involves_objects:
    - HighVoltageConnectionRequest
    - ScopeValidationResult
    - PowerAccessPoint
    - Feeder
    - SubstationTransformer
    - ExistingAccessPointConstraintRule
    - AccessPointCapacityCheck
    - PowerSourceSearchBatch
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      access_point_ids:
        type: str
        description: 待校核电源点编号列表，多个值用逗号分隔；为空时使用最新搜索批次结果
        default: ''
      single_route_capacity_kva:
        type: float
        description: 单路接入容量；为空或0时由请求容量和供电路数计算
        default: 0
      rule_id:
        type: str
        description: 现有电源点约束规则编号；为空时使用当前生效规则
        default: ''
    preconditions:
    - object: ScopeValidationResult
      field: is_in_scope
      operator: eq
      value: true
    - object: PowerSourceSearchBatch
      field: search_batch_id
      operator: exists
      value: true
    hint: 直接可用电源点必须同时满足：馈线历史和当前负载率未超限、馈线可开放容量大于单路接入容量、备用间隔满足要求、接入用户数不超过规则阈值、接入后线损率不超过阈值、主变可开放容量大于单路接入容量且主变负载率未超限。任一失败不得标记为直接可用；若负载率类约束失败但具备划接可能，应标记requires_load_transfer。
    effects:
    - object: AccessPointCapacityCheck
      field: is_directly_usable
      set_to: 是否可直接作为现有电源点接入
    - object: AccessPointCapacityCheck
      field: requires_load_transfer
      set_to: 是否需要负荷划接
    - object: AccessPointCapacityCheck
      field: failed_constraints
      set_to: 失败约束清单
    temporal_constraints: []
  check_original_supply_capacity:
    summary: 校核增容场景原线路和原主变承载能力
    description: 增容场景下优先按request_id查询原有电源信息，校核原接入线路、原主变是否可承载新增或增容后容量，并确定是否可继续保留原接入点。
    group: 容量校核
    function_type: business
    writes_to:
    - OriginalSupplyCapacityCheck
    involves_objects:
    - HighVoltageConnectionRequest
    - ScopeValidationResult
    - ExpansionOriginalSupplyInfo
    - Feeder
    - SubstationTransformer
    - ExistingAccessPointConstraintRule
    - OriginalSupplyCapacityCheck
    params:
      request_id:
        type: str
        description: 高压增容请求编号；用于查询对应ExpansionOriginalSupplyInfo
      rule_id:
        type: str
        description: 现有电源点约束规则编号；为空时使用当前生效规则
        default: ''
    preconditions:
    - object: ScopeValidationResult
      field: is_in_scope
      operator: eq
      value: true
    - object: ExpansionOriginalSupplyInfo
      field: request_id
      operator: eq
      value_from_param: request_id
    hint: 仅增容场景调用，原电源信息必须基于request_id从ExpansionOriginalSupplyInfo查询，不使用不存在的原电源信息记录编号。应以incremental_capacity_kva或post_expansion_capacity_kva折算单路接入容量，校核原馈线和原主变可开放容量、负载率。若原电源需划接，应继续生成负荷划接方案；若供电方式要求双回路/双电源，还必须搜索并校核补充电源点。
    effects:
    - object: OriginalSupplyCapacityCheck
      field: is_original_supply_usable
      set_to: 原电源是否可继续使用
    - object: OriginalSupplyCapacityCheck
      field: requires_load_transfer
      set_to: 是否需要原线路或原主变负荷划接
    temporal_constraints: []
  generate_load_transfer_plan:
    summary: 生成并校核馈线或主变负荷划接方案
    description: 针对馈线或主变负载率超限、容量不足但具备调整可能的情况，搜索邻近馈线或站内轻载主变，生成负荷划接方案并校核划接后负载率。
    group: 负荷划接
    function_type: business
    writes_to:
    - LoadTransferPlan
    involves_objects:
    - HighVoltageConnectionRequest
    - ScopeValidationResult
    - Feeder
    - SubstationTransformer
    - LoadTransferRule
    - AccessPointCapacityCheck
    - OriginalSupplyCapacityCheck
    - LoadTransferPlan
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      overloaded_object_type:
        type: str
        description: 超限对象类型：Feeder或SubstationTransformer
      overloaded_object_id:
        type: str
        description: 超限馈线编号或主变编号
      single_route_capacity_kva:
        type: float
        description: 需通过划接释放或承载的单路容量
      rule_id:
        type: str
        description: 负荷划接规则编号；为空时使用当前生效规则
        default: ''
    preconditions:
    - object: ScopeValidationResult
      field: is_in_scope
      operator: eq
      value: true
    hint: 馈线或主变负载率超过80%时必须判断划接可行性。馈线划接优先在保持现有联络关系前提下，搜索1000米内可接收负荷的邻近馈线；主变划接优先在同站内选择轻载主变。划接后目标馈线和目标主变最大负载率均不得超过80%。不可行时必须记录infeasible_reason，并作为新出线触发条件输入。
    effects:
    - object: LoadTransferPlan
      field: is_feasible
      set_to: 划接是否可行
    - object: LoadTransferPlan
      field: post_transfer_feeder_load_rate
      set_to: 划接后馈线负载率
    - object: LoadTransferPlan
      field: post_transfer_transformer_load_rate
      set_to: 划接后主变负载率
    temporal_constraints: []
  evaluate_new_substation_outgoing_line:
    summary: 评估变电站新出线触发与可行性
    description: 在配置允许评估新出线的前提下，封装新出线触发条件判断、15公里范围变电站由近至远搜索、空余间隔校验、主变可开放容量和实时负载率校核，并输出新出线分支结果。
    group: 新出线
    function_type: business
    writes_to:
    - NewSubstationOutgoingLineDecision
    involves_objects:
    - HighVoltageConnectionRequest
    - ScopeValidationResult
    - ConnectionReasoningConfig
    - AccessPointCapacityCheck
    - OriginalSupplyCapacityCheck
    - LoadTransferPlan
    - Substation
    - SubstationTransformer
    - NewSubstationOutgoingLineTriggerRule
    - NewSubstationOutgoingLineFeasibilityRule
    - NewSubstationOutgoingLineDecision
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      single_route_capacity_kva:
        type: float
        description: 单路供电容量；为空或0时由请求容量和供电路数计算
        default: 0
      trigger_rule_id:
        type: str
        description: 新出线触发规则编号；为空时使用当前生效规则
        default: ''
      feasibility_rule_id:
        type: str
        description: 新出线可行性规则编号；为空时使用当前生效规则
        default: ''
    preconditions:
    - object: ScopeValidationResult
      field: is_in_scope
      operator: eq
      value: true
    - object: ConnectionReasoningConfig
      field: enable_new_substation_outgoing_line
      operator: eq
      value: true
    - object: AccessPointCapacityCheck
      field: check_id
      operator: exists
      value: true
    hint: 配置启用新出线仅表示允许评估新出线分支，是触发判断的必要条件而非充分条件；不得仅因enable_new_substation_outgoing_line或config_enabled为真就停止常规现有电源点方案生成。配置允许后，满足以下业务条件之一才触发新出线：单路容量大于等于5000kVA、无符合要求现有电源点、1000米内无可行馈线划接对象、站内无可行主变划接对象。新出线触发依赖现有电源点容量校核结果；增容场景还应结合OriginalSupplyCapacityCheck，存在负荷划接需求时还应结合LoadTransferPlan可行性结果。触发后应停止常规从现有电源点中选取接入点的方案生成逻辑。可行性仅允许在15公里范围内按由近至远选择存在空余间隔、主变可开放容量满足单路容量且主变实时负载率不超过80%的变电站；否则输出无可用方案原因。
    effects:
    - object: NewSubstationOutgoingLineDecision
      field: is_triggered
      set_to: 是否触发新出线分支
    - object: NewSubstationOutgoingLineDecision
      field: is_feasible
      set_to: 新出线是否可行
    - object: NewSubstationOutgoingLineDecision
      field: selected_substation_id
      set_to: 选定变电站编号
    temporal_constraints: []
  generate_candidate_connection_schemes:
    summary: 生成候选10kV接入方案组合
    description: 根据供电方式要求、现有电源点校核结果、原电源保留要求、负荷划接方案、新出线结果和红线设备规则，生成合法候选接入方案。
    group: 方案生成
    function_type: business
    writes_to:
    - CandidateConnectionScheme
    involves_objects:
    - HighVoltageConnectionRequest
    - ScopeValidationResult
    - SupplyModeDecision
    - PowerSourceSearchBatch
    - AccessPointCapacityCheck
    - OriginalSupplyCapacityCheck
    - LoadTransferPlan
    - NewSubstationOutgoingLineDecision
    - ConnectionReasoningConfig
    - RedlineBoundaryDeviceRule
    - CandidateConnectionScheme
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      source_check_ids:
        type: str
        description: 可参与组合的电源点校核记录编号列表，多个值用逗号分隔；通常留空以使用请求下全部最新校核结果，避免漏掉原电源或补充电源点
        default: ''
      load_transfer_plan_ids:
        type: str
        description: 可引用的负荷划接方案编号列表，多个值用逗号分隔
        default: ''
      new_outgoing_line_decision_id:
        type: str
        description: 新出线评估结果编号；为空时使用请求下最新结果
        default: ''
      redline_rule_id:
        type: str
        description: 红线分界设备规则编号；为空时使用当前生效规则
        default: ''
    preconditions:
    - object: ScopeValidationResult
      field: is_in_scope
      operator: eq
      value: true
    - object: SupplyModeDecision
      field: decision_id
      operator: exists
      value: true
    hint: 候选方案必须满足供电方式、设备类型配置、容量校核和独立性规则。调用时优先只传request_id，让函数自动使用本请求下全部AccessPointCapacityCheck和可行LoadTransferPlan；只有明确需要排除某些校核结果时才传source_check_ids。双电源必须来自两个不同变电站，或来自同一变电站不同电源进线的两段母线；双回路至少来自不同母线。增容场景中，若原电源通过校核或存在可行划接方案，应把原电源点与补充电源点一起参与组合。若新出线已触发且可行，应按变电站间隔开关生成新出线方案；若新出线触发后不可行，不得继续生成常规现有电源点方案。红线处新增设备启用时必须写入分界设备类型。
    effects:
    - object: CandidateConnectionScheme
      field: constraint_check_summary
      set_to: 供电方式、独立性、设备类型和容量约束校核摘要
    - object: CandidateConnectionScheme
      field: redline_boundary_device_type
      set_to: 按红线规则确定的分界设备类型
    temporal_constraints: []
  score_and_rank_schemes:
    summary: 对候选方案评分、排序并形成最终推荐集合
    description: 按固定权重计算距离、可开放容量、供电可靠性综合得分，按运行方式保留最优方案并控制最终输出不超过10套。
    group: 评分排序
    function_type: business
    writes_to:
    - SchemeScore
    - RankedConnectionSchemeSet
    involves_objects:
    - CandidateConnectionScheme
    - SchemeScoringRule
    - SchemeScore
    - RankedConnectionSchemeSet
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      scheme_ids:
        type: str
        description: 待评分候选方案编号列表，多个值用逗号分隔；为空时使用请求下全部候选方案
        default: ''
      rule_id:
        type: str
        description: 方案评分规则编号；为空时使用当前生效规则
        default: ''
    preconditions:
    - object: CandidateConnectionScheme
      field: scheme_id
      operator: exists
      value: true
    hint: 评分权重默认为供电距离40%、可开放容量30%、供电可靠性30%。可靠性应综合电源数和运行方式得分。必须每种运行方式至少保留最高分1套方案，再按总分排序；最终推荐方案集合不得超过10套。无候选方案时不得生成成功状态的RankedConnectionSchemeSet，应转入无方案结论。
    effects:
    - object: SchemeScore
      field: total_score
      set_to: 综合评分
    - object: SchemeScore
      field: rank
      set_to: 排序名次
    - object: RankedConnectionSchemeSet
      field: scheme_ids
      set_to: 不超过10套的推荐方案编号
    temporal_constraints: []
  generate_connection_scheme_pdf_preview:
    summary: 生成接入方案PDF预览交付物
    description: 将用户需求、推理过程、电源点选择、负荷划接说明、路径走向、新建公共接入点和推荐方案汇总为PDF预览。
    group: 交付输出
    function_type: business
    writes_to:
    - ConnectionSchemePdfPreview
    involves_objects:
    - HighVoltageConnectionRequest
    - RankedConnectionSchemeSet
    - CandidateConnectionScheme
    - SchemeScore
    - PowerSourceSearchBatch
    - LoadTransferPlan
    - NewSubstationOutgoingLineDecision
    - ConnectionSchemePdfPreview
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      result_id:
        type: str
        description: 最终推荐方案集合编号；为空时使用请求下最新成功结果
        default: ''
      output_format:
        type: str
        description: 预览输出格式
        default: pdf
    preconditions:
    - object: RankedConnectionSchemeSet
      field: result_id
      operator: exists
      value: true
    - object: RankedConnectionSchemeSet
      field: generation_status
      operator: eq
      value: 成功
    hint: PDF预览必须包含：用户用电需求摘要、范围校验和供电方式判定、周边电源点搜索过程、电源点选取原因、容量与负载校核结果、负荷划接说明、路径走向、新建公共接入点或红线分界设备说明、推荐方案评分排序。若包含新出线方案，应说明触发原因、15公里搜索和选定变电站间隔。
    effects:
    - object: ConnectionSchemePdfPreview
      field: pdf_uri
      set_to: 生成的PDF预览文件地址
    - object: ConnectionSchemePdfPreview
      field: generated_at
      set_to: 生成时间
    temporal_constraints: []
  generate_no_available_scheme_conclusion:
    summary: 生成无可用接入方案终态结论
    description: 当范围校验通过但现有电源点、负荷划接、变电站新出线、方案组合或评分排序均无法形成可行方案时，生成可追溯的无方案结论和人工复核建议。
    group: 交付输出
    function_type: business
    writes_to:
    - NoAvailableConnectionSchemeConclusion
    involves_objects:
    - HighVoltageConnectionRequest
    - ScopeValidationResult
    - AccessPointCapacityCheck
    - LoadTransferPlan
    - NewSubstationOutgoingLineDecision
    - CandidateConnectionScheme
    - RankedConnectionSchemeSet
    - NoAvailableConnectionSchemeConclusion
    params:
      request_id:
        type: str
        description: 高压接入请求编号
      failed_stage:
        type: str
        description: 失败阶段，如现有电源点校核、负荷划接、新出线可行性、方案组合、评分排序
      searched_radius_m:
        type: int
        description: 现有电源点最大搜索半径
        default: 1000
      searched_substation_radius_km:
        type: float
        description: 新出线变电站最大搜索半径
        default: 15
    preconditions:
    - object: ScopeValidationResult
      field: is_in_scope
      operator: eq
      value: true
    hint: 无方案结论应仅在范围校验通过且确无可行候选方案时生成，不用于表达范围校验失败。必须汇总失败阶段、失败约束、已搜索现有电源点半径、已搜索变电站范围、新出线不可行原因、候选方案为空或排序未生成成功结果的原因，并给出人工复核建议，如调整受电点位置、核实负荷资料、人工规划新建线路、扩容主变或新增间隔。
    effects:
    - object: NoAvailableConnectionSchemeConclusion
      field: explanation
      set_to: 无可用方案原因说明
    - object: NoAvailableConnectionSchemeConclusion
      field: recommended_manual_review_actions
      set_to: 建议人工复核动作
    temporal_constraints: []
rules:
  connection_scope_validation_rule:
    description: 10kV高压接入方案推理入口范围校验：业务类型属于允许范围、供电电压为10kV，且新装/临时用电受电变压器总容量或增容后容量不超过配置上限时才允许继续生成方案；失败原因写入
      ScopeValidationResult.failed_reasons。
    rule_type: judgment
    match_strategy: all
    applies_to:
    - HighVoltageConnectionRequest
    - ExpansionOriginalSupplyInfo
    - ConnectionScopeRule
    - ScopeValidationResult
    result_field: is_in_scope
    source: ConnectionScopeRule
    conditions:
    - source_object: HighVoltageConnectionRequest
      field: business_type
      operator: in_field
      value: ConnectionScopeRule.allowed_business_types
      on_fail_result: false
      fail_reason: 业务类型不属于10kV高压新装、增容或装表临时用电范围
    - source_object: HighVoltageConnectionRequest
      field: supply_voltage_kv
      operator: eq_field
      value: ConnectionScopeRule.required_supply_voltage_kv
      on_fail_result: false
      fail_reason: 供电电压不是10kV
    - field: __compound__
      operator: any
      value:
      - all:
        - source_object: HighVoltageConnectionRequest
          field: business_type
          operator: ne
          value: 增容
        - source_object: HighVoltageConnectionRequest
          field: total_receiving_transformer_capacity_kva
          operator: lte_field
          value: ConnectionScopeRule.max_total_receiving_transformer_capacity_kva
      - all:
        - source_object: HighVoltageConnectionRequest
          field: business_type
          operator: eq
          value: 增容
        - source_object: ExpansionOriginalSupplyInfo
          field: post_expansion_capacity_kva
          operator: lte_field
          value: ConnectionScopeRule.max_total_receiving_transformer_capacity_kva
      result: null
    default_result: true
  supply_mode_decision_rule:
    description: 根据用户重要等级、负荷等级和用户需求判定最低供电方式，按供电方式等级取最高要求，等级顺序为双电源 > 双回路 > 单电源；不得低于用户明确需求。
    rule_type: classification
    match_strategy: max_requirement
    requirement_order:
    - 单电源
    - 双回路
    - 双电源
    applies_to:
    - HighVoltageConnectionRequest
    - PowerSupplyModeRule
    - SupplyModeDecision
    result_field: required_supply_mode
    source: PowerSupplyModeRule
    conditions:
    - field: requested_operation_mode
      operator: eq
      value: 双电源
      result: 双电源
    - field: requested_power_source_count
      operator: gte
      value: 2
      result: 双电源
    - field: user_importance_level
      operator: eq
      value: 一级重要用户
      result: 双电源
    - field: load_level
      operator: eq
      value: 一级负荷
      result: 双电源
    - field: requested_operation_mode
      operator: eq
      value: 双回路
      result: 双回路
    - field: user_importance_level
      operator: eq
      value: 二级重要用户
      result: 双回路
    - field: user_importance_level
      operator: eq
      value: 临时性重要用户
      result: 双回路
    - field: load_level
      operator: eq
      value: 二级负荷
      result: 双回路
    - field: load_level
      operator: eq
      value: 三级负荷
      result: 单电源
    - field: business_type
      operator: in
      value:
      - 新装
      - 增容
      - 临时
      result: 单电源
    default_result: 单电源
  dual_source_independence_rule:
    description: 双电源方案合法性判定：非双电源方案直接通过；双电源方案的两个电源应来自不同变电站，或来自同一变电站但属于不同电源进线的不同母线；校核结果写入
      CandidateConnectionScheme.constraint_check_summary。
    rule_type: judgment
    match_strategy: first_match
    applies_to:
    - CandidateConnectionScheme
    - PowerAccessPoint
    - Substation
    result_field: constraint_check_summary
    source: 双电源独立性组合口径
    conditions:
    - field: supply_mode
      operator: ne
      value: 双电源
      result:
        dual_source_valid: true
        reason: 非双电源方案不适用双电源独立性校核
    - field: selected_substation_ids
      operator: distinct_count_gte
      value: 2
      result:
        dual_source_valid: true
        reason: 双电源来自不同变电站
    - field: __compound__
      operator: all
      value:
      - field: selected_substation_ids
        operator: distinct_count_eq
        value: 1
      - field: selected_busbar_ids
        operator: distinct_count_gte
        value: 2
      - field: selected_access_point_ids
        operator: incoming_source_distinct_count_gte
        value: 2
      result:
        dual_source_valid: true
        reason: 双电源来自同一变电站但分属不同电源进线和不同母线
    default_result:
      dual_source_valid: false
      reason: 双电源未满足不同变电站或不同进线不同母线要求
  dual_circuit_independence_rule:
    description: 双回路方案前置过滤规则：非双回路方案直接通过；双回路方案两路电源至少应来自不同母线；不满足时不得写入正式 CandidateConnectionScheme，校核摘要写入
      constraint_check_summary。
    rule_type: judgment
    lifecycle: pre_filter_for_generate_candidate_connection_schemes
    match_strategy: first_match
    applies_to:
    - CandidateConnectionScheme
    - PowerAccessPoint
    result_field: constraint_check_summary
    source: 双回路独立性组合口径
    conditions:
    - field: supply_mode
      operator: ne
      value: 双回路
      result:
        dual_circuit_valid: true
        reason: 非双回路方案不适用双回路独立性校核
    - field: selected_busbar_ids
      operator: distinct_count_gte
      value: 2
      result:
        dual_circuit_valid: true
        reason: 双回路来自不同母线
    default_result:
      dual_circuit_valid: false
      reason: 双回路未满足不同母线要求
  existing_access_point_constraint_rule:
    description: 现有电源点直接接入准入校核：电源点可用，馈线可开放容量、负载率、用户数、线损率满足配置要求，主变可开放容量和负载率满足配置要求，且具备备用间隔时才可直接使用。
    rule_type: judgment
    match_strategy: all
    applies_to:
    - PowerAccessPoint
    - Feeder
    - SubstationTransformer
    - ExistingAccessPointConstraintRule
    - AccessPointCapacityCheck
    result_field: is_directly_usable
    source: ExistingAccessPointConstraintRule
    conditions:
    - source_object: PowerAccessPoint
      field: is_available
      operator: eq
      value: true
      on_fail_result: false
      fail_reason: 电源点不可用
    - source_object: PowerAccessPoint
      field: current_operation_status
      operator: eq
      value: 可接入
      on_fail_result: false
      fail_reason: 电源点运行状态不可接入
    - source_object: Feeder
      field: historical_max_load_rate
      operator: lt_field
      value: ExistingAccessPointConstraintRule.max_feeder_historical_load_rate
      on_fail_result: false
      fail_reason: 馈线历史最大负载率超限
    - source_object: Feeder
      field: current_load_rate
      operator: lt_field
      value: ExistingAccessPointConstraintRule.max_feeder_current_load_rate
      on_fail_result: false
      fail_reason: 馈线当前负载率超限
    - source_object: Feeder
      field: available_capacity_kva
      operator: gte_context
      value: single_route_capacity_kva
      on_fail_result: false
      fail_reason: 馈线可开放容量不足
    - source_object: PowerAccessPoint
      field: available_bay_count
      operator: gte_field
      value: ExistingAccessPointConstraintRule.min_spare_bay_count
      on_fail_result: false
      fail_reason: 备用间隔不足
    - source_object: Feeder
      field: connected_user_count
      operator: lte_field
      value: ExistingAccessPointConstraintRule.max_connected_user_count
      on_fail_result: false
      fail_reason: 馈线接入用户数超限
    - source_object: Feeder
      field: line_loss_rate_after_connection
      operator: lte_field
      value: ExistingAccessPointConstraintRule.max_line_loss_rate_after_connection
      on_fail_result: false
      fail_reason: 接入后线损率超限
    - source_object: SubstationTransformer
      field: available_capacity_kva
      operator: gte_context
      value: single_route_capacity_kva
      on_fail_result: false
      fail_reason: 主变可开放容量不足
    - source_object: SubstationTransformer
      field: current_load_rate
      operator: lt_field
      value: ExistingAccessPointConstraintRule.max_transformer_load_rate
      on_fail_result: false
      fail_reason: 主变负载率超限
    default_result: true
  original_supply_capacity_rule:
    description: 增容场景原电源优先校核：仅适用于增容；原馈线、原主变存在，且按增容容量校核后的可开放容量和负载率均满足要求时，原电源可继续作为接入方案。
    rule_type: judgment
    match_strategy: all
    applies_to:
    - HighVoltageConnectionRequest
    - ExpansionOriginalSupplyInfo
    - Feeder
    - SubstationTransformer
    - ExistingAccessPointConstraintRule
    - OriginalSupplyCapacityCheck
    result_field: is_original_supply_usable
    source: 增容原电源接入校核口径
    capacity_context:
      required_incremental_capacity_kva: ExpansionOriginalSupplyInfo.incremental_capacity_kva
      fallback_formula: ExpansionOriginalSupplyInfo.post_expansion_capacity_kva -
        ExpansionOriginalSupplyInfo.existing_contract_capacity_kva
    conditions:
    - source_object: HighVoltageConnectionRequest
      field: business_type
      operator: eq
      value: 增容
      on_fail_result: false
      fail_reason: 非增容场景不适用原电源增容校核
    - source_object: ExpansionOriginalSupplyInfo
      field: original_feeder_id
      operator: exists
      value: true
      on_fail_result: false
      fail_reason: 原馈线缺失
    - source_object: ExpansionOriginalSupplyInfo
      field: original_transformer_id
      operator: exists
      value: true
      on_fail_result: false
      fail_reason: 原主变缺失
    - source_object: ExpansionOriginalSupplyInfo
      field: incremental_capacity_kva
      operator: gt
      value: 0
      on_fail_result: false
      fail_reason: 增容容量无效
    - source_object: Feeder
      field: available_capacity_kva
      operator: gte_context
      value: required_incremental_capacity_kva
      on_fail_result: false
      fail_reason: 原馈线可开放容量不足
    - source_object: Feeder
      field: current_load_rate
      operator: lt_field
      value: ExistingAccessPointConstraintRule.max_feeder_current_load_rate
      on_fail_result: false
      fail_reason: 原馈线当前负载率超限
    - source_object: SubstationTransformer
      field: available_capacity_kva
      operator: gte_context
      value: required_incremental_capacity_kva
      on_fail_result: false
      fail_reason: 原主变可开放容量不足
    - source_object: SubstationTransformer
      field: current_load_rate
      operator: lt_field
      value: ExistingAccessPointConstraintRule.max_transformer_load_rate
      on_fail_result: false
      fail_reason: 原主变负载率超限
    default_result: true
  single_to_dual_expansion_rule:
    description: 单电源增容升级双电源时，候选方案必须保留一路原电源接入点，另一路按新装电源点推荐逻辑生成并满足独立性要求；校核结果写入 CandidateConnectionScheme.constraint_check_summary。
    rule_type: judgment
    match_strategy: first_match
    applies_to:
    - ExpansionOriginalSupplyInfo
    - CandidateConnectionScheme
    result_field: constraint_check_summary
    source: 单电源增容升级双电源保留原电源口径
    conditions:
    - source_object: ExpansionOriginalSupplyInfo
      field: original_supply_mode
      operator: ne
      value: 单电源
      result:
        original_source_retained: true
        reason: 原供电方式非单电源，不适用单电源升级双电源校核
    - source_object: CandidateConnectionScheme
      field: supply_mode
      operator: ne
      value: 双电源
      result:
        original_source_retained: true
        reason: 候选方案非双电源，不适用单电源升级双电源校核
    - source_object: CandidateConnectionScheme
      field: selected_access_point_ids
      operator: contains_field
      value: ExpansionOriginalSupplyInfo.original_access_point_id
      result:
        original_source_retained: true
        reason: 双电源增容方案已保留原电源接入点
    default_result:
      original_source_retained: false
      reason: 单电源增容升级双电源方案未保留原电源接入点
  load_transfer_feasibility_rule:
    description: 负荷划接可行性判定：馈线或主变负载率超限时，若按配置要求保持既有联络关系，并使划接后目标馈线及涉及的目标主变负载率不超过配置阈值，则划接可行。
    rule_type: judgment
    match_strategy: all
    applies_to:
    - LoadTransferRule
    - LoadTransferPlan
    - Feeder
    - SubstationTransformer
    result_field: is_feasible
    source: LoadTransferRule
    conditions:
    - source_object: LoadTransferRule
      field: preserve_existing_tie_relationship
      operator: eq
      value: true
      on_fail_result: false
      fail_reason: 不满足保持既有联络关系要求
    - source_object: LoadTransferPlan
      field: receiver_feeder_id
      operator: exists
      value: true
      on_fail_result: false
      fail_reason: 无可接收负荷的目标馈线
    - source_object: LoadTransferPlan
      field: transfer_capacity_kva
      operator: gt
      value: 0
      on_fail_result: false
      fail_reason: 划接容量无效
    - source_object: LoadTransferPlan
      field: post_transfer_feeder_load_rate
      operator: lte_field
      value: LoadTransferRule.target_feeder_max_load_rate_after_transfer
      on_fail_result: false
      fail_reason: 划接后目标馈线负载率超限
    - field: __compound__
      operator: any
      value:
      - source_object: LoadTransferPlan
        field: overloaded_object_type
        operator: eq
        value: feeder
      - source_object: LoadTransferPlan
        field: post_transfer_transformer_load_rate
        operator: lte_field
        value: LoadTransferRule.target_transformer_max_load_rate_after_transfer
      result: null
    default_result: true
  new_substation_outgoing_line_trigger_rule:
    description: 变电站新出线触发判定：新出线分支必须先由配置启用；在启用前提下，若单路容量达到配置阈值、无可用现有电源点、1000米内无馈线划接候选或站内无主变划接候选等任一条件成立，则触发新出线评估。
    rule_type: judgment
    match_strategy: gated_any
    applies_to:
    - ConnectionReasoningConfig
    - AccessPointCapacityCheck
    - OriginalSupplyCapacityCheck
    - LoadTransferPlan
    - NewSubstationOutgoingLineTriggerRule
    - NewSubstationOutgoingLineDecision
    result_field: is_triggered
    source: NewSubstationOutgoingLineTriggerRule
    gate:
      any:
      - source_object: ConnectionReasoningConfig
        field: enable_new_substation_outgoing_line
        operator: eq
        value: true
      - source_object: NewSubstationOutgoingLineTriggerRule
        field: config_enabled
        operator: eq
        value: true
    conditions:
    - source_object: AccessPointCapacityCheck
      field: single_route_capacity_kva
      operator: gte_field
      value: NewSubstationOutgoingLineTriggerRule.single_route_capacity_threshold_kva
      result: true
      trigger_reason: 单路容量达到新出线触发阈值
    - source_object: NewSubstationOutgoingLineTriggerRule
      field: no_available_existing_access_point
      operator: eq
      value: true
      result: true
      trigger_reason: 无可用现有电源点
    - source_object: NewSubstationOutgoingLineTriggerRule
      field: no_feeder_transfer_candidate_within_1000m
      operator: eq
      value: true
      result: true
      trigger_reason: 1000米内无可行馈线划接候选
    - source_object: NewSubstationOutgoingLineTriggerRule
      field: no_transformer_transfer_candidate_in_substation
      operator: eq
      value: true
      result: true
      trigger_reason: 站内无可行主变划接候选
    default_result: false
  new_substation_outgoing_line_feasibility_rule:
    description: 新出线变电站可行性判定：按配置半径由近至远搜索候选变电站，候选变电站存在空余出线间隔，且主变可开放容量不小于单路容量、实时负载率满足配置要求时可生成新出线方案。
    rule_type: judgment
    match_strategy: all
    applies_to:
    - Substation
    - SubstationTransformer
    - AccessPointCapacityCheck
    - NewSubstationOutgoingLineFeasibilityRule
    - NewSubstationOutgoingLineDecision
    result_field: is_feasible
    source: NewSubstationOutgoingLineFeasibilityRule
    conditions:
    - source_object: Substation
      field: distance_to_receiving_point_m
      operator: lte_field_km_as_m
      value: NewSubstationOutgoingLineFeasibilityRule.search_radius_km
      on_fail_result: false
      fail_reason: 变电站超出新出线搜索半径
    - source_object: Substation
      field: spare_outgoing_bay_count
      operator: gte_field
      value: NewSubstationOutgoingLineFeasibilityRule.min_spare_outgoing_bay_count
      on_fail_result: false
      fail_reason: 变电站空余出线间隔不足
    - source_object: SubstationTransformer
      field: available_capacity_kva
      operator: gte_context
      value: single_route_capacity_kva
      on_fail_result: false
      fail_reason: 主变可开放容量不足
    - source_object: SubstationTransformer
      field: current_load_rate
      operator: lte_field
      value: NewSubstationOutgoingLineFeasibilityRule.max_transformer_load_rate
      on_fail_result: false
      fail_reason: 主变当前负载率超限
    default_result: true
  specified_device_type_filter_rule:
    description: 指定设备类型过滤规则：配置或PMS前置推理指定电源点设备类型时，搜索和候选方案只能使用指定类型电源点；当人工配置和PMS指定同时存在时取交集。
    rule_type: judgment
    lifecycle: pre_filter_for_search_power_access_points
    match_strategy: all
    applies_to:
    - ConnectionReasoningConfig
    - PowerAccessPoint
    - CandidateConnectionScheme
    result_field: constraint_check_summary
    source: 推理配置设备类型强约束口径
    conditions:
    - field: __compound__
      operator: any
      value:
      - source_object: ConnectionReasoningConfig
        field: allowed_source_device_types
        operator: not_exists
        value: true
      - source_object: PowerAccessPoint
        field: device_type
        operator: in_field
        value: ConnectionReasoningConfig.allowed_source_device_types
      result: null
    - field: __compound__
      operator: any
      value:
      - source_object: ConnectionReasoningConfig
        field: pms_preselected_source_type
        operator: not_exists
        value: true
      - source_object: PowerAccessPoint
        field: device_type
        operator: eq_field
        value: ConnectionReasoningConfig.pms_preselected_source_type
      result: null
    default_result:
      device_type_valid: true
      reason: 电源点设备类型满足配置和PMS约束
  redline_boundary_device_rule:
    description: 红线处新增用户分界设备判定：启用红线设备时按配置表的接入形式、单路容量和备用间隔要求匹配分界设备；优先级为不新增 > 容量阈值 >
      接入形式 > 备用间隔。
    rule_type: classification
    match_strategy: first_match
    applies_to:
    - ConnectionReasoningConfig
    - RedlineBoundaryDeviceRule
    - CandidateConnectionScheme
    result_field: redline_boundary_device_type
    source: RedlineBoundaryDeviceRule
    conditions:
    - source_object: ConnectionReasoningConfig
      field: add_redline_boundary_device
      operator: eq
      value: false
      result: 不新增
    - field: __compound__
      operator: all
      value:
      - source_object: ConnectionReasoningConfig
        field: add_redline_boundary_device
        operator: eq
        value: true
      - source_object: CandidateConnectionScheme
        field: single_route_capacity_kva
        operator: gte_field
        value: RedlineBoundaryDeviceRule.single_route_capacity_kva
      - source_object: RedlineBoundaryDeviceRule
        field: boundary_device_type
        operator: exists
        value: true
      result: null
    - field: __compound__
      operator: all
      value:
      - source_object: ConnectionReasoningConfig
        field: add_redline_boundary_device
        operator: eq
        value: true
      - source_object: RedlineBoundaryDeviceRule
        field: connection_form
        operator: eq
        value: 架空
      result: 一二次融合柱上断路器
    - field: __compound__
      operator: all
      value:
      - source_object: ConnectionReasoningConfig
        field: add_redline_boundary_device
        operator: eq
        value: true
      - source_object: RedlineBoundaryDeviceRule
        field: min_spare_bay_count
        operator: gte
        value: 2
      result: 环网柜或开闭所
    default_result: 需人工确认分界设备
  scheme_scoring_and_retention_rule:
    description: 候选方案评分与保留规则：按配置权重计算 total_score = distance_score * distance_weight
      + available_capacity_score * available_capacity_weight + reliability_score *
      reliability_weight；每种运行方式可保留最高分方案，最终输出数量不超过配置上限。
    rule_type: classification
    match_strategy: first_match
    applies_to:
    - SchemeScoringRule
    - CandidateConnectionScheme
    - SchemeScore
    - RankedConnectionSchemeSet
    result_field: retained_reason
    source: SchemeScoringRule
    formula:
      target_field: SchemeScore.total_score
      expression: SchemeScore.distance_score * SchemeScoringRule.distance_weight +
        SchemeScore.available_capacity_score * SchemeScoringRule.available_capacity_weight
        + SchemeScore.reliability_score * SchemeScoringRule.reliability_weight
      weight_sum_should_equal: 1
    conditions:
    - source_object: SchemeScore
      field: rank
      operator: gt_field
      value: SchemeScoringRule.max_output_count
      result: 不保留：超出最多输出套数限制
    - field: __compound__
      operator: all
      value:
      - source_object: SchemeScoringRule
        field: retain_best_per_operation_mode
        operator: eq
        value: true
      - source_object: RankedConnectionSchemeSet
        field: best_scheme_per_operation_mode
        operator: contains_field
        value: SchemeScore.scheme_id
      result: 按运行方式保留最高分方案
    - source_object: SchemeScore
      field: rank
      operator: lte_field
      value: SchemeScoringRule.max_output_count
      result: 按综合得分排序保留
    default_result: 不保留：未进入推荐集合
  no_available_scheme_terminal_rule:
    description: 无可用方案终态判定：不存在可直接使用的现有电源点、不存在可行负荷划接方案，且新出线评估不可行时，最终推荐集合置为无方案状态，并生成无可用接入方案结论及人工复核建议。
    rule_type: judgment
    match_strategy: all
    applies_to:
    - AccessPointCapacityCheck
    - LoadTransferPlan
    - NewSubstationOutgoingLineDecision
    - RankedConnectionSchemeSet
    - NoAvailableConnectionSchemeConclusion
    result_field: generation_status
    source: 无可用接入方案终态判定口径
    conditions:
    - source_object: AccessPointCapacityCheck
      field: is_directly_usable
      operator: none_eq
      value: true
      on_fail_result: 已生成可用方案
      fail_reason: 存在可直接使用的现有电源点
    - source_object: LoadTransferPlan
      field: is_feasible
      operator: none_eq
      value: true
      on_fail_result: 已生成可用方案
      fail_reason: 存在可行负荷划接方案
    - source_object: NewSubstationOutgoingLineDecision
      field: is_feasible
      operator: none_eq
      value: true
      on_fail_result: 已生成可用方案
      fail_reason: 存在可行变电站新出线方案
    default_result: 无可用方案
workflows:
  new_connection_scheme_generation_workflow:
    description: 高压10kV新装接入方案智能生成流程：从范围校验、配置约束、供电方式判定、现有电源点搜索与校核，到负荷划接、新出线强制切换分支、候选方案生成、评分排序和PDF预览输出。
    trigger: 高压新装请求通过营销2.0传入，并由业务人员在PMS3.0发起正式推理。
    involves_objects:
    - HighVoltageConnectionRequest
    - ConnectionReasoningConfig
    - ConnectionScopeRule
    - PowerSupplyModeRule
    - ExistingAccessPointConstraintRule
    - LoadTransferRule
    - NewSubstationOutgoingLineTriggerRule
    - NewSubstationOutgoingLineFeasibilityRule
    - SchemeScoringRule
    - RedlineBoundaryDeviceRule
    - ScopeValidationResult
    - SupplyModeDecision
    - PowerSourceSearchBatch
    - PowerAccessPoint
    - Feeder
    - SubstationTransformer
    - Substation
    - AccessPointCapacityCheck
    - LoadTransferPlan
    - NewSubstationOutgoingLineDecision
    - CandidateConnectionScheme
    - SchemeScore
    - RankedConnectionSchemeSet
    - ConnectionSchemePdfPreview
    - NoAvailableConnectionSchemeConclusion
    steps:
    - name: 范围校验
      function: validate_connection_scope
      description: 校验业务类型、供电电压、受电变压器总容量是否属于10kV高压新装接入方案推理范围；不通过则停止常规方案生成。
      next:
        通过: 应用推理配置
        不通过: 生成无可用方案结论
      sla: 正式推理启动后即时完成
    - name: 应用推理配置
      function: apply_reasoning_config_constraints
      description: 读取并应用指定电源点设备类型、红线处分界设备、新出线选项和PMS前置选择结果，作为后续搜索与方案生成的强约束。
      next: 判定供电方式
      sla: 范围校验通过后即时完成
    - name: 判定供电方式
      function: decide_supply_mode
      description: 根据用户重要等级、负荷等级、临时用电属性和用户需求，确定单电源、双回路或双电源的最低供电方式要求。
      next: 扩散搜索现有电源点
      sla: 应用推理配置后即时完成
    - name: 扩散搜索现有电源点
      function: search_power_access_points
      description: 以受电点坐标为中心，按200米、500米、800米、1000米顺序扩散搜索满足设备类型约束的现有电源点，并在线路数量满足要求时停止。
      next: 校核现有电源点
      sla: 供电方式判定后即时完成
    - name: 校核现有电源点
      function: check_access_point_capacity
      description: 对候选电源点关联的馈线、主变、备用间隔、接入用户数和接入后线损率进行准入校核，形成直接可用或需负荷划接的判断。
      next:
        存在直接可用电源点: 评估新出线分支
        存在需负荷划接电源点: 生成负荷划接方案
        无可用且无可划接电源点: 评估新出线分支
      sla: 电源点搜索完成后即时完成
    - name: 生成负荷划接方案
      function: generate_load_transfer_plan
      description: 针对馈线或主变负载率超限的候选点，生成并校核负荷划接方案，确保划接后目标馈线和目标主变负载率不超过规则阈值。
      next: 评估新出线分支
      sla: 现有电源点校核后即时完成
    - name: 评估新出线分支
      function: evaluate_new_substation_outgoing_line
      description: 根据配置勾选、单路容量阈值、现有电源点可用性和负荷划接可行性判断是否触发变电站新出线；新出线一旦触发即强制停止常规现有电源点方案回退，仅允许新出线可行方案继续进入候选方案生成。
      next:
        触发且新出线可行: 生成候选接入方案
        触发但新出线不可行: 生成无可用方案结论
        未触发且存在直接可用电源点或可行负荷划接方案: 生成候选接入方案
        未触发且不存在可用现有电源点或可行负荷划接方案: 生成无可用方案结论
      sla: 负荷划接判断后即时完成
    - name: 生成候选接入方案
      function: generate_candidate_connection_schemes
      description: 综合供电方式要求、可用电源点、负荷划接方案、新出线结果、红线设备规则和双电源/双回路独立性要求，生成合法候选接入方案；若新出线已触发，仅基于新出线结果生成候选方案。
      next:
        已生成候选方案: 评分排序方案
        无候选方案: 生成无可用方案结论
      sla: 新出线分支评估后即时完成
    - name: 评分排序方案
      function: score_and_rank_schemes
      description: 按距离、可开放容量和可靠性进行综合评分，按运行方式保留最高分方案，并控制最终推荐方案不超过10套。
      next:
        已形成推荐集合: 生成PDF预览
        推荐集合为空: 生成无可用方案结论
      sla: 候选方案生成后即时完成
    - name: 生成PDF预览
      function: generate_connection_scheme_pdf_preview
      description: 输出包含用户需求、推理过程、电源点选取、负荷切割、路径走向、新建公共接入点和推荐方案摘要的PDF预览交付物。
      next: 流程结束
      sla: 评分排序完成后即时完成
    - name: 生成无可用方案结论
      function: generate_no_available_scheme_conclusion
      description: 在范围不通过、现有电源点不可用、负荷划接不可行、新出线触发但不可行或未触发且无可用常规方案等场景下，生成可追溯的无可用接入方案结论。
      next: 流程结束
      sla: 判定无可用方案后即时完成
    - name: 流程结束
      function: ''
      description: 新装接入方案推理完成，输出推荐方案PDF预览或无可用方案结论。
  expansion_scheme_generation_workflow:
    description: 高压10kV增容接入方案智能生成流程：优先校核原线路和原主变，区分单电源增容、单电源升级双电源和新出线强制切换场景，生成增容推荐方案并输出PDF预览。
    trigger: 高压增容请求通过营销2.0传入，并由业务人员在PMS3.0发起正式推理。
    involves_objects:
    - HighVoltageConnectionRequest
    - ExpansionOriginalSupplyInfo
    - ConnectionReasoningConfig
    - ConnectionScopeRule
    - PowerSupplyModeRule
    - ExistingAccessPointConstraintRule
    - LoadTransferRule
    - NewSubstationOutgoingLineTriggerRule
    - NewSubstationOutgoingLineFeasibilityRule
    - SchemeScoringRule
    - RedlineBoundaryDeviceRule
    - ScopeValidationResult
    - SupplyModeDecision
    - OriginalSupplyCapacityCheck
    - PowerSourceSearchBatch
    - PowerAccessPoint
    - Feeder
    - SubstationTransformer
    - Substation
    - AccessPointCapacityCheck
    - LoadTransferPlan
    - NewSubstationOutgoingLineDecision
    - CandidateConnectionScheme
    - SchemeScore
    - RankedConnectionSchemeSet
    - ConnectionSchemePdfPreview
    - NoAvailableConnectionSchemeConclusion
    steps:
    - name: 范围校验
      function: validate_connection_scope
      description: 校验业务类型、供电电压、增容后受电变压器总容量是否属于10kV高压增容接入方案推理范围。
      next:
        通过: 应用推理配置
        不通过: 生成无可用方案结论
      sla: 正式推理启动后即时完成
    - name: 应用推理配置
      function: apply_reasoning_config_constraints
      description: 应用指定设备类型、红线处分界设备、新出线开关和PMS预选电源点类型等推理配置。
      next: 判定供电方式
      sla: 范围校验通过后即时完成
    - name: 判定供电方式
      function: decide_supply_mode
      description: 根据增容后用户重要等级、负荷等级和用户需求，确定增容方案所需供电方式、路数、电源数及独立性约束。
      next: 校核原电源容量
      sla: 应用推理配置后即时完成
    - name: 校核原电源容量
      function: check_original_supply_capacity
      description: 读取原电源接入线路、对应主变和增容容量，校核原线路与原主变是否可承载新增或增容容量。
      next:
        单电源增容且原电源可用: 生成候选接入方案
        原电源需划接: 生成负荷划接方案
        升级双电源: 搜索新增一路电源点
        原电源不可用且需新出线判断: 评估新出线分支
      sla: 供电方式判定后即时完成
    - name: 生成负荷划接方案
      function: generate_load_transfer_plan
      description: 当原线路或原主变负载率超限时，生成原线路或原主变负荷划接方案，并校核划接后负载率是否满足规则。
      next:
        划接可行且仍需补充电源: 搜索新增一路电源点
        划接可行且供电方式已满足: 生成候选接入方案
        划接不可行: 评估新出线分支
      sla: 原电源容量校核后即时完成
    - name: 搜索新增一路电源点
      function: search_power_access_points
      description: 在单电源增容升级为双电源时，保留一路原电源，并按新装逻辑扩散搜索另一路电源点。
      next: 校核新增一路电源点
      sla: 确定升级双电源后即时完成
    - name: 校核新增一路电源点
      function: check_access_point_capacity
      description: 对升级双电源所需新增一路候选电源点进行馈线、主变、备用间隔、用户数和线损率准入校核。
      next:
        存在可用新增电源点: 评估新出线分支
        存在需划接新增电源点: 生成新增一路负荷划接方案
        无可用新增电源点: 评估新出线分支
      sla: 新增一路电源点搜索完成后即时完成
    - name: 生成新增一路负荷划接方案
      function: generate_load_transfer_plan
      description: 对升级双电源新增一路候选电源点涉及的重载馈线或主变生成负荷划接方案。
      next: 评估新出线分支
      sla: 新增一路电源点校核后即时完成
    - name: 评估新出线分支
      function: evaluate_new_substation_outgoing_line
      description: 在原电源不可用、负荷划接不可行、配置勾选或单路容量达到阈值等条件下，评估变电站新出线是否触发并可行；新出线一旦触发即强制停止回退到原电源、新增电源点或负荷划接方案。
      next:
        触发且新出线可行: 生成候选接入方案
        触发但新出线不可行: 生成无可用方案结论
        未触发且存在可用原电源或新增电源点或可行划接方案: 生成候选接入方案
        未触发且不存在可用原电源、新增电源点或可行划接方案: 生成无可用方案结论
      sla: 原电源或新增一路校核后即时完成
    - name: 生成候选接入方案
      function: generate_candidate_connection_schemes
      description: 生成增容候选接入方案；单电源增容仅围绕原电源形成方案，单电源升级双电源必须保留一路原电源并满足独立性要求；若新出线已触发，仅基于新出线结果生成候选方案。
      next:
        已生成候选方案: 评分排序方案
        无候选方案: 生成无可用方案结论
      sla: 增容分支校核完成后即时完成
    - name: 评分排序方案
      function: score_and_rank_schemes
      description: 对增容候选方案执行固定权重评分、按运行方式保留和最多10套输出控制。
      next:
        已形成推荐集合: 生成PDF预览
        推荐集合为空: 生成无可用方案结论
      sla: 候选方案生成后即时完成
    - name: 生成PDF预览
      function: generate_connection_scheme_pdf_preview
      description: 生成包含原电源校核、负荷转移说明、增容推荐方案和路径说明的PDF预览交付物。
      next: 流程结束
      sla: 评分排序完成后即时完成
    - name: 生成无可用方案结论
      function: generate_no_available_scheme_conclusion
      description: 在原电源、新增一路电源点、负荷划接和新出线均不可行，或新出线触发但不可行时，生成增容场景无可用方案结论。
      next: 流程结束
      sla: 判定无可用方案后即时完成
    - name: 流程结束
      function: ''
      description: 增容接入方案推理完成，输出推荐方案PDF预览或无可用方案结论。
  new_substation_outgoing_line_workflow:
    description: 变电站新出线接入方案生成流程：在配置勾选、容量阈值、现有电源点不可用或负荷划接不可行时，强制停止常规现有电源点选取，转为15公里范围内变电站新出线方案综合评估。
    trigger: 推理配置启用变电站新出线，或常规电源点推荐过程中满足新出线触发条件。
    involves_objects:
    - HighVoltageConnectionRequest
    - ConnectionReasoningConfig
    - NewSubstationOutgoingLineTriggerRule
    - NewSubstationOutgoingLineFeasibilityRule
    - SchemeScoringRule
    - RedlineBoundaryDeviceRule
    - AccessPointCapacityCheck
    - OriginalSupplyCapacityCheck
    - LoadTransferPlan
    - Substation
    - SubstationTransformer
    - NewSubstationOutgoingLineDecision
    - CandidateConnectionScheme
    - SchemeScore
    - RankedConnectionSchemeSet
    - ConnectionSchemePdfPreview
    - NoAvailableConnectionSchemeConclusion
    steps:
    - name: 综合评估新出线触发与可行性
      function: evaluate_new_substation_outgoing_line
      description: 以幂等的单次综合评估方式判断配置勾选、单路容量达到阈值、无可用现有电源点、1000米内无馈线割接对象或站内无主变割接对象等触发条件；触发后停止常规现有电源点方案生成，并按由近至远搜索15公里范围内候选变电站，校验空余出线间隔、主变可开放容量和实时负载率。
      next:
        未触发: 流程结束
        触发且可行: 生成新出线候选方案
        触发但不可行: 生成无可用方案结论
      sla: 进入新出线分支时即时完成
    - name: 生成新出线候选方案
      function: generate_candidate_connection_schemes
      description: 基于选定变电站、主变和出线间隔开关生成新出线候选接入方案，并写入路径、新建公共接入点和红线处分界设备说明。
      next:
        已生成候选方案: 评分排序方案
        无候选方案: 生成无可用方案结论
      sla: 新出线综合评估通过后即时完成
    - name: 评分排序方案
      function: score_and_rank_schemes
      description: 将新出线方案纳入候选方案集合进行评分排序和输出数量控制。
      next:
        已形成推荐集合: 生成PDF预览
        推荐集合为空: 生成无可用方案结论
      sla: 新出线候选方案生成后即时完成
    - name: 生成PDF预览
      function: generate_connection_scheme_pdf_preview
      description: 生成包含新出线触发原因、15公里变电站搜索、空余间隔与主变校核、新出线路径和推荐方案摘要的PDF预览。
      next: 流程结束
      sla: 评分排序完成后即时完成
    - name: 生成无可用方案结论
      function: generate_no_available_scheme_conclusion
      description: 当新出线触发后15公里范围内无符合空余间隔、主变容量和负载率要求的变电站，或无法生成合法新出线候选方案时，生成无可用新出线接入方案结论。
      next: 流程结束
      sla: 确认新出线不可行后即时完成
    - name: 流程结束
      function: ''
      description: 变电站新出线分支处理完成，输出新出线推荐方案、纳入最终方案集合或返回未触发状态。
