    - name: 评估新出线分支
      function: evaluate_new_substation_outgoing_line
      description: 当现有电源点不可用、负荷划接不可行、配置启用或单路容量达到阈值时，评估是否转入变电站新出线方案；新出线一旦触发即强制停止常规现有电源点方案回退。
      next:
        触发且新出线可行: 生成候选接入方案
        触发但新出线不可行: 生成无可用方案结论
        未触发且存在直接可用电源点或可行负荷划接方案: 生成候选接入方案
        未触发且不存在可用现有电源点或可行负荷划接方案: 生成无可用方案结论
      sla: 负荷划接判断后即时完成
    - name: 生成候选接入方案
      function: generate_candidate_connection_schemes
      description: 根据临时用电供电方式、可用电源点、负荷划接结果、新出线决策和红线设备要求生成候选接入方案；若新出线已触发，仅基于新出线结果生成候选方案。
      next:
        已生成候选方案: 评分排序方案
        无候选方案: 生成无可用方案结论
      sla: 新出线分支评估后即时完成
    - name: 评分排序方案
      function: score_and_rank_schemes
      description: 对临时用电候选方案按距离、可开放容量和可靠性评分，保留各运行方式最高分方案且总数不超过10套。
      next:
        已形成推荐集合: 生成PDF预览
        推荐集合为空: 生成无可用方案结论
      sla: 候选方案生成后即时完成
    - name: 生成PDF预览
      function: generate_connection_scheme_pdf_preview
      description: 生成临时用电接入推荐方案PDF预览，包含用户需求、推理过程、路径走向、负荷切割或新出线说明。
      next: 流程结束
      sla: 评分排序完成后即时完成
    - name: 生成无可用方案结论
      function: generate_no_available_scheme_conclusion
      description: 在临时用电场景下无法形成现有电源点、负荷划接或新出线方案，或新出线触发但不可行时，生成无可用方案结论。
      next: 流程结束
      sla: 判定无可用方案后即时完成
    - name: 流程结束
      function: ''
      description: 临时用电接入方案推理完成，输出推荐方案PDF预览或无可用方案结论。
  no_available_scheme_workflow:
    description: 无可用接入方案终态处理流程：当范围校验不通过，或现有电源点、原电源、负荷划接、新出线均无法满足约束时，形成可追溯的无方案结论。
    trigger: 任一接入方案生成流程中出现硬性范围不通过、候选方案为空或所有分支均不可行。
    involves_objects:
    - HighVoltageConnectionRequest
    - ConnectionScopeRule
    - ExistingAccessPointConstraintRule
    - LoadTransferRule
    - NewSubstationOutgoingLineTriggerRule
    - NewSubstationOutgoingLineFeasibilityRule
    - ScopeValidationResult
    - AccessPointCapacityCheck
    - OriginalSupplyCapacityCheck
    - LoadTransferPlan
    - NewSubstationOutgoingLineDecision
    - RankedConnectionSchemeSet
    - NoAvailableConnectionSchemeConclusion
    steps:
    - name: 汇总失败证据
      function: ''
      description: 编排层聚合步骤，不由单独函数执行；汇总范围校验失败原因、现有电源点校核失败约束、原电源校核失败原因、负荷划接不可行原因和新出线不可行原因，作为生成无可用方案结论的输入。
      next: 生成无可用方案结论
      sla: 判定进入无方案终态后即时完成
    - name: 生成无可用方案结论
      function: generate_no_available_scheme_conclusion
      description: 生成包含失败阶段、失败约束、已搜索半径、已搜索变电站范围、解释说明和建议人工复核动作的无可用方案结论。
      next: 流程结束
      sla: 失败证据汇总后即时完成
    - name: 流程结束
      function: ''
      description: 无可用接入方案终态处理完成。
