    mutability: append_only
    source:
      type: runtime_memory
      id_field: conclusion_id
    summary: 当现有电源点和新出线均无法满足约束时生成的无方案结论。
    description: generate_no_available_scheme_conclusion生成的终态输出，说明失败阶段、失败约束、已搜索范围、无法形成可用方案的原因和人工复核建议。
    properties:
      conclusion_id:
        type: str
        required: true
        description: 无可用方案结论编号。
      request_id:
        type: str
        required: true
        description: 对应高压接入请求编号。
      failed_stage:
        type: str
        description: 方案生成失败的阶段。
      failed_constraints:
        type: list[str]
        description: 未满足约束集合。
      searched_radius_m:
        type: float
        description: 已搜索现有电源点半径，单位米。
      searched_substation_radius_km:
        type: float
        description: 已搜索变电站半径，单位公里。
      explanation:
        type: str
        description: 无可用接入方案的业务解释。
      recommended_manual_review_actions:
        type: list[str]
        description: 推荐人工复核动作集合。
