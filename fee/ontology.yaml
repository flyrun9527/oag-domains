name: fee
description: "高速公路费率管理与最小费额路径计算。费额单位为分，里程单位为米。覆盖收费站/收费单元基础数据、费率参数生成、路网连通图构建、最小费额路径搜索和路径校验。"

objects:
  TollStation:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: fee_json_file
      id_field: station_id
      config: {path: data/toll_station.json}
    summary: "收费站"
    description: "收费站基础数据。use_status=2 表示在用站，参与站点入口/出口路径搜索。"
    properties:
      station_id: {type: str, required: true, description: "收费站编号"}
      name: {type: str, description: "收费站名称"}
      type: {type: int, description: "站点类型: 1=省界站, 2=非省界站"}
      toll_plaza_count: {type: int, description: "车道数"}
      use_status: {type: int, description: "使用状态: 2=在用, 3=停用"}
      real_type: {type: int, description: "实际类型"}
      region_name: {type: str, description: "所属区域"}
      country_name: {type: str, description: "所属县区"}
      regionalism_code: {type: str, description: "行政区划代码"}

  TollUnit:
    kind: entity
    data_source: external_api
    mutability: read_only
    source:
      type: fee_json_file
      id_field: toll_interval_id
      config: {path: data/toll_unit.json}
    summary: "收费单元"
    description: "收费路网中相邻节点之间的有向收费区间。rate_code 关联 BaseRate，opposite_id 表示对向单元。"
    properties:
      toll_interval_id: {type: str, required: true, description: "收费单元编号"}
      toll_interval_name: {type: str, description: "收费单元名称"}
      province_id: {type: str, description: "省份编号"}
      toll_road_id: {type: str, description: "收费公路编号"}
      rate_code: {type: str, description: "费率代码"}
      section_id: {type: str, description: "路段编号"}
      start_org_id: {type: str, description: "起点节点编号"}
      start_org_type: {type: int, description: "起点节点类型: 1=收费站, 2=枢纽, 3=虚拟节点"}
      end_org_id: {type: str, description: "终点节点编号"}
      end_org_type: {type: int, description: "终点节点类型: 1=收费站, 2=枢纽, 3=虚拟节点"}
      start_org_name: {type: str, description: "起点名称"}
      end_org_name: {type: str, description: "终点名称"}
      actual_length: {type: str, description: "实际里程"}
      charge_length: {type: str, description: "计费里程"}
      direction: {type: int, description: "方向: 1=上行, 2=下行"}
      province_type: {type: int, description: "是否省界: 0=非省界, 1=省界"}
      opposite_id: {type: str, description: "对向收费单元编号"}
      gantry_id: {type: str, description: "门架编号"}
      gantry_name: {type: str, description: "门架名称"}
      toll_flag: {type: int, description: "收费标志: 0/空=正常, 1=虚拟单元"}
      road_type: {type: str, description: "道路类型"}
      version: {type: str, description: "数据版本"}
      lastver: {type: str, description: "上一版本"}

  BaseRate:
    kind: lookup_table
    data_source: human_confirmed
    mutability: read_only
    source:
      type: fee_json_file
      id_field: rate_key
      config: {path: data/base_rate.json}
    summary: "基础费率"
    description: "按 rate_code + vehicle_type 定义基础费率。rate_code<50 按里程计费，rate_code>=50 按固定金额计费。"
    properties:
      rate_key: {type: str, required: true, description: "派生主键: rate_code:vehicle_type"}
      rate_code: {type: str, description: "费率代码"}
      vehicle_type: {type: int, description: "车型代码"}
      vc_rate: {type: str, description: "费率值"}
      province_id: {type: str, description: "省份编号"}
      rate_type: {type: int, description: "费率类型"}
      rate_desc: {type: str, description: "费率说明"}
      version: {type: str, description: "数据版本"}
      lastver: {type: str, description: "上一版本"}

  SpecialTimeDiscount:
    kind: lookup_table
    data_source: human_confirmed
    mutability: read_only
    source:
      type: fee_json_file
      id_field: discount_key
      config: {path: data/special_time_discount.json}
    summary: "特殊时段优惠"
    description: "收费单元分车型优惠政策。全天优惠(start_hour=0,end_hour=24)参与当前示例计费。"
    properties:
      discount_key: {type: str, required: true, description: "派生主键: toll_interval_id:vehicle_type:start_hour:end_hour"}
      toll_interval_id: {type: str, description: "收费单元编号"}
      start_date: {type: str, description: "优惠开始日期"}
      end_date: {type: str, description: "优惠结束日期"}
      start_hour: {type: int, description: "每日起始小时"}
      end_hour: {type: int, description: "每日结束小时"}
      vehicle_type: {type: str, description: "车型代码"}
      cpc_discount: {type: int, description: "CPC/MTC 千分比偏移量"}
      etc_discount: {type: int, description: "ETC 千分比偏移量"}
      flag: {type: int, description: "启用标志"}
      lastver: {type: str, description: "上一版本"}
      verusetime: {type: str, description: "生效时间"}

  NoContiguityRule:
    kind: rule_table
    data_source: human_confirmed
    mutability: read_only
    source:
      type: fee_json_file
      id_field: rule_key
      config: {path: data/no_contiguity_rule.json}
    summary: "路网连通修正规则"
    description: "不可达/强制可达规则。contiguity_type=1 禁用边，2/3 强制添加边。"
    properties:
      rule_key: {type: str, required: true, description: "派生主键"}
      en_road_node_id: {type: str, description: "起点节点编号"}
      en_road_node_type: {type: int, description: "起点节点类型"}
      ex_road_node_id: {type: str, description: "终点节点编号"}
      ex_road_node_type: {type: int, description: "终点节点类型"}
      contiguity_type: {type: int, description: "1=不可达, 2=强制可达, 3=跨省强制边"}
      version: {type: str, description: "数据版本"}
      lastver: {type: str, description: "上一版本"}

  Contiguity:
    kind: entity
    data_source: agent_generated
    mutability: mutable
    source:
      type: runtime_memory
      id_field: edge_id
    summary: "路网有向边"
    description: "build_graph 产出的有向连通边。invalid=0 的边参与路径搜索。"
    properties:
      edge_id: {type: str, required: true, description: "边编号"}
      en_road_node_id: {type: str, description: "起点节点编号"}
      en_road_node_type: {type: int, description: "起点节点类型: 0=收费单元, 1=收费站"}
      ex_road_node_id: {type: str, description: "终点节点编号"}
      ex_road_node_type: {type: int, description: "终点节点类型: 0=收费单元, 1=收费站"}
      miles: {type: int, description: "实际里程"}
      charge_miles: {type: int, description: "计费里程"}
      invalid: {type: int, description: "0=有效, 1=无效"}
      rule_id: {type: str, description: "触发规则"}

  ProvinceRateParam:
    kind: entity
    data_source: agent_generated
    mutability: mutable
    source:
      type: runtime_memory
      id_field: param_id
    summary: "收费单元车型费额参数"
    description: "compute_fees 产出的 (收费单元,车型) fee/mfee/efee 参数。"
    properties:
      param_id: {type: str, required: true, description: "参数编号"}
      toll_interval_id: {type: str, description: "收费单元编号"}
      vehicle_type: {type: int, description: "车型代码"}
      fee: {type: int, description: "基础费额"}
      mfee: {type: int, description: "MTC实收费额"}
      efee: {type: int, description: "ETC实收费额"}
      rate_source: {type: str, description: "费率来源: default/discount"}

  MinimumFeePath:
    kind: entity
    data_source: agent_generated
    mutability: append_only
    source:
      type: runtime_memory
      id_field: path_id
    summary: "最小费额路径"
    description: "find_path 产出的入口站到出口站最小 MTC 费额路径。"
    properties:
      path_id: {type: int, required: true, description: "路径编号"}
      en_station_id: {type: str, description: "入口收费站编号"}
      ex_station_id: {type: str, description: "出口收费站编号"}
      vehicle_type: {type: int, description: "车型代码"}
      toll_intervals: {type: str, description: "经过收费单元序列"}
      chargefee_group: {type: str, description: "各单元 MTC 费额序列"}
      chargefee95_group: {type: str, description: "各单元 ETC 费额序列"}
      total_fee: {type: int, description: "MTC 总费额"}
      total_fee95: {type: int, description: "ETC 总费额"}
      total_mileage: {type: int, description: "总计费里程"}

  ValidationError:
    kind: entity
    data_source: agent_generated
    mutability: mutable
    source:
      type: runtime_memory
      id_field: error_id
    summary: "路径校验错误"
    description: "validate_path 产出的 V1-V5 校验错误。"
    properties:
      error_id: {type: str, required: true, description: "错误编号"}
      path_id: {type: int, description: "路径编号"}
      rule_id: {type: str, description: "校验规则编号"}
      message: {type: str, description: "错误详情"}

links:
  unit_has_base_rate:
    source: TollUnit
    target: BaseRate
    join: {source_key: rate_code, target_key: rate_code}
    link_type: references
    cardinality: "1..n"
    description: "收费单元通过 rate_code 关联多车型基础费率。"

  unit_has_discounts:
    source: TollUnit
    target: SpecialTimeDiscount
    join: {source_key: toll_interval_id, target_key: toll_interval_id}
    link_type: references
    cardinality: "0..n"
    description: "收费单元关联可选优惠政策。"

  unit_has_rate_params:
    source: TollUnit
    target: ProvinceRateParam
    join: {source_key: toll_interval_id, target_key: toll_interval_id}
    link_type: derived
    cardinality: "0..n"
    description: "compute_fees 生成的收费参数。"

  path_has_errors:
    source: MinimumFeePath
    target: ValidationError
    join: {source_key: path_id, target_key: path_id}
    link_type: derived
    cardinality: "0..n"
    description: "validate_path 生成的路径校验错误。"

functions:
  build_graph:
    summary: "构建路网有向边"
    group: "费额路径计算"
    description: "从 TollUnit、TollStation、NoContiguityRule 生成 Contiguity 有向边。"
    function_type: business
    writes_to: [Contiguity]
    involves_objects: [TollUnit, TollStation, NoContiguityRule, Contiguity]
    hint: "首次路径搜索前先执行。会替换当前内存中的 Contiguity 结果。"
    params:
      version_id: {type: str, default: "", description: "版本标识，当前示例仅透传"}

  compute_fees:
    summary: "计算收费单元车型费额"
    group: "费额路径计算"
    description: "为每个收费单元和车型计算 fee/mfee/efee，写入 ProvinceRateParam。"
    function_type: business
    depends_on: [build_graph]
    writes_to: [ProvinceRateParam]
    involves_objects: [TollUnit, BaseRate, SpecialTimeDiscount, ProvinceRateParam]
    hint: "默认计算 1,2,3,4,11,12,13,14,15,16 十类车型。会替换当前内存中的 ProvinceRateParam。"
    params:
      vehicle_types: {type: str, default: "1,2,3,4,11,12,13,14,15,16", description: "车型列表，逗号分隔"}

  find_path:
    summary: "搜索最小 MTC 费额路径"
    group: "费额路径计算"
    description: "基于 Contiguity 和 ProvinceRateParam，用 Dijkstra 搜索入口站到出口站的最小 MTC 费额路径。"
    function_type: business
    depends_on: [compute_fees]
    writes_to: [MinimumFeePath]
    involves_objects: [TollStation, TollUnit, Contiguity, ProvinceRateParam, MinimumFeePath]
    hint: "如果图或费率参数为空，先执行 build_graph 与 compute_fees。"
    params:
      en_station_id: {type: str, description: "入口收费站编号"}
      ex_station_id: {type: str, description: "出口收费站编号"}
      vehicle_type: {type: int, default: 1, description: "车型代码"}

  validate_path:
    summary: "校验最小费额路径"
    group: "费额路径计算"
    description: "按 V1-V5 校验路径连通性、费额公式和门架连续性，写入 ValidationError。"
    function_type: business
    depends_on: [find_path]
    writes_to: [ValidationError]
    involves_objects: [MinimumFeePath, TollUnit, Contiguity, ValidationError]
    hint: "对 find_path 返回的 path_id 执行。会替换该路径的旧校验错误。"
    params:
      path_id: {type: int, description: "路径编号"}

workflows:
  minimum_fee_path:
    description: "收费站间最小费额路径计算流程。"
    trigger: "用户给定入口站、出口站和车型"
    involves_objects: [TollStation, TollUnit, BaseRate, Contiguity, ProvinceRateParam, MinimumFeePath]
    steps:
      - name: 构建路网
        function: build_graph
        next: 计算费率
      - name: 计算费率
        function: compute_fees
        next: 搜索路径
      - name: 搜索路径
        function: find_path
        next: 校验路径
      - name: 校验路径
        function: validate_path
