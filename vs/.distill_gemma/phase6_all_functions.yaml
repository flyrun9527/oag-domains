  source: '文档: 10.3 物资保障'
  hint: '根据 disaster_type 查询 MaterialAllocationRule 表。

    返回: material_list(所需物资清单)。'
- name: inspect_facility
  function_type: business
  summary: 执行设施（路段/桥梁/隧道）应急调查，记录调查方法、内容及初步受损评估，生成调查记录。
  group: 应急调查
  description: 输入：event_id, facility_id, facility_type, inspection_method, inspection_content。处理：根据设施类型调用对应规范（路基4.4/桥梁7.1/隧道8.2）进行灾情侦测，结合
    lookup 函数初步判定损伤等级或抢通目标。输出：写入 FacilityInspection 实体。
  depends_on:
  - get_road_segment
  - get_bridge
  - get_tunnel
  writes_to:
  - FacilityInspection
  params:
  - name: event_id
    type: str
    description: 关联的突发事件ID
    default: null
  - name: facility_id
    type: str
    description: 设施ID（路段/桥梁/隧道）
    default: null
  - name: facility_type
    type: str
    description: 设施类型，如'RoadSegment'
    default: null
  - name: inspection_method
    type: str
    description: 调查方法，如'无人机调查'
    default: null
  - name: inspection_content
    type: str
    description: 调查内容描述，如'灾害类型, 规模, 分布位置'
    default: null
  involves_objects:
  - FacilityInspection
  - RoadSegment
  - Bridge
  - Tunnel
  source: '文档: 6.1 路基路面应急调查, 7.1 桥涵应急调查, 8.2 隧道应急调查'
  hint: 'R1: 根据 facility_type 选择对应的调查重点：

    - RoadSegment: 依据 4.4 节，侦测沉陷/垮塌/断裂程度、边坡滑坡/崩塌、支挡结构损毁、路面覆盖/掩埋/湿滑程度。

    - Bridge: 依据 7.1 节，调查整体稳定性（坍塌/落梁）、承载能力（支座/墩台/基础）、通行能力（桥面/伸缩缝/引道）。

    - Tunnel: 依据 8.2 节，调查洞口掩埋/边仰坡失稳、衬砌开裂/坍塌、涌水突泥、有毒有害气体泄漏。

    R2: 调查方法选择：大范围/危险环境优先使用无人机/遥感（4.3 节）；近距离/细节使用人工/便携仪器（4.4/4.5/4.6 节）。

    R3: 初步受损程度判定：

    - RoadSegment: 调用 lookup_road_damage_grade_standard 获取路基/边坡/支挡/路面损伤等级。

    - Bridge: 调用 lookup_bridge_damage_grade_standard 获取稳定性/承载能力/通行能力损伤等级。

    - Tunnel: 依据 8.3/8.4 节，结合重要等级、抢通难度、次生灾害风险确定抢通目标等级（I/II/III）。

    R4: 副作用：生成 FacilityInspection 记录，包含 inspection_method, inspection_content 及初步判定的损伤等级或抢通目标。'
- name: assess_facility
  function_type: business
  summary: 基于调查记录，结合损伤标准或风险标准，评估设施通行结论（正常/限制/禁止）及风险等级，并生成评估记录。
  group: 应急评估
  description: 输入 inspection_id 关联调查记录，根据设施类型调用 lookup_road_damage_grade_standard、lookup_bridge_damage_grade_standard
    或 lookup_secondary_disaster_risk_standard 获取判定依据，计算 assessment_conclusion 和 risk_level，最终写入
    FacilityAssessment 对象。
  depends_on:
  - inspect_facility
  - lookup_road_damage_grade_standard
  - lookup_bridge_damage_grade_standard
  - lookup_secondary_disaster_risk_standard
  writes_to:
  - FacilityAssessment
  params:
  - name: inspection_id
    type: str
    description: 关联的调查记录ID
    default: null
  - name: assessment_conclusion
    type: str
    description: 评估结论，如'限制通行'
    default: null
  - name: risk_level
    type: str
    description: 风险等级，如'II级'
    default: null
  involves_objects:
  - FacilityAssessment
  - FacilityInspection
  source: '文档: 6.2 路基路面应急评估, 7.2 桥涵应急评估, 8.3 隧道应急评估'
  hint: 'R1: 根据设施类型（路基/桥梁/隧道）调用对应的 lookup 函数获取损伤等级标准或风险标准。

    R2: 路基/桥梁评估：若各部位损伤等级中存在 III 级，则 assessment_conclusion=''禁止通行''；若存在 II 级且无 III
    级，则 assessment_conclusion=''限制通行''；若全为 I 级，则 assessment_conclusion=''正常通行''。

    R3: 隧道评估：若发生有毒有害气体泄漏或瓦斯超标，assessment_conclusion=''禁止通行''；否则根据抢通目标等级确定结论（I级->禁止通行,
    II级->限制通行, III级->正常通行）。

    R4: 风险等级确定：结合次生灾害发生概率和损失程度，调用 lookup_secondary_disaster_risk_standard 确定 risk_level（I级~IV级）。

    R5: 副作用：写入 FacilityAssessment 记录。'
- name: generate_clearance_plan
  function_type: business
  summary: 基于设施评估结果和抢通技术规则，生成包含技术措施和状态（候选）的抢通方案记录。
  group: 抢通方案
  description: 输入 assessment_id 获取评估结论和风险等级，结合 plan_type 调用 lookup_clearance_technique_rule
    获取推荐技术，生成 ClearancePlan 记录（含技术措施、资源需求、状态）。
  depends_on:
  - assess_facility
  - lookup_clearance_technique_rule
  writes_to:
  - ClearancePlan
  params:
  - name: assessment_id
    type: str
    description: 关联的评估记录ID
    default: null
  - name: plan_type
    type: str
    description: 方案类型，如'便道'
    default: null
  - name: status
    type: str
    description: 状态，默认为'候选'
    default: 候选
  involves_objects:
  - ClearancePlan
  - FacilityAssessment
  source: '文档: 7.3 桥涵抢通技术, 6.4 路基路面应急处置技术'
  hint: 'R1: 根据 assessment_id 获取 FacilityAssessment 记录，读取 assessment_conclusion 和
    risk_level。

    R2: 调用 lookup_clearance_technique_rule，传入评估结论、风险等级及 plan_type，获取推荐的技术措施。

    R3: 生成 ClearancePlan 记录，包含 plan_type、技术措施、资源需求，状态设为 status（默认''候选''）。

    注意: 若评估结论为''禁止通行''或风险等级为''III级''/''IV级''，需优先选择便道、便桥或改线绕行等隔离/替代方案；若为''限制通行''，可选择应急修复或快速补强。'
- name: dispatch_resources
  function_type: business
  summary: 根据抢通方案需求和库存情况，生成资源调度单，调度应急队伍、装备或物资。
  group: 资源调度
  description: '输入: plan_id(抢通方案ID), resource_type(资源类型), resource_id(资源ID), dispatch_reason(调度原因)。处理:
    结合 ClearancePlan 需求、EquipmentStock/MaterialStock 库存及 lookup 规则，生成 ResourceDispatch
    记录。输出: ResourceDispatch 对象。副作用: 写入 ResourceDispatch 表。'
  depends_on:
  - generate_clearance_plan
  - get_equipment_stock
  - get_material_stock
  - lookup_equipment_selection_rule
  - lookup_material_allocation_rule
  writes_to:
  - ResourceDispatch
  params:
  - name: plan_id
    type: str
    description: 关联的抢通方案ID
    default: null
  - name: resource_type
    type: str
    description: 资源类型，如'装备'
    default: null
  - name: resource_id
    type: str
    description: 资源ID（队伍/装备/物资）
    default: null
  - name: dispatch_reason
    type: str
    description: 调度原因，如'突发事件类型'
    default: null
  involves_objects:
  - ResourceDispatch
  - ClearancePlan
  - EquipmentStock
  - MaterialStock
  source: '文档: 5.5 资源调度'
  hint: 'R1: 根据 ClearancePlan 的资源需求，调用 lookup_equipment_selection_rule 和 lookup_material_allocation_rule
    确定所需装备和物资类型。

    R2: 调用 get_equipment_stock 和 get_material_stock 获取当前库存情况。

    R3: 结合方案需求与库存可用性，生成 ResourceDispatch 记录，包含 resource_type、dispatch_reason 等字段。

    注意: 资源调度需遵循属地管理原则，优先调用就近储备点资源。'
- name: execute_traffic_control
  function_type: business
  summary: 根据设施评估结论或隧道抢通目标，查询并执行相应的交通管制措施，生成管制记录。
  group: 交通管制
  description: 输入 assessment_id 获取评估结论，结合 control_type 和 implementation_time，依据规范确定具体管制措施（如半幅通行、限速等），生成
    TrafficControl 执行记录。
  depends_on:
  - assess_facility
  - lookup_traffic_control_rule
  writes_to:
  - TrafficControl
  params:
  - name: assessment_id
    type: str
    description: 关联的评估记录ID
    default: null
  - name: control_type
    type: str
    description: 管制类型，如'封闭'
    default: null
  - name: implementation_time
    type: str
    description: 实施时间
    default: null
  involves_objects:
  - TrafficControl
  - FacilityAssessment
  source: '文档: 6.3 交通管制措施'
  hint: 'R1: 根据 FacilityAssessment 的 assessment_conclusion 或 Tunnel 的抢通目标，调用 lookup_traffic_control_rule
    确定管制措施。

    R2: 对限制通行路段，在限制通行期间应派专人定点指挥，控制车辆交通，维持行车秩序。

    R3: 对限制通行路段，可采取半幅通行、单车道居中通行、限速、限载行驶、分时控制等限制措施。

    R4: 应及时通过广播、电视、电台发布交通管制信息，并在距离机动车入口的适当位置设置交通管制信息牌。

    副作用: 写入 TrafficControl 记录，包含 control_type 和 implementation_time。'
- name: handle_accident
  function_type: business
  summary: 处理交通事故，确定事故类型与等级，执行处理措施并生成处理记录。
  group: 事故处理
  description: 根据事故现场情况确定事故类型，调用 lookup_accident_level_standard 确定事故等级，调用 lookup_accident_handling_time_rule
    确定处理时限，执行相应的处理措施（如牵拉、起吊、拖运等），记录处理耗时，并生成 AccidentHandlingRecord。
  depends_on:
  - lookup_accident_level_standard
  - lookup_accident_handling_time_rule
  writes_to:
  - AccidentHandlingRecord
  params:
  - name: event_id
    type: str
    description: 关联的突发事件ID
    default: null
  - name: accident_type
    type: str
    description: 事故类型，如'碰撞'
    default: null
  - name: handling_method
    type: str
    description: 处理措施，如'拖运'
    default: null
  - name: handling_duration
    type: str
    description: 处理耗时
    default: null
  - name: accident_level
    type: str
    description: 事故等级，如'II级'
    default: null
  involves_objects:
  - AccidentHandlingRecord
  - AccidentType
  source: '文档: 9.3 事故应急处理'
  hint: 'R1: 根据事故现场情况确定 accident_type（如抛锚、碰撞等）。

    R2: 调用 lookup_accident_level_standard 确定 accident_level。

    R3: 调用 lookup_accident_handling_time_rule 确定处理时限。

    R4: 根据事故类型和等级执行相应的 handling_method（如牵拉、起吊、拖运等）。

    R5: 记录 handling_duration。

    副作用: 写入 AccidentHandlingRecord 记录。'
- name: generate_event_report
  function_type: business
  summary: 汇总突发事件、设施评估、清障计划及资源调度信息，生成灾情信息报告（首报/续报/终报）。
  group: 信息报告
  description: 输入 event_id、report_type 和 report_content，关联查询 EmergencyEvent 及相关处置记录，汇总事件进展与处置情况，生成并写入
    EventReport 记录。
  depends_on:
  - get_emergency_event
  - assess_facility
  - generate_clearance_plan
  - dispatch_resources
  writes_to:
  - EventReport
  params:
  - name: event_id
    type: str
    description: 关联的突发事件ID
    default: null
  - name: report_type
    type: str
    description: 报告类型，如'首报'
    default: null
  - name: report_content
    type: str
    description: 报告内容要素，如'时间, 地点, 采取措施'
    default: null
  involves_objects:
  - EventReport
  - EmergencyEvent
  source: '文档: 5.3 信息上报'
  hint: 'R1: 根据 event_id 获取 EmergencyEvent 信息（包括 event_type, event_level, location,
    occurrence_time, is_blocked）。

    R2: 汇总 FacilityAssessment、ClearancePlan、ResourceDispatch 等相关处置进展信息。

    R3: 根据 report_type（首报/续报/终报）和 report_content 要素（时间、地点、起因、性质、后果、影响范围、采取措施等）组装报告内容。

    R4: 生成 EventReport 记录并写入系统。'
- name: record_monitoring
  function_type: business
  summary: 记录隧道或边坡抢通过程中的监测数据（项目、手段、预警等级），生成监测记录。
  group: 监测巡查
  description: 在抢通过程中，对隧道或边坡进行监测，记录监测项目（如拱顶下沉、位移等）、监测手段（如仪器监测、巡视监测）及风险预警等级，生成 MonitoringRecord
    实体。
  depends_on:
  - inspect_facility
  writes_to:
  - MonitoringRecord
  params:
  - name: facility_id
    type: str
    description: 关联的设施ID
    default: null
  - name: monitoring_item
    type: str
    description: 监测项目，如'拱顶下沉'
    default: null
  - name: monitoring_method
    type: str
    description: 监测手段，如'仪器监测'
    default: null
  - name: warning_level
    type: str
    description: 风险预警等级
    default: null
  involves_objects:
  - MonitoringRecord
  source: '文档: 8.5.2 监测与巡查'
  hint: 'R1: 监测手段应包含巡视监测和仪器监测，优先采用非接触变形监测。

    R2: 监测项目包括拱顶下沉、周边收敛、隧底隆起、边仰坡水平位移及竖向位移，具体项目根据隧道变形破坏特征确定。

    R3: 监测频率宜根据现场风险情况而定。

    R4: 须指派专人开展巡视工作，及时上报巡查结果。

    R5: 须采取必要措施保证监测作业人员及巡查人员的安全。

    副作用: 写入 MonitoringRecord 记录。'
