functions:
- name: get_road_segment
  function_type: get
  summary: 查询公路路段实体详情，包括桩号、等级、损毁类型及等级。
  group: 设施查询
  description: 根据路段ID查询RoadSegment对象，返回其基础信息、损毁类型(damage_type)、损毁等级(damage_grade)及当前交通管制措施。
  depends_on: []
  writes_to: []
  params:
  - name: road_segment_id
    type: str
    description: 公路路段唯一标识
    default: null
  involves_objects:
  - RoadSegment
  source: '对象模型: RoadSegment'
- name: get_bridge
  function_type: get
  summary: 查询桥梁设施实体详情，包括结构形式、各维度损伤等级及抢通技术。
  group: 设施查询
  description: 根据桥梁ID查询Bridge对象，返回其结构信息、整体稳定性/承载能力/通行能力损伤等级、灾损类型及推荐的抢通技术。
  depends_on: []
  writes_to: []
  params:
  - name: bridge_id
    type: str
    description: 桥梁唯一标识
    default: null
  involves_objects:
  - Bridge
  source: '对象模型: Bridge'
- name: get_tunnel
  function_type: get
  summary: 查询隧道设施实体详情，包括重要等级、抢通难度、目标等级及灾害类型。
  group: 设施查询
  description: 根据隧道ID查询Tunnel对象，返回其重要等级、抢通难度、抢通目标等级、最小通行限界及灾害类型。
  depends_on: []
  writes_to: []
  params:
  - name: tunnel_id
    type: str
    description: 隧道唯一标识
    default: null
  involves_objects:
  - Tunnel
  source: '对象模型: Tunnel'
- name: get_emergency_event
  function_type: get
  summary: 查询公路交通突发事件记录，包括事件类型、级别、位置及是否阻断。
  group: 事件查询
  description: 根据事件ID查询EmergencyEvent对象，返回事件类型、级别、发生位置、时间及是否造成交通阻断。
  depends_on: []
  writes_to: []
  params:
  - name: event_id
    type: str
    description: 事件唯一标识
    default: null
  involves_objects:
  - EmergencyEvent
  source: '对象模型: EmergencyEvent'
- name: get_emergency_depot
  function_type: get
  summary: 查询应急物资储备点详情，包括位置、级别及储备方式。
  group: 资源查询
  description: 根据储备点ID查询EmergencyDepot对象，返回其名称、位置、级别及储备方式。
  depends_on: []
  writes_to: []
  params:
  - name: depot_id
    type: str
    description: 储备点唯一标识
    default: null
  involves_objects:
  - EmergencyDepot
  source: '对象模型: EmergencyDepot'
- name: get_rescue_team
  function_type: get
  summary: 查询应急救援队伍详情，包括组织级别及通信设备。
  group: 资源查询
  description: 根据队伍ID查询RescueTeam对象，返回其名称、所属组织级别及配备的通信设备。
  depends_on: []
  writes_to: []
  params:
  - name: team_id
    type: str
    description: 救援队伍唯一标识
    default: null
  involves_objects:
  - RescueTeam
  source: '对象模型: RescueTeam'
- name: get_equipment_stock
  function_type: get
  summary: 查询应急装备库存记录，包括装备类型、作业类型及所属储备点。
  group: 资源查询
  description: 根据装备库存ID或储备点ID查询EquipmentStock对象，返回装备类型、作业类型、重量等级、部署方式及适用环境。
  depends_on: []
  writes_to: []
  params:
  - name: stock_id
    type: str
    description: 装备库存记录ID
    default: null
  - name: depot_id
    type: str
    description: 储备点ID，用于查询该点所有装备
    default: null
  involves_objects:
  - EquipmentStock
  source: '对象模型: EquipmentStock'
- name: get_material_stock
  function_type: get
  summary: 查询应急物资库存记录，包括物资名称、类别及适用灾害类型。
  group: 资源查询
  description: 根据物资库存ID或储备点ID查询MaterialStock对象，返回物资名称、类别、适用灾害类型及所属储备点。
  depends_on: []
  writes_to: []
  params:
  - name: stock_id
    type: str
    description: 物资库存记录ID
    default: null
  - name: depot_id
    type: str
    description: 储备点ID，用于查询该点所有物资
    default: null
  involves_objects:
  - MaterialStock
  source: '对象模型: MaterialStock'
- name: lookup_event_level_standard
  function_type: lookup
  summary: 查询公路交通突发事件分级标准，根据影响范围和抢修时间确定事件级别。
  group: 规则查询
  description: 根据抢修时间阈值和影响范围描述，查询EventLevelStandard，返回对应的事件级别（I-IV级）。
  depends_on: []
  writes_to: []
  params:
  - name: repair_time_threshold
    type: str
    description: 抢修处置时间阈值，如'24小时以上'
    default: null
  - name: impact_scope
    type: str
    description: 影响范围描述，如'影响周边省份'
    default: null
  involves_objects:
  - EventLevelStandard
  source: '文档: 5.2 事件分级'
- name: lookup_road_damage_grade_standard
  function_type: lookup
  summary: 查询路基路面受损程度分级标准，根据受损程度确定等级和通行建议。
  group: 规则查询
  description: 根据设施类型（路基本体/边坡/支挡结构）和受损程度（轻微/中度/严重），查询RoadDamageGradeStandard，返回损毁等级（I/II/III）及通行建议（正常/限制/禁止）。
  depends_on: []
  writes_to: []
  params:
  - name: facility_type
    type: str
    description: 设施类型，如'路基本体'
    default: null
  - name: damage_degree
    type: str
    description: 受损程度，如'轻微破坏'
    default: null
  involves_objects:
  - RoadDamageGradeStandard
  source: '文档: 6.2 路基路面应急评估'
- name: lookup_bridge_damage_grade_standard
  function_type: lookup
  summary: 查询桥涵受损程度分级标准，根据评估维度和损伤程度确定等级和通行建议。
  group: 规则查询
  description: 根据评估维度（整体稳定性/承载能力/通行能力）和损伤程度（轻微/中等/严重），查询BridgeDamageGradeStandard，返回损伤等级（I/II/III）及通行建议。
  depends_on: []
  writes_to: []
  params:
  - name: dimension
    type: str
    description: 评估维度，如'整体稳定性'
    default: null
  - name: damage_degree
    type: str
    description: 损伤程度，如'轻微损伤'
    default: null
  involves_objects:
  - BridgeDamageGradeStandard
  source: '文档: 7.2 桥涵应急评估'
- name: lookup_tunnel_importance_level
  function_type: lookup
  summary: 查询隧道重要等级分级表，根据道路等级和交通量确定重要等级。
  group: 规则查询
  description: 根据道路等级和年日均交通量范围，查询TunnelImportanceLevel，返回隧道重要等级（一级/二级/三级）。
  depends_on: []
  writes_to: []
  params:
  - name: road_grade
    type: str
    description: 道路等级，如'高速及一级公路'
    default: null
  - name: traffic_volume
    type: str
    description: 年日均交通量范围，如'≥10001'
    default: null
  involves_objects:
  - TunnelImportanceLevel
  source: '文档: 8.3.2 隧道重要等级'
- name: lookup_secondary_disaster_risk_standard
  function_type: lookup
  summary: 查询次生灾害风险等级标准，根据发生可能性和损失程度确定风险等级。
  group: 规则查询
  description: 根据发生可能性等级（如'频繁的'）和损失程度等级（如'灾难性的'），查询SecondaryDisasterRiskStandard，返回风险等级（I-IV级）。
  depends_on: []
  writes_to: []
  params:
  - name: probability_level
    type: str
    description: 发生可能性等级，如'频繁的'
    default: null
  - name: loss_level
    type: str
    description: 损失程度等级，如'灾难性的'
    default: null
  involves_objects:
  - SecondaryDisasterRiskStandard
  source: '文档: 8.3.5 次生事故风险等级'
- name: lookup_tunnel_clearance_difficulty_matrix
  function_type: lookup
  summary: 查询隧道抢通难度矩阵，根据抢通时长评级和风险等级确定难度。
  group: 规则查询
  description: 根据抢通时长评级（A/B/C/D）和次生灾害风险等级（I-IV级），查询TunnelClearanceDifficultyMatrix，返回抢通难度（高/中/低）。
  depends_on: []
  writes_to: []
  params:
  - name: duration_rating
    type: str
    description: 抢通时长评级，如'A'
    default: null
  - name: risk_grade
    type: str
    description: 次生灾害风险等级，如'I级'
    default: null
  involves_objects:
  - TunnelClearanceDifficultyMatrix
  source: '文档: 8.3.7 隧道抢通难度等级'
- name: lookup_tunnel_clearance_target_matrix
  function_type: lookup
  summary: 查询隧道抢通目标矩阵，根据抢通难度和重要等级确定抢通目标。
  group: 规则查询
  description: 根据抢通难度（高/中/低）和隧道重要等级（一级/二级/三级），查询TunnelClearanceTargetMatrix，返回抢通目标等级（I/II/III级）。
  depends_on: []
  writes_to: []
  params:
  - name: difficulty_level
    type: str
    description: 抢通难度，如'高难度'
    default: null
  - name: importance_level
    type: str
    description: 隧道重要等级，如'一级'
    default: null
  involves_objects:
  - TunnelClearanceTargetMatrix
  source: '文档: 8.4.1 隧道抢通目标等级'
- name: lookup_clearance_technique_rule
  function_type: lookup
  summary: 查询抢通技术选用规则，根据设施类型和灾损类型推荐技术措施。
  group: 规则查询
  description: 根据设施类型（路基/桥梁/隧道）和灾损类型（沉陷/坍塌/火灾等），查询ClearanceTechniqueRule，返回推荐的技术措施（如机械回填/便道/通风）。
  depends_on: []
  writes_to: []
  params:
  - name: facility_type
    type: str
    description: 设施类型，如'桥梁'
    default: null
  - name: disaster_type
    type: str
    description: 灾损类型，如'坍塌'
    default: null
  involves_objects:
  - ClearanceTechniqueRule
  source: '文档: 7.3 桥涵抢通技术, 6.4 路基路面应急处置技术'
- name: lookup_traffic_control_rule
  function_type: lookup
  summary: 查询交通管制措施规则，根据受损等级确定管制措施。
  group: 规则查询
  description: 根据受损等级（I/II/III级），查询TrafficControlRule，返回对应的交通管制措施（如半幅通行/封闭）。
  depends_on: []
  writes_to: []
  params:
  - name: damage_grade
    type: str
    description: 受损等级，如'II级'
    default: null
  involves_objects:
  - TrafficControlRule
  source: '文档: 6.3 交通管制措施'
- name: lookup_accident_level_standard
  function_type: lookup
  summary: 查询道路交通事故等级标准，根据伤亡和经济损失确定事故等级。
  group: 规则查询
  description: 根据人员伤亡判定条件和经济损失判定条件，查询AccidentLevelStandard，返回事故等级（I-IV级）。
  depends_on: []
  writes_to: []
  params:
  - name: casualty_criteria
    type: str
    description: 人员伤亡判定条件，如'4人以上死亡'
    default: null
  - name: economic_loss_criteria
    type: str
    description: 经济损失判定条件，如'5000万元以上'
    default: null
  involves_objects:
  - AccidentLevelStandard
  source: '文档: 9.2.3 道路交通事故等级'
- name: lookup_accident_handling_time_rule
  function_type: lookup
  summary: 查询事故应急处理时限规则，根据事故等级确定处理时限和终止条件。
  group: 规则查询
  description: 根据事故等级（I-IV级），查询AccidentHandlingTimeRule，返回处理时限和终止条件。
  depends_on: []
  writes_to: []
  params:
  - name: accident_level
    type: str
    description: 事故等级，如'I级'
    default: null
  involves_objects:
  - AccidentHandlingTimeRule
  source: '文档: 9.2.5 道路交通事故应急处理时限'
- name: lookup_equipment_selection_rule
  function_type: lookup
  summary: 查询应急装备选型规则，根据作业场景和环境条件推荐装备类型。
  group: 规则查询
  description: 根据作业场景（如土方作业/抢通）和环境条件，查询EquipmentSelectionRule，返回推荐的装备类型、重量等级及运达方式。
  depends_on: []
  writes_to: []
  params:
  - name: scenario
    type: str
    description: 作业场景，如'抢通'
    default: null
  - name: environment_condition
    type: str
    description: 环境条件，如'山地陡坡'
    default: null
  involves_objects:
  - EquipmentSelectionRule
  source: '文档: 10.2.1 装备选型原则'
- name: lookup_material_allocation_rule
  function_type: lookup
  summary: 查询应急物资分配规则，根据灾害类型确定所需物资清单。
  group: 规则查询
  description: 根据灾害类型（冰雪/水灾/火灾等），查询MaterialAllocationRule，返回所需的物资清单。
  depends_on: []
  writes_to: []
  params:
  - name: disaster_type
    type: str
    description: 灾害类型，如'冰雪'
    default: null
  involves_objects:
  - MaterialAllocationRule
  source: '文档: 10.3 物资保障'
- name: inspect_facility
  function_type: business
  summary: 执行设施应急调查，记录调查方法、内容及受损情况，写入调查记录。
  group: 应急调查
  description: 对指定设施（路段/桥梁/隧道）进行应急调查。根据调查方法（人工/无人机/遥感）和调查内容，生成FacilityInspection记录。需结合lookup_road_damage_grade_standard或lookup_bridge_damage_grade_standard初步判断受损程度。
  depends_on:
  - get_road_segment
  - get_bridge
  - get_tunnel
  writes_to:
  - FacilityInspection
  params:
  - name: event_id
    type: str
    description: 关联的突发事件ID
    default: null
  - name: facility_id
    type: str
    description: 设施ID（路段/桥梁/隧道）
    default: null
  - name: facility_type
    type: str
    description: 设施类型，如'RoadSegment'
    default: null
  - name: inspection_method
    type: str
    description: 调查方法，如'无人机调查'
    default: null
  - name: inspection_content
    type: str
    description: 调查内容描述，如'灾害类型, 规模, 分布位置'
    default: null
  involves_objects:
  - FacilityInspection
  - RoadSegment
  - Bridge
  - Tunnel
  source: '文档: 6.1 路基路面应急调查, 7.1 桥涵应急调查, 8.2 隧道应急调查'
- name: assess_facility
  function_type: business
  summary: 执行设施应急评估，基于调查记录确定通行结论和风险等级，写入评估记录。
  group: 应急评估
  description: 基于FacilityInspection记录，结合lookup_road_damage_grade_standard、lookup_bridge_damage_grade_standard或lookup_secondary_disaster_risk_standard，生成FacilityAssessment记录，包含评估结论（正常/限制/禁止通行）和风险等级。
  depends_on:
  - inspect_facility
  - lookup_road_damage_grade_standard
  - lookup_bridge_damage_grade_standard
  - lookup_secondary_disaster_risk_standard
  writes_to:
  - FacilityAssessment
  params:
  - name: inspection_id
    type: str
    description: 关联的调查记录ID
    default: null
  - name: assessment_conclusion
    type: str
    description: 评估结论，如'限制通行'
    default: null
  - name: risk_level
    type: str
    description: 风险等级，如'II级'
    default: null
  involves_objects:
  - FacilityAssessment
  - FacilityInspection
  source: '文档: 6.2 路基路面应急评估, 7.2 桥涵应急评估, 8.3 隧道应急评估'
- name: generate_clearance_plan
  function_type: business
  summary: 生成抢通方案，基于评估结果和抢通技术规则，确定技术措施和资源需求。
  group: 抢通方案
  description: 根据FacilityAssessment结果，调用lookup_clearance_technique_rule获取推荐技术，生成ClearancePlan记录。方案包含计划类型、技术措施及状态（候选）。
  depends_on:
  - assess_facility
  - lookup_clearance_technique_rule
  writes_to:
  - ClearancePlan
  params:
  - name: assessment_id
    type: str
    description: 关联的评估记录ID
    default: null
  - name: plan_type
    type: str
    description: 方案类型，如'便道'
    default: null
  - name: status
    type: str
    description: 状态，默认为'候选'
    default: 候选
  involves_objects:
  - ClearancePlan
  - FacilityAssessment
  source: '文档: 7.3 桥涵抢通技术, 6.4 路基路面应急处置技术'
- name: dispatch_resources
  function_type: business
  summary: 调度应急资源，根据方案需求和库存情况，生成资源调度单。
  group: 资源调度
  description: 根据ClearancePlan的资源需求，结合get_equipment_stock和get_material_stock，调用lookup_equipment_selection_rule和lookup_material_allocation_rule，生成ResourceDispatch记录，调度队伍、装备或物资。
  depends_on:
  - generate_clearance_plan
  - get_equipment_stock
  - get_material_stock
  - lookup_equipment_selection_rule
  - lookup_material_allocation_rule
  writes_to:
  - ResourceDispatch
  params:
  - name: plan_id
    type: str
    description: 关联的抢通方案ID
    default: null
  - name: resource_type
    type: str
    description: 资源类型，如'装备'
    default: null
  - name: resource_id
    type: str
    description: 资源ID（队伍/装备/物资）
    default: null
  - name: dispatch_reason
    type: str
    description: 调度原因，如'突发事件类型'
    default: null
  involves_objects:
  - ResourceDispatch
  - ClearancePlan
  - EquipmentStock
  - MaterialStock
  source: '文档: 5.5 资源调度'
- name: execute_traffic_control
  function_type: business
  summary: 执行交通管制，根据评估结论或抢通目标，生成交通管制执行记录。
  group: 交通管制
  description: 根据FacilityAssessment的通行结论或Tunnel的抢通目标，调用lookup_traffic_control_rule确定管制措施，生成TrafficControl记录，记录实施时间和类型。
  depends_on:
  - assess_facility
  - lookup_traffic_control_rule
  writes_to:
  - TrafficControl
  params:
  - name: assessment_id
    type: str
    description: 关联的评估记录ID
    default: null
  - name: control_type
    type: str
    description: 管制类型，如'封闭'
    default: null
  - name: implementation_time
    type: str
    description: 实施时间
    default: null
  involves_objects:
  - TrafficControl
  - FacilityAssessment
  source: '文档: 6.3 交通管制措施'
- name: handle_accident
  function_type: business
  summary: 处理交通事故，记录事故类型、处理措施及耗时，生成处理记录。
  group: 事故处理
  description: 根据事故现场情况，确定事故类型（抛锚/碰撞等），调用lookup_accident_level_standard确定等级，lookup_accident_handling_time_rule确定时限，执行处理措施（牵拉/起吊等），生成AccidentHandlingRecord。
  depends_on:
  - lookup_accident_level_standard
  - lookup_accident_handling_time_rule
  writes_to:
  - AccidentHandlingRecord
  params:
  - name: event_id
    type: str
    description: 关联的突发事件ID
    default: null
  - name: accident_type
    type: str
    description: 事故类型，如'碰撞'
    default: null
  - name: handling_method
    type: str
    description: 处理措施，如'拖运'
    default: null
  - name: handling_duration
    type: str
    description: 处理耗时
    default: null
  - name: accident_level
    type: str
    description: 事故等级，如'II级'
    default: null
  involves_objects:
  - AccidentHandlingRecord
  - AccidentType
  source: '文档: 9.3 事故应急处理'
- name: generate_event_report
  function_type: business
  summary: 生成灾情信息报告，汇总事件进展、处置情况，生成首报/续报/终报。
  group: 信息报告
  description: 根据EmergencyEvent、FacilityAssessment、ClearancePlan、ResourceDispatch等记录，汇总信息，生成EventReport记录。
  depends_on:
  - get_emergency_event
  - assess_facility
  - generate_clearance_plan
  - dispatch_resources
  writes_to:
  - EventReport
  params:
  - name: event_id
    type: str
    description: 关联的突发事件ID
    default: null
  - name: report_type
    type: str
    description: 报告类型，如'首报'
    default: null
  - name: report_content
    type: str
    description: 报告内容要素，如'时间, 地点, 采取措施'
    default: null
  involves_objects:
  - EventReport
  - EmergencyEvent
  source: '文档: 5.3 信息上报'
- name: record_monitoring
  function_type: business
  summary: 记录监测巡查数据，包括监测项目、数值及风险预警。
  group: 监测巡查
  description: 在抢通过程中，对隧道或边坡进行监测，记录监测项目（拱顶下沉/位移等）、监测手段及预警等级，生成MonitoringRecord。
  depends_on:
  - inspect_facility
  writes_to:
  - MonitoringRecord
  params:
  - name: facility_id
    type: str
    description: 关联的设施ID
    default: null
  - name: monitoring_item
    type: str
    description: 监测项目，如'拱顶下沉'
    default: null
  - name: monitoring_method
    type: str
    description: 监测手段，如'仪器监测'
    default: null
  - name: warning_level
    type: str
    description: 风险预警等级
    default: null
  involves_objects:
  - MonitoringRecord
  source: '文档: 8.5.2 监测与巡查'
