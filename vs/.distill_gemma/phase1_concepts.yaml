objects:
- name: RoadSegment
  category: entity
  summary: 公路路段实体，包含桩号、等级、坐标等基础信息，是灾情定位和抢通作业的基本单元。
  source: 公路交通应急处置技术规范.md 1.0.2, 4.7.1
  reasoning: A类：领域实体。Agent 需要通过桩号或坐标查询具体路段信息，以判断灾情位置和道路属性。
- name: Bridge
  category: entity
  summary: 桥梁设施实体，包含结构形式、跨径、材质、支座类型等详细信息，用于评估桥梁受损情况。
  source: 公路交通应急处置技术规范.md 7.1, 附录1
  reasoning: A类：领域实体。Agent 需要查询桥梁的具体结构参数以进行应急调查和评估。
- name: Tunnel
  category: entity
  summary: 隧道设施实体，包含洞口位置、衬砌结构、通风设施、长度等基础信息。
  source: 公路交通应急处置技术规范.md 8.2, 8.2.2
  reasoning: A类：领域实体。Agent 需要查询隧道基础资料以开展应急调查和评估。
- name: EmergencyDepot
  category: entity
  summary: 应急物资储备点，存储各类应急装备和物资，支持按坐标搜索和库存查询。
  source: 公路交通应急处置技术规范.md 10.3.6, 附录4-1
  reasoning: A类：领域实体。Agent 需要查询最近的储备点以调度物资。
- name: RescueTeam
  category: entity
  summary: 应急救援队伍，包含人员资质、装备配置、当前位置等信息。
  source: 公路交通应急处置技术规范.md 3.0.3, 10.6.1
  reasoning: A类：领域实体。Agent 需要查询可用救援队伍以进行调度。
- name: EquipmentStock
  category: entity
  summary: 应急装备库存记录，关联储备点和具体装备类型（如挖掘机、起重机等）。
  source: 公路交通应急处置技术规范.md 10.2, 附录4-2~4-14
  reasoning: A类：领域实体。Agent 需要查询特定装备的可用性和位置。
- name: MaterialStock
  category: entity
  summary: 应急物资库存记录，关联储备点和具体物资类型（如融雪剂、编织袋等）。
  source: 公路交通应急处置技术规范.md 10.3, 表10.3.2
  reasoning: A类：领域实体。Agent 需要查询特定物资的库存数量。
- name: EventLevelStandard
  category: rule
  summary: 公路交通突发事件分级标准，根据影响范围、抢修时间、伤亡人数等条件映射到 I~IV 级。
  source: 公路交通应急处置技术规范.md 5.2, 表5.2.1
  reasoning: B类：业务规则。Agent 需要根据灾情数据查表确定事件级别，从而触发相应响应流程。
- name: RoadDamageGradeStandard
  category: rule
  summary: 路基路面受损程度分级标准，根据损毁特征映射到 I/II/III 级，并给出通行建议（正常/限制/禁止）。
  source: 公路交通应急处置技术规范.md 6.2, 表6.2-1~6.2-3
  reasoning: B类：业务规则。Agent 需要根据现场调查数据查表确定受损等级和通行状态。
- name: BridgeDamageGradeStandard
  category: rule
  summary: 桥涵受损程度分级标准，分为整体稳定性、承载能力、通行能力三个维度，映射到 I/II/III 级。
  source: 公路交通应急处置技术规范.md 7.2, 表7.2-1~7.2-3
  reasoning: B类：业务规则。Agent 需要根据桥梁调查数据查表确定损伤等级和通行建议。
- name: TunnelImportanceLevel
  category: rule
  summary: 隧道重要等级分级表，根据道路等级和年日均交通量映射到一级/二级/三级。
  source: 公路交通应急处置技术规范.md 8.3.2, 表8.3-1
  reasoning: B类：业务规则。Agent 需要查表确定隧道的重要程度，作为抢通目标决策依据。
- name: SecondaryDisasterRiskStandard
  category: rule
  summary: 次生灾害风险等级标准，包含发生可能性概率表和损失程度表，用于计算风险等级。
  source: 公路交通应急处置技术规范.md 8.3.3~8.3.5, 表8.3-2~8.3-5
  reasoning: B类：业务规则。Agent 需要查表评估次生灾害风险，影响抢通难度和目标制定。
- name: TunnelClearanceDifficultyMatrix
  category: rule
  summary: 隧道抢通难度矩阵，根据抢通时长评级和次生灾害风险等级映射到高/中/低难度。
  source: 公路交通应急处置技术规范.md 8.3.7, 表8.3-7
  reasoning: B类：业务规则。Agent 需要查表确定抢通难度，进而决定抢通目标。
- name: TunnelClearanceTargetMatrix
  category: rule
  summary: 隧道抢通目标矩阵，根据抢通难度和隧道重要等级映射到 I/II/III 级抢通目标。
  source: 公路交通应急处置技术规范.md 8.4.1, 表8.4-1
  reasoning: B类：业务规则。Agent 需要查表确定最终的抢通目标（禁止通行/限制通行/基本通行）。
- name: ClearanceTechniqueRule
  category: rule
  summary: 抢通技术选用规则，根据设施类型（路基/桥梁/隧道）和灾损类型（沉陷/坍塌/火灾等）映射到推荐技术措施。
  source: 公路交通应急处置技术规范.md 6.4, 7.3, 8.5
  reasoning: B类：业务规则。Agent 需要根据灾情类型查表推荐具体的抢通技术方案。
- name: TrafficControlRule
  category: rule
  summary: 交通管制措施规则，根据受损等级或抢通目标映射到具体的管制措施（如半幅通行、限速、封闭等）。
  source: 公路交通应急处置技术规范.md 6.3, 7.3.3
  reasoning: B类：业务规则。Agent 需要根据评估结果查表确定应采取的交通管制措施。
- name: AccidentLevelStandard
  category: rule
  summary: 道路交通事故等级标准，根据伤亡人数、经济损失、交通影响映射到 I~IV 级。
  source: 公路交通应急处置技术规范.md 9.2.3, 表9.2.3
  reasoning: B类：业务规则。Agent 需要根据事故数据查表确定事故等级和处理需求。
- name: AccidentHandlingTimeRule
  category: rule
  summary: 事故应急处理时限规则，根据事故等级映射到预计处理时长和终止条件。
  source: 公路交通应急处置技术规范.md 9.2.5, 表9.2.5
  reasoning: B类：业务规则。Agent 需要查表确定事故处理的预期时间和完成标准。
- name: EquipmentSelectionRule
  category: rule
  summary: 应急装备选型规则，根据作业场景、环境条件、灾害类型映射到推荐的装备类型和配置。
  source: 公路交通应急处置技术规范.md 10.2, 附录4
  reasoning: B类：业务规则。Agent 需要根据任务需求查表推荐合适的应急装备。
- name: MaterialAllocationRule
  category: rule
  summary: 应急物资分配规则，根据灾害类型（冰雪/水灾/火灾等）映射到所需的物资清单。
  source: 公路交通应急处置技术规范.md 10.3.2, 表10.3.2
  reasoning: B类：业务规则。Agent 需要根据灾害类型查表确定需要调度的物资种类。
- name: FacilityInspection
  category: process
  summary: 设施应急调查记录，记录调查时间、人员、受损部位、损毁等级、照片编号等。
  source: 公路交通应急处置技术规范.md 6.1, 7.1, 8.2, 附录1
  reasoning: C类：业务过程。Agent 需要写入调查记录，作为后续评估和抢通方案的依据。
- name: FacilityAssessment
  category: process
  summary: 设施应急评估记录，记录评估结论（正常/限制/禁止通行）、风险等级、抢通建议等。
  source: 公路交通应急处置技术规范.md 6.2, 7.2, 8.3
  reasoning: C类：业务过程。Agent 需要写入评估结果，驱动后续决策流程。
- name: ClearancePlan
  category: process
  summary: 抢通方案记录，包含方案类型、技术措施、资源需求、状态（候选/执行/完成）等。
  source: 公路交通应急处置技术规范.md 6.4, 7.3, 8.5
  reasoning: C类：业务过程。Agent 需要创建和管理抢通方案，跟踪执行状态。
- name: ResourceDispatch
  category: process
  summary: 资源调度单，记录调度的队伍、装备、物资、出发时间、预计到达时间等。
  source: 公路交通应急处置技术规范.md 5.5, 10.3.7
  reasoning: C类：业务过程。Agent 需要记录资源调度指令，跟踪资源到位情况。
- name: TrafficControl
  category: process
  summary: 交通管制执行记录，记录管制措施、实施时间、解除时间、执行人员等。
  source: 公路交通应急处置技术规范.md 6.3, 7.3.3
  reasoning: C类：业务过程。Agent 需要记录管制措施的实施情况，确保合规和可追溯。
- name: AccidentHandlingRecord
  category: process
  summary: 事故处理记录，记录事故类型、处理措施、耗时、人员装备使用情况等。
  source: 公路交通应急处置技术规范.md 9.3
  reasoning: C类：业务过程。Agent 需要记录事故处理全过程，用于事后评估和总结。
- name: EventReport
  category: process
  summary: 灾情信息报告，包含首报、续报、终报，记录事件进展、处置情况、影响范围等。
  source: 公路交通应急处置技术规范.md 5.3, 5.4
  reasoning: C类：业务过程。Agent 需要生成和更新灾情报告，向上级汇报和协调资源。
- name: MonitoringRecord
  category: process
  summary: 监测巡查记录，记录监测时间、项目（沉降/收敛/位移等）、数值、风险预警等。
  source: 公路交通应急处置技术规范.md 6.4.1, 8.5.2
  reasoning: C类：业务过程。Agent 需要记录监测数据，用于判断灾害发展趋势和抢通安全性。
maybe_attributes:
- name: DamageLevel
  reason: 损伤等级（I/II/III）是设施受损状态的属性，通常作为 FacilityInspection 或 FacilityAssessment 的结果字段，而非独立实体。
  suggested_parent: FacilityInspection
- name: PassabilityStatus
  reason: 通行状态（正常/限制/禁止）是评估结论的属性，依附于评估记录或设施当前状态。
  suggested_parent: FacilityAssessment
- name: EventLevel
  reason: 事件级别（I~IV）是突发事件的属性，由 EventLevelStandard 规则计算得出，存储在事件对象中。
  suggested_parent: DisasterEvent
- name: ClearanceTarget
  reason: 抢通目标（I/II/III级）是抢通方案的属性，由 TunnelClearanceTargetMatrix 规则计算得出。
  suggested_parent: ClearancePlan
- name: AccidentType
  reason: 事故类型（碰撞/翻车/坠车等）是事故事件的属性，用于分类和选择处理流程。
  suggested_parent: AccidentEvent
- name: EquipmentType
  reason: 装备类型（挖掘机/起重机等）是装备实体的分类属性，或作为 EquipmentStock 的字段。
  suggested_parent: EquipmentStock
- name: MaterialType
  reason: 物资类型（融雪剂/编织袋等）是物资实体的分类属性，或作为 MaterialStock 的字段。
  suggested_parent: MaterialStock
