name: highway_emergency
description: 公路交通应急处置。基于《公路交通应急处置技术规范》(JTG征求意见稿)。距离单位km，时间单位h。

objects:
  # ============================================================
  # A类 - 公路基础设施（外部接口数据，不入库）
  # ============================================================

  RoadSegment:
    summary: "路段(公路基本单元，按桩号搜)"
    description: 路段。外部接口数据，请用 get_road_segment 查询，不要用 query
    properties:
      segment_id: {type: str, required: true, description: "路段编号"}
      road_name: {type: str, description: "公路名称，如G318"}
      road_grade: {type: str, description: "公路等级: 高速/一级/二级/三级/四级"}
      start_stake: {type: str, description: "起始桩号，如K120+000"}
      end_stake: {type: str, description: "终止桩号，如K135+000"}
      lane_count: {type: int, description: "车道数"}
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      length_km: {type: float, description: "长度(km)"}

  Bridge:
    summary: "桥梁(含桥涵，按bridge_id查)"
    description: 桥梁。外部接口数据，请用 get_bridge_status 查询
    properties:
      bridge_id: {type: str, required: true, description: "桥梁编号"}
      name: {type: str, description: "桥梁名称"}
      segment_id: {type: str, description: "所属路段编号"}
      center_stake: {type: str, description: "中心桩号"}
      span_m: {type: float, description: "主跨跨径(m)"}
      total_length_m: {type: float, description: "全长(m)"}
      width_m: {type: float, description: "桥面宽度(m)"}
      structure_type: {type: str, description: "结构型式: 简支梁/连续梁/拱桥/缆索桥/桁架桥/斜拉桥"}
      material_type: {type: str, description: "材质: 钢筋混凝土/预应力混凝土/钢结构/圬工"}
      lane_count: {type: int, description: "车道数"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}

  Tunnel:
    summary: "隧道(按tunnel_id查)"
    description: 隧道。外部接口数据，请用 get_tunnel_status 查询
    properties:
      tunnel_id: {type: str, required: true, description: "隧道编号"}
      name: {type: str, description: "隧道名称"}
      segment_id: {type: str, description: "所属路段编号"}
      length_m: {type: float, description: "长度(m)"}
      width_m: {type: float, description: "净宽(m)"}
      height_m: {type: float, description: "净高(m)"}
      tunnel_type: {type: str, description: "类型: 山岭隧道/水下隧道"}
      layout: {type: str, description: "布置: 单洞/双洞"}
      ventilation_type: {type: str, description: "通风方式"}
      has_cross_passage: {type: int, description: "有横通道: 1=是 0=否"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}

  # ============================================================
  # A类 - 应急资源（外部接口数据，不入库）
  # ============================================================

  EmergencyDepot:
    summary: "应急物资储备点(按坐标搜)"
    description: 应急物资储备点。外部接口数据，请用 get_depots_in_range 查询
    properties:
      depot_id: {type: str, required: true, description: "储备点编号"}
      name: {type: str, description: "名称"}
      level: {type: str, description: "级别: 国家/省级/市级/县级/养护队"}
      storage_mode: {type: str, description: "储备方式: 实物储备/协议储备/生产能力储备"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      province: {type: str, description: "所在省份"}

  RescueTeam:
    summary: "应急队伍(按坐标搜)"
    description: 应急队伍。外部接口数据，请用 get_rescue_teams_in_range 查询
    properties:
      team_id: {type: str, required: true, description: "队伍编号"}
      name: {type: str, description: "队伍名称"}
      team_type: {type: str, description: "类型: 专业/兼职/社会"}
      capacity_person: {type: int, description: "人数"}
      specialty: {type: str, description: "专长: 路基/桥涵/隧道/事故清障/综合"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      available: {type: int, description: "是否可用: 1=是 0=否"}

  EquipmentStock:
    summary: "装备库存(储备点→装备清单)"
    description: 储备点装备库存。外部接口数据，请用 get_equipment_by_depot 查询
    properties:
      stock_id: {type: str, required: true, description: "库存编号"}
      depot_id: {type: str, description: "储备点编号"}
      category: {type: str, description: "大类: 通用/专用"}
      sub_category: {type: str, description: "小类: 土方装备/破碎装备/桩工装备/混凝土装备/起重吊装装备/运输装备/生存保障装备/侦测装备/路基路面装备/桥涵装备/隧道装备/事故处置装备/冰雪沙水火装备"}
      name: {type: str, description: "装备名称"}
      quantity: {type: int, description: "数量"}
      weight_grade: {type: str, description: "重量等级: 微型(<1t)/轻型(1-12t)/中型(12-30t)/重型(>30t)"}
      deploy_mode: {type: str, description: "部署方式: 人力携行/自行运输/陆地运输/空中运输"}
      intelligence_level: {type: str, description: "智能化等级: 非智能/可遥控/环境感知/自适应操控"}

  MaterialStock:
    summary: "物资库存(储备点→物资清单)"
    description: 储备点物资库存。外部接口数据，请用 get_material_by_depot 查询
    properties:
      stock_id: {type: str, required: true, description: "库存编号"}
      depot_id: {type: str, description: "储备点编号"}
      name: {type: str, description: "物资名称"}
      quantity: {type: int, description: "数量"}
      unit: {type: str, description: "单位"}
      applicable_disasters: {type: str, description: "适用灾害类型(逗号分隔): 交通事故/冰雪/风沙/水灾/火灾/地震地质"}

  # ============================================================
  # B类 - 业务规则对象（稳定配置，落库可 query）
  # ============================================================

  DamageGradeStandard:
    summary: "损伤分级标准(设施类型+等级→通行建议)"
    description: |
      公路基础设施损伤分级标准(规范6.2/7.2/8.2章)。可用 lookup_damage_grade 查询。
      路基路面: 路基本体/边坡/支挡结构三项，取最大等级(6.2.5)。
      桥涵: 整体稳定性/承载能力/通行能力三项，取最大等级(7.2.5)。
      隧道: 洞口/洞门/衬砌/路面/吊顶预埋件，取最大等级(8.2.5)。
    properties:
      facility_type: {type: str, required: true, description: "设施类型: 路基本体/边坡/支挡结构/桥涵整体稳定/桥涵承载力/桥涵通行能力/隧道洞口/隧道洞门/隧道衬砌/隧道路面/隧道吊顶预埋件"}
      damage_grade: {type: str, required: true, description: "损伤等级: I/II/III"}
      damage_degree: {type: str, description: "损伤程度: 轻微破坏/中度破坏/严重破坏或毁坏"}
      description: {type: str, description: "损伤状况描述"}
      hazard: {type: str, description: "危险性: 不影响正常使用/行车不便/车辆无法通行"}
      access_decision: {type: str, description: "通行建议: 正常通行/限制通行/禁止通行"}

  EventLevelStandard:
    summary: "突发事件分级标准(I~IV级，5.2章)"
    description: 公路交通突发事件分级标准。可用 lookup_event_level 查询
    properties:
      level: {type: str, required: true, description: "级别: I/II/III/IV"}
      level_name: {type: str, description: "名称: 重大/较大/一般/轻微"}
      description: {type: str, description: "事件严重度描述"}
      duration_threshold_hours: {type: int, description: "预计处置时间门槛(小时)"}
      response_department: {type: str, description: "负责部门"}

  ClearanceTechniqueRule:
    summary: "抢通技术选用规则(设施+灾损→技术，6.4/7.3/8.5章)"
    description: 抢通技术选用规则。可用 lookup_clearance_technique 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      facility_type: {type: str, description: "设施类型: 路基路面/桥涵/隧道"}
      damage_type: {type: str, description: "灾损类型: 沉陷/坍塌/水毁/滑坡阻塞/崩塌落石/泥石流/冰雪/沙害/桥涵垮塌/桥涵受损/洞口掩埋/衬砌受损/涌水突泥/有毒气体泄漏/火灾爆炸"}
      applicable_condition: {type: str, description: "适用条件"}
      technique_name: {type: str, description: "技术名称"}
      technique_desc: {type: str, description: "技术说明"}
      required_equipment: {type: str, description: "所需装备(逗号分隔)"}
      required_material: {type: str, description: "所需物资(逗号分隔)"}

  TrafficControlRule:
    summary: "交通管制措施规则(损伤等级→管制，6.3章)"
    description: 交通管制措施规则。可用 lookup_traffic_control 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      damage_grade: {type: str, description: "损伤等级: I/II/III"}
      facility_type: {type: str, description: "设施类型"}
      control_measure: {type: str, description: "管制措施: 正常通行/半幅通行/单车道居中/限速限载/分时控制/禁止通行"}
      description: {type: str, description: "措施说明"}

  TunnelImportanceLevel:
    summary: "隧道重要等级(道路等级+交通量→等级，8.3章)"
    description: 隧道重要等级分级表。可用 lookup_tunnel_importance 查询
    properties:
      road_grade: {type: str, required: true, description: "道路等级: 高速及一级/二级/三级/四级"}
      aadt_range: {type: str, required: true, description: "年日均交通量范围(pcu/d/ln): ≥10001/5001~10000/≤5000"}
      importance_level: {type: str, description: "重要等级: 一级/二级/三级"}

  TunnelDifficultyMatrix:
    summary: "隧道抢通难度矩阵(时长+风险→难度，8.3章)"
    description: 隧道抢通难度等级矩阵
    properties:
      duration_grade: {type: str, required: true, description: "抢通时长评级: A(不可接受)/B(勉强)/C(基本满足)/D(很短)"}
      risk_level: {type: str, required: true, description: "次生事故风险等级: I/II/III/IV"}
      difficulty: {type: str, description: "难度: 高难度/中等难度/低难度"}

  TunnelTargetMatrix:
    summary: "隧道抢通目标矩阵(难度+重要等级→目标，8.4章)"
    description: 隧道抢通目标等级矩阵
    properties:
      difficulty: {type: str, required: true, description: "抢通难度: 高难度/中等难度/低难度"}
      importance_level: {type: str, required: true, description: "隧道重要等级: 一级/二级/三级"}
      target_grade: {type: str, description: "抢通目标等级: I(禁止通行改道)/II(限制性通行，摩托车通行)/III(保证抢险车辆通行)"}
      min_width_m: {type: float, description: "最小通行宽度(m): II级2.3/III级1.5"}
      min_height_m: {type: float, description: "最小通行高度(m): II级2.5/III级2.0"}

  SecondaryDisasterRiskRule:
    summary: "次生事故风险等级(概率×损失→等级，8.3章)"
    description: 次生事故风险等级评定规则。概率和损失程度的矩阵
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      probability: {type: str, description: "发生概率: 不可能的/罕见的/偶尔的/可能的/频繁的"}
      loss_level: {type: str, description: "损失程度: 可忽略的/需考虑的/严重的/非常严重的/灾难性的"}
      risk_level: {type: str, description: "风险等级: I(极高)/II(可降低)/III(可容忍边缘)/IV(可容忍)"}

  BridgeTypeSelection:
    summary: "便桥选型参考(场景+跨径→桥型，附录3)"
    description: 便桥选型参考表。可用 lookup_bridge_type 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      scenario: {type: str, description: "应用场景: 跨越小型河川(<10m)/小型河川(10-15m)/中小型河川(15-30m)/中型河川(30-50m)/中大型河川(50-200m)"}
      obstacle_width_range: {type: str, description: "障碍宽度范围(m)"}
      bridge_type: {type: str, description: "便桥类型: 机械化桥/装配式钢桥/舟桥/应急轻便桥/索道桥"}
      capacity_desc: {type: str, description: "通行保障能力"}
      setup_time: {type: str, description: "架设时效"}
      notes: {type: str, description: "其他参考因素"}

  ResponseLevelRule:
    summary: "响应级别规则(事件级别→响应要求，5.3/5.4章)"
    description: 应急响应级别规则
    properties:
      event_level: {type: str, required: true, description: "事件级别: I/II/III/IV"}
      response_level: {type: str, description: "响应级别"}
      responsible_org: {type: str, description: "负责机构: 交通运输部/省级/市级/县级"}
      report_time_hours: {type: int, description: "信息上报时限(小时)，2小时内"}
      time_limit_hours: {type: int, description: "处理时限(小时)"}
      termination_condition: {type: str, description: "终止条件"}

  AccidentTypeRule:
    summary: "交通事故类型分类(9.2.2章)"
    description: 道路交通事故按应急处理方式分为8大类
    properties:
      accident_type: {type: str, required: true, description: "事故类型: 抛锚/碰撞/碾压/翻车/坠车/落水/烧毁/货物散落"}
      cause: {type: str, description: "事故致因"}
      scene_feature: {type: str, description: "现场特征"}
      handling_method: {type: str, description: "处理方式: 牵拉/起吊/扶正/拖运/撑涨破拆/消防/侦检"}

  AccidentLevelStandard:
    summary: "交通事故等级分级(9.2.3章)"
    description: 道路交通事故规模分为4个等级
    properties:
      level: {type: str, required: true, description: "等级: I(特大)/II(重大)/III(较大)/IV(一般)"}
      complexity: {type: str, description: "复杂程度"}
      traffic_impact: {type: str, description: "交通影响描述"}
      casualty_threshold: {type: str, description: "人员伤亡门槛"}
      economic_loss_threshold: {type: str, description: "经济损失门槛"}
      handling_time_hours: {type: str, description: "处理时限: I级≥12h/II级6-12h/III级3-6h/IV级≤3h"}
      responsible_org: {type: str, description: "负责机构"}

  EquipmentConfigRule:
    summary: "装备配置参考(10.2章)"
    description: 应急处置装备配置参考。按作业类型和环境条件选型
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      equipment_category: {type: str, description: "装备大类: 通用/专用"}
      equipment_type: {type: str, description: "装备类型"}
      work_type: {type: str, description: "作业类型: 挖/装载/推土/破碎/凿钻/浇筑/压路/平地/起吊/运输等"}
      applicable_scenario: {type: str, description: "适用场景"}
      deploy_mode: {type: str, description: "部署方式"}
      weight_grade: {type: str, description: "重量等级"}
      env_condition: {type: str, description: "适用环境: 全地形/高海拔/低承载/山地陡坡/高低温/常规地形"}
      capacity_desc: {type: str, description: "作业能力描述"}

  MaterialConfigRule:
    summary: "物资配置参考(10.3章)"
    description: 应急物资按灾害类型配置参考
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      material_name: {type: str, description: "物资名称"}
      material_category: {type: str, description: "物资类别: 处置物资/生存保障/人员防护"}
      applicable_disasters: {type: str, description: "适用灾害类型(逗号分隔)"}

  ReconTechniqueRule:
    summary: "应急侦测技术选用规则(4章)"
    description: 不同设施类型和灾害的侦测手段选用规则
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      facility_type: {type: str, description: "设施类型: 路基路面/桥涵/隧道/事故现场"}
      damage_scenario: {type: str, description: "灾害场景"}
      recon_method: {type: str, description: "侦测方法: 卫星遥感/航空摄影/无人机/现场人工估测/便携仪器/智能机器人"}
      recon_equipment: {type: str, description: "侦测装备"}
      applicable_condition: {type: str, description: "适用条件"}

  # ============================================================
  # C类 - 业务过程对象（智能体写入产物）
  # ============================================================

  DisasterEvent:
    summary: "自然灾害事件(地震/暴雨/泥石流/滑坡等)"
    description: |
      自然灾害导致的公路交通突发事件。涉及设施损伤，需要 inspect_facility 检查评估。
    properties:
      event_id: {type: str, required: true, description: "事件编号"}
      disaster_type: {type: str, description: "灾害类型: 地震/暴雨/泥石流/滑坡/崩塌/冰雪/洪水/火灾/风沙/雪崩"}
      event_level: {type: str, description: "事件级别: I/II/III/IV"}
      event_time: {type: str, description: "发生时间"}
      location_desc: {type: str, description: "位置描述"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)"}
      response_level: {type: str, description: "响应级别"}
      status: {type: str, description: "状态: 进行中/已终止"}

  AccidentEvent:
    summary: "交通事故事件(9章)"
    description: |
      交通事故导致的公路交通突发事件。不涉及设施损伤检查(不适用 inspect_facility)。
      事故类型按处理方式分为: 抛锚/碰撞/碾压/翻车/坠车/落水/烧毁/货物散落。
    properties:
      event_id: {type: str, required: true, description: "事件编号"}
      accident_type: {type: str, description: "事故类型: 抛锚/碰撞/碾压/翻车/坠车/落水/烧毁/货物散落"}
      event_level: {type: str, description: "事件级别: I/II/III/IV"}
      event_time: {type: str, description: "发生时间"}
      location_desc: {type: str, description: "位置描述"}
      road_type: {type: str, description: "事发道路类型: 隧道/桥梁/山区道路/一般路段"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)"}
      vehicle_type: {type: str, description: "涉事车辆类型"}
      vehicle_count: {type: int, description: "涉事车辆数量"}
      cargo_type: {type: str, description: "货物类型(如有危化品须标注)"}
      is_hazmat: {type: int, description: "是否涉及危化品: 1=是 0=否"}
      casualty_info: {type: str, description: "人员伤亡情况"}
      response_level: {type: str, description: "响应级别"}
      status: {type: str, description: "状态: 进行中/已终止"}

  FacilityInspection:
    summary: "设施现场检查(检查评估记录)"
    description: |
      设施现场检查记录。inspect_facility 产出。
      generate_clearance_plans、set_traffic_control、assess_event_level 以本记录为输入。
    properties:
      inspection_id: {type: str, required: true, description: "检查编号"}
      event_id: {type: str, description: "关联事件编号"}
      facility_type: {type: str, description: "设施类型: 路段/桥梁/隧道"}
      facility_id: {type: str, description: "设施编号"}
      facility_name: {type: str, description: "设施名称"}
      damage_summary: {type: str, description: "损伤概况"}
      detail_items: {type: str, description: "分项评估(JSON): 各检查项的损伤等级"}
      overall_damage_grade: {type: str, description: "综合损伤等级: I/II/III"}
      access_recommendation: {type: str, description: "通行建议: 正常通行/限制通行/禁止通行"}
      secondary_risk: {type: str, description: "次生灾害风险评估"}
      inspection_time: {type: str, description: "检查时间"}

  ClearancePlan:
    summary: "抢通方案(候选/执行/完成)"
    description: |
      抢通方案。generate_clearance_plans 产出，score_plans 评分。
      dispatch_resources 和 evaluate_traffic 以本记录为输入。
    properties:
      plan_id: {type: str, required: true, description: "方案编号"}
      event_id: {type: str, description: "关联事件编号"}
      plan_level: {type: str, description: "方案层级: 总体/线路/设施"}
      facility_id: {type: str, description: "关联设施编号"}
      facility_name: {type: str, description: "设施名称"}
      damage_type: {type: str, description: "灾损类型"}
      technique_name: {type: str, description: "抢通技术"}
      technique_desc: {type: str, description: "技术说明"}
      estimated_duration_hours: {type: float, description: "预估工期(小时)"}
      required_equipment: {type: str, description: "所需装备"}
      required_material: {type: str, description: "所需物资"}
      timeliness_score: {type: float, description: "时效性评分(0-100)"}
      safety_score: {type: float, description: "安全性评分(0-100)"}
      economy_score: {type: float, description: "经济性评分(0-100)"}
      total_score: {type: float, description: "综合评分: 时效40%+安全30%+经济30%"}
      status: {type: str, description: "状态: candidate/executing/completed/dropped"}

  ResourceDispatch:
    summary: "资源调度单(队伍/装备/物资)"
    description: 资源调度记录。dispatch_resources 产出
    properties:
      dispatch_id: {type: str, required: true, description: "调度编号"}
      event_id: {type: str, description: "关联事件编号"}
      plan_id: {type: str, description: "关联方案编号"}
      resource_type: {type: str, description: "资源类型: 队伍/装备/物资"}
      resource_name: {type: str, description: "资源名称"}
      quantity: {type: int, description: "数量"}
      source_depot_id: {type: str, description: "来源储备点编号"}
      source_name: {type: str, description: "来源名称"}
      distance_km: {type: float, description: "运距(km)"}
      transport_mode: {type: str, description: "运输方式: 人力携行/自行运输/陆地运输/空中运输"}
      estimated_arrival_hours: {type: float, description: "预计到达时间(h)"}
      status: {type: str, description: "状态: pending/in_transit/arrived/completed"}

  TrafficControl:
    summary: "交通管制措施(执行记录)"
    description: 交通管制措施记录。set_traffic_control 产出
    properties:
      control_id: {type: str, required: true, description: "管制编号"}
      event_id: {type: str, description: "关联事件编号"}
      facility_id: {type: str, description: "设施编号"}
      facility_name: {type: str, description: "设施名称"}
      control_type: {type: str, description: "管制类型: 半幅通行/单车道居中/限速限载/分时控制/封闭"}
      speed_limit_kmh: {type: int, description: "限速(km/h)，0表示不限"}
      weight_limit_t: {type: int, description: "限重(t)，0表示不限"}
      info_release_channel: {type: str, description: "信息发布渠道: 广播/电视/电台/信息牌"}
      status: {type: str, description: "状态: active/lifted"}
      message: {type: str, description: "管制说明"}

  TrafficEvaluation:
    summary: "通行评估(抢通后评估)"
    description: 应急通行评估记录。evaluate_traffic 产出
    properties:
      eval_id: {type: str, required: true, description: "评估编号"}
      event_id: {type: str, description: "关联事件编号"}
      plan_id: {type: str, description: "关联方案编号"}
      facility_id: {type: str, description: "设施编号"}
      eval_result: {type: str, description: "评估结果: 开放应急通行/继续抢通"}
      restrictions: {type: str, description: "通行限制条件"}
      message: {type: str, description: "评估说明"}

  DetourPlan:
    summary: "绕行方案(无法抢通时的替代)"
    description: |
      绕行方案。generate_detour 产出。
      当 FacilityInspection 为III级且无可行抢通技术时，或预估工期超出响应时限时使用。
    properties:
      detour_id: {type: str, required: true, description: "绕行方案编号"}
      event_id: {type: str, description: "关联事件编号"}
      detour_route_name: {type: str, description: "绕行线路名称"}
      start_point: {type: str, description: "起点"}
      end_point: {type: str, description: "终点"}
      length_km: {type: float, description: "绕行距离(km)"}
      road_condition: {type: str, description: "路况"}
      estimated_delay_min: {type: int, description: "预估增加耗时(分钟)"}
      message: {type: str, description: "方案说明"}

  EventReport:
    summary: "灾情信息报告(首报/续报/终报，5.3章)"
    description: |
      灾情信息报告。generate_event_report 产出。
      信息报送要素(5.3.3): 时间地点信息来源、起因性质过程后果影响范围趋势、已采取措施和下一步计划、联系人。
      应在2小时内上报(5.3.2)。
    properties:
      report_id: {type: str, required: true, description: "报告编号"}
      event_id: {type: str, description: "关联事件编号"}
      report_type: {type: str, description: "报告类型: 首报/续报/终报"}
      event_summary: {type: str, description: "事件概况(时间、地点、信息来源)"}
      cause_and_nature: {type: str, description: "事件起因和性质"}
      damage_scope: {type: str, description: "已造成后果及影响范围"}
      trend_analysis: {type: str, description: "事件发展趋势"}
      measures_taken: {type: str, description: "已采取措施"}
      next_plan: {type: str, description: "下一步工作计划"}
      report_org: {type: str, description: "信息报送单位"}
      contact_person: {type: str, description: "联系人和联系电话"}
      report_time: {type: str, description: "报告时间"}

  AccidentHandlingRecord:
    summary: "事故处理记录(9.3章)"
    description: 交通事故应急处理记录。handle_accident 产出
    properties:
      record_id: {type: str, required: true, description: "记录编号"}
      event_id: {type: str, description: "关联事故事件编号"}
      handling_steps: {type: str, description: "处理步骤(JSON数组)"}
      equipment_used: {type: str, description: "使用装备(逗号分隔)"}
      warning_zone_setup: {type: str, description: "警戒区域设置描述"}
      handling_result: {type: str, description: "处理结果"}
      road_cleared: {type: int, description: "路面是否清理: 1=是 0=否"}
      completion_time: {type: str, description: "完成时间"}

  SecondaryDisasterMonitoring:
    summary: "次生灾害监测与预警记录(6.4.1章)"
    description: 抢通过程中的次生灾害监测记录
    properties:
      monitoring_id: {type: str, required: true, description: "监测编号"}
      event_id: {type: str, description: "关联事件编号"}
      facility_id: {type: str, description: "监测设施编号"}
      monitoring_type: {type: str, description: "监测类型: 人工巡查/地面位移观测/深部位移观测/无人机观测"}
      frequency: {type: str, description: "监测频次: 每天1-2次/持续跟踪/余震降雨后即时"}
      warning_status: {type: str, description: "预警状态: 正常/预警/紧急撤离"}
      findings: {type: str, description: "监测发现"}

links:
  disaster_has_inspections:
    source: DisasterEvent
    target: FacilityInspection
    join: {source_key: event_id, target_key: event_id}
    description: 灾害事件下的设施检查记录

  disaster_has_plans:
    source: DisasterEvent
    target: ClearancePlan
    join: {source_key: event_id, target_key: event_id}
    description: 灾害事件下的抢通方案

  plan_has_dispatches:
    source: ClearancePlan
    target: ResourceDispatch
    join: {source_key: plan_id, target_key: plan_id}
    description: 方案下的资源调度记录

  disaster_has_controls:
    source: DisasterEvent
    target: TrafficControl
    join: {source_key: event_id, target_key: event_id}
    description: 灾害事件下的交通管制

  accident_has_controls:
    source: AccidentEvent
    target: TrafficControl
    join: {source_key: event_id, target_key: event_id}
    description: 事故事件下的交通管制

  disaster_has_evaluations:
    source: DisasterEvent
    target: TrafficEvaluation
    join: {source_key: event_id, target_key: event_id}
    description: 灾害事件下的通行评估

  disaster_has_detours:
    source: DisasterEvent
    target: DetourPlan
    join: {source_key: event_id, target_key: event_id}
    description: 灾害事件下的绕行方案

  disaster_has_reports:
    source: DisasterEvent
    target: EventReport
    join: {source_key: event_id, target_key: event_id}
    description: 灾害事件下的灾情报告

  accident_has_reports:
    source: AccidentEvent
    target: EventReport
    join: {source_key: event_id, target_key: event_id}
    description: 事故事件下的事故报告

  accident_has_handling:
    source: AccidentEvent
    target: AccidentHandlingRecord
    join: {source_key: event_id, target_key: event_id}
    description: 事故事件下的处理记录

  disaster_has_monitoring:
    source: DisasterEvent
    target: SecondaryDisasterMonitoring
    join: {source_key: event_id, target_key: event_id}
    description: 灾害事件下的次生灾害监测

  depot_has_equipment:
    source: EmergencyDepot
    target: EquipmentStock
    join: {source_key: depot_id, target_key: depot_id}
    description: 储备点下的装备库存

  depot_has_material:
    source: EmergencyDepot
    target: MaterialStock
    join: {source_key: depot_id, target_key: depot_id}
    description: 储备点下的物资库存

functions:
  # ----- A. 接口包装函数 -----
  get_event:
    summary: "查询突发事件详情"
    description: "查询事件详情。同时搜索 DisasterEvent 和 AccidentEvent"
    group: "事件查询"
    params:
      event_id: {type: str, description: "事件编号"}

  get_road_segment:
    summary: "查询路段信息"
    description: "查询路段基本信息"
    group: "基础设施查询"
    params:
      segment_id: {type: str, description: "路段编号"}

  get_bridge_status:
    summary: "查询桥梁信息"
    description: "查询桥梁基本信息和结构参数"
    group: "基础设施查询"
    params:
      bridge_id: {type: str, description: "桥梁编号"}

  get_tunnel_status:
    summary: "查询隧道信息"
    description: "查询隧道基本信息和结构参数"
    group: "基础设施查询"
    params:
      tunnel_id: {type: str, description: "隧道编号"}

  get_affected_facilities:
    summary: "查询事件影响范围内设施"
    description: "根据事件位置，搜索半径内的路段、桥梁、隧道"
    group: "事件查询"
    params:
      event_id: {type: str, description: "事件编号"}
      radius_km: {type: float, default: 5, description: "搜索半径(km)"}

  get_depots_in_range:
    summary: "范围内应急物资储备点"
    description: "空间查询：以(lng,lat)为中心搜索储备点"
    group: "资源搜索"
    params:
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      radius_km: {type: float, default: 100, description: "搜索半径(km)"}

  get_rescue_teams_in_range:
    summary: "范围内应急队伍"
    description: "空间查询：以(lng,lat)为中心搜索可用应急队伍"
    group: "资源搜索"
    params:
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      radius_km: {type: float, default: 100, description: "搜索半径(km)"}

  get_equipment_by_depot:
    summary: "查询储备点装备清单"
    description: "查询某储备点的装备库存，可按大类过滤"
    group: "资源搜索"
    params:
      depot_id: {type: str, description: "储备点编号"}
      category: {type: str, default: "", description: "大类过滤: 通用/专用(可选)"}

  get_material_by_depot:
    summary: "查询储备点物资清单"
    description: "查询某储备点的物资库存，可按灾害类型过滤"
    group: "资源搜索"
    params:
      depot_id: {type: str, description: "储备点编号"}
      disaster_type: {type: str, default: "", description: "灾害类型过滤(可选)"}

  # ----- B. 业务规则查询 -----
  lookup_damage_grade:
    summary: "查损伤分级标准"
    description: "根据设施类型和损伤等级查通行建议"
    group: "规则查询"
    params:
      facility_type: {type: str, description: "设施类型"}
      damage_grade: {type: str, default: "", description: "损伤等级(可选)"}

  lookup_event_level:
    summary: "查事件分级标准"
    description: "查询突发事件分级标准"
    group: "规则查询"
    params:
      level: {type: str, default: "", description: "级别(可选)"}

  lookup_clearance_technique:
    summary: "查抢通技术选用规则"
    description: "根据设施类型和灾损类型查可用的抢通技术"
    group: "规则查询"
    params:
      facility_type: {type: str, description: "设施类型: 路基路面/桥涵/隧道"}
      damage_type: {type: str, default: "", description: "灾损类型(可选)"}

  lookup_traffic_control:
    summary: "查交通管制措施"
    description: "根据损伤等级查推荐的交通管制措施"
    group: "规则查询"
    params:
      damage_grade: {type: str, description: "损伤等级: I/II/III"}
      facility_type: {type: str, default: "", description: "设施类型(可选)"}

  lookup_tunnel_importance:
    summary: "查隧道重要等级"
    description: "根据道路等级和交通量查隧道重要等级"
    group: "规则查询"
    params:
      road_grade: {type: str, description: "道路等级"}
      aadt_range: {type: str, default: "", description: "交通量范围(可选)"}

  lookup_tunnel_target:
    summary: "查隧道抢通目标"
    description: "根据抢通难度和隧道重要等级查抢通目标"
    group: "规则查询"
    params:
      difficulty: {type: str, description: "抢通难度: 高难度/中等难度/低难度"}
      importance_level: {type: str, description: "重要等级: 一级/二级/三级"}

  lookup_bridge_type:
    summary: "查便桥选型"
    description: "根据场景查推荐的便桥类型"
    group: "规则查询"
    params:
      scenario: {type: str, default: "", description: "应用场景(可选)"}
      obstacle_width_range: {type: str, default: "", description: "障碍宽度范围(可选)"}

  lookup_response_level:
    summary: "查响应级别要求"
    description: "根据事件级别查响应要求"
    group: "规则查询"
    params:
      event_level: {type: str, description: "事件级别: I/II/III/IV"}

  lookup_accident_type:
    summary: "查事故类型及处理方式"
    description: "根据事故类型查处理方式和装备需求"
    group: "规则查询"
    params:
      accident_type: {type: str, default: "", description: "事故类型(可选)"}

  lookup_accident_level:
    summary: "查事故等级分级"
    description: "查询事故等级标准和处理时限"
    group: "规则查询"
    params:
      level: {type: str, default: "", description: "等级(可选)"}

  lookup_secondary_risk:
    summary: "查次生事故风险等级"
    description: "根据概率和损失程度查风险等级"
    group: "规则查询"
    params:
      probability: {type: str, default: "", description: "发生概率(可选)"}
      loss_level: {type: str, default: "", description: "损失程度(可选)"}

  lookup_recon_technique:
    summary: "查应急侦测技术"
    description: "根据设施类型和灾害场景查推荐的侦测手段"
    group: "规则查询"
    params:
      facility_type: {type: str, description: "设施类型"}
      damage_scenario: {type: str, default: "", description: "灾害场景(可选)"}

  lookup_equipment_config:
    summary: "查装备配置参考"
    description: "根据作业类型或场景查推荐装备配置"
    group: "规则查询"
    params:
      work_type: {type: str, default: "", description: "作业类型(可选)"}
      applicable_scenario: {type: str, default: "", description: "适用场景(可选)"}

  lookup_material_config:
    summary: "查物资配置参考"
    description: "根据灾害类型查推荐物资配置"
    group: "规则查询"
    params:
      disaster_type: {type: str, default: "", description: "灾害类型(可选)"}
      material_category: {type: str, default: "", description: "物资类别(可选)"}

  # ----- C. 业务编排函数 -----
  inspect_facility:
    summary: "对设施进行检查评估"
    description: "对受损设施进行现场检查评估，确定损伤等级和通行建议，写入 FacilityInspection"
    group: "检查与评估"
    hint: >
      根据设施类型采用不同检查标准(规范6.2/7.2/8.2):
      路段: 路基本体+边坡+支挡结构三项取最大等级(6.2.5)
      桥梁: 整体稳定性+承载能力+通行能力三项取最大等级(7.2.5)
      隧道: 洞口边仰坡+洞门+衬砌+路面+吊顶预埋件取最大等级
      损伤等级I→正常通行，II→限制通行，III→禁止通行
      任何一项评定为III级者，整体为III级禁止通行(7.2.5条1)
    params:
      event_id: {type: str, description: "事件编号"}
      facility_type: {type: str, description: "设施类型: 路段/桥梁/隧道"}
      facility_id: {type: str, description: "设施编号"}

  assess_event_level:
    summary: "综合评估事件等级"
    description: "根据 FacilityInspection 记录综合评估事件等级，更新事件的 event_level 和 response_level"
    group: "检查与评估"
    hint: >
      评估依据(5.2章):
      I级: 国家干线阻断24h以上，影响周边省份
      II级: 国家干线12h以上或省级干线24h以上
      III级: 国家干线6h以上或省级12h以上
      IV级: 其他由公路所属企事业单位处置
    params:
      event_id: {type: str, description: "事件编号"}

  generate_clearance_plans:
    summary: "生成候选抢通方案"
    description: "根据 FacilityInspection 和 ClearanceTechniqueRule，为需抢通的设施生成候选 ClearancePlan(status=candidate)"
    group: "方案与评估"
    hint: >
      输入: event_id对应的FacilityInspection(损伤等级II或III)
      输出: ClearancePlan候选记录
      原则(7.3.1/8.1.6): 因地制宜就地取材、结构简单施工方便、时效性优先
      短期抢通兼顾长期修复(7.3.1条2)
      可降低标准临时使用或管制通行(7.3.1条3)
    params:
      event_id: {type: str, description: "事件编号"}

  score_plans:
    summary: "三维加权评分(时效40+安全30+经济30)"
    description: "对 ClearancePlan(status=candidate) 进行三维评分"
    group: "方案与评估"
    hint: >
      时效性(40%): 预估工期越短分越高
      安全性(30%): 次生灾害风险越低分越高，有监测手段加分
      经济性(30%): 所需资源越少、运距越短分越高
      抢通方案选择原则(8.1.6): 快速高效、因地制宜、技术可行、经济合理
    params:
      event_id: {type: str, description: "事件编号"}

  dispatch_resources:
    summary: "为方案调度资源(队伍+装备+物资)"
    description: "根据 ClearancePlan 的 required_equipment/required_material，搜索最近储备点生成 ResourceDispatch 调度单"
    group: "资源调度"
    hint: >
      调度原则(5.5/10.3.7):
      先近后远: 从最近储备点调配
      满足急需: 优先满足最紧急需求
      先主后次: 优先调配关键装备
      通专相济: 通用+专用组合调配(10.2.2)
      物资使用补偿: I级无偿使用国家储备，其他"谁使用谁补偿"(10.3.6)
    params:
      event_id: {type: str, description: "事件编号"}
      plan_id: {type: str, description: "方案编号"}

  set_traffic_control:
    summary: "设置交通管制措施"
    description: "根据 FacilityInspection 的损伤等级设置 TrafficControl"
    group: "管制与通行"
    hint: >
      管制措施(6.3章):
      限制通行路段: 派专人定点指挥，控制车辆交通(6.3.3)
      可采取措施: 半幅通行/单车道居中/限速限载/分时控制(6.3.4)
      应通过广播电视电台发布管制信息(6.4.5)
      桥涵特殊: 限制通行期间再次突发险情应立即禁止通行(7.3.3条3)
    params:
      event_id: {type: str, description: "事件编号"}
      facility_id: {type: str, description: "设施编号"}
      control_type: {type: str, description: "管制类型"}

  evaluate_traffic:
    summary: "抢通完成后通行评估"
    description: "评估 ClearancePlan 是否达到应急通行目标，写入 TrafficEvaluation"
    group: "管制与通行"
    params:
      event_id: {type: str, description: "事件编号"}
      plan_id: {type: str, description: "方案编号"}

  generate_detour:
    summary: "生成绕行方案(无法抢通时)"
    description: "当无法抢通或工期过长时生成 DetourPlan"
    group: "救济"
    hint: >
      适用条件:
      - FacilityInspection为III级且无可行抢通技术
      - ClearancePlan预估工期超出ResponseLevelRule.time_limit_hours
      - 隧道抢通目标为I级(禁止通行改道)(8.4.1)
      - 隧道周边有便于实施的替代方案(8.4.5)
      选线原则(6.4.5条6): 充分利用原有道路，减少桥涵数，避免高填深挖
    params:
      event_id: {type: str, description: "事件编号"}
      facility_id: {type: str, description: "设施编号"}

  handle_accident:
    summary: "执行事故应急处理(9.3章)"
    description: "根据事故类型执行清障救援处理流程，写入 AccidentHandlingRecord"
    group: "事故处理"
    hint: >
      处理流程(9.3.4):
      抛锚→判断抢修难度→拖运或现场抢修
      碰撞→拖运
      碾压→起吊分离+拖运
      翻车→扶正+拖运
      坠车→起吊/牵拉+扶正+拖运
      落水→探明位置+起吊/牵拉+扶正+拖运
      烧毁→起吊+背载托运
      货物散落→起吊/收集+按事故形态处理
      准备工作(9.3.2): 切断电源、电动车特殊处理、固定车辆
      安全要求(9.3.6): 隧道内翻车先牵拉至隧道外、高压线安全距离
    params:
      event_id: {type: str, description: "事故事件编号"}

  generate_event_report:
    summary: "生成灾情信息报告"
    description: "生成灾情/事故信息报告(EventReport)，符合5.3章信息报送要求"
    group: "信息报送"
    hint: >
      信息报送要素(5.3.3):
      1. 事件时间、地点及信息来源
      2. 起因、性质、基本过程、已造成后果及影响范围和发展趋势
      3. 已采取措施、下一步工作计划
      4. 报送单位、联系人和联系电话
      上报时限: 2小时内(5.3.2)
      上报流程: 逐级上报，IV级以上报县区，III级以上报市级，II级以上报省级，I级报交通运输部(5.3.1)
    params:
      event_id: {type: str, description: "事件编号"}
      report_type: {type: str, default: "首报", description: "报告类型: 首报/续报/终报"}

  monitor_secondary_disaster:
    summary: "次生灾害监测(6.4.1章)"
    description: "在抢通过程中开展次生灾害监测，写入 SecondaryDisasterMonitoring"
    group: "监测预警"
    hint: >
      监测要求(6.4.1):
      通视条件差或高位崩塌落石路段: 专人持续跟踪观察+人工预警
      临时便道便桥: 采取交通管制，单向间隔管制通行
      大型滑坡山体变形: 开展地灾区域及受损结构物巡查监测
      巡查频次: 一般每天1-2次，余震降雨后应及时巡查
      地灾体持续变形: 安排专人持续跟踪
      严重威胁: 布设地面位移观测点，必要时深部位移观测
      地形陡峻: 可采用无人机适时观测
    params:
      event_id: {type: str, description: "事件编号"}
      facility_id: {type: str, description: "设施编号"}
