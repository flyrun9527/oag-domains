RoadSegment:
  summary: 路段/路基路面(公路基本单元，按桩号/坐标搜)
  category: entity
  source: 公路交通应急处置技术规范.md 6.1/6.2
  properties:
    road_class:
      type: str
      required: false
      description: 公路等级，枚举值：高速公路、一级公路、二级公路、三级公路、四级公路
    road_name:
      type: str
      required: false
      description: 路段名称
    start_pile_number:
      type: str
      required: false
      description: 起始桩号
    end_pile_number:
      type: str
      required: false
      description: 终止桩号
    direction:
      type: str
      required: false
      description: 运行方向
    road_width:
      type: float
      required: false
      description: 道路宽度(m)
    surface_condition:
      type: str
      required: false
      description: 路面状况
Bridge:
  summary: 桥梁(含桥涵，按bridge_id查，含结构形式/跨径/材质)
  category: entity
  source: 公路交通应急处置技术规范.md 7.1/7.2
  properties:
    structure_type:
      type: str
      required: false
      description: 结构形式，枚举值：梁桥、拱桥、缆索桥、斜拉桥等
    span_length:
      type: float
      required: false
      description: 跨径(m)
    material:
      type: str
      required: false
      description: 材质，枚举值：混凝土、钢结构、组合结构
    bearing_type:
      type: str
      required: false
      description: 支座类型
    pier_count:
      type: int
      required: false
      description: 桥墩数量
    abutment_type:
      type: str
      required: false
      description: 桥台类型
    foundation_type:
      type: str
      required: false
      description: 基础类型
    expansion_joint_type:
      type: str
      required: false
      description: 伸缩缝类型
Tunnel:
  summary: 隧道(按tunnel_id查，含通风/消防/结构参数)
  category: entity
  source: 公路交通应急处置技术规范.md 8.2/8.3
  properties:
    ventilation_type:
      type: str
      required: false
      description: 通风方式
    fire_protection_level:
      type: str
      required: false
      description: 消防等级
    cross_passage_type:
      type: str
      required: false
      description: 横通道类型，枚举值：人行横通道、车行横通道
    lining_type:
      type: str
      required: false
      description: 衬砌类型
    ceiling_type:
      type: str
      required: false
      description: 吊顶类型
    embedded_parts_status:
      type: str
      required: false
      description: 预埋件状况
EmergencyDepot:
  summary: 应急储备中心(国家/省/市/县四级，按坐标搜)
  category: entity
  source: 公路交通应急处置技术规范.md 10.3.6
  properties:
    administrative_level:
      type: str
      required: false
      description: 行政级别，枚举值：国家、省、市、县
RescueTeam:
  summary: 救援队伍(按坐标/专业能力搜，含编制与装备配置)
  category: entity
  source: 公路交通应急处置技术规范.md 5.5/10.2
  properties:
    team_type:
      type: str
      required: false
      description: 队伍类型，如：应急救援施工队伍、应急救援专家、社会应急救援力量
    specialty:
      type: str
      required: false
      description: 专业能力/专长，如：隧道抢通、桥涵抢通、事故处理、危化品处置
    personnel_count:
      type: int
      required: false
      description: 编制人数
    equipment_list:
      type: str
      required: false
      description: 配备的应急装备清单，如：土方装备、破碎装备、侦测装备等
    location:
      type: str
      required: false
      description: 驻扎或部署位置
EquipmentStock:
  summary: 装备库存(储备点→装备清单，含重量/环境/智能化等级)
  category: entity
  source: 公路交通应急处置技术规范.md 10.2.4~10.2.21
  properties:
    equipment_category:
      type: str
      required: false
      description: 装备类别，枚举值：通用装备、专用装备
    function_type:
      type: str
      required: false
      description: 作业功能，枚举值：土方、破碎、桩工、混凝土、起重吊装、运输、生存保障、应急侦测、路基路面抢通、桥涵抢通、隧道抢通、事故处置、冰雪沙泥水火灾害处置
    weight_class:
      type: str
      required: false
      description: 重量等级，枚举值：微型(<1t)、轻型(1-12t)、中型(12-30t)、重型(>30t)
    transport_mode:
      type: str
      required: false
      description: 运达方式，枚举值：人力携行、自行运输、陆地运输、空中运输
    environment_adaptability:
      type: str
      required: false
      description: 环境适应性，枚举值：全地形、高海拔等
MaterialStock:
  summary: 物资库存(储备点→物资清单，含适用灾害类型)
  category: entity
  source: 公路交通应急处置技术规范.md 10.3.2~10.3.4
  properties:
    material_type:
      type: str
      required: false
      description: 物资类型，枚举值：融雪材料、防滑材料、防沙材料、填充材料等
    applicable_disaster:
      type: str
      required: false
      description: 适用灾害类型，枚举值：冰雪、沙害、水毁、泥石流等
Organization:
  summary: 应急组织机构(指挥调度/管养单位，含层级与职责)
  category: entity
  source: 公路交通应急处置技术规范.md 5.1/5.3
  properties:
    org_level:
      type: str
      required: false
      description: 组织层级，枚举值：交通运输部、省级、市级、县级、企事业单位
    responsibility_scope:
      type: str
      required: false
      description: 职责范围
DisasterEvent:
  summary: 自然灾害事件(地震/滑坡/泥石流/水毁等，含发生时间地点)
  category: entity
  source: 公路交通应急处置技术规范.md 2.0.1/4.2
  properties:
    disaster_type:
      type: str
      required: false
      description: 灾害类型，枚举值：地震、滑坡、泥石流、水毁、冰雪、风沙、火灾等
    occurrence_time:
      type: str
      required: false
      description: 发生时间
    location:
      type: str
      required: false
      description: 发生地点
    impact_scope:
      type: str
      required: false
      description: 影响范围
    severity_level:
      type: str
      required: false
      description: 事件级别，枚举值：I级(特别重大)、II级(重大)、III级(较大)、IV级(一般)
    estimated_recovery_time:
      type: float
      required: false
      description: 预计抢修处置时间(小时)
AccidentEvent:
  summary: 交通事故事件(碰撞/翻车/危化品泄漏等，含报警信息)
  category: entity
  source: 公路交通应急处置技术规范.md 9.1/9.2
  properties:
    accident_type:
      type: str
      required: false
      description: 事故类型，枚举值：抛锚、碰撞、碾压、翻车、坠车、落水、烧毁、货物散落
    vehicle_type:
      type: str
      required: false
      description: 涉事车辆类型，枚举值：客车、货车、轿车、特种车等
    has_hazardous_materials:
      type: bool
      required: false
      description: 是否涉及危化品
    casualty_count:
      type: int
      required: false
      description: 伤亡人数
    economic_loss:
      type: float
      required: false
      description: 直接经济损失(万元)
    accident_level:
      type: str
      required: false
      description: 事故等级，枚举值：I级(特大)、II级(重大)、III级(较大)、IV级(一般)
    response_level:
      type: str
      required: false
      description: 响应等级，枚举值：I级、II级、III级、IV级
WeatherData:
  summary: 气象水文数据(实时/预报，含温度/降水/风速/能见度)
  category: entity
  source: 公路交通应急处置技术规范.md 4.2/10.6.2
  properties:
    temperature:
      type: float
      required: false
      description: 温度(℃)
    weather_condition:
      type: str
      required: false
      description: 天气状况，枚举值：雾、冰雪、霜、雨、大风等
    visibility:
      type: float
      required: false
      description: 能见度(m)
    wind_speed:
      type: float
      required: false
      description: 风速(m/s)
    wind_level:
      type: int
      required: false
      description: 风力等级
GeologicalData:
  summary: 地质地形资料(岩土类型/坡度/水文地质/勘察文件)
  category: entity
  source: 公路交通应急处置技术规范.md 4.2/6.1
  properties:
    geomorphology_type:
      type: str
      required: false
      description: 地貌类型
    rock_soil_type:
      type: str
      required: false
      description: 岩土体类型
    geological_structure:
      type: str
      required: false
      description: 地质构造
    hydrogeology:
      type: str
      required: false
      description: 水文地质
    slope_gradient:
      type: float
      required: false
      description: 地形坡度(°)
TrafficData:
  summary: 交通运行数据(断面流量/车速/拥堵状态，按桩号查)
  category: entity
  source: 公路交通应急处置技术规范.md 10.6.2
  properties:
    traffic_volume:
      type: int
      required: false
      description: 断面流量(pcu/d)
    congestion_status:
      type: str
      required: false
      description: 拥堵状态
    average_speed:
      type: float
      required: false
      description: 平均车速(km/h)
MonitoringData:
  summary: 结构监测数据(位移/应力/气体浓度/视频图像)
  category: entity
  source: 公路交通应急处置技术规范.md 4.4~4.6/8.5.2
  properties:
    displacement_value:
      type: float
      required: false
      description: 位移值(mm)
    stress_value:
      type: float
      required: false
      description: 应力值(MPa)
    gas_concentration:
      type: float
      required: false
      description: 气体浓度(ppm或cm³/m³)
    gas_type:
      type: str
      required: false
      description: 气体类型，枚举值：一氧化碳、氯气、氮氧化物等
    monitoring_frequency:
      type: str
      required: false
      description: 监测频次
DetourRoute:
  summary: 绕行分流路线(替代交通路径，含距离/路况/承载能力)
  category: entity
  source: 公路交通应急处置技术规范.md 8.4.5
  properties:
    route_length:
      type: float
      required: false
      description: 路线长度(km)
    road_condition:
      type: str
      required: false
      description: 路况
    load_capacity:
      type: float
      required: false
      description: 承载能力(t)
    max_gradient:
      type: float
      required: false
      description: 最大纵坡(%)
    min_curve_radius:
      type: float
      required: false
      description: 最小平曲线半径(m)
EventLevelStandard:
  summary: 突发事件分级标准(公路等级+中断时间+影响范围→I-IV级)
  category: rule
  source: 公路交通应急处置技术规范.md 5.2.1
  properties:
    highway_class:
      type: str
      required: true
      description: 公路等级，枚举值：国家干线、省级干线
    interruption_time:
      type: float
      required: true
      description: 中断时间(小时)
    impact_scope:
      type: str
      required: true
      description: 影响范围，枚举值：周边省份、省内、市内
    event_level:
      type: str
      required: false
      description: 事件级别，枚举值：I级、II级、III级、IV级
ReportTimeRule:
  summary: 信息上报时效规则(事件级别→上报时限/流程/要素)
  category: rule
  source: 公路交通应急处置技术规范.md 5.3.2
  properties:
    event_level:
      type: str
      required: true
      description: 事件级别，枚举值：I级、II级、III级、IV级
    report_time_limit:
      type: float
      required: false
      description: 上报时限(小时)
    report_method:
      type: str
      required: false
      description: 上报方式，枚举值：电话、书面、电子邮件
CommandDispatchRule:
  summary: 指挥调度程序(事件级别→指挥层级/联动机制/求援条件)
  category: rule
  source: 公路交通应急处置技术规范.md 5.1.3/5.4
  properties:
    event_level:
      type: str
      required: true
      description: 事件级别，枚举值：I级、II级、III级、IV级
    command_level:
      type: str
      required: false
      description: 指挥层级，枚举值：交通运输部、省级、市级、县级
    linkage_mechanism:
      type: str
      required: false
      description: 联动机制
ResourceDispatchRule:
  summary: 资源调度原则(事件类型/位置→调度路径/优先级/补偿原则)
  category: rule
  source: 公路交通应急处置技术规范.md 5.5/10.3.7
  properties:
    event_type:
      type: str
      required: true
      description: 事件类型
    location:
      type: str
      required: true
      description: 位置
    dispatch_path:
      type: str
      required: false
      description: 调度路径
    priority:
      type: str
      required: false
      description: 优先级
ResponseTerminationRule:
  summary: 响应终止条件(处置状态/清理完成度→终止/扩大应急判定)
  category: rule
  source: 公路交通应急处置技术规范.md 5.4.5/9.2.5
  properties:
    disposal_status:
      type: str
      required: true
      description: 处置状态
    cleanup_completion:
      type: str
      required: true
      description: 清理完成度
    termination_decision:
      type: str
      required: false
      description: 终止/扩大应急判定
SubgradeDamageStandard:
  summary: 路基受损分级标准(损毁特征→I-III级及正常/限制/禁止通行)
  category: rule
  source: 公路交通应急处置技术规范.md 6.2.2
  properties:
    damage_feature:
      type: str
      required: true
      description: 损毁特征
    damage_grade:
      type: str
      required: false
      description: 损毁等级，枚举值：I级、II级、III级
    access_decision:
      type: str
      required: false
      description: 通行建议，枚举值：正常通行、限制通行、禁止通行
SlopeDamageStandard:
  summary: 边坡受损分级标准(滑坡/崩塌特征→I-III级及通行建议)
  category: rule
  source: 公路交通应急处置技术规范.md 6.2.3
  properties:
    damage_feature:
      type: str
      required: true
      description: 损毁特征
    damage_grade:
      type: str
      required: false
      description: 损毁等级，枚举值：I级、II级、III级
    access_decision:
      type: str
      required: false
      description: 通行建议，枚举值：正常通行、限制通行、禁止通行
RetainingStructureDamageStandard:
  summary: 支挡结构受损分级标准(挡墙/护坡特征→I-III级及通行建议)
  category: rule
  source: 公路交通应急处置技术规范.md 6.2.4
  properties:
    damage_feature:
      type: str
      required: true
      description: 损毁特征
    damage_grade:
      type: str
      required: false
      description: 损毁等级，枚举值：I级、II级、III级
    access_decision:
      type: str
      required: false
      description: 通行建议，枚举值：正常通行、限制通行、禁止通行
SubgradeClearanceRule:
  summary: 路基抢通技术选用(灾害类型+地质条件→回填/拓宽/注浆/改线)
  category: rule
  source: 公路交通应急处置技术规范.md 6.4.2~6.4.7
  properties:
    disaster_type:
      type: str
      required: true
      description: 灾害类型
    geological_condition:
      type: str
      required: true
      description: 地质条件
    clearance_technique:
      type: str
      required: false
      description: 抢通技术，枚举值：机械回填、路基拓宽、注浆加固、全部填土、拦边填土、换填泡沫轻质土、凹形竖曲线通过法、改移线位法
TrafficControlRule:
  summary: 交通管制措施规则(损伤等级→半幅/限速/分时/封闭管制)
  category: rule
  source: 公路交通应急处置技术规范.md 6.3/7.3.3
  properties:
    damage_grade:
      type: str
      required: true
      description: 损伤等级，枚举值：I级、II级、III级
    control_measure:
      type: str
      required: false
      description: 管制措施，枚举值：半幅通行、单车道居中通行、限速、限载、分时控制、封闭
SecondaryDisasterWarningRule:
  summary: 次生灾害预警要求(变形趋势/巡查频次→预警级别与处置)
  category: rule
  source: 公路交通应急处置技术规范.md 6.4.1
  properties:
    deformation_trend:
      type: str
      required: true
      description: 变形趋势
    inspection_frequency:
      type: str
      required: true
      description: 巡查频次
    warning_level:
      type: str
      required: false
      description: 预警级别
BridgeInspectionRule:
  summary: 桥涵调查重点规则(灾害类型→调查部位/内容/设备清单)
  category: rule
  source: 公路交通应急处置技术规范.md 7.1.4
  properties:
    disaster_type:
      type: str
      required: true
      description: 灾害类型
    inspection_part:
      type: str
      required: false
      description: 调查部位，枚举值：上部结构、下部结构、基础、桥面、伸缩缝、引道
    inspection_content:
      type: str
      required: false
      description: 调查内容
    equipment_list:
      type: str
      required: false
      description: 设备清单
BridgeStabilityStandard:
  summary: 桥涵稳定性评估标准(整体偏位/坍塌→I-III级及通行结论)
  category: rule
  source: 公路交通应急处置技术规范.md 7.2-1/附录2-1
  properties:
    damage_feature:
      type: str
      required: true
      description: 损毁特征
    damage_grade:
      type: str
      required: false
      description: 损伤等级，枚举值：I级、II级、III级
    access_decision:
      type: str
      required: false
      description: 通行结论，枚举值：正常通行、限制通行、禁止通行
BridgeCapacityStandard:
  summary: 桥涵承载力评估标准(构件开裂/变形→I-III级及通行结论)
  category: rule
  source: 公路交通应急处置技术规范.md 7.2-2/附录2-2~2-6
  properties:
    damage_feature:
      type: str
      required: true
      description: 损毁特征
    damage_grade:
      type: str
      required: false
      description: 损伤等级，枚举值：I级、II级、III级
    access_decision:
      type: str
      required: false
      description: 通行结论，枚举值：正常通行、限制通行、禁止通行
BridgePassabilityStandard:
  summary: 桥涵通行能力评估标准(桥面高差/障碍→I-III级及通行结论)
  category: rule
  source: 公路交通应急处置技术规范.md 7.2-3/附录2-7~2-9
  properties:
    damage_feature:
      type: str
      required: true
      description: 损毁特征
    damage_grade:
      type: str
      required: false
      description: 损伤等级，枚举值：I级、II级、III级
    access_decision:
      type: str
      required: false
      description: 通行结论，枚举值：正常通行、限制通行、禁止通行
BridgeClearanceRule:
