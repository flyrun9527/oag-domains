      description: 灾害严重程度/结构破损评定等级，如：1~3类(好至中等)、4类(严重破损)、5类(危险状态)
    clearance_target_level:
      type: str
      required: false
      description: 抢通目标等级，枚举：I级(禁止通行并改道)、II级(限制性通行)、III级(基本抢险车辆通行)
    clearance_difficulty_level:
      type: str
      required: false
      description: 抢通难度等级，枚举：高难度、中等难度、低难度
    tunnel_importance_level:
      type: str
      required: false
      description: 隧道重要等级，枚举：一级、二级、三级
    secondary_risk_level:
      type: str
      required: false
      description: 次生事故风险等级，枚举：I级(极高)、II级(可采取措施)、III级(可容忍边缘)、IV级(可容忍)
    estimated_duration_rating:
      type: str
      required: false
      description: 抢通时长评级，枚举：A(太长不可接受)、B(较长勉强接受)、C(基本满足)、D(很短)
    min_passage_width:
      type: float
      required: false
      description: 最小通行限界宽度(m)，如：1.5m(III级), 2.3m(II级)
    min_passage_height:
      type: float
      required: false
      description: 最小通行限界高度(m)，如：2m(III级), 2.5m(II级)
    gas_leak_detected:
      type: bool
      required: false
      description: 是否检测到有毒有害气体泄漏
    fire_detected:
      type: bool
      required: false
      description: 是否发生火灾
    status:
      type: str
      required: false
      description: 当前状态，如：应急侦测、应急调查、应急评估、应急实施、抢通完成、永久修复中
AccidentInspectionRecord:
  summary: 事故调查记录(现场警戒/危化品探测/环境评估/防护配置)
  category: process
  source: 公路交通应急处置技术规范.md 9.1
  properties:
    accident_type:
      type: str
      required: false
      description: 事故类型，枚举：抛锚、碰撞、碾压、翻车、坠车、落水、烧毁、货物散落
    vehicle_type:
      type: str
      required: false
      description: 涉事车辆类型，如：客车、普通货车、危化品运输车
    hazardous_material_type:
      type: str
      required: false
      description: 危化品类型，如：爆炸性、易燃性、毒害性、放射性、腐蚀性
    casualty_count:
      type: int
      required: false
      description: 人员伤亡数量
    vehicle_damage_count:
      type: int
      required: false
      description: 车辆损失数量
    weather_condition:
      type: str
      required: false
      description: 气象状况，如：雾、冰雪、霜、雨、大风
    road_blockage_status:
      type: str
      required: false
      description: 道路阻隔情况
    alert_zone_set:
      type: bool
      required: false
      description: 是否已设置警戒区域
    status:
      type: str
      required: false
      description: 调查状态，如：现场警戒、危化品探测、环境评估、防护配置
AccidentLevelRecord:
  summary: 事故等级评估(伤亡/损失/响应等级/处理需求判定)
  category: process
  source: 公路交通应急处置技术规范.md 9.2
  properties:
    accident_level:
      type: str
      required: false
      description: 事故等级，枚举：I级(特大)、II级(重大)、III级(较大)、IV级(一般)
    response_level:
      type: str
      required: false
      description: 响应等级，枚举：I级、II级、III级、IV级
    handling_difficulty:
      type: str
      required: false
      description: 处理难度，枚举：难度极大、难度较大、难度不大、容易
    coordination_level:
      type: str
      required: false
      description: 需求等级/协调层级，如：交通运输部组织协调、省级、市级、县级
    estimated_handling_time:
      type: str
      required: false
      description: 应急处理时限，如：>=12小时、6~12小时、3~6小时、<=3小时
    economic_loss_range:
      type: str
      required: false
      description: 直接经济损失范围，如：5000万元以上、1000-5000万元、500-1000万元、500万元以下
    status:
      type: str
      required: false
      description: 评估状态，如：伤亡统计、损失评估、响应等级判定
AccidentEquipmentDispatch:
  summary: 装备调度记录(清障/起重/破拆装备调拨/到位状态)
  category: process
  source: 公路交通应急处置技术规范.md 9.3.3
  properties:
    equipment_type:
      type: str
      required: false
      description: 装备类型，如：清障救援车、起重机、破拆工具、侦测设备
    equipment_category:
      type: str
      required: false
      description: 装备分类，枚举：通用装备、专用装备
    weight_class:
      type: str
      required: false
      description: 重量等级，枚举：微型(<1t)、轻型(1-12t)、中型(12-30t)、重型(>30t)
    deployment_method:
      type: str
      required: false
      description: 部署方式，枚举：人力携行、自行运输、陆地运输、空中运输
    arrival_status:
      type: str
      required: false
      description: 到位状态，如：已调度、运输中、已到位、作业中、已撤出
    status:
      type: str
      required: false
      description: 调度记录状态
AccidentHandlingRecord:
  summary: 事故处置作业记录(牵拉/起吊/扶正/拖运执行/现场恢复)
  category: process
  source: 公路交通应急处置技术规范.md 9.3.4~9.3.7
  properties:
    accident_type:
      type: str
      required: false
      description: 事故类型，枚举值：抛锚、碰撞、碾压、翻车、坠车、落水、烧毁、货物散落
    accident_level:
      type: str
      required: false
      description: 事故等级，枚举值：I级(特大)、II级(重大)、III级(较大)、IV级(一般)
    response_level:
      type: str
      required: false
      description: 响应等级，枚举值：I级、II级、III级、IV级
    handling_method:
      type: str
      required: false
      description: 主要处置作业方式，枚举值：牵拉、起吊、扶正、拖运、撑涨破拆、消防、侦检、现场抢修
    vehicle_type:
      type: str
      required: false
      description: 事故车辆类型，如：小型客车、中型货车、重型半挂、电动汽车等
    has_hazardous_materials:
      type: bool
      required: false
      description: 是否涉及危化品泄漏或火灾爆炸风险
    personnel_trapped:
      type: bool
      required: false
      description: 是否有人员被困
    start_time:
      type: str
      required: false
      description: 处置开始时间
    end_time:
      type: str
      required: false
      description: 处置结束时间
    duration_hours:
      type: float
      required: false
      description: 处置耗时（小时），用于对比应急处理时限标准
    status:
      type: str
      required: false
      description: 处置状态，枚举值：进行中、已完成、已终止
DetourPlanRecord:
  summary: 绕行分流方案记录(替代路线/管制措施/信息发布/状态)
  category: process
  source: 公路交通应急处置技术规范.md 8.4.5
  properties:
    control_measure_type:
      type: str
      required: false
      description: 交通管制措施类型，枚举值：半幅通行、单车道居中通行、限速限载、分时控制、封闭道路、单向间隔管制
    detour_route_description:
      type: str
      required: false
      description: 绕行路线描述或替代路线名称
    info_release_channels:
      type: str
      required: false
      description: 信息发布渠道，枚举值：广播、电视、电台、交通信息牌、APP推送
    warning_sign_distance:
      type: int
      required: false
      description: 警示标志设置距离（米），如白天150m，夜间200m
    is_traffic_resumed:
      type: bool
      required: false
      description: 交通是否已恢复
    status:
      type: str
      required: false
      description: 方案状态，枚举值：制定中、执行中、已解除
