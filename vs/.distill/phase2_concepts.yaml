objects:
- name: RoadSegment
  category: entity
  summary: 路段/路基路面(公路基本单元，按桩号/坐标搜)
  source: 公路交通应急处置技术规范.md 6.1/6.2
  reasoning: A类实体。承载路基、边坡、支挡结构等静态属性，是抢通与评估的空间载体。
  workflow_role: 应急调查与评估 / 抢通技术选用与实施
- name: Bridge
  category: entity
  summary: 桥梁(含桥涵，按bridge_id查，含结构形式/跨径/材质)
  source: 公路交通应急处置技术规范.md 7.1/7.2
  reasoning: A类实体。独立基础设施对象，存储设计参数与养护记录，不随事件改变。
  workflow_role: 桥涵应急侦测与调查 / 桥涵应急评估
- name: Tunnel
  category: entity
  summary: 隧道(按tunnel_id查，含通风/消防/结构参数)
  source: 公路交通应急处置技术规范.md 8.2/8.3
  reasoning: A类实体。独立基础设施对象，存储运营资料与结构限界。
  workflow_role: 应急疏散与侦测 / 隧道应急评估
- name: EmergencyDepot
  category: entity
  summary: 应急储备中心(国家/省/市/县四级，按坐标搜)
  source: 公路交通应急处置技术规范.md 10.3.6
  reasoning: A类实体。现实中的物资装备储备节点，具有固定位置与管辖级别。
  workflow_role: 应急资源调度
- name: RescueTeam
  category: entity
  summary: 救援队伍(按坐标/专业能力搜，含编制与装备配置)
  source: 公路交通应急处置技术规范.md 5.5/10.2
  reasoning: A类实体。客观存在的应急力量组织，属性固定。
  workflow_role: 应急资源调度
- name: EquipmentStock
  category: entity
  summary: 装备库存(储备点→装备清单，含重量/环境/智能化等级)
  source: 公路交通应急处置技术规范.md 10.2.4~10.2.21
  reasoning: A类实体。装备分类体系作为其属性，库存状态随调度变化但对象本身固定。
  workflow_role: 应急资源调度 / 装备选型与调度
- name: MaterialStock
  category: entity
  summary: 物资库存(储备点→物资清单，含适用灾害类型)
  source: 公路交通应急处置技术规范.md 10.3.2~10.3.4
  reasoning: A类实体。物资分类与储备方式作为属性，独立查询场景明确。
  workflow_role: 应急资源调度
- name: Organization
  category: entity
  summary: 应急组织机构(指挥调度/管养单位，含层级与职责)
  source: 公路交通应急处置技术规范.md 5.1/5.3
  reasoning: A类实体。现实中的行政与指挥体系，不随单次事件改变。
  workflow_role: 信息核实与上报 / 预案启动与指挥
- name: DisasterEvent
  category: entity
  summary: 自然灾害事件(地震/滑坡/泥石流/水毁等，含发生时间地点)
  source: 公路交通应急处置技术规范.md 2.0.1/4.2
  reasoning: A类实体。客观发生的灾害本体，存储类型、规模、位置等固有属性。
  workflow_role: 信息核实与上报 / 现场应急侦测
- name: AccidentEvent
  category: entity
  summary: 交通事故事件(碰撞/翻车/危化品泄漏等，含报警信息)
  source: 公路交通应急处置技术规范.md 9.1/9.2
  reasoning: A类实体。客观发生的事故本体，存储形态、车辆类型、危化品属性。
  workflow_role: 事故信息收集与现场警戒
- name: WeatherData
  category: entity
  summary: 气象水文数据(实时/预报，含温度/降水/风速/能见度)
  source: 公路交通应急处置技术规范.md 4.2/10.6.2
  reasoning: A类实体。外部环境客观数据源，Agent通过接口或定时拉取查询。
  workflow_role: 现场应急侦测 / 事故信息收集
- name: GeologicalData
  category: entity
  summary: 地质地形资料(岩土类型/坡度/水文地质/勘察文件)
  source: 公路交通应急处置技术规范.md 4.2/6.1
  reasoning: A类实体。静态基础资料，用于抢通技术选用与风险评估。
  workflow_role: 现场应急侦测 / 应急调查与评估
- name: TrafficData
  category: entity
  summary: 交通运行数据(断面流量/车速/拥堵状态，按桩号查)
  source: 公路交通应急处置技术规范.md 10.6.2
  reasoning: A类实体。路网监测客观数据，用于事件分级与分流决策。
  workflow_role: 交通管制与次生监测 / 确定抢通目标
- name: MonitoringData
  category: entity
  summary: 结构监测数据(位移/应力/气体浓度/视频图像)
  source: 公路交通应急处置技术规范.md 4.4~4.6/8.5.2
  reasoning: A类实体。传感器与巡查采集的客观数据流，不随业务记录改变。
  workflow_role: 交通管制与次生监测 / 施工监测与永久加固
- name: DetourRoute
  category: entity
  summary: 绕行分流路线(替代交通路径，含距离/路况/承载能力)
  source: 公路交通应急处置技术规范.md 8.4.5
  reasoning: A类实体。路网中客观存在的替代路径，用于抢通目标决策。
  workflow_role: 确定抢通目标
- name: EventLevelStandard
  category: rule
  summary: 突发事件分级标准(公路等级+中断时间+影响范围→I-IV级)
  source: 公路交通应急处置技术规范.md 5.2.1
  reasoning: B类规则。典型分级表，Agent通过lookup判定事件级别。
  workflow_role: 事件分级判定
- name: ReportTimeRule
  category: rule
  summary: 信息上报时效规则(事件级别→上报时限/流程/要素)
  source: 公路交通应急处置技术规范.md 5.3.2
  reasoning: B类规则。条件→结论映射，决定上报路径与时间要求。
  workflow_role: 信息核实与上报
- name: CommandDispatchRule
  category: rule
  summary: 指挥调度程序(事件级别→指挥层级/联动机制/求援条件)
  source: 公路交通应急处置技术规范.md 5.1.3/5.4
  reasoning: B类规则。流程与权限映射表，指导指挥体系启动。
  workflow_role: 预案启动与指挥
- name: ResourceDispatchRule
  category: rule
  summary: 资源调度原则(事件类型/位置→调度路径/优先级/补偿原则)
  source: 公路交通应急处置技术规范.md 5.5/10.3.7
  reasoning: B类规则。查表获取调度策略与路径优化依据。
  workflow_role: 应急资源调度
- name: ResponseTerminationRule
  category: rule
  summary: 响应终止条件(处置状态/清理完成度→终止/扩大应急判定)
  source: 公路交通应急处置技术规范.md 5.4.5/9.2.5
  reasoning: B类规则。条件→结论映射，决定业务流程终点。
  workflow_role: 处置评估与响应终止
- name: SubgradeDamageStandard
  category: rule
  summary: 路基受损分级标准(损毁特征→I-III级及正常/限制/禁止通行)
  source: 公路交通应急处置技术规范.md 6.2.2
