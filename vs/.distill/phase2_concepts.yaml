maybe_attributes:
- name: EquipmentClassification
  reason: 装备分类(通用/专用/土方/破碎/桩工等)是静态字典，随装备库存动态变化，适合作为EquipmentStock的枚举属性。
  suggested_parent: EquipmentStock
- name: MaterialType
  reason: 物资分类(融雪剂/编织袋/水泥/防护装备等)是静态字典，适合作为MaterialStock的属性，无需独立查询。
  suggested_parent: MaterialStock
- name: CommNetworkTopology
  reason: 通信网络拓扑(公网/专网/卫星/5G)是支撑工具配置，无独立业务查询场景，归为Organization或EquipmentStock属性。
  suggested_parent: Organization
- name: PowerSupplyLevel
  reason: 电力保障分级(I级/II级)是作业环境条件，随处置过程动态判定，适合作为ClearancePlan或TunnelClearanceRecord的属性。
  suggested_parent: ClearancePlan
- name: DataAccuracyRequirement
  reason: 数据保障准确度与时效要求(85%/10分钟)是系统配置参数，非业务规则表，放入函数hint或系统配置。
  suggested_parent: SystemConfig
- name: DronePayloadType
  reason: 无人机载荷类型(光学/红外/激光/气体)是装备能力描述，作为EquipmentStock或ReconReport的属性更合理。
  suggested_parent: EquipmentStock
- name: AccidentVehicleWeight
  reason: 事故车辆吨位是动态现场数据，用于装备选型计算，作为AccidentEvent或AccidentHandlingRecord的属性。
  suggested_parent: AccidentEvent
