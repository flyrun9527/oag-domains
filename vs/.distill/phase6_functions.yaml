functions:
- name: report_event_info
  function_type: business
  summary: 基于事件级别查询上报规则并生成事件上报记录
  group: 指挥调度
  description: 输入突发事件ID与组织机构ID，校验信息完整性后，调用 lookup_report_time_rule 根据事件级别获取上报时限与流程要求，最终写入
    EventReport 记录。
  depends_on: []
  writes_to:
  - EventReport
  params:
  - name: event_id
    type: str
    description: 突发事件唯一标识
    default: null
  - name: org_id
    type: str
    description: 上报组织机构ID
    default: null
  involves_objects:
  - DisasterEvent
  - Organization
  - ReportTimeRule
  - EventReport
  source: 公路交通应急处置技术规范.md 5.3
  hint: 'R1: 调用 lookup_report_time_rule，传入 DisasterEvent 的 severity_level 获取对应的 report_time_limit、report_method
    及要素要求。

    R2: 校验 DisasterEvent 与 Organization 信息完整性。

    R3: 根据获取的规则生成 EventReport 记录，report_type 默认为''首报''，report_time 为当前时间。

    副作用: 写入 EventReport 对象。'
- name: grade_event_level
  function_type: business
  summary: 判定突发事件级别并记录分级依据
  group: 指挥调度
  description: 输入事件ID、公路等级、中断时间、影响范围 → 调用 lookup_event_level_standard 匹配分级标准 → 判定I-IV级
    → 写入 EventGradingRecord
  depends_on:
  - report_event_info
  writes_to:
  - EventGradingRecord
  params:
  - name: event_id
    type: str
    description: 突发事件唯一标识
    default: null
  - name: highway_class
    type: str
    description: 公路等级
    default: null
  - name: interruption_time
    type: float
    description: 预计中断/阻塞时间(小时)
    default: null
  - name: impact_scope
    type: str
    description: 影响范围
    default: null
  involves_objects:
  - RoadSegment
  - TrafficData
  - EventLevelStandard
  - EventGradingRecord
  source: 公路交通应急处置技术规范.md 5.2
  hint: 'R1: 调用 lookup_event_level_standard 获取 EventLevelStandard 规则表。

    R2: 依据输入参数 highway_class、interruption_time、impact_scope 匹配规则，确定 event_level (I-IV级)。

    R3: 判定逻辑：优先匹配最高级别标准（如国家干线+24h+周边省份→I级）。

    副作用: 写入 EventGradingRecord 记录(determined_level, basis_data, event_id)。'
- name: activate_emergency_plan
  function_type: business
  summary: 启动应急预案并生成指挥调度记录
  group: 指挥调度
  description: 输入事件级别(event_level)与指挥机构ID(command_org_id)，查询指挥调度规则确定指挥层级与联动机制，评估处置能力并判断求援状态，最终写入预案启动记录(PlanActivationRecord)。
  depends_on:
  - grade_event_level
  writes_to:
  - PlanActivationRecord
  params:
  - name: event_id
    type: str
    description: 突发事件唯一标识
    default: null
  - name: event_level
    type: str
    description: 判定事件级别
    default: null
  - name: command_org_id
    type: str
    description: 指挥调度机构ID
    default: null
  involves_objects:
  - Organization
  - CommandDispatchRule
  - PlanActivationRecord
  source: 公路交通应急处置技术规范.md 5.4
  hint: 'R1: 调用 lookup_command_dispatch_rule，输入 event_level 和 command_org_id，获取对应的
    command_level（指挥层级）、linkage_mechanism（联动机制）及求援条件。

    R2: 依据获取的指挥层级与联动机制，结合当前事件级别评估处置能力（capability_assessment）。

    R3: 根据求援条件判断是否需要外部支援，确定 request_status（求援状态）。

    副作用: 写入 PlanActivationRecord 记录，包含 command_org、capability_assessment、request_status
    及关联的 event_id。'
- name: dispatch_emergency_resources
  function_type: business
  summary: 基于事件类型与位置调度应急资源并生成调拨单
  group: 指挥调度
  description: 输入 event_id, event_type, location, resource_types → 查询调度规则与资源库 → 优化路径与优先级
    → 写入 ResourceDispatchRecord
  depends_on:
  - activate_emergency_plan
  writes_to:
  - ResourceDispatchRecord
  params:
  - name: event_id
    type: str
    description: 突发事件唯一标识
    default: null
  - name: event_type
    type: str
    description: 事件类型
    default: null
  - name: location
    type: str
    description: 事发位置
    default: null
  - name: resource_types
    type: str
    description: 需调度资源类型(队伍/装备/物资)
    default: null
  involves_objects:
  - EmergencyDepot
  - RescueTeam
  - EquipmentStock
  - MaterialStock
  - ResourceDispatchRule
  - ResourceDispatchRecord
  source: 公路交通应急处置技术规范.md 5.5
  hint: 'R1: 调用 lookup_resource_dispatch_rule 获取基于 event_type 和 location 的调度路径、优先级及补偿原则。

    R2: 根据 resource_types 匹配资源：队伍查 RescueTeam (按 specialty/location)，装备查 EquipmentStock
    (按 function_type/transport_mode)，物资查 MaterialStock (按 applicable_disaster)。

    R3: 依据 5.5.3 条，结合资源位置与 transport_mode，以最快运输方式确定最终 dispatch_path。

    R4: 依据 10.3.6/10.3.7 条，遵循“先近后远、满足急需”原则选择 EmergencyDepot，并确定使用原则（I级无偿，其他补偿）。

    副作用: 写入 ResourceDispatchRecord (status=candidate, 包含 dispatch_path, resource_type,
    event_id)。'
- name: evaluate_and_terminate_response
  function_type: business
  summary: 评估处置状态并判定响应终止或扩大应急
  group: 指挥调度
  description: 输入处置状态、清理完成度及现场监测数据，调用 lookup_response_termination_rule 判定终止条件，生成总结评估并写入
    ResponseTerminationRecord。
  depends_on:
  - dispatch_emergency_resources
  writes_to:
  - ResponseTerminationRecord
  params:
  - name: event_id
    type: str
    description: 突发事件唯一标识
    default: null
  - name: disposal_status
    type: str
    description: 当前处置状态
    default: null
  - name: cleanup_completion
    type: str
    description: 现场清理完成度
    default: null
  involves_objects:
  - MonitoringData
  - ResponseTerminationRule
  - ResponseTerminationRecord
  source: 公路交通应急处置技术规范.md 5.4.5
  hint: 'R1: 调用 lookup_response_termination_rule，传入 disposal_status 和 cleanup_completion，获取
    termination_decision（终止/扩大应急）。

    R2: 若判定为终止，结合 MonitoringData 生成 summary_evaluation 和 improvement_suggestions。

    副作用: 写入 ResponseTerminationRecord (event_id, termination_conditions_met, summary_evaluation,
    improvement_suggestions)。'
- name: conduct_subgrade_recon
  function_type: business
  summary: 执行路基路面应急侦测并生成报告
  group: 路基路面抢通
  description: 输入路段ID、气象水文数据、地质资料及侦测手段，依据规范4.2/4.3采集宏观遥感与现场初勘数据，汇总损毁概况与环境影响，写入 ReconReport。
  depends_on: []
  writes_to:
  - ReconReport
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: segment_id
    type: str
    description: 路段唯一标识
    default: null
  - name: recon_method
    type: str
    description: 侦测手段(卫星/无人机/现场)
    default: null
  involves_objects:
  - RoadSegment
  - WeatherData
  - GeologicalData
  - ReconReport
  source: 公路交通应急处置技术规范.md 4.4
  hint: 'R1: 依据规范4.2，结合 RoadSegment 的桩号/坐标，获取受灾区域道路、地形资料；结合 GeologicalData 获取地貌类型、岩土体类型、地质构造、水文地质等环境资料；结合
    WeatherData 获取气象监测与预报信息。

    R2: 依据规范4.3，根据 recon_method 执行宏观侦测：若为卫星遥感，侧重大范围受灾区域及大规模地质灾害体侦测；若为无人机/航空摄影，侧重局部受灾区域、特定灾害体及急难险重现场侦测，获取影像数据。

    R3: 汇总灾情信息（损毁类型、规模、空间分布特性、影响程度）及基础资料。

    副作用: 写入 ReconReport 对象，记录 recon_method、data_summary 及关联 event_id。'
- name: assess_subgrade_damage
  function_type: business
  summary: 评估路基/边坡/支挡损毁等级并生成通行建议
  group: 路基路面抢通
  description: 输入损毁特征和评估范围，查询对应构件的受损分级标准，按最差构件原则确定整体损毁等级(I-III级)及通行建议(正常/限制/禁止)，并写入评估记录。
  depends_on:
  - conduct_subgrade_recon
  writes_to:
  - SubgradeAssessmentRecord
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: damage_features
    type: str
    description: 损毁特征描述
    default: null
  - name: assessment_scope
    type: str
    description: 评估范围(路基本体/边坡/支挡结构)
    default: null
  involves_objects:
  - SubgradeDamageStandard
  - SlopeDamageStandard
  - RetainingStructureDamageStandard
  - SubgradeAssessmentRecord
  source: 公路交通应急处置技术规范.md 6.2
  hint: 'R1: 根据 assessment_scope 调用对应 lookup 函数获取分级标准：

    - 路基本体: lookup_subgrade_damage_standard

    - 边坡: lookup_slope_damage_standard

    - 支挡结构: lookup_retaining_structure_damage_standard

    R2: 将 damage_features 与标准中的 damage_feature 匹配，确定各构件的 damage_grade 和 access_decision。

    R3: 综合评定逻辑：若评估范围包含多项，取最差等级（III级 > II级 > I级）作为最终 damage_grade。

    R4: 通行建议映射：I级→正常通行，II级→限制通行，III级→禁止通行。

    R5: 若评定为 II级或 III级，需提出应急抢通处治和交通管制措施建议(6.2.5)。

    副作用: 写入 SubgradeAssessmentRecord (包含 damage_grade, access_suggestion, treatment_measure,
    event_id)。'
- name: implement_subgrade_clearance
  function_type: business
  summary: 基于灾害类型与地质条件匹配抢通技术并生成路基抢通方案
  group: 路基路面抢通
  description: 输入灾害类型、地质条件及关联事件ID，调用 lookup_subgrade_clearance_rule 匹配抢通技术，依据规范6.4章节生成具体施工步骤，结合物资库存校验可行性，最终写入
    ClearancePlan 对象。
  depends_on:
  - assess_subgrade_damage
  writes_to:
  - ClearancePlan
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: disaster_type
    type: str
    description: 灾害类型
    default: null
  - name: geological_condition
    type: str
    description: 现场地质条件
    default: null
  involves_objects:
  - GeologicalData
  - MaterialStock
  - SubgradeClearanceRule
  - ClearancePlan
  source: 公路交通应急处置技术规范.md 6.4
  hint: 'R1: 调用 lookup_subgrade_clearance_rule，输入 disaster_type 和 geological_condition
    匹配 SubgradeClearanceRule 获取 clearance_technique。

    R2: 根据选定的 clearance_technique 生成 construction_steps：

    - 路基沉陷(机械回填/路基拓宽/注浆加固): 遵循6.4.2原则(如回填需整平压实、拓宽需挖除上边坡、注浆需先挖除错台)。

    - 路基坍塌(全部填土/拦边填土/换填泡沫轻质土/凹形竖曲线/改移线位): 遵循6.4.3原则(如全部填土需分层压实、拦边填土基底夯实、泡沫轻质土分层浇筑<1m)。

    - 路基水毁: 遵循6.4.4原则(固基护脚、以疏为主，视情况抛石/便桥/挡墙)。

    - 滑坡/泥石流/崩塌堵塞: 遵循6.4.5/6.4.6/6.4.7原则(先加固后清理或开挖便道/改线)。

    R3: 结合 MaterialStock 确认物资可用性(如填充材料、防滑材料等)。

    副作用: 写入 ClearancePlan 记录(technology_selection=选定技术, construction_steps=生成步骤, status=candidate,
    event_id=输入ID)。'
- name: manage_traffic_control_subgrade
  function_type: business
  summary: 基于损伤等级与变形趋势实施交通管制并布设次生灾害监测
  group: 路基路面抢通
  description: 输入损伤等级(damage_grade)、变形趋势(deformation_trend)及巡查频次，通过 lookup_traffic_control_rule
    和 lookup_secondary_disaster_warning_rule 动态确定管制措施与预警级别，最终写入 TrafficControlRecord
    和 SecondaryDisasterMonitorRecord 记录。
  depends_on:
  - implement_subgrade_clearance
  writes_to:
  - TrafficControlRecord
  - SecondaryDisasterMonitorRecord
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: damage_grade
    type: str
    description: 损伤等级
    default: null
  - name: deformation_trend
    type: str
    description: 变形发展趋势
    default: null
  involves_objects:
  - TrafficData
  - MonitoringData
  - TrafficControlRule
  - SecondaryDisasterWarningRule
  - TrafficControlRecord
  - SecondaryDisasterMonitorRecord
  source: 公路交通应急处置技术规范.md 6.3, 6.4.1
  hint: 'R1: 调用 lookup_traffic_control_rule，根据 damage_grade 查询对应的 control_measure（如半幅通行、封闭等）。

    R2: 调用 lookup_secondary_disaster_warning_rule，根据 deformation_trend 和 inspection_frequency
    查询 warning_level 及处置要求。

    R3: 若 damage_grade 为 III 级或存在严重变形趋势，优先采取封闭或严格管制措施。

    副作用: 将确定的管制措施写入 TrafficControlRecord；将预警级别、巡查频次及变形数据写入 SecondaryDisasterMonitorRecord。'
- name: conduct_bridge_recon
  function_type: business
  summary: 执行桥涵应急调查并记录重点部位检查结果
  group: 桥涵抢通
  description: 输入桥梁ID、灾害类型及事件ID → 调用 lookup_bridge_inspection_rule 获取针对性调查规则 → 执行现场或遥感调查
    → 写入 BridgeInspectionRecord (含检查清单、影像、初步判定)
  depends_on: []
  writes_to:
  - BridgeInspectionRecord
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: bridge_id
    type: str
    description: 桥梁唯一标识
    default: null
  - name: disaster_type
    type: str
    description: 灾害类型
    default: null
  involves_objects:
  - Bridge
  - BridgeInspectionRule
  - BridgeInspectionRecord
  source: 公路交通应急处置技术规范.md 7.1
  hint: 'R1: 调用 lookup_bridge_inspection_rule，传入 disaster_type 获取该灾害类型下的重点调查部位(inspection_part)、调查内容(inspection_content)及设备清单(equipment_list)。

    R2: 依据 7.1.6 条，调查应以目视检测为主，借助简单便携式装备为辅；若车辆无法接近，采取徒步或轻便交通工具抵近；大范围灾害需结合遥感/航拍/无人机技术。

    R3: 调查范围应涵盖灾情超过设计预期的所有桥涵构件及引道、被交道路等安全隐患区域(7.1.4)。

    副作用: 将生成的检查清单写入 BridgeInspectionRecord.inspection_checklist，采集的影像数据写入 image_data，初步判定结果写入
    preliminary_judgment，并关联 event_id。'
- name: assess_bridge_damage
  function_type: business
  summary: 基于损毁特征评估桥涵稳定性/承载力/通行能力并判定通行结论
  group: 桥涵抢通
  description: 输入事件ID、损毁特征及评估维度，调用对应标准查询函数获取各维度损伤等级，依据‘最差构件决定整体’原则（任一III级即禁止通行）生成综合评估记录，写入
    BridgeAssessmentRecord。
  depends_on:
  - conduct_bridge_recon
  writes_to:
  - BridgeAssessmentRecord
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: damage_features
    type: str
    description: 损毁特征描述
    default: null
  - name: assessment_dimensions
    type: str
    description: 评估维度(稳定性/承载力/通行能力)
    default: null
  involves_objects:
  - MonitoringData
  - BridgeStabilityStandard
  - BridgeCapacityStandard
  - BridgePassabilityStandard
  - BridgeAssessmentRecord
  source: 公路交通应急处置技术规范.md 7.2
  hint: 'R1: 根据 assessment_dimensions 分别调用 lookup_bridge_stability_standard、lookup_bridge_capacity_standard、lookup_bridge_passability_standard，传入
    damage_features 获取各维度损伤等级(damage_grade)。

    R2: 综合判定逻辑：若任一维度评定为III级，则整体通行结论为禁止通行；若存在II级且无III级，为限制通行；全为I级为正常通行(7.2.5)。

    R3: 将各维度评级及最终通行结论写入 BridgeAssessmentRecord。'
- name: implement_bridge_clearance
  function_type: business
  summary: 制定桥涵抢通方案并记录实施步骤
  group: 桥涵抢通
  description: 输入损毁程度、地形条件、跨径及装备库存 → 调用 lookup_bridge_clearance_rule 与 lookup_temporary_bridge_rule
    综合评估 → 选定便桥/修复/加固/桥改路工艺 → 写入 BridgeClearancePlan
  depends_on:
  - assess_bridge_damage
  writes_to:
  - BridgeClearancePlan
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: damage_degree
    type: str
    description: 损毁程度
    default: null
  - name: terrain_condition
    type: str
    description: 地形条件
    default: null
  - name: span_length
    type: float
    description: 需跨越宽度(m)
    default: null
  involves_objects:
  - GeologicalData
  - EquipmentStock
  - BridgeClearanceRule
  - TemporaryBridgeRule
  - BridgeClearancePlan
  source: 公路交通应急处置技术规范.md 7.3
  hint: 'R1: 调用 lookup_bridge_clearance_rule，输入 damage_degree 和 terrain_condition，获取基础抢通技术（便道/便桥/修复/加固/桥改路）。

    R2: 若选定便桥技术，调用 lookup_temporary_bridge_rule，输入 span_length 及现场水文/承载条件，确定具体桥型（机械化桥/装配式钢桥/舟桥等）。

    R3: 综合时效性、地形地质与装备条件（EquipmentStock）选定最终方案。时效性应作为优先考虑条件(7.3.1)。

    R4: 若损毁严重无法修复，优先研究桥改路基通过可能性(7.3.4)。

    副作用: 写入 BridgeClearancePlan 记录，包含 clearance_scheme 和 implementation_record。'
- name: monitor_bridge_construction
  function_type: business
  summary: 监测桥涵施工状态并记录永久加固进度
  group: 桥涵抢通
  description: 输入应力/位移监测数据及损伤类型，调用 lookup_bridge_reinforcement_rule 获取监测阈值与加固工艺。对比实时数据与阈值，若超限则触发停止通行及加固处置，最终将监测结果、处置动作及加固进度写入
    BridgeConstructionMonitorRecord。
  depends_on:
  - implement_bridge_clearance
  writes_to:
  - BridgeConstructionMonitorRecord
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: damage_type
    type: str
    description: 损伤类型
    default: null
  - name: monitoring_data
    type: str
    description: 实时应力/位移监测数据
    default: null
  involves_objects:
  - MonitoringData
  - BridgeReinforcementRule
  - BridgeConstructionMonitorRecord
  source: 公路交通应急处置技术规范.md 7.3.14
  hint: 'R1: 调用 lookup_bridge_reinforcement_rule，根据 damage_type 获取对应的 reinforcement_process（加固工艺）和
    monitoring_requirement（监测要求）。

    R2: 解析 monitoring_data 中的 stress_value 和 displacement_value，依据 lookup 返回的 monitoring_requirement
    判断是否超限。

    R3: 若数据超限，立即停止通行并启动加固处置；若未超限，记录正常监测状态。

    副作用: 写入 BridgeConstructionMonitorRecord，包含 stress_monitoring、displacement_monitoring、limit_exceedance_action（超限处置动作）及
    reinforcement_progress（永久加固进度）。'
- name: conduct_tunnel_recon
  function_type: business
  summary: 执行隧道应急侦测与疏散状态记录
  group: 隧道抢通
  description: 输入 tunnel_id、disaster_type 及 MonitoringData → 调用 lookup_tunnel_inspection_rule
    获取排查清单 → 结合监测数据生成洞口/洞身/气体/火灾初勘数据及疏散状态 → 写入 TunnelReconReport
  depends_on: []
  writes_to:
  - TunnelReconReport
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: tunnel_id
    type: str
    description: 隧道唯一标识
    default: null
  - name: disaster_type
    type: str
    description: 灾害类型
    default: null
  involves_objects:
  - Tunnel
  - MonitoringData
  - TunnelInspectionRule
  - TunnelReconReport
  source: 公路交通应急处置技术规范.md 8.2
  hint: 'R1: 调用 lookup_tunnel_inspection_rule，输入 disaster_type 获取 inspection_part（调查部位）、gas_check_list（气体排查清单）、fire_check_list（火灾排查清单）。

    R2: 依据排查清单，结合 MonitoringData 中的 gas_concentration、gas_type 及现场视频/图像数据，记录 portal_data（洞口初勘数据）、body_data（洞身初勘数据）、gas_data（气体初勘数据）、fire_data（火灾初勘数据）。

    R3: 优先保障人员疏散安全，根据侦测结果判定 evacuation_status（疏散状态）。

    副作用: 写入 TunnelReconReport 记录，关联 event_id。'
- name: assess_tunnel_risk
  function_type: business
  summary: 评估隧道重要等级、次生风险等级与抢通难度
  group: 隧道抢通
  description: 输入道路等级、交通量、发生概率、损失程度、抢通时长评级，通过 lookup 函数分别查询重要等级、风险等级和难度矩阵，综合生成评估报告并写入
    TunnelAssessmentReport。
  depends_on:
  - conduct_tunnel_recon
  writes_to:
  - TunnelAssessmentReport
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: road_class
    type: str
    description: 道路等级
    default: null
  - name: traffic_volume
    type: int
    description: 年日均交通量
    default: null
  - name: occurrence_probability
    type: str
    description: 次生事故发生概率
    default: null
  - name: loss_degree
    type: str
    description: 损失程度
    default: null
  - name: clearance_duration
    type: str
    description: 抢通时长评级(A/B/C/D)
    default: null
  involves_objects:
  - TrafficData
  - TunnelImportanceLevel
  - SecondaryRiskLevel
  - ClearanceDifficultyMatrix
  - TunnelAssessmentReport
  source: 公路交通应急处置技术规范.md 8.3
  hint: 'R1: 调用 lookup_tunnel_importance_level，输入 road_class 和 traffic_volume，获取 importance_level。

    R2: 调用 lookup_secondary_risk_level，输入 occurrence_probability 和 loss_degree，获取
    risk_level。

    R3: 调用 lookup_clearance_difficulty_matrix，输入 clearance_duration 和 R2 获取的 risk_level，获取
    difficulty_level。

    R4: 综合上述三项评级结果，生成 comprehensive_conclusion。

    副作用: 写入 TunnelAssessmentReport 对象，包含 importance_level, risk_level, difficulty_level,
    comprehensive_conclusion, event_id。'
- name: determine_tunnel_clearance_target
  function_type: business
  summary: 确定隧道抢通目标等级与最小通行限界
  group: 隧道抢通
  description: 输入难度等级、重要等级及分流方案，查询目标矩阵与限界表，判定抢通目标等级(I-III级)及对应的最小宽高限界，并写入 TunnelTargetDecision
    决策记录。
  depends_on:
  - assess_tunnel_risk
  writes_to:
  - TunnelTargetDecision
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: difficulty_level
    type: str
    description: 抢通难度等级
    default: null
  - name: importance_level
    type: str
    description: 隧道重要等级
    default: null
  - name: detour_plan
    type: str
    description: 替代交通分流方案
    default: null
  involves_objects:
  - DetourRoute
  - TunnelTargetMatrix
  - TunnelClearanceLimit
  - TunnelTargetDecision
  source: 公路交通应急处置技术规范.md 8.4
  hint: 'R1: 调用 lookup_tunnel_target_matrix，输入 difficulty_level 和 importance_level，获取
    target_level (I-III级)。

    R2: 调用 lookup_tunnel_clearance_limit，输入 R1 得到的 target_level，获取 min_width 和 min_height。

    R3: 若 detour_plan 存在，优先记录改道方案；否则依据 target_level 确定通行策略 (I级禁止通行/改道, II级限制通行, III级基本通行)。

    副作用: 写入 TunnelTargetDecision 对象，包含 target_level, passage_limit (格式: ''宽Xm高Ym''),
    detour_plan, event_id。'
- name: implement_tunnel_clearance
  function_type: business
  summary: 实施隧道抢通作业并动态监测状态
  group: 隧道抢通
  description: 输入目标等级、灾害类型、气体浓度及库存信息 → 调用 lookup_tunnel_clearance_rule 选用措施 → 校验气体/结构安全阈值
    → 动态调整通行状态与限界 → 写入 TunnelClearanceRecord
  depends_on:
  - determine_tunnel_clearance_target
  writes_to:
  - TunnelClearanceRecord
  params:
  - name: event_id
    type: str
    description: 关联突发事件ID
    default: null
  - name: target_level
    type: str
    description: 抢通目标等级
    default: null
  - name: disaster_type
    type: str
    description: 灾害类型
    default: null
  - name: gas_concentration
    type: float
    description: 有害气体浓度
    default: null
  involves_objects:
  - EquipmentStock
  - MonitoringData
  - TunnelClearanceRule
  - TunnelClearanceRecord
  source: 公路交通应急处置技术规范.md 8.5
  hint: 'R1: 调用 lookup_tunnel_clearance_rule 获取针对 disaster_type 的支护/排水/通风/灭火措施。

    R2: 安全否决：若 gas_concentration 超标或结构变形超限，立即禁止通行，抢通目标设为 I 级。

    R3: 依据 target_level 确定最小通行限界：III级(宽1.5m/高2m)，II级(宽2.3m/高2.5m)。

    R4: 结合 EquipmentStock 库存选择适配装备，优先满足时效性与安全性。

    副作用: 写入 TunnelClearanceRecord (status=应急实施/抢通完成, 记录 clearance_target_level, min_passage_width,
    min_passage_height, gas_leak_detected, fire_detected)。'
- name: conduct_accident_inspection
  function_type: business
  summary: 实施事故现场警戒、危化品探测与信息收集
  group: 事故处置
  description: 输入事故ID、现场环境及气象数据，调用 lookup_accident_inspection_rule 确定警戒范围与防护等级，执行现场隔离、疏散与危化品探测，并将调查结果写入
    AccidentInspectionRecord。
  depends_on: []
  writes_to:
  - AccidentInspectionRecord
  params:
  - name: event_id
    type: str
    description: 交通事故唯一标识
    default: null
  - name: site_environment
    type: str
    description: 现场环境描述
    default: null
  - name: weather_condition
    type: str
    description: 气象状况
    default: null
  involves_objects:
  - AccidentEvent
  - WeatherData
  - AccidentInspectionRule
  - AccidentInspectionRecord
  source: 公路交通应急处置技术规范.md 9.1
  hint: 'R1: 调用 lookup_accident_inspection_rule，输入 site_environment 和 weather_condition，获取
    warning_range(警戒范围)、protection_level(防护等级) 和 evacuation_requirement(疏散要求)。

    R2: 结合 AccidentEvent 的 has_hazardous_materials 和 accident_type 识别危化品/火灾风险，确定现场警戒与探测重点。

    R3: 依据规范 9.1.3 执行现场警戒（设置反光标志/锥形筒）、人员疏散及危化品探测。

    副作用: 写入 AccidentInspectionRecord，记录 accident_type, vehicle_type, hazardous_material_type,
    casualty_count, weather_condition, alert_zone_set=true, status=''现场警戒''。'
- name: assess_accident_level
  function_type: business
  summary: 基于伤亡、损失及影响范围评估事故等级与响应级别
  group: 事故处置
  description: 输入事故关键指标（伤亡人数、经济损失、影响范围、事故形态），通过 lookup_accident_type_rule 分类事故类型，通过
    lookup_accident_level_standard 判定事故等级（I-IV级）与响应等级，最终生成 AccidentLevelRecord 记录以指导后续应急处置。
  depends_on:
  - conduct_accident_inspection
  writes_to:
  - AccidentLevelRecord
  params:
  - name: event_id
    type: str
    description: 交通事故唯一标识
    default: null
  - name: casualty_count
    type: int
    description: 伤亡人数
    default: null
  - name: economic_loss
    type: float
    description: 直接经济损失(万元)
    default: null
  - name: impact_scope
    type: str
    description: 交通影响范围
    default: null
  - name: accident_form
    type: str
    description: 事故形态/致因
    default: null
  involves_objects:
  - AccidentEvent
  - AccidentTypeRule
  - AccidentLevelStandard
  - AccidentLevelRecord
  source: 公路交通应急处置技术规范.md 9.2
  hint: 'R1: 调用 lookup_accident_type_rule，输入 accident_form 和 casualty_count/economic_loss
    等上下文，确定 accident_type。

    R2: 调用 lookup_accident_level_standard，输入 casualty_count, economic_loss, impact_scope，查询匹配的事故等级
    (accident_level) 和响应等级 (response_level)。

    R3: 根据查得的 accident_level 和 response_level，结合规范 5.2.1 及上下文推断 handling_difficulty,
    coordination_level, estimated_handling_time。

    副作用: 写入 AccidentLevelRecord 对象，包含 event_id, accident_level, response_level 及推断的处置参数。'
- name: dispatch_accident_equipment
  function_type: business
  summary: 基于事故车辆吨位与作业方式，匹配规则并调度清障/起重/破拆装备
  group: 事故处置
  description: 输入事故ID、车辆吨位及作业方式，调用 lookup_accident_equipment_rule 获取推荐装备类型，结合库存情况生成
    AccidentEquipmentDispatch 调度记录。
  depends_on:
  - assess_accident_level
  writes_to:
  - AccidentEquipmentDispatch
  params:
  - name: event_id
    type: str
    description: 交通事故唯一标识
    default: null
  - name: vehicle_tonnage
    type: float
    description: 涉事车辆吨位(t)
    default: null
  - name: operation_mode
    type: str
    description: 作业方式(牵拉/起吊/扶正/拖运等)
    default: null
  involves_objects:
  - EquipmentStock
  - AccidentEquipmentRule
  - AccidentEquipmentDispatch
  source: 公路交通应急处置技术规范.md 9.3.3
  hint: 'R1: 调用 lookup_accident_equipment_rule，传入 vehicle_tonnage 和 operation_mode
    查询 AccidentEquipmentRule，获取匹配的 equipment_type。

    R2: 依据 10.2.1 选型原则（功能适用性、环境适应性、作业安全性、技术先进性）及 10.2.2 配置原则（通用与专用组合、群组最少、动态配置），从
    EquipmentStock 中筛选符合 equipment_type 且库存可用的装备。

    R3: 生成调度记录，写入 AccidentEquipmentDispatch 对象，包含 event_id、equipment_type、equipment_category、weight_class、deployment_method，初始
    status 设为 ''已调度''。'
- name: handle_accident_scene
  function_type: business
  summary: 实施事故现场处置作业并恢复交通
  group: 事故处置
  description: 输入事故类型、电压及环境参数，查询处置规则与安全距离，执行警戒、救援及车辆处置作业，记录处置耗时与状态至 AccidentHandlingRecord。
  depends_on:
  - dispatch_accident_equipment
  writes_to:
  - AccidentHandlingRecord
  params:
  - name: event_id
    type: str
    description: 交通事故唯一标识
    default: null
  - name: accident_type
    type: str
    description: 事故类型
    default: null
  - name: voltage
    type: float
    description: 邻近高压线电压(kV)
    default: null
  - name: environment
    type: str
    description: 作业环境(隧道/桥梁/山区等)
    default: null
  involves_objects:
  - RoadSegment
  - Bridge
  - Tunnel
  - AccidentHandlingRule
  - SafetyDistanceRule
  - AccidentHandlingRecord
  source: 公路交通应急处置技术规范.md 9.3.4, 9.3.6
  hint: 'R1: 调用 lookup_accident_handling_rule(accident_type) 获取处置步骤(牵拉/起吊/扶正/拖运)。

    R2: 调用 lookup_safety_distance_rule(voltage, environment) 获取最小安全距离(min_safe_distance)。

    R3: 依据规范9.1.3设置警戒区(白天150m/夜间200m)，确保作业距离满足R2返回的安全距离。

    R4: 依据规范9.3.1优先解救被困人员，严禁烟火，按R1步骤执行处置。

    副作用: 写入 AccidentHandlingRecord 记录(event_id, accident_type, handling_method, start_time,
    end_time, duration_hours, status=已完成)。'
- name: lookup_event_level_standard
  function_type: lookup
  summary: 查询公路交通突发事件分级标准
  group: 规则查询
  description: 输入公路等级、中断时间、影响范围，依据规范5.2.1返回对应的事件级别(I-IV级)。
  depends_on: []
  writes_to: []
  params:
  - name: highway_class
    type: str
    description: 公路等级
    default: null
  - name: interruption_time
    type: float
    description: 中断时间(小时)
    default: null
  - name: impact_scope
    type: str
    description: 影响范围
    default: null
  involves_objects:
  - EventLevelStandard
  source: 公路交通应急处置技术规范.md 5.2.1
  hint: 'R1: 根据输入的 highway_class、interruption_time 和 impact_scope 查询 EventLevelStandard
    表。

    R2: 匹配规则：

    - I级: 国家干线 + 中断>24h + 影响周边省份

    - II级: (国家干线 + 中断>12h) 或 (省级干线 + 中断>24h)

    - III级: (国家干线 + 中断>6h) 或 (省级干线 + 中断>12h)

    - IV级: 其他情况

    R3: 返回匹配到的 event_level。'
- name: lookup_report_time_rule
  function_type: lookup
  summary: 查询事件上报时限与方式规则
  group: 规则查询
  description: 输入事件级别(event_level)，返回对应的上报时限(report_time_limit)和上报方式(report_method)。用于确定不同级别突发事件的信息报送要求。
  depends_on: []
  writes_to: []
  params:
  - name: event_level
    type: str
    description: 事件级别
    default: null
  involves_objects:
  - ReportTimeRule
  source: 公路交通应急处置技术规范.md 5.3
  hint: '根据输入的事件级别(event_level)查询 ReportTimeRule 规则表。

    返回字段: report_time_limit(上报时限/小时), report_method(上报方式)。

    注意: 仅返回规则数据，不包含具体事件信息。'
- name: lookup_command_dispatch_rule
  function_type: lookup
  summary: 查询应急指挥调度规则
  group: 规则查询
  description: 输入事件级别，返回对应的指挥层级、联动机制及求援条件。用于确定应急响应中的指挥架构和协作流程。
  depends_on: []
  writes_to: []
  params:
  - name: event_level
    type: str
    description: 事件级别
    default: null
  involves_objects:
  - CommandDispatchRule
  source: 公路交通应急处置技术规范.md 5.4
  hint: 'R1: 根据输入 event_level (I级/II级/III级/IV级) 查询 CommandDispatchRule 表。

    R2: 返回对应的 command_level (指挥层级)、linkage_mechanism (联动机制)。

    R3: 依据 5.4 节规则，确定是否需要向上级求援或启动跨部门联动。'
- name: lookup_resource_dispatch_rule
  function_type: lookup
  summary: 查询应急资源调度路径、优先级及补偿原则
  group: 规则查询
  description: 输入事件类型(event_type)和事发位置(location)，查询 ResourceDispatchRule 规则表，返回调度路径(dispatch_path)、优先级(priority)及补偿原则。依据规范5.5节，遵循最快运输方式与属地/上级资源布局综合调度原则。
  depends_on: []
  writes_to: []
  params:
  - name: event_type
    type: str
    description: 事件类型
    default: null
  - name: location
    type: str
    description: 事发位置
    default: null
  involves_objects:
  - ResourceDispatchRule
  source: 公路交通应急处置技术规范.md 5.5
  hint: 'R1: 根据 event_type 和 location 查询 ResourceDispatchRule 表。

    R2: 返回 dispatch_path(调度路径)、priority(优先级)。

    R3: 调度原则：结合所处位置与运输方式快速性特征，以最快运输方式明确调运路径(5.5.3)。

    R4: 调度范围：结合属地及上级应急管理机构资源布局综合开展(5.5.6)。'
- name: lookup_response_termination_rule
  function_type: lookup
  summary: 查询应急响应终止或扩大判定规则
  group: 规则查询
  description: 输入处置状态和清理完成度，查询 ResponseTerminationRule 获取终止或扩大应急的判定结果。
  depends_on: []
  writes_to: []
  params:
  - name: disposal_status
    type: str
    description: 处置状态
    default: null
  - name: cleanup_completion
    type: str
    description: 清理完成度
    default: null
  involves_objects:
  - ResponseTerminationRule
  source: 公路交通应急处置技术规范.md 5.4.5
  hint: '根据输入的 disposal_status(处置状态) 和 cleanup_completion(清理完成度) 查询 ResponseTerminationRule
    表。

    返回: termination_decision(终止/扩大应急判定)。'
- name: lookup_subgrade_damage_standard
