- name: dispatch_accident_equipment
  function_type: business
  summary: 选型并调度清障/起重/破拆装备
  group: 事故处置
  description: 输入车辆吨位、作业方式、装备库存 → 调用 lookup_accident_equipment_rule 匹配装备类型 → 生成调拨单
    → 写入 AccidentEquipmentDispatch
  depends_on:
  - assess_accident_level
  writes_to:
  - AccidentEquipmentDispatch
  params:
  - name: event_id
    type: str
    description: 交通事故唯一标识
    default: null
  - name: vehicle_tonnage
    type: float
    description: 涉事车辆吨位(t)
    default: null
  - name: operation_mode
    type: str
    description: 作业方式(牵拉/起吊/扶正/拖运等)
    default: null
  involves_objects:
  - EquipmentStock
  - AccidentEquipmentRule
  - AccidentEquipmentDispatch
  source: 公路交通应急处置技术规范.md 9.3.3
  hint: 调用 lookup_accident_equipment_rule 获取装备选型原则，匹配吨位与作业方式不硬编码装备清单
- name: handle_accident_scene
  function_type: business
  summary: 实施事故处置作业并恢复现场交通
  group: 事故处置
  description: 输入事故类型、作业空间、高压线/桥梁限制 → 调用 lookup_accident_handling_rule 与 lookup_safety_distance_rule
    → 规范作业流程与安全距离 → 记录处置耗时与状态 → 写入 AccidentHandlingRecord
  depends_on:
  - dispatch_accident_equipment
  writes_to:
  - AccidentHandlingRecord
  params:
  - name: event_id
    type: str
    description: 交通事故唯一标识
    default: null
  - name: accident_type
    type: str
    description: 事故类型
    default: null
  - name: voltage
    type: float
    description: 邻近高压线电压(kV)
    default: null
  - name: environment
    type: str
    description: 作业环境(隧道/桥梁/山区等)
    default: null
  involves_objects:
  - RoadSegment
  - Bridge
  - Tunnel
  - AccidentHandlingRule
  - SafetyDistanceRule
  - AccidentHandlingRecord
  source: 公路交通应急处置技术规范.md 9.3.4, 9.3.6
  hint: 调用 lookup_accident_handling_rule 获取处理步骤，调用 lookup_safety_distance_rule 获取最小安全距离，动态调整作业顺序
