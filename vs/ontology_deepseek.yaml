name: highway_emergency_ds
description: 公路交通应急处置。基于《公路交通应急处置技术规范》(JTG征求意见稿)。由 DeepSeek-v4-pro 建模。距离单位km，时间单位h。

name: road_emergency
description: 公路交通应急处置与抢通。距离单位km，时间单位h。

objects:
  # ============================================================
  # A类 - 实体对象（公路基础设施、应急资源等外部接口数据）
  # ============================================================

  RoadSegment:
    summary: "路段(公路基本单元，按桩号搜)"
    description: 路段。外部接口数据，请用 get_road_segment 查询，不要用 query
    properties:
      segment_id: {type: str, required: true, description: "路段编号"}
      road_name: {type: str, description: "公路名称，如G318"}
      road_grade: {type: str, description: "公路等级: 高速/一级/二级/三级/四级"}
      start_stake: {type: str, description: "起始桩号，如K120+000"}
      end_stake: {type: str, description: "终止桩号，如K135+000"}
      lane_count: {type: int, description: "车道数"}
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      length_km: {type: float, description: "长度(km)"}

  Bridge:
    summary: "桥梁(含桥涵，按bridge_id查)"
    description: 桥梁。外部接口数据，请用 get_bridge_status 查询
    properties:
      bridge_id: {type: str, required: true, description: "桥梁编号"}
      name: {type: str, description: "桥梁名称"}
      segment_id: {type: str, description: "所属路段编号"}
      center_stake: {type: str, description: "中心桩号"}
      span_m: {type: float, description: "主跨跨径(m)"}
      total_length_m: {type: float, description: "全长(m)"}
      width_m: {type: float, description: "桥面宽度(m)"}
      structure_type: {type: str, description: "结构型式: 简支/连续/悬臂/桁架/吊桥/拱桥/斜拉桥/其他"}
      lane_count: {type: int, description: "车道数"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}

  Tunnel:
    summary: "隧道(按tunnel_id查)"
    description: 隧道。外部接口数据，请用 get_tunnel_status 查询
    properties:
      tunnel_id: {type: str, required: true, description: "隧道编号"}
      name: {type: str, description: "隧道名称"}
      segment_id: {type: str, description: "所属路段编号"}
      length_m: {type: float, description: "长度(m)"}
      width_m: {type: float, description: "净宽(m)"}
      height_m: {type: float, description: "净高(m)"}
      tunnel_type: {type: str, description: "类型: 山岭隧道/水下隧道"}
      layout: {type: str, description: "布置: 单洞/双洞"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}

  EmergencyDepot:
    summary: "应急物资储备点(按坐标搜)"
    description: 应急物资储备点。外部接口数据，请用 get_depots_in_range 查询
    properties:
      depot_id: {type: str, required: true, description: "储备点编号"}
      name: {type: str, description: "名称"}
      level: {type: str, description: "级别: 国家/省级/市级/县级/养护队"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      province: {type: str, description: "所在省份"}

  RescueTeam:
    summary: "应急队伍(按坐标搜)"
    description: 应急队伍。外部接口数据，请用 get_rescue_teams_in_range 查询
    properties:
      team_id: {type: str, required: true, description: "队伍编号"}
      name: {type: str, description: "队伍名称"}
      team_type: {type: str, description: "类型: 专业/兼职/社会"}
      capacity_person: {type: int, description: "人数"}
      specialty: {type: str, description: "专长: 路基/桥涵/隧道/事故清障/综合"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      available: {type: int, description: "是否可用: 1=是 0=否"}

  EquipmentStock:
    summary: "装备库存(储备点→装备清单)"
    description: 储备点装备库存。外部接口数据，请用 get_equipment_by_depot 查询
    properties:
      stock_id: {type: str, required: true, description: "库存编号"}
      depot_id: {type: str, description: "储备点编号"}
      category: {type: str, description: "大类: 通用/专用"}
      sub_category: {type: str, description: "小类: 土方装备/破碎装备/桩工装备/混凝土装备/起重吊装装备/运输装备/生存保障装备/应急侦测装备/路基路面抢通装备/桥涵抢通装备/隧道抢通装备/事故处置装备/冰雪沙泥水火灾害处置装备"}
      name: {type: str, description: "装备名称"}
      quantity: {type: int, description: "数量"}
      weight_grade: {type: str, description: "重量等级: 微型/轻型/中型/重型"}

  MaterialStock:
    summary: "物资库存(储备点→物资清单)"
    description: 储备点物资库存。外部接口数据，请用 get_material_by_depot 查询
    properties:
      stock_id: {type: str, required: true, description: "库存编号"}
      depot_id: {type: str, description: "储备点编号"}
      name: {type: str, description: "物资名称"}
      quantity: {type: int, description: "数量"}
      unit: {type: str, description: "单位"}
      applicable_disasters: {type: str, description: "适用灾害类型(逗号分隔): 交通事故/冰雪/风沙/水灾/火灾/地震地质"}

  # ============================================================
  # B类 - 规则对象（标准、分级表、矩阵、选型规则等稳定配置）
  # ============================================================

  DamageGradeStandard:
    summary: "损伤分级标准(设施类型+等级→通行建议)"
    description: 公路基础设施损伤分级标准。依据规范6.2、7.2、8.2节。可用 lookup_damage_grade 查询
    properties:
      facility_type: {type: str, required: true, description: "设施类型: 路基路面-路基本体/路基路面-边坡/路基路面-支挡结构/桥涵-整体稳定性/桥涵-承载能力/桥涵-通行能力/隧道-洞口/隧道-洞门/隧道-衬砌/隧道-路面/隧道-吊顶预埋件"}
      damage_grade: {type: str, required: true, description: "损伤等级: I/II/III"}
      damage_degree: {type: str, description: "损伤程度: 无损伤或轻微损伤/中等损伤/严重损伤或坍塌"}
      description: {type: str, description: "损伤状况描述"}
      access_decision: {type: str, description: "通行建议: 观察通行/限制通行并加强观测/禁止通行并实施抢通"}

  EventLevelStandard:
    summary: "突发事件分级标准(I~IV级)"
    description: 公路交通突发事件分级标准。依据规范5.2.1。可用 lookup_event_level 查询
    properties:
      level: {type: str, required: true, description: "级别: I/II/III/IV"}
      level_name: {type: str, description: "名称: 特别重大/重大/较大/一般"}
      description: {type: str, description: "事件严重度描述"}
      duration_threshold_hours: {type: int, description: "预计处置时间门槛(小时)"}
      response_department: {type: str, description: "负责部门: 交通运输部/省级交通运输主管部门/市地区交通运输主管部门/公路所属企事业单位"}

  ClearanceTechniqueRule:
    summary: "抢通技术选用规则(设施+灾损→技术)"
    description: 抢通技术选用规则。依据规范第6、7、8章。可用 lookup_clearance_technique 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      facility_type: {type: str, description: "设施类型: 路基路面/桥涵/隧道"}
      damage_type: {type: str, description: "灾损类型: 沉陷开裂/坍塌/水毁/滑坡阻塞/崩塌落石/泥石流/冰雪/沙害/桥涵垮塌/桥涵受损可通车/洞口掩埋/衬砌受损/涌水突泥/有毒有害气体泄漏/火灾爆炸"}
      applicable_condition: {type: str, description: "适用条件"}
      technique_name: {type: str, description: "技术名称"}
      technique_desc: {type: str, description: "技术说明"}
      required_equipment: {type: str, description: "所需装备(逗号分隔)"}
      required_material: {type: str, description: "所需物资(逗号分隔)"}

  TrafficControlRule:
    summary: "交通管制措施规则(损伤等级→管制)"
    description: 交通管制措施规则。依据规范6.3、7.3.3、9.2。可用 lookup_traffic_control 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      damage_grade: {type: str, description: "损伤等级: I/II/III"}
      facility_type: {type: str, description: "设施类型: 路基路面/桥涵/隧道"}
      control_measure: {type: str, description: "管制措施: 正常通行/半幅通行/单车道居中/限速限载/分时控制/禁止通行"}
      description: {type: str, description: "措施说明"}

  TunnelImportanceLevel:
    summary: "隧道重要等级(道路等级+交通量→等级)"
    description: 隧道重要等级分级表。依据规范表8.3-1。可用 lookup_tunnel_importance 查询
    properties:
      road_grade: {type: str, required: true, description: "道路等级: 高速及一级公路/二级公路/三级公路/四级公路"}
      aadt_range: {type: str, required: true, description: "年日均交通量范围(pcu/d/ln): ≥10001 / 5001~10000 / ≤5000"}
      importance_level: {type: str, description: "重要等级: 一级/二级/三级"}

  TunnelDifficultyMatrix:
    summary: "隧道抢通难度矩阵(时长+风险→难度)"
    description: 隧道抢通难度等级矩阵。依据规范表8.3-7
    properties:
      duration_grade: {type: str, required: true, description: "抢通时长评级: A/B/C/D"}
      risk_level: {type: str, required: true, description: "次生事故风险等级: I/II/III/IV"}
      difficulty: {type: str, description: "难度: 高难度/中等难度/低难度"}

  TunnelTargetMatrix:
    summary: "隧道抢通目标矩阵(难度+重要等级→目标)"
    description: 隧道抢通目标等级矩阵。依据规范表8.4-1
    properties:
      difficulty: {type: str, required: true, description: "抢通难度: 高难度/中等难度/低难度"}
      importance_level: {type: str, required: true, description: "隧道重要等级: 一级/二级/三级"}
      target_grade: {type: str, description: "抢通目标等级: I(禁止通行改道)/II(限制性通行)/III(保证抢险车辆通行)"}

  BridgeTypeSelection:
    summary: "便桥选型参考(场景+跨径→桥型)"
    description: 便桥选型参考表。依据规范附录3。可用 lookup_bridge_type 查询
    properties:
      rule_id: {type: str, required: true, description: "规则编号"}
      scenario: {type: str, description: "应用场景: 跨越小型河川等障碍宽度不超过10m/宽度10m-15m/宽度15m-30m/宽度30m-50m/宽度50m-200m"}
      obstacle_width_range: {type: str, description: "障碍宽度范围(m)"}
      bridge_type: {type: str, description: "便桥类型: 应急轻便桥(拼装式)/机械化桥/公路装配式钢桥/动力舟桥"}
      capacity_desc: {type: str, description: "通行保障能力"}
      setup_time: {type: str, description: "架设时效"}
      notes: {type: str, description: "其他参考因素"}

  ResponseLevelRule:
    summary: "响应级别规则(事件级别→响应要求)"
    description: 应急响应级别规则。依据规范5.2、5.4、9.2.5
    properties:
      event_level: {type: str, required: true, description: "事件级别: I/II/III/IV"}
      response_level: {type: str, description: "响应级别: 一级/二级/三级/四级"}
      responsible_org: {type: str, description: "负责机构: 交通运输部/省级交通运输主管部门/市级交通运输主管部门/县级交通运输主管部门/企事业单位"}
      time_limit_hours: {type: int, description: "处理时限(小时)"}
      termination_condition: {type: str, description: "终止条件: 完成车辆转移、路面障碍物清理、救援装备撤出与整理、信息上报、手续交接、装备人员归建"}

  # ============================================================
  # C类 - 过程对象（智能体在应急处置流程中产出的业务记录）
  # ============================================================

  DisasterEvent:
    summary: "自然灾害事件(地震/暴雨/泥石流/滑坡等)"
    description: |
      自然灾害导致的公路交通突发事件。涉及设施损伤，需要 inspect_facility 检查评估。
      plan_recon_mission 可为本类型事件规划无人机侦测。
    properties:
      event_id: {type: str, required: true, description: "事件编号"}
      disaster_type: {type: str, description: "灾害类型: 地震/暴雨/泥石流/滑坡/崩塌/冰雪/洪水/火灾"}
      event_level: {type: str, description: "事件级别: I/II/III/IV"}
      event_time: {type: str, description: "发生时间"}
      location_desc: {type: str, description: "位置描述"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)"}
      response_level: {type: str, description: "响应级别"}
      status: {type: str, description: "状态: 进行中/已终止"}

  AccidentEvent:
    summary: "交通事故事件(不涉及设施损伤检查)"
    description: |
      交通事故导致的公路交通突发事件。不涉及设施损伤检查(不适用 inspect_facility)。
      主要关注事故清障(set_traffic_control)和交通管制。
    properties:
      event_id: {type: str, required: true, description: "事件编号"}
      accident_type: {type: str, description: "事故类型: 抛锚/碰撞/碾压/翻车/坠车/落水/烧毁/货物散落"}
      event_level: {type: str, description: "事件级别: I/II/III/IV"}
      event_time: {type: str, description: "发生时间"}
      location_desc: {type: str, description: "位置描述"}
      lng: {type: float, description: "经度"}
      lat: {type: float, description: "纬度"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)"}
      vehicle_type: {type: str, description: "涉事车辆类型"}
      cargo_type: {type: str, description: "货物类型(如有)"}
      casualty_info: {type: str, description: "人员伤亡情况"}
      response_level: {type: str, description: "响应级别"}
      status: {type: str, description: "状态: 进行中/已终止"}

  FacilityInspection:
    summary: "设施现场检查(检查评估记录)"
    description: 设施现场检查记录。inspect_facility 产出。generate_clearance_plans、set_traffic_control、assess_event_level 以本记录为输入
    properties:
      inspection_id: {type: str, required: true, description: "检查编号"}
      event_id: {type: str, description: "关联事件编号"}
      facility_type: {type: str, description: "设施类型: 路段/桥梁/隧道"}
      facility_id: {type: str, description: "设施编号"}
      facility_name: {type: str, description: "设施名称"}
      damage_summary: {type: str, description: "损伤概况"}
      overall_damage_grade: {type: str, description: "综合损伤等级: I/II/III"}
      access_recommendation: {type: str, description: "通行建议: 观察通行/限制通行/禁止通行"}
      inspection_time: {type: str, description: "检查时间"}

links:
  event_has_inspections:
    source: DisasterEvent
    target: FacilityInspection
    join: {source_key: event_id, target_key: event_id}
    description: 自然灾害事件下的设施检查评估记录

  inspection_of_road_segment:
    source: FacilityInspection
    target: RoadSegment
    join: {source_key: facility_id, target_key: segment_id}
    description: 设施检查记录相关联的路段，当 facility_type 为路段时使用

  inspection_of_bridge:
    source: FacilityInspection
    target: Bridge
    join: {source_key: facility_id, target_key: bridge_id}
    description: 设施检查记录相关联的桥梁，当 facility_type 为桥涵时使用

  inspection_of_tunnel:
    source: FacilityInspection
    target: Tunnel
    join: {source_key: facility_id, target_key: tunnel_id}
    description: 设施检查记录相关联的隧道，当 facility_type 为隧道时使用

  depot_has_equipment:
    source: EmergencyDepot
    target: EquipmentStock
    join: {source_key: depot_id, target_key: depot_id}
    description: 应急物资储备点所拥有的装备库存清单

  depot_has_material:
    source: EmergencyDepot
    target: MaterialStock
    join: {source_key: depot_id, target_key: depot_id}
    description: 应急物资储备点所拥有的物资库存清单

functions:
  # ============================================================
  # A. 接口包装函数
  # ============================================================
  get_road_segment:
    summary: "查询路段基本信息"
    description: "根据路段编号查询公路路段的基础属性、桩号、坐标等"
    group: "基础设施查询"
    params:
      segment_id: {type: str, description: "路段编号"}

  get_bridge_status:
    summary: "查询桥梁状态信息"
    description: "根据桥梁编号查询桥梁结构、跨径、坐标等信息"
    group: "基础设施查询"
    params:
      bridge_id: {type: str, description: "桥梁编号"}

  get_tunnel_status:
    summary: "查询隧道状态信息"
    description: "根据隧道编号查询隧道长度、净空、类型、坐标等"
    group: "基础设施查询"
    params:
      tunnel_id: {type: str, description: "隧道编号"}

  get_depots_in_range:
    summary: "按空间范围查询应急物资储备点"
    description: "根据中心经纬度和半径，检索范围内的应急物资储备点列表"
    group: "资源查询"
    params:
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      radius_km: {type: float, description: "搜索半径(km)"}

  get_rescue_teams_in_range:
    summary: "按空间范围查询应急队伍"
    description: "根据中心经纬度和半径，检索范围内的应急救援队伍列表"
    group: "资源查询"
    params:
      lng: {type: float, description: "中心经度"}
      lat: {type: float, description: "中心纬度"}
      radius_km: {type: float, description: "搜索半径(km)"}

  get_equipment_by_depot:
    summary: "查询储备点装备库存"
    description: "根据储备点编号，返回该储备点的所有装备库存条目"
    group: "资源查询"
    params:
      depot_id: {type: str, description: "储备点编号"}

  get_material_by_depot:
    summary: "查询储备点物资库存"
    description: "根据储备点编号，返回该储备点的所有物资库存条目"
    group: "资源查询"
    params:
      depot_id: {type: str, description: "储备点编号"}

  # ============================================================
  # B. 规则查询函数
  # ============================================================
  lookup_damage_grade:
    summary: "查询损伤分级标准"
    description: "根据设施类型和损伤等级，查询对应的损伤程度、通行建议等标准"
    group: "规则查询"
    params:
      facility_type: {type: str, description: "设施类型，如：路基路面-路基本体"}
      damage_grade: {type: str, description: "损伤等级：I/II/III"}

  lookup_event_level:
    summary: "查询突发事件分级标准"
    description: "根据事件级别查询事件名称、处置时间门槛和负责部门"
    group: "规则查询"
    params:
      level: {type: str, description: "事件级别：I/II/III/IV"}

  lookup_clearance_technique:
    summary: "查询抢通技术选用规则"
    description: "根据设施类型和灾损类型，查询适用的抢通技术名称、所需装备物资"
    group: "规则查询"
    params:
      facility_type: {type: str, description: "设施类型：路基路面/桥涵/隧道"}
      damage_type: {type: str, description: "灾损类型，如：沉陷开裂/桥涵垮塌/洞口掩埋等"}

  lookup_traffic_control:
    summary: "查询交通管制措施规则"
    description: "根据损伤等级和设施类型，查询对应的交通管制措施"
    group: "规则查询"
    params:
      damage_grade: {type: str, description: "损伤等级：I/II/III"}
      facility_type: {type: str, description: "设施类型：路基路面/桥涵/隧道"}

  lookup_tunnel_importance:
    summary: "查询隧道重要等级"
    description: "根据道路等级和年日均交通量范围，确定隧道重要等级"
    group: "规则查询"
    params:
      road_grade: {type: str, description: "道路等级：高速及一级公路/二级公路/三级公路/四级公路"}
      aadt_range: {type: str, description: "年日均交通量范围(pcu/d/ln)：≥10001/5001~10000/≤5000"}

  lookup_tunnel_difficulty:
    summary: "查询隧道抢通难度等级"
    description: "根据抢通时长评级和次生事故风险等级，查询隧道抢通难度"
    group: "规则查询"
    params:
      duration_grade: {type: str, description: "抢通时长评级：A/B/C/D"}
      risk_level: {type: str, description: "次生事故风险等级：I/II/III/IV"}

  lookup_tunnel_target:
    summary: "查询隧道抢通目标等级"
    description: "根据抢通难度和隧道重要等级，查询隧道抢通目标等级"
    group: "规则查询"
    params:
      difficulty: {type: str, description: "抢通难度：高难度/中等难度/低难度"}
      importance_level: {type: str, description: "隧道重要等级：一级/二级/三级"}

  lookup_bridge_type:
    summary: "查询便桥选型规则"
    description: "根据应用场景或障碍宽度，查询推荐的便桥类型、通行能力和架设时效"
    group: "规则查询"
    params:
      scenario: {type: str, description: "应用场景描述，如：跨越小型河川等障碍宽度不超过10m"}
      obstacle_width_range: {type: str, description: "障碍宽度范围(m)", default: ""}

  lookup_response_level:
    summary: "查询应急响应级别规则"
    description: "根据事件级别查询对应的响应级别、负责机构和处理时限等要求"
    group: "规则查询"
    params:
      event_level: {type: str, description: "事件级别：I/II/III/IV"}

  # ============================================================
  # C. 业务编排函数
  # ============================================================
  inspect_facility:
    summary: "对受损设施进行现场检查评估"
    description: "对事件中受影响的公路设施（路段/桥梁/隧道）进行损伤检查，生成 FacilityInspection 记录，给出损伤等级和通行建议"
    group: "检查与评估"
    hint: >
      依据规范6.2、7.2、8.2节进行损伤分级；
      需调用 lookup_damage_grade 获取分级标准；
      输出综合损伤等级 I/II/III 及对应的通行建议。
    params:
      event_id: {type: str, description: "关联事件编号"}
      facility_type: {type: str, description: "设施类型：路段/桥梁/隧道"}
      facility_id: {type: str, description: "设施编号"}

  assess_event_level:
    summary: "评估突发事件等级"
    description: "综合事件影响范围、预计处置时间等信息，评估事件的级别 I~IV，并确定响应级别"
    group: "检查与评估"
    hint: >
      依据规范5.2.1确定事件级别；
      调用 lookup_event_level 和 lookup_response_level 获取分级和响应规则；
      更新事件对象的 event_level 和 response_level。
    params:
      event_id: {type: str, description: "事件编号"}
      affected_segment_ids: {type: str, description: "受影响路段编号(逗号分隔)", default: ""}
      estimated_duration_hours: {type: float, description: "预计抢通时间(h)", default: 0.0}

  generate_clearance_plans:
    summary: "生成抢通方案列表"
    description: "根据设施检查结果，匹配抢通技术规则，生成一个或多个抢通方案，包含技术、所需装备物资和队伍组合"
    group: "抢通与调度"
    hint: >
      依据规范第6、7、8章及附录3；
      调用 lookup_clearance_technique 匹配技术；
      若涉及桥梁，调用 lookup_bridge_type 选型便桥；
      每个方案包含技术名称、装备需求、物资需求和预估时间。
    params:
      event_id: {type: str, description: "事件编号"}
      inspection_id: {type: str, description: "设施检查记录编号"}

  score_plans:
    summary: "对抢通方案进行多维度评分"
    description: "按照时效(40%)、安全(30%)、经济(30%)的权重对多个方案进行评分排序，返回最优方案"
    group: "抢通与调度"
    hint: >
      时效评价依据方案预估抢通时间；
      安全评价考虑次生灾害风险和作业风险；
      经济评价考虑资源调用成本和里程。
    params:
      plans: {type: list, description: "待评分的抢通方案列表"}

  dispatch_resources:
    summary: "执行资源调度"
    description: "根据选定的抢通方案，从各储备点调度相应的装备、物资和应急队伍，下达调度指令"
    group: "抢通与调度"
    hint: >
      依据规范5.4、9.2.5；
      调用 get_depots_in_range 搜索最近的储备点；
      调用 get_equipment_by_depot、get_material_by_depot 检查库存；
      调用 get_rescue_teams_in_range 匹配可用队伍。
    params:
      plan_id: {type: str, description: "选定的抢通方案编号"}
      event_id: {type: str, description: "事件编号"}

  set_traffic_control:
    summary: "制定并实施交通管制"
    description: "根据设施损伤等级和类型，确定交通管制措施（正常通行/限行/禁止通行等）并部署"
    group: "交通管制"
    hint: >
      依据规范6.3、7.3.3、9.2；
      调用 lookup_traffic_control 获取管制措施；
      应考虑对路网的影响范围。
    params:
      event_id: {type: str, description: "事件编号"}
      inspection_id: {type: str, description: "设施检查记录编号"}
      damage_grade: {type: str, description: "综合损伤等级：I/II/III"}
      facility_type: {type: str, description: "设施类型：路基路面/桥涵/隧道"}

  evaluate_traffic:
    summary: "评估通行能力"
    description: "在抢通或管制实施后，重新评估路段/桥梁/隧道的实际通行能力和安全状态"
    group: "通行与绕行"
    hint: >
      依据损伤分级对应的通行建议（规范6.2、7.2、8.2）；
      判断是否具备全幅或半幅通行条件。
    params:
      event_id: {type: str, description: "事件编号"}
      facility_type: {type: str, description: "设施类型"}
      facility_id: {type: str, description: "设施编号"}

  generate_detour:
    summary: "生成绕行方案"
    description: "当关键路段或桥梁无法通行时，基于路网数据生成绕行路线，包含距离、预计时间和适合车型"
    group: "通行与绕行"
    hint: >
      根据事件影响路段和管制信息，利用公路路网拓扑计算绕行路径；
      应给出推荐绕行路线及替代路线。
    params:
      event_id: {type: str, description: "事件编号"}
      affected_segment_ids: {type: str, description: "无法通行的路段编号(逗号分隔)"}
      vehicle_type: {type: str, description: "通行车辆类型", default: "小型车"}

  handle_accident:
    summary: "处置交通事故"
    description: "对交通事故事件进行处理，包括清障、人员救护、货物转驳，并配合交通管制恢复通行"
    group: "事故处理"
    hint: >
      依据规范9.2进行事故现场处置；
      不涉及设施损伤检查，直接调度清障资源。
    params:
      accident_event_id: {type: str, description: "交通事故事件编号"}

  generate_event_report:
    summary: "生成灾情与处置报告"
    description: "汇总事件信息、设施损伤、抢通进展、资源投入和通行状态，生成结构化灾情报告"
    group: "报告与监测"
    hint: >
      报告应包含事件基本属性、损坏等级、响应级别、抢通措施、
      资源调度情况和当前通行状况，必要时提出次生灾害风险说明。
    params:
      event_id: {type: str, description: "事件编号"}

  monitor_secondary_disaster:
    summary: "次生灾害监测与预警"
    description: "对隧道、高边坡等重点部位进行次生灾害（涌水突泥、二次坍塌、有毒有害气体等）风险监测"
    group: "报告与监测"
    hint: >
      依据规范表8.3-7 次生事故风险等级；
      调用 lookup_tunnel_difficulty 评估风险；
      输出监测方案与预警阈值建议。
    params:
      event_id: {type: str, description: "事件编号"}
      facility_type: {type: str, description: "设施类型", default: "隧道"}
      facility_id: {type: str, description: "设施编号", default: ""}