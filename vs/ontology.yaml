functions:
  report_event_info:
    summary: 生成事件上报记录
    group: 指挥调度
    description: 接收事件基础信息，匹配上报规则，输出首报/续报/终报记录。
    depends_on: []
    hint: 'R1: 调用 lookup_report_time_rule，传入 DisasterEvent 的 severity_level 获取对应的
      report_time_limit、report_method 及要素要求。

      R2: 校验 DisasterEvent 与 Organization 信息完整性。

      R3: 根据获取的规则生成 EventReport 记录，report_type 默认为''首报''，report_time 为当前时间。

      副作用: 写入 EventReport 对象。'
    params:
      event_id:
        type: str
        description: 突发事件唯一标识
      org_id:
        type: str
        description: 上报组织机构ID
    writes_to:
    - EventReport
  grade_event_level:
    summary: 判定突发事件级别
    group: 指挥调度
    description: 接收灾情特征数据，匹配分级标准，输出事件级别与定级依据记录。
    depends_on:
    - report_event_info
    hint: 'R1: 调用 lookup_event_level_standard 获取 EventLevelStandard 规则表。

      R2: 依据输入参数 highway_class、interruption_time、impact_scope 匹配规则，确定 event_level
      (I-IV级)。

      R3: 判定逻辑：优先匹配最高级别标准（如国家干线+24h+周边省份→I级）。

      副作用: 写入 EventGradingRecord 记录(determined_level, basis_data, event_id)。'
    params:
      event_id:
        type: str
        description: 突发事件唯一标识
      highway_class:
        type: str
        description: 公路等级
      interruption_time:
        type: float
        description: 预计中断/阻塞时间(小时)
      impact_scope:
        type: str
        description: 影响范围
    writes_to:
    - EventGradingRecord
  activate_emergency_plan:
    summary: 启动应急预案
    group: 指挥调度
    description: 接收事件级别与影响范围，匹配指挥规则，输出预案启动与调度记录。
    depends_on:
    - grade_event_level
    hint: 'R1: 调用 lookup_command_dispatch_rule，输入 event_level 和 command_org_id，获取对应的
      command_level（指挥层级）、linkage_mechanism（联动机制）及求援条件。

      R2: 依据获取的指挥层级与联动机制，结合当前事件级别评估处置能力（capability_assessment）。

      R3: 根据求援条件判断是否需要外部支援，确定 request_status（求援状态）。

      副作用: 写入 PlanActivationRecord 记录，包含 command_org、capability_assessment、request_status
      及关联的 event_id。'
    params:
      event_id:
        type: str
        description: 突发事件唯一标识
      event_level:
        type: str
        description: 判定事件级别
      command_org_id:
        type: str
        description: 指挥调度机构ID
    writes_to:
    - PlanActivationRecord
  dispatch_emergency_resources:
    summary: 调度应急资源
    group: 指挥调度
    description: 接收事件类型与位置，匹配调度原则，输出队伍/装备/物资调拨单。
    depends_on:
    - activate_emergency_plan
    hint: 'R1: 调用 lookup_resource_dispatch_rule 获取基于 event_type 和 location 的调度路径、优先级及补偿原则。

      R2: 根据 resource_types 匹配资源：队伍查 RescueTeam (按 specialty/location)，装备查 EquipmentStock
      (按 function_type/transport_mode)，物资查 MaterialStock (按 applicable_disaster)。

      R3: 依据 5.5.3 条，结合资源位置与 transport_mode，以最快运输方式确定最终 dispatch_path。

      R4: 依据 10.3.6/10.3.7 条，遵循“先近后远、满足急需”原则选择 EmergencyDepot，并确定使用原则（I级无偿，其他补偿）。

      副作用: 写入 ResourceDispatchRecord (status=candidate, 包含 dispatch_path, resource_type,
      event_id)。'
    params:
      event_id:
        type: str
        description: 突发事件唯一标识
      event_type:
        type: str
        description: 事件类型
      location:
        type: str
        description: 事发位置
      resource_types:
        type: str
        description: 需调度资源类型(队伍/装备/物资)
    writes_to:
    - ResourceDispatchRecord
  evaluate_and_terminate_response:
    summary: 评估响应终止或扩大
    group: 指挥调度
    description: 接收处置状态与清理进度，匹配终止规则，输出终止判定或升级建议记录。
    depends_on:
    - dispatch_emergency_resources
    hint: 'R1: 调用 lookup_response_termination_rule，传入 disposal_status 和 cleanup_completion，获取
      termination_decision（终止/扩大应急）。

      R2: 若判定为终止，结合 MonitoringData 生成 summary_evaluation 和 improvement_suggestions。

      副作用: 写入 ResponseTerminationRecord (event_id, termination_conditions_met, summary_evaluation,
      improvement_suggestions)。'
    params:
      event_id:
        type: str
        description: 突发事件唯一标识
      disposal_status:
        type: str
        description: 当前处置状态
      cleanup_completion:
        type: str
        description: 现场清理完成度
    writes_to:
    - ResponseTerminationRecord
  conduct_subgrade_recon:
    summary: 执行路基应急侦测
    group: 路基路面抢通
    description: 接收坐标与灾害类型，调用遥感/现场数据，输出路基初勘报告。
    depends_on: []
    hint: 'R1: 依据规范4.2，结合 RoadSegment 的桩号/坐标，获取受灾区域道路、地形资料；结合 GeologicalData 获取地貌类型、岩土体类型、地质构造、水文地质等环境资料；结合
      WeatherData 获取气象监测与预报信息。

      R2: 依据规范4.3，根据 recon_method 执行宏观侦测：若为卫星遥感，侧重大范围受灾区域及大规模地质灾害体侦测；若为无人机/航空摄影，侧重局部受灾区域、特定灾害体及急难险重现场侦测，获取影像数据。

      R3: 汇总灾情信息（损毁类型、规模、空间分布特性、影响程度）及基础资料。

      副作用: 写入 ReconReport 对象，记录 recon_method、data_summary 及关联 event_id。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      segment_id:
        type: str
        description: 路段唯一标识
      recon_method:
        type: str
        description: 侦测手段(卫星/无人机/现场)
    writes_to:
    - ReconReport
  assess_subgrade_damage:
    summary: 评估路基损毁等级
    group: 路基路面抢通
    description: 接收现场勘查数据，匹配受损分级标准，输出损毁等级与通行建议记录。
    depends_on:
    - conduct_subgrade_recon
    hint: 'R1: 根据 assessment_scope 调用对应 lookup 函数获取分级标准：

      - 路基本体: lookup_subgrade_damage_standard

      - 边坡: lookup_slope_damage_standard

      - 支挡结构: lookup_retaining_structure_damage_standard

      R2: 将 damage_features 与标准中的 damage_feature 匹配，确定各构件的 damage_grade 和 access_decision。

      R3: 综合评定逻辑：若评估范围包含多项，取最差等级（III级 > II级 > I级）作为最终 damage_grade。

      R4: 通行建议映射：I级→正常通行，II级→限制通行，III级→禁止通行。

      R5: 若评定为 II级或 III级，需提出应急抢通处治和交通管制措施建议(6.2.5)。

      副作用: 写入 SubgradeAssessmentRecord (包含 damage_grade, access_suggestion, treatment_measure,
      event_id)。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      damage_features:
        type: str
        description: 损毁特征描述
      assessment_scope:
        type: str
        description: 评估范围(路基本体/边坡/支挡结构)
    writes_to:
    - SubgradeAssessmentRecord
  implement_subgrade_clearance:
    summary: 制定路基抢通方案
    group: 路基路面抢通
    description: 接收损毁等级与地质条件，匹配抢通技术规则，输出抢通工艺与步骤记录。
    depends_on:
    - assess_subgrade_damage
    hint: 'R1: 调用 lookup_subgrade_clearance_rule，输入 disaster_type 和 geological_condition
      匹配 SubgradeClearanceRule 获取 clearance_technique。

      R2: 根据选定的 clearance_technique 生成 construction_steps：

      - 路基沉陷(机械回填/路基拓宽/注浆加固): 遵循6.4.2原则(如回填需整平压实、拓宽需挖除上边坡、注浆需先挖除错台)。

      - 路基坍塌(全部填土/拦边填土/换填泡沫轻质土/凹形竖曲线/改移线位): 遵循6.4.3原则(如全部填土需分层压实、拦边填土基底夯实、泡沫轻质土分层浇筑<1m)。

      - 路基水毁: 遵循6.4.4原则(固基护脚、以疏为主，视情况抛石/便桥/挡墙)。

      - 滑坡/泥石流/崩塌堵塞: 遵循6.4.5/6.4.6/6.4.7原则(先加固后清理或开挖便道/改线)。

      R3: 结合 MaterialStock 确认物资可用性(如填充材料、防滑材料等)。

      副作用: 写入 ClearancePlan 记录(technology_selection=选定技术, construction_steps=生成步骤,
      status=candidate, event_id=输入ID)。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      disaster_type:
        type: str
        description: 灾害类型
      geological_condition:
        type: str
        description: 现场地质条件
    writes_to:
    - ClearancePlan
  manage_traffic_control_subgrade:
    summary: 实施路基交通管制
    group: 路基路面抢通
    description: 接收损伤等级与监测数据，匹配管制与预警规则，输出管制措施与监测记录。
    depends_on:
    - implement_subgrade_clearance
    hint: 'R1: 调用 lookup_traffic_control_rule，根据 damage_grade 查询对应的 control_measure（如半幅通行、封闭等）。

      R2: 调用 lookup_secondary_disaster_warning_rule，根据 deformation_trend 和 inspection_frequency
      查询 warning_level 及处置要求。

      R3: 若 damage_grade 为 III 级或存在严重变形趋势，优先采取封闭或严格管制措施。

      副作用: 将确定的管制措施写入 TrafficControlRecord；将预警级别、巡查频次及变形数据写入 SecondaryDisasterMonitorRecord。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      damage_grade:
        type: str
        description: 损伤等级
      deformation_trend:
        type: str
        description: 变形发展趋势
    writes_to:
    - TrafficControlRecord
    - SecondaryDisasterMonitorRecord
  conduct_bridge_recon:
    summary: 执行桥涵应急调查
    group: 桥涵抢通
    description: 接收桥涵ID与灾害类型，匹配调查规则，输出重点部位检查记录。
    depends_on: []
    hint: 'R1: 调用 lookup_bridge_inspection_rule，传入 disaster_type 获取该灾害类型下的重点调查部位(inspection_part)、调查内容(inspection_content)及设备清单(equipment_list)。

      R2: 依据 7.1.6 条，调查应以目视检测为主，借助简单便携式装备为辅；若车辆无法接近，采取徒步或轻便交通工具抵近；大范围灾害需结合遥感/航拍/无人机技术。

      R3: 调查范围应涵盖灾情超过设计预期的所有桥涵构件及引道、被交道路等安全隐患区域(7.1.4)。

      副作用: 将生成的检查清单写入 BridgeInspectionRecord.inspection_checklist，采集的影像数据写入 image_data，初步判定结果写入
      preliminary_judgment，并关联 event_id。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      bridge_id:
        type: str
        description: 桥梁唯一标识
      disaster_type:
        type: str
        description: 灾害类型
    writes_to:
    - BridgeInspectionRecord
  assess_bridge_damage:
    summary: 评估桥涵损毁状态
    group: 桥涵抢通
    description: 接收结构勘查数据，匹配稳定性/承载力/通行标准，输出综合评估记录。
    depends_on:
    - conduct_bridge_recon
    hint: 'R1: 根据 assessment_dimensions 分别调用 lookup_bridge_stability_standard、lookup_bridge_capacity_standard、lookup_bridge_passability_standard，传入
      damage_features 获取各维度损伤等级(damage_grade)。

      R2: 综合判定逻辑：若任一维度评定为III级，则整体通行结论为禁止通行；若存在II级且无III级，为限制通行；全为I级为正常通行(7.2.5)。

      R3: 将各维度评级及最终通行结论写入 BridgeAssessmentRecord。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      damage_features:
        type: str
        description: 损毁特征描述
      assessment_dimensions:
        type: str
        description: 评估维度(稳定性/承载力/通行能力)
    writes_to:
    - BridgeAssessmentRecord
  implement_bridge_clearance:
    summary: 制定桥涵抢通方案
    group: 桥涵抢通
    description: 接收损毁特征与地形条件，匹配抢通技术规则，输出便桥/修复/加固方案记录。
    depends_on:
    - assess_bridge_damage
    hint: 'R1: 调用 lookup_bridge_clearance_rule，输入 damage_degree 和 terrain_condition，获取基础抢通技术（便道/便桥/修复/加固/桥改路）。

      R2: 若选定便桥技术，调用 lookup_temporary_bridge_rule，输入 span_length 及现场水文/承载条件，确定具体桥型（机械化桥/装配式钢桥/舟桥等）。

      R3: 综合时效性、地形地质与装备条件（EquipmentStock）选定最终方案。时效性应作为优先考虑条件(7.3.1)。

      R4: 若损毁严重无法修复，优先研究桥改路基通过可能性(7.3.4)。

      副作用: 写入 BridgeClearancePlan 记录，包含 clearance_scheme 和 implementation_record。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      damage_degree:
        type: str
        description: 损毁程度
      terrain_condition:
        type: str
        description: 地形条件
      span_length:
        type: float
        description: 需跨越宽度(m)
    writes_to:
    - BridgeClearancePlan
  monitor_bridge_construction:
    summary: 监测桥涵施工状态
    group: 桥涵抢通
    description: 接收传感器数据与施工日志，匹配加固规则，输出应力/位移监测与进度记录。
    depends_on:
    - implement_bridge_clearance
    hint: 'R1: 调用 lookup_bridge_reinforcement_rule，根据 damage_type 获取对应的 reinforcement_process（加固工艺）和
      monitoring_requirement（监测要求）。

      R2: 解析 monitoring_data 中的 stress_value 和 displacement_value，依据 lookup 返回的 monitoring_requirement
      判断是否超限。

      R3: 若数据超限，立即停止通行并启动加固处置；若未超限，记录正常监测状态。

      副作用: 写入 BridgeConstructionMonitorRecord，包含 stress_monitoring、displacement_monitoring、limit_exceedance_action（超限处置动作）及
      reinforcement_progress（永久加固进度）。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      damage_type:
        type: str
        description: 损伤类型
      monitoring_data:
        type: str
        description: 实时应力/位移监测数据
    writes_to:
    - BridgeConstructionMonitorRecord
  conduct_tunnel_recon:
    summary: 执行隧道应急侦测
    group: 隧道抢通
    description: 接收隧道ID与灾害类型，匹配调查规则，输出洞口/洞身/气体初勘报告。
    depends_on: []
    hint: 'R1: 调用 lookup_tunnel_inspection_rule，输入 disaster_type 获取 inspection_part（调查部位）、gas_check_list（气体排查清单）、fire_check_list（火灾排查清单）。

      R2: 依据排查清单，结合 MonitoringData 中的 gas_concentration、gas_type 及现场视频/图像数据，记录 portal_data（洞口初勘数据）、body_data（洞身初勘数据）、gas_data（气体初勘数据）、fire_data（火灾初勘数据）。

      R3: 优先保障人员疏散安全，根据侦测结果判定 evacuation_status（疏散状态）。

      副作用: 写入 TunnelReconReport 记录，关联 event_id。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      tunnel_id:
        type: str
        description: 隧道唯一标识
      disaster_type:
        type: str
        description: 灾害类型
    writes_to:
    - TunnelReconReport
  assess_tunnel_risk:
    summary: 评估隧道风险等级
    group: 隧道抢通
    description: 接收道路等级与灾情数据，匹配重要/风险/难度矩阵，输出综合风险评级记录。
    depends_on:
    - conduct_tunnel_recon
    hint: 'R1: 调用 lookup_tunnel_importance_level，输入 road_class 和 traffic_volume，获取
      importance_level。

      R2: 调用 lookup_secondary_risk_level，输入 occurrence_probability 和 loss_degree，获取
      risk_level。

      R3: 调用 lookup_clearance_difficulty_matrix，输入 clearance_duration 和 R2 获取的 risk_level，获取
      difficulty_level。

      R4: 综合上述三项评级结果，生成 comprehensive_conclusion。

      副作用: 写入 TunnelAssessmentReport 对象，包含 importance_level, risk_level, difficulty_level,
      comprehensive_conclusion, event_id。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      road_class:
        type: str
        description: 道路等级
      traffic_volume:
        type: int
        description: 年日均交通量
      occurrence_probability:
        type: str
        description: 次生事故发生概率
      loss_degree:
        type: str
        description: 损失程度
      clearance_duration:
        type: str
        description: 抢通时长评级(A/B/C/D)
    writes_to:
    - TunnelAssessmentReport
  determine_tunnel_clearance_target:
    summary: 确定隧道抢通目标
    group: 隧道抢通
    description: 接收难度与重要等级，匹配目标矩阵与限界表，输出抢通目标与尺寸标准记录。
    depends_on:
    - assess_tunnel_risk
    hint: 'R1: 调用 lookup_tunnel_target_matrix，输入 difficulty_level 和 importance_level，获取
      target_level (I-III级)。

      R2: 调用 lookup_tunnel_clearance_limit，输入 R1 得到的 target_level，获取 min_width 和 min_height。

      R3: 若 detour_plan 存在，优先记录改道方案；否则依据 target_level 确定通行策略 (I级禁止通行/改道, II级限制通行,
      III级基本通行)。

      副作用: 写入 TunnelTargetDecision 对象，包含 target_level, passage_limit (格式: ''宽Xm高Ym''),
      detour_plan, event_id。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      difficulty_level:
        type: str
        description: 抢通难度等级
      importance_level:
        type: str
        description: 隧道重要等级
      detour_plan:
        type: str
        description: 替代交通分流方案
    writes_to:
    - TunnelTargetDecision
  implement_tunnel_clearance:
    summary: 实施隧道抢通作业
    group: 隧道抢通
    description: 接收目标等级与灾害类型，匹配抢通技术规则，输出支护/排水/通风作业记录。
    depends_on:
    - determine_tunnel_clearance_target
    hint: 'R1: 调用 lookup_tunnel_clearance_rule 获取针对 disaster_type 的支护/排水/通风/灭火措施。

      R2: 安全否决：若 gas_concentration 超标或结构变形超限，立即禁止通行，抢通目标设为 I 级。

      R3: 依据 target_level 确定最小通行限界：III级(宽1.5m/高2m)，II级(宽2.3m/高2.5m)。

      R4: 结合 EquipmentStock 库存选择适配装备，优先满足时效性与安全性。

      副作用: 写入 TunnelClearanceRecord (status=应急实施/抢通完成, 记录 clearance_target_level,
      min_passage_width, min_passage_height, gas_leak_detected, fire_detected)。'
    params:
      event_id:
        type: str
        description: 关联突发事件ID
      target_level:
        type: str
        description: 抢通目标等级
      disaster_type:
        type: str
        description: 灾害类型
      gas_concentration:
        type: float
        description: 有害气体浓度
    writes_to:
    - TunnelClearanceRecord
  conduct_accident_inspection:
    summary: 实施事故现场勘查
    group: 事故处置
    description: 接收事故坐标与环境数据，匹配安全与调查规则，输出警戒/探测/防护记录。
    depends_on: []
    hint: 'R1: 调用 lookup_accident_inspection_rule，输入 site_environment 和 weather_condition，获取
      warning_range(警戒范围)、protection_level(防护等级) 和 evacuation_requirement(疏散要求)。

      R2: 结合 AccidentEvent 的 has_hazardous_materials 和 accident_type 识别危化品/火灾风险，确定现场警戒与探测重点。

      R3: 依据规范 9.1.3 执行现场警戒（设置反光标志/锥形筒）、人员疏散及危化品探测。

      副作用: 写入 AccidentInspectionRecord，记录 accident_type, vehicle_type, hazardous_material_type,
      casualty_count, weather_condition, alert_zone_set=true, status=''现场警戒''。'
    params:
      event_id:
        type: str
        description: 交通事故唯一标识
      site_environment:
        type: str
        description: 现场环境描述
      weather_condition:
        type: str
        description: 气象状况
    writes_to:
    - AccidentInspectionRecord
  assess_accident_level:
    summary: 评估事故等级
    group: 事故处置
    description: 接收伤亡/损失/影响数据，匹配事故分级标准，输出事故级别与响应需求记录。
    depends_on:
    - conduct_accident_inspection
    hint: 'R1: 调用 lookup_accident_type_rule，输入 accident_form 和 casualty_count/economic_loss
      等上下文，确定 accident_type。

      R2: 调用 lookup_accident_level_standard，输入 casualty_count, economic_loss, impact_scope，查询匹配的事故等级
      (accident_level) 和响应等级 (response_level)。

      R3: 根据查得的 accident_level 和 response_level，结合规范 5.2.1 及上下文推断 handling_difficulty,
      coordination_level, estimated_handling_time。

      副作用: 写入 AccidentLevelRecord 对象，包含 event_id, accident_level, response_level 及推断的处置参数。'
    params:
      event_id:
        type: str
        description: 交通事故唯一标识
      casualty_count:
        type: int
        description: 伤亡人数
      economic_loss:
        type: float
        description: 直接经济损失(万元)
      impact_scope:
        type: str
        description: 交通影响范围
      accident_form:
        type: str
        description: 事故形态/致因
    writes_to:
    - AccidentLevelRecord
  dispatch_accident_equipment:
    summary: 调度事故处置装备
    group: 事故处置
    description: 接收车辆吨位与作业方式，匹配装备选型规则，输出清障/起重/破拆装备调拨记录。
    depends_on:
    - assess_accident_level
    hint: 'R1: 调用 lookup_accident_equipment_rule，传入 vehicle_tonnage 和 operation_mode
      查询 AccidentEquipmentRule，获取匹配的 equipment_type。

      R2: 依据 10.2.1 选型原则（功能适用性、环境适应性、作业安全性、技术先进性）及 10.2.2 配置原则（通用与专用组合、群组最少、动态配置），从
      EquipmentStock 中筛选符合 equipment_type 且库存可用的装备。

      R3: 生成调度记录，写入 AccidentEquipmentDispatch 对象，包含 event_id、equipment_type、equipment_category、weight_class、deployment_method，初始
      status 设为 ''已调度''。'
    params:
      event_id:
        type: str
        description: 交通事故唯一标识
      vehicle_tonnage:
        type: float
        description: 涉事车辆吨位(t)
      operation_mode:
        type: str
        description: 作业方式(牵拉/起吊/扶正/拖运等)
    writes_to:
    - AccidentEquipmentDispatch
  handle_accident_scene:
    summary: 处置事故现场
    group: 事故处置
    description: 接收事故类型与装备到位状态，匹配处理流程规则，输出牵拉/起吊/拖运作业记录。
    depends_on:
    - dispatch_accident_equipment
    hint: 'R1: 调用 lookup_accident_handling_rule(accident_type) 获取处置步骤(牵拉/起吊/扶正/拖运)。

      R2: 调用 lookup_safety_distance_rule(voltage, environment) 获取最小安全距离(min_safe_distance)。

      R3: 依据规范9.1.3设置警戒区(白天150m/夜间200m)，确保作业距离满足R2返回的安全距离。

      R4: 依据规范9.3.1优先解救被困人员，严禁烟火，按R1步骤执行处置。

      副作用: 写入 AccidentHandlingRecord 记录(event_id, accident_type, handling_method,
      start_time, end_time, duration_hours, status=已完成)。'
    params:
      event_id:
        type: str
        description: 交通事故唯一标识
      accident_type:
        type: str
        description: 事故类型
      voltage:
        type: float
        description: 邻近高压线电压(kV)
      environment:
        type: str
        description: 作业环境(隧道/桥梁/山区等)
    writes_to:
    - AccidentHandlingRecord
  lookup_event_level_standard:
    summary: 查询突发事件分级标准
    group: 规则查询
    description: 接收公路等级/中断时间/影响范围，返回I-IV级分级阈值与判定逻辑。
    depends_on: []
    hint: 'R1: 根据输入的 highway_class、interruption_time 和 impact_scope 查询 EventLevelStandard
      表。

      R2: 匹配规则：

      - I级: 国家干线 + 中断>24h + 影响周边省份

      - II级: (国家干线 + 中断>12h) 或 (省级干线 + 中断>24h)

      - III级: (国家干线 + 中断>6h) 或 (省级干线 + 中断>12h)

      - IV级: 其他情况

      R3: 返回匹配到的 event_level。'
    params:
      highway_class:
        type: str
        description: 公路等级
      interruption_time:
        type: float
        description: 中断时间(小时)
      impact_scope:
        type: str
        description: 影响范围
  lookup_report_time_rule:
    summary: 查询事件上报时限规则
    group: 规则查询
    description: 接收事件级别，返回对应上报时限、流程节点与信息要素要求。
    depends_on: []
    hint: '根据输入的事件级别(event_level)查询 ReportTimeRule 规则表。

      返回字段: report_time_limit(上报时限/小时), report_method(上报方式)。

      注意: 仅返回规则数据，不包含具体事件信息。'
    params:
      event_level:
        type: str
        description: 事件级别
  lookup_command_dispatch_rule:
    summary: 查询指挥调度规则
    group: 规则查询
    description: 接收事件级别，返回指挥层级划分、跨部门联动机制与求援条件。
    depends_on: []
    hint: 'R1: 根据输入 event_level (I级/II级/III级/IV级) 查询 CommandDispatchRule 表。

      R2: 返回对应的 command_level (指挥层级)、linkage_mechanism (联动机制)。

      R3: 依据 5.4 节规则，确定是否需要向上级求援或启动跨部门联动。'
    params:
      event_level:
        type: str
        description: 事件级别
  lookup_resource_dispatch_rule:
    summary: 查询资源调度原则
    group: 规则查询
    description: 接收事件类型与位置，返回调度路径规划、优先级排序与补偿原则。
    depends_on: []
    hint: 'R1: 根据 event_type 和 location 查询 ResourceDispatchRule 表。

      R2: 返回 dispatch_path(调度路径)、priority(优先级)。

      R3: 调度原则：结合所处位置与运输方式快速性特征，以最快运输方式明确调运路径(5.5.3)。

      R4: 调度范围：结合属地及上级应急管理机构资源布局综合开展(5.5.6)。'
    params:
      event_type:
        type: str
        description: 事件类型
      location:
        type: str
        description: 事发位置
  lookup_response_termination_rule:
    summary: 查询响应终止规则
    group: 规则查询
    description: 接收处置状态与清理完成度，返回终止判定条件或扩大应急触发阈值。
    depends_on: []
    hint: '根据输入的 disposal_status(处置状态) 和 cleanup_completion(清理完成度) 查询 ResponseTerminationRule
      表。

      返回: termination_decision(终止/扩大应急判定)。'
    params:
      disposal_status:
        type: str
        description: 处置状态
      cleanup_completion:
        type: str
        description: 清理完成度
  lookup_subgrade_damage_standard:
    summary: 查询路基受损分级标准
    group: 规则查询
    description: 接收损毁特征描述，返回I-III级分级定义与对应通行建议。
    depends_on: []
    hint: '根据输入的 damage_feature 在 SubgradeDamageStandard 中匹配对应的损毁等级 (damage_grade)
      和通行建议 (access_decision)。

      返回字段: damage_grade (I级/II级/III级), access_decision (正常通行/限制通行/禁止通行)。'
    params:
      damage_feature:
        type: str
        description: 损毁特征
  lookup_slope_damage_standard:
    summary: 查询边坡受损分级标准
    group: 规则查询
    description: 接收滑坡/崩塌特征，返回I-III级分级定义与对应通行建议。
    depends_on: []
    hint: '根据输入的 damage_feature 在 SlopeDamageStandard 中匹配对应的损毁等级 (damage_grade) 和通行建议
      (access_decision)。

      返回字段: damage_grade (I级/II级/III级), access_decision (正常通行/限制通行/禁止通行)。'
    params:
      damage_feature:
        type: str
        description: 损毁特征
  lookup_retaining_structure_damage_standard:
    summary: 查询支挡结构受损分级标准
    group: 规则查询
    description: 接收挡墙/护坡特征，返回I-III级分级定义与对应通行建议。
    depends_on: []
    hint: '根据输入的 damage_feature 在 RetainingStructureDamageStandard 中匹配对应的损毁等级 (damage_grade)
      和通行建议 (access_decision)。

      返回字段: damage_grade (I级/II级/III级), access_decision (正常通行/限制通行/禁止通行)。'
    params:
      damage_feature:
        type: str
        description: 损毁特征
  lookup_subgrade_clearance_rule:
    summary: 查询路基抢通技术规则
    group: 规则查询
    description: 接收灾害类型与地质条件，返回回填/拓宽/注浆/改线等技术选型指南。
    depends_on: []
    hint: '根据输入的 disaster_type 和 geological_condition 查询 SubgradeClearanceRule 表。

      返回匹配的 clearance_technique（抢通技术）。

      注意：若存在多条匹配规则，需结合具体灾害特征（如沉陷、坍塌、水毁等）选择最适技术。'
    params:
      disaster_type:
        type: str
        description: 灾害类型
      geological_condition:
        type: str
        description: 地质条件
  lookup_traffic_control_rule:
    summary: 查询交通管制措施规则
    group: 规则查询
    description: 接收损伤等级，返回半幅/限速/分时/封闭等管制措施配置。
    depends_on: []
    hint: 'R1: 根据输入的 damage_grade (I级/II级/III级) 查询 TrafficControlRule 表。

      R2: 返回对应的 control_measure (如半幅通行、限速、封闭等)。

      R3: 依据规范 6.3.4，II级(限制通行)通常对应半幅/单车道/限速/分时；III级(禁止通行)对应封闭。'
    params:
      damage_grade:
        type: str
        description: 损伤等级
  lookup_secondary_disaster_warning_rule:
    summary: 查询次生灾害预警规则
    group: 规则查询
    description: 接收变形趋势与巡查频次，返回预警级别划分与对应处置要求。
    depends_on: []
    hint: '根据输入的 deformation_trend (变形趋势) 和 inspection_frequency (巡查频次)，在 SecondaryDisasterWarningRule
      规则表中匹配对应的预警级别。

      返回字段: warning_level (预警级别)。

      注意: 若变形趋势为持续变形或特征不明，需结合规范6.4.1要求安排专人跟踪或布设观测点，但本函数仅返回基于当前输入参数的规则匹配结果。'
    params:
      deformation_trend:
        type: str
        description: 变形趋势
      inspection_frequency:
        type: str
        description: 巡查频次
  lookup_bridge_inspection_rule:
    summary: 查询桥涵调查规则
    group: 规则查询
    description: 接收灾害类型，返回重点调查部位、检查内容与所需设备清单。
    depends_on: []
    hint: 'R1: 根据输入的 disaster_type 查询 BridgeInspectionRule 规则表。

      R2: 返回该灾害类型对应的 inspection_part(调查部位)、inspection_content(调查内容) 和 equipment_list(设备清单)。

      R3: 若存在多条规则，返回所有匹配项以覆盖不同调查维度（整体稳定性、承载能力、通行能力）。'
    params:
      disaster_type:
        type: str
        description: 灾害类型
  lookup_bridge_stability_standard:
    summary: 查询桥涵稳定性标准
    group: 规则查询
    description: 接收整体偏位/坍塌特征，返回I-III级稳定性等级与通行建议。
    depends_on: []
    hint: '根据输入的 damage_feature 在 BridgeStabilityStandard 规则库中匹配对应的损伤等级 (damage_grade)
      和通行结论 (access_decision)。

      返回字段含义:

      - damage_grade: 损伤等级 (I级/II级/III级)

      - access_decision: 通行结论 (正常通行/限制通行/禁止通行)'
    params:
      damage_feature:
        type: str
        description: 损毁特征
  lookup_bridge_capacity_standard:
    summary: 查询桥涵承载力标准
    group: 规则查询
    description: 接收构件开裂/变形特征，返回I-III级承载力等级与通行建议。
    depends_on: []
    hint: '根据输入的 damage_feature 在 BridgeCapacityStandard 规则表中匹配对应的损伤等级 (damage_grade)
      和通行结论 (access_decision)。

      返回字段: damage_grade (I级/II级/III级), access_decision (正常通行/限制通行/禁止通行)。'
    params:
      damage_feature:
        type: str
        description: 损毁特征
  lookup_bridge_passability_standard:
    summary: 查询桥涵通行能力标准
    group: 规则查询
    description: 接收桥面高差/障碍特征，返回I-III级通行能力等级与通行建议。
    depends_on: []
    hint: '根据输入的 damage_feature 在 BridgePassabilityStandard 表中匹配对应的损伤等级 (damage_grade)
      和通行结论 (access_decision)。

      返回字段: damage_grade (I级/II级/III级), access_decision (正常通行/限制通行/禁止通行)。'
    params:
      damage_feature:
        type: str
        description: 损毁特征
  lookup_bridge_clearance_rule:
    summary: 查询桥涵抢通技术规则
    group: 规则查询
    description: 接收损毁程度与地形条件，返回便道/便桥/修复/加固等技术选型指南。
    depends_on: []
    hint: '根据输入的 damage_degree 和 terrain_condition 查询 BridgeClearanceRule 规则表。

      返回匹配的 clearance_technique（枚举值：便道、便桥、修复、加固、桥改路）。

      注意：若输入条件无匹配规则，应返回空或提示需人工决策。'
    params:
      damage_degree:
        type: str
        description: 损毁程度
      terrain_condition:
        type: str
        description: 地形条件
  lookup_temporary_bridge_rule:
    summary: 查询便桥选用规则
    group: 规则查询
    description: 接收跨径/流速/载重条件，返回应急便桥桥型、时效与保障能力参数。
    depends_on: []
    hint: 'R1: 根据输入的 span_length(跨径)、water_flow(水流速度)、load_capacity(承载能力) 查询 TemporaryBridgeRule
      规则表。

      R2: 匹配满足上述三个参数约束的桥型方案。

      R3: 返回推荐的 bridge_type(桥型)、service_life(时效) 及保障能力信息。'
    params:
      span_length:
        type: float
        description: 跨径(m)
      water_flow:
        type: float
        description: 水流速度(m/s)
      load_capacity:
        type: float
        description: 承载能力(t)
  lookup_bridge_reinforcement_rule:
    summary: 查询桥涵永久加固规则
    group: 规则查询
    description: 接收损伤类型，返回加固工艺、监测要求与材料规格标准。
    depends_on: []
    hint: '根据输入的 damage_type 查询 BridgeReinforcementRule 表。

      返回: reinforcement_process(加固工艺)、monitoring_requirement(监测要求)、material(材料)。

      依据: 规范 7.3.14 条，针对承载能力评估为II、III类的桥涵快速补强加固技术要求。'
    params:
      damage_type:
        type: str
        description: 损伤类型
  lookup_tunnel_inspection_rule:
    summary: 查询隧道调查规则
    group: 规则查询
    description: 接收灾害类型，返回调查部位、气体检测与火灾排查清单。
    depends_on: []
    hint: '根据输入的 disaster_type 查询 TunnelInspectionRule 规则表。

      返回对应的 inspection_part（调查部位）、gas_check_list（气体排查清单）和 fire_check_list（火灾排查清单）。

      注意：不同灾害类型对应不同的重点调查部位和排查清单。'
    params:
      disaster_type:
        type: str
        description: 灾害类型
  lookup_tunnel_importance_level:
    summary: 查询隧道重要等级
    group: 规则查询
    description: 接收道路等级与交通量，返回一/二/三级重要等级划分。
    depends_on: []
    hint: '根据输入的 road_class 和 traffic_volume 查询 TunnelImportanceLevel 规则表。

      返回字段: importance_level (枚举值: 一级、二级、三级)。

      注意: 特殊重要隧道或起控制作用的隧道可直接定为一级(8.3.2说明)。'
    params:
      road_class:
        type: str
        description: 道路等级
      traffic_volume:
        type: int
        description: 年日均交通量(pcu/d/ln)
  lookup_secondary_risk_level:
    summary: 查询次生风险等级
    group: 规则查询
    description: 接收发生概率与损失程度，返回I-IV级次生事故风险等级。
    depends_on: []
    hint: 'R1: 根据输入的 occurrence_probability（发生概率）和 loss_degree（损失程度），在 SecondaryRiskLevel
      规则表中查找匹配记录。

      R2: 返回对应的 risk_level（风险等级，I-IV级）。

      注意：输入参数需与规则表中的枚举值（如''频繁的''、''灾难性的''等）严格匹配。'
    params:
      occurrence_probability:
        type: str
        description: 发生概率
      loss_degree:
        type: str
        description: 损失程度
  lookup_clearance_difficulty_matrix:
    summary: 查询抢通难度矩阵
    group: 规则查询
    description: 接收抢通时长与风险等级，返回高/中/低难度等级判定。
    depends_on: []
    hint: '根据输入的 clearance_duration (A/B/C/D) 和 risk_level (I/II/III/IV级) 查询 ClearanceDifficultyMatrix
      表。

      返回对应的 difficulty_level (高难度/中等难度/低难度)。

      依据: 规范 8.3.7 表 8.3-7。'
    params:
      clearance_duration:
        type: str
        description: 抢通时长评级(A/B/C/D)
      risk_level:
        type: str
        description: 风险等级
  lookup_tunnel_target_matrix:
    summary: 查询隧道抢通目标矩阵
    group: 规则查询
    description: 接收难度等级与重要等级，返回I-III级抢通目标等级。
    depends_on: []
    hint: '根据输入的 difficulty_level (高难度/中等难度/低难度) 和 importance_level (一级/二级/三级)，查询
      TunnelTargetMatrix 规则表。

      返回对应的 target_level (I级/II级/III级)。

      注意：I级代表禁止通行并改道，II级代表限制性通行，III级代表保证基本抢险车辆通行。'
    params:
      difficulty_level:
        type: str
        description: 难度等级
      importance_level:
        type: str
        description: 重要等级
  lookup_tunnel_clearance_limit:
    summary: 查询隧道通行限界
    group: 规则查询
    description: 接收抢通目标等级，返回最小宽高限界(m)标准。
    depends_on: []
    hint: '根据输入的 target_level (I级/II级/III级) 查询 TunnelClearanceLimit 规则表。

      返回对应的 min_width (最小宽度, m) 和 min_height (最小高度, m)。

      注意: 规范8.5.1表8.6-1中仅定义了II级(2.3m宽, 2.5m高)和III级(1.5m宽, 2m高)的限界，I级通常对应禁止通行或改道，若无数据需按业务逻辑处理。'
    params:
      target_level:
        type: str
        description: 抢通目标等级
  lookup_tunnel_clearance_rule:
    summary: 查询隧道抢通技术规则
    group: 规则查询
    description: 接收灾害类型，返回支护/排水/通风/灭火等技术要求。
    depends_on: []
    hint: '根据输入的 disaster_type 查询 TunnelClearanceRule 表。

      返回对应的 clearance_measure（支护、排水、通风、灭火、防护台车、脚手架等）。

      注意：不同灾害类型可能对应多种措施，需结合具体场景选择。'
    params:
      disaster_type:
        type: str
        description: 灾害类型
