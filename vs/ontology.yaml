        description: 事故类型，枚举：抛锚、碰撞、碾压、翻车、坠车、落水、烧毁、货物散落
      vehicle_type:
        type: str
        description: 涉事车辆类型，如：客车、普通货车、危化品运输车
      hazardous_material_type:
        type: str
        description: 危化品类型，如：爆炸性、易燃性、毒害性、放射性、腐蚀性
      casualty_count:
        type: int
        description: 人员伤亡数量
      vehicle_damage_count:
        type: int
        description: 车辆损失数量
      weather_condition:
        type: str
        description: 气象状况，如：雾、冰雪、霜、雨、大风
      road_blockage_status:
        type: str
        description: 道路阻隔情况
      alert_zone_set:
        type: bool
        description: 是否已设置警戒区域
      status:
        type: str
        description: 调查状态，如：现场警戒、危化品探测、环境评估、防护配置
      event_id:
        type: str
        description: 关联的交通事故ID
  AccidentLevelRecord:
    summary: 事故等级评估(伤亡/损失/响应等级/处理需求)
    description: 业务流程生成数据，由定级函数自动写入，通过记录ID查询。
    properties:
      accident_level:
        type: str
        description: 事故等级，枚举：I级(特大)、II级(重大)、III级(较大)、IV级(一般)
      response_level:
        type: str
        description: 响应等级，枚举：I级、II级、III级、IV级
      handling_difficulty:
        type: str
        description: 处理难度，枚举：难度极大、难度较大、难度不大、容易
      coordination_level:
        type: str
        description: 需求等级/协调层级，如：交通运输部组织协调、省级、市级、县级
      estimated_handling_time:
        type: str
        description: 应急处理时限，如：>=12小时、6~12小时、3~6小时、<=3小时
      economic_loss_range:
        type: str
        description: 直接经济损失范围，如：5000万元以上、1000-5000万元、500-1000万元、500万元以下
      status:
        type: str
        description: 评估状态，如：伤亡统计、损失评估、响应等级判定
      event_id:
        type: str
        description: 关联的交通事故ID
  AccidentEquipmentDispatch:
    summary: 装备调度记录(清障/起重/破拆装备调拨/到位状态)
    description: 业务流程生成数据，由装备调度函数生成，通过记录ID查询。
    properties:
      equipment_type:
        type: str
        description: 装备类型，如：清障救援车、起重机、破拆工具、侦测设备
      equipment_category:
        type: str
        description: 装备分类，枚举：通用装备、专用装备
      weight_class:
        type: str
        description: 重量等级，枚举：微型(<1t)、轻型(1-12t)、中型(12-30t)、重型(>30t)
      deployment_method:
        type: str
        description: 部署方式，枚举：人力携行、自行运输、陆地运输、空中运输
      arrival_status:
        type: str
        description: 到位状态，如：已调度、运输中、已到位、作业中、已撤出
      status:
        type: str
        description: 调度记录状态
      event_id:
        type: str
        description: 关联的交通事故ID
  AccidentHandlingRecord:
    summary: 事故处置作业记录(牵拉/起吊/扶正/拖运执行/恢复)
    description: 业务流程生成数据，由处置函数自动写入，通过记录ID查询。
    properties:
      accident_type:
        type: str
        description: 事故类型，枚举值：抛锚、碰撞、碾压、翻车、坠车、落水、烧毁、货物散落
      accident_level:
        type: str
        description: 事故等级，枚举值：I级(特大)、II级(重大)、III级(较大)、IV级(一般)
      response_level:
        type: str
        description: 响应等级，枚举值：I级、II级、III级、IV级
      handling_method:
        type: str
        description: 主要处置作业方式，枚举值：牵拉、起吊、扶正、拖运、撑涨破拆、消防、侦检、现场抢修
      vehicle_type:
        type: str
        description: 事故车辆类型，如：小型客车、中型货车、重型半挂、电动汽车等
      has_hazardous_materials:
        type: bool
        description: 是否涉及危化品泄漏或火灾爆炸风险
      personnel_trapped:
        type: bool
        description: 是否有人员被困
      start_time:
        type: str
        description: 处置开始时间
      end_time:
        type: str
        description: 处置结束时间
      duration_hours:
        type: float
        description: 处置耗时（小时），用于对比应急处理时限标准
      status:
        type: str
        description: 处置状态，枚举值：进行中、已完成、已终止
      event_id:
        type: str
        description: 关联的交通事故ID
  DetourPlanRecord:
    summary: 绕行分流方案记录(替代路线/管制措施/信息发布)
    description: 业务流程生成数据，由分流规划函数生成，通过方案ID查询。
    properties:
      control_measure_type:
        type: str
        description: 交通管制措施类型，枚举值：半幅通行、单车道居中通行、限速限载、分时控制、封闭道路、单向间隔管制
      detour_route_description:
        type: str
        description: 绕行路线描述或替代路线名称
      info_release_channels:
        type: str
        description: 信息发布渠道，枚举值：广播、电视、电台、交通信息牌、APP推送
      warning_sign_distance:
        type: int
        description: 警示标志设置距离（米），如白天150m，夜间200m
      is_traffic_resumed:
        type: bool
        description: 交通是否已恢复
      status:
        type: str
        description: 方案状态，枚举值：制定中、执行中、已解除
