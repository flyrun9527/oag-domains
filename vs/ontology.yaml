name: vs
description: 领域本体，包含 69 个对象类型（15 实体、31 规则、23 过程）
objects:
  RoadSegment:
    summary: 路段(公路基本单元，按桩号/坐标搜)
    description: 基础地理实体数据，通过空间索引或桩号查询接口获取。
    properties:
      road_class:
        type: str
        description: 公路等级，枚举值：高速公路、一级公路、二级公路、三级公路、四级公路
      road_name:
        type: str
        description: 路段名称
      start_pile_number:
        type: str
        description: 起始桩号
      end_pile_number:
        type: str
        description: 终止桩号
      direction:
        type: str
        description: 运行方向
      road_width:
        type: float
        description: 道路宽度(m)
      surface_condition:
        type: str
        description: 路面状况
      segment_id:
        type: str
        description: 路段唯一标识
  Bridge:
    summary: 桥梁(含桥涵，按bridge_id查)
    description: 结构物台账数据，通过ID或空间范围查询接口获取。
    properties:
      structure_type:
        type: str
        description: 结构形式，枚举值：梁桥、拱桥、缆索桥、斜拉桥等
      span_length:
        type: float
        description: 跨径(m)
      material:
        type: str
        description: 材质，枚举值：混凝土、钢结构、组合结构
      bearing_type:
        type: str
        description: 支座类型
      pier_count:
        type: int
        description: 桥墩数量
      abutment_type:
        type: str
        description: 桥台类型
      foundation_type:
        type: str
        description: 基础类型
      expansion_joint_type:
        type: str
        description: 伸缩缝类型
      segment_id:
        type: str
        description: 所属路段ID
  Tunnel:
    summary: 隧道(按tunnel_id查)
    description: 结构物台账数据，通过ID或空间范围查询接口获取。
    properties:
      ventilation_type:
        type: str
        description: 通风方式
      fire_protection_level:
        type: str
        description: 消防等级
      cross_passage_type:
        type: str
        description: 横通道类型，枚举值：人行横通道、车行横通道
      lining_type:
        type: str
        description: 衬砌类型
      ceiling_type:
        type: str
        description: 吊顶类型
      embedded_parts_status:
        type: str
        description: 预埋件状况
      segment_id:
        type: str
        description: 所属路段ID
  EmergencyDepot:
    summary: 应急储备中心(按坐标/行政层级搜)
    description: 物资储备节点数据，通过空间/层级查询接口获取。
    properties:
      administrative_level:
        type: str
        description: 行政级别，枚举值：国家、省、市、县
      depot_id:
        type: str
        description: 储备中心唯一标识
      org_id:
        type: str
        description: 管辖组织机构ID
  RescueTeam:
    summary: 救援队伍(按坐标/专业能力搜)
    description: 应急力量台账数据，通过空间/能力标签查询接口获取。
    properties:
      team_type:
        type: str
        description: 队伍类型，如：应急救援施工队伍、应急救援专家、社会应急救援力量
      specialty:
        type: str
        description: 专业能力/专长，如：隧道抢通、桥涵抢通、事故处理、危化品处置
      personnel_count:
        type: int
        description: 编制人数
      equipment_list:
        type: str
        description: 配备的应急装备清单，如：土方装备、破碎装备、侦测装备等
      location:
        type: str
        description: 驻扎或部署位置
      org_id:
        type: str
        description: 所属组织机构ID
  EquipmentStock:
    summary: 装备库存(储备点→装备清单)
    description: 物资明细数据，关联储备点ID查询接口获取。
    properties:
      equipment_category:
        type: str
        description: 装备类别，枚举值：通用装备、专用装备
      function_type:
        type: str
        description: 作业功能，枚举值：土方、破碎、桩工、混凝土、起重吊装、运输、生存保障、应急侦测、路基路面抢通、桥涵抢通、隧道抢通、事故处置、冰雪沙泥水火灾害处置
      weight_class:
        type: str
        description: 重量等级，枚举值：微型(<1t)、轻型(1-12t)、中型(12-30t)、重型(>30t)
      transport_mode:
        type: str
        description: 运达方式，枚举值：人力携行、自行运输、陆地运输、空中运输
      environment_adaptability:
        type: str
        description: 环境适应性，枚举值：全地形、高海拔等
      depot_id:
        type: str
        description: 所属储备中心ID
  MaterialStock:
    summary: 物资库存(储备点→物资清单)
    description: 物资明细数据，关联储备点ID查询接口获取。
    properties:
      material_type:
        type: str
        description: 物资类型，枚举值：融雪材料、防滑材料、防沙材料、填充材料等
      applicable_disaster:
        type: str
        description: 适用灾害类型，枚举值：冰雪、沙害、水毁、泥石流等
      depot_id:
        type: str
        description: 所属储备中心ID
  Organization:
    summary: 应急组织机构(指挥/管养单位)
    description: 行政与指挥架构数据，通过层级/职责查询接口获取。
    properties:
      org_level:
        type: str
        description: 组织层级，枚举值：交通运输部、省级、市级、县级、企事业单位
      responsibility_scope:
        type: str
        description: 职责范围
      org_id:
        type: str
        description: 组织机构唯一标识
  DisasterEvent:
    summary: 自然灾害事件(地震/滑坡/水毁等)
    description: 灾情上报数据，通过时间/空间范围查询接口获取。
    properties:
      disaster_type:
        type: str
        description: 灾害类型，枚举值：地震、滑坡、泥石流、水毁、冰雪、风沙、火灾等
      occurrence_time:
        type: str
        description: 发生时间
      location:
        type: str
        description: 发生地点
      impact_scope:
        type: str
        description: 影响范围
      severity_level:
        type: str
        description: 事件级别，枚举值：I级(特别重大)、II级(重大)、III级(较大)、IV级(一般)
      estimated_recovery_time:
        type: float
        description: 预计抢修处置时间(小时)
      event_id:
        type: str
        description: 自然灾害事件唯一标识
  AccidentEvent:
    summary: 交通事故事件(碰撞/翻车/危化品等)
    description: 事故报警数据，通过时间/空间范围查询接口获取。
    properties:
      accident_type:
        type: str
        description: 事故类型，枚举值：抛锚、碰撞、碾压、翻车、坠车、落水、烧毁、货物散落
      vehicle_type:
        type: str
        description: 涉事车辆类型，枚举值：客车、货车、轿车、特种车等
      has_hazardous_materials:
        type: bool
        description: 是否涉及危化品
      casualty_count:
        type: int
        description: 伤亡人数
      economic_loss:
        type: float
        description: 直接经济损失(万元)
      accident_level:
        type: str
        description: 事故等级，枚举值：I级(特大)、II级(重大)、III级(较大)、IV级(一般)
      response_level:
        type: str
        description: 响应等级，枚举值：I级、II级、III级、IV级
      event_id:
        type: str
        description: 交通事故事件唯一标识
  WeatherData:
    summary: 气象水文数据(实时/预报)
    description: 外部气象接口数据，按区域/时间查询获取。
    properties:
      temperature:
        type: float
        description: 温度(℃)
      weather_condition:
        type: str
        description: 天气状况，枚举值：雾、冰雪、霜、雨、大风等
      visibility:
        type: float
        description: 能见度(m)
      wind_speed:
        type: float
        description: 风速(m/s)
      wind_level:
        type: int
        description: 风力等级
  GeologicalData:
    summary: 地质地形资料(岩土/坡度/水文)
    description: 勘察与测绘数据，按路段/坐标查询接口获取。
    properties:
      geomorphology_type:
        type: str
        description: 地貌类型
      rock_soil_type:
        type: str
        description: 岩土体类型
      geological_structure:
        type: str
        description: 地质构造
      hydrogeology:
        type: str
        description: 水文地质
      slope_gradient:
        type: float
        description: 地形坡度(°)
  TrafficData:
    summary: 交通运行数据(流量/车速/拥堵)
    description: 监测站实时数据，按桩号/断面查询接口获取。
    properties:
      traffic_volume:
        type: int
        description: 断面流量(pcu/d)
      congestion_status:
        type: str
        description: 拥堵状态
      average_speed:
        type: float
        description: 平均车速(km/h)
  MonitoringData:
    summary: 结构监测数据(位移/应力/气体)
    description: 物联网传感器数据，按设施ID/时间查询接口获取。
    properties:
      displacement_value:
        type: float
        description: 位移值(mm)
      stress_value:
        type: float
        description: 应力值(MPa)
      gas_concentration:
        type: float
        description: 气体浓度(ppm或cm³/m³)
      gas_type:
        type: str
        description: 气体类型，枚举值：一氧化碳、氯气、氮氧化物等
      monitoring_frequency:
        type: str
        description: 监测频次
  DetourRoute:
    summary: 绕行分流路线(替代路径)
    description: 路网拓扑数据，按起终点/管制范围查询接口获取。
    properties:
      route_length:
        type: float
        description: 路线长度(km)
      road_condition:
        type: str
        description: 路况
      load_capacity:
        type: float
        description: 承载能力(t)
      max_gradient:
        type: float
        description: 最大纵坡(%)
      min_curve_radius:
        type: float
        description: 最小平曲线半径(m)
  EventLevelStandard:
    summary: 突发事件分级标准(公路等级+中断时间+影响范围→I-IV级)
    description: 业务规则库数据，通过条件键值匹配查询。
    properties:
      highway_class:
        type: str
        description: 公路等级，枚举值：国家干线、省级干线
        required: true
      interruption_time:
        type: float
        description: 中断时间(小时)
        required: true
      impact_scope:
        type: str
        description: 影响范围，枚举值：周边省份、省内、市内
        required: true
      event_level:
        type: str
        description: 事件级别，枚举值：I级、II级、III级、IV级
  ReportTimeRule:
    summary: 信息上报时效规则(事件级别→时限/流程)
    description: 业务规则库数据，通过级别匹配查询。
    properties:
      event_level:
        type: str
        description: 事件级别，枚举值：I级、II级、III级、IV级
        required: true
      report_time_limit:
        type: float
        description: 上报时限(小时)
      report_method:
        type: str
        description: 上报方式，枚举值：电话、书面、电子邮件
  CommandDispatchRule:
    summary: 指挥调度程序(事件级别→指挥层级/联动)
    description: 业务规则库数据，通过级别匹配查询。
    properties:
      event_level:
        type: str
        description: 事件级别，枚举值：I级、II级、III级、IV级
        required: true
      command_level:
        type: str
        description: 指挥层级，枚举值：交通运输部、省级、市级、县级
      linkage_mechanism:
        type: str
        description: 联动机制
  ResourceDispatchRule:
    summary: 资源调度原则(事件类型/位置→路径/优先级)
    description: 业务规则库数据，通过类型/位置匹配查询。
    properties:
      event_type:
        type: str
        description: 事件类型
        required: true
      location:
        type: str
        description: 位置
        required: true
      dispatch_path:
        type: str
        description: 调度路径
      priority:
        type: str
        description: 优先级
  ResponseTerminationRule:
    summary: 响应终止条件(处置状态/清理完成度→终止/扩大)
    description: 业务规则库数据，通过状态匹配查询。
    properties:
      disposal_status:
        type: str
        description: 处置状态
        required: true
      cleanup_completion:
        type: str
        description: 清理完成度
        required: true
      termination_decision:
        type: str
        description: 终止/扩大应急判定
  SubgradeDamageStandard:
    summary: 路基受损分级标准(损毁特征→I-III级及通行建议)
    description: 业务规则库数据，通过损毁特征匹配查询。
    properties:
      damage_feature:
        type: str
        description: 损毁特征
        required: true
      damage_grade:
        type: str
        description: 损毁等级，枚举值：I级、II级、III级
      access_decision:
        type: str
        description: 通行建议，枚举值：正常通行、限制通行、禁止通行
  SlopeDamageStandard:
    summary: 边坡受损分级标准(滑坡/崩塌特征→I-III级及通行建议)
    description: 业务规则库数据，通过地质特征匹配查询。
    properties:
      damage_feature:
        type: str
        description: 损毁特征
        required: true
      damage_grade:
        type: str
        description: 损毁等级，枚举值：I级、II级、III级
      access_decision:
        type: str
        description: 通行建议，枚举值：正常通行、限制通行、禁止通行
  RetainingStructureDamageStandard:
    summary: 支挡结构受损分级标准(挡墙/护坡特征→I-III级及通行建议)
    description: 业务规则库数据，通过结构特征匹配查询。
    properties:
      damage_feature:
        type: str
        description: 损毁特征
        required: true
      damage_grade:
        type: str
        description: 损毁等级，枚举值：I级、II级、III级
      access_decision:
        type: str
        description: 通行建议，枚举值：正常通行、限制通行、禁止通行
  SubgradeClearanceRule:
    summary: 路基抢通技术选用(灾害类型+地质条件→回填/拓宽/注浆/改线)
    description: 业务规则库数据，通过灾害/地质条件匹配查询。
    properties:
      disaster_type:
        type: str
        description: 灾害类型
        required: true
      geological_condition:
        type: str
        description: 地质条件
        required: true
      clearance_technique:
        type: str
        description: 抢通技术，枚举值：机械回填、路基拓宽、注浆加固、全部填土、拦边填土、换填泡沫轻质土、凹形竖曲线通过法、改移线位法
  TrafficControlRule:
    summary: 交通管制措施规则(损伤等级→半幅/限速/封闭)
    description: 业务规则库数据，通过损伤等级匹配查询。
    properties:
      damage_grade:
        type: str
        description: 损伤等级，枚举值：I级、II级、III级
        required: true
      control_measure:
        type: str
        description: 管制措施，枚举值：半幅通行、单车道居中通行、限速、限载、分时控制、封闭
  SecondaryDisasterWarningRule:
    summary: 次生灾害预警要求(变形趋势/巡查频次→预警级别)
    description: 业务规则库数据，通过监测数据匹配查询。
    properties:
      deformation_trend:
        type: str
        description: 变形趋势
        required: true
      inspection_frequency:
        type: str
        description: 巡查频次
        required: true
      warning_level:
        type: str
        description: 预警级别
  BridgeInspectionRule:
    summary: 桥涵调查重点规则(灾害类型→调查部位/设备清单)
    description: 业务规则库数据，通过灾害类型匹配查询。
    properties:
      disaster_type:
        type: str
        description: 灾害类型
        required: true
      inspection_part:
        type: str
        description: 调查部位，枚举值：上部结构、下部结构、基础、桥面、伸缩缝、引道
      inspection_content:
        type: str
        description: 调查内容
      equipment_list:
        type: str
        description: 设备清单
  BridgeStabilityStandard:
    summary: 桥涵稳定性评估标准(整体偏位/坍塌→I-III级及通行结论)
    description: 业务规则库数据，通过结构特征匹配查询。
    properties:
      damage_feature:
        type: str
        description: 损毁特征
        required: true
      damage_grade:
        type: str
        description: 损伤等级，枚举值：I级、II级、III级
      access_decision:
        type: str
        description: 通行结论，枚举值：正常通行、限制通行、禁止通行
  BridgeCapacityStandard:
    summary: 桥涵承载力评估标准(构件开裂/变形→I-III级及通行结论)
    description: 业务规则库数据，通过构件损伤匹配查询。
    properties:
      damage_feature:
        type: str
        description: 损毁特征
        required: true
      damage_grade:
        type: str
        description: 损伤等级，枚举值：I级、II级、III级
      access_decision:
        type: str
        description: 通行结论，枚举值：正常通行、限制通行、禁止通行
  BridgePassabilityStandard:
    summary: 桥涵通行能力评估标准(桥面高差/障碍→I-III级及通行结论)
    description: 业务规则库数据，通过桥面状况匹配查询。
    properties:
      damage_feature:
        type: str
        description: 损毁特征
        required: true
      damage_grade:
        type: str
        description: 损伤等级，枚举值：I级、II级、III级
      access_decision:
        type: str
        description: 通行结论，枚举值：正常通行、限制通行、禁止通行
  BridgeClearanceRule:
    summary: 桥涵抢通技术选用(损毁程度+地形→便道/便桥/修复/加固)
    description: 业务规则库数据，通过损毁/地形条件匹配查询。
    properties:
      damage_degree:
        type: str
        description: 损毁程度
        required: true
      terrain_condition:
        type: str
        description: 地形条件
        required: true
      clearance_technique:
        type: str
        description: 抢通技术，枚举值：便道、便桥、修复、加固、桥改路
  TemporaryBridgeRule:
    summary: 便桥技术选用规则(跨径+水流+承载→桥型/时效)
    description: 业务规则库数据，通过水文/跨径条件匹配查询。
    properties:
      span_length:
        type: float
        description: 跨径(m)
        required: true
      water_flow:
        type: float
        description: 水流速度(m/s)
        required: true
      load_capacity:
        type: float
        description: 承载能力(t)
        required: true
      bridge_type:
        type: str
        description: 桥型，枚举值：机械化桥、装配式公路钢桥、舟桥、应急轻便桥、索道桥
      service_life:
        type: str
        description: 时效
  BridgeReinforcementRule:
    summary: 永久加固技术要求(损伤类型→加固工艺/监测/材料)
    description: 业务规则库数据，通过损伤类型匹配查询。
    properties:
      damage_type:
        type: str
        description: 损伤类型
        required: true
      reinforcement_process:
        type: str
        description: 加固工艺，枚举值：外包钢管套、外缠纤维、顶升复位
